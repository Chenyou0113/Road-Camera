<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全台天氣儀表板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            font-size: 1em;
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
            min-width: 120px;
            text-align: right;
        }

        #map {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: 600px;
        }

        .loading {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .loading.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #666;
            font-size: 1.1em;
        }

        .error-message {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            color: #856404;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #764ba2;
        }

        .controls button.refresh {
            margin-left: auto;
        }

        .info-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 15px;
            color: white;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ 全台天氣儀表板</h1>
            <p>即時氣象資料來自中央氣象署 (CWA)</p>
        </div>

        <div class="info-box">
            <i class="fas fa-info-circle"></i> 
            本儀表板每 5 分鐘自動更新一次。地圖上的彩色圓點代表不同的溫度區間，點擊可查看詳細資訊。
        </div>

        <div class="error-message" id="error-message"></div>

        <div class="controls">
            <button id="btn-refresh" class="refresh">
                <i class="fas fa-sync-alt"></i> 重新整理
            </button>
        </div>

        <div class="dashboard">
            <div class="stats-card">
                <div class="stat-item">
                    <span class="stat-label">📊 總測站數</span>
                    <span class="stat-value" id="stat-total">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">🌡️ 平均溫度</span>
                    <span class="stat-value" id="stat-avg-temp">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">🔥 最高溫度</span>
                    <span class="stat-value" id="stat-max-temp">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">❄️ 最低溫度</span>
                    <span class="stat-value" id="stat-min-temp">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">🌧️ 最大雨量</span>
                    <span class="stat-value" id="stat-max-rain">--</span>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #d62828;"></div>
                        <span>≥35°C (極熱)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #f77f00;"></div>
                        <span>30-35°C (熱)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #fcbf49;"></div>
                        <span>25-30°C (舒適偏熱)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #aacc00;"></div>
                        <span>20-25°C (舒適)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #4cc9f0;"></div>
                        <span>15-20°C (涼)</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #4361ee;"></div>
                        <span>&lt;15°C (冷)</span>
                    </div>
                </div>
            </div>

            <div id="map"></div>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在載入天氣資料...</p>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBvpcEA4hfvIg9ddt0UadRLibxwsORPVe4" async defer></script>
    <script>
        // ============ 設定 ============
        const CONFIG = {
            API_URL: '/api/weather-stations',
            REFRESH_INTERVAL: 300000 // 5 分鐘
        };

        // ============ DOM 操作輔助 ============
        const DOM = {
            loading: document.getElementById('loading'),
            errorMessage: document.getElementById('error-message'),
            statTotal: document.getElementById('stat-total'),
            statAvgTemp: document.getElementById('stat-avg-temp'),
            statMaxTemp: document.getElementById('stat-max-temp'),
            statMinTemp: document.getElementById('stat-min-temp'),
            statMaxRain: document.getElementById('stat-max-rain'),
            btnRefresh: document.getElementById('btn-refresh')
        };

        let map = null;
        let markers = [];
        let stationsData = [];

        // ============ 顏色輔助函式 ============
        function getTempColor(temp) {
            if (temp === null) return '#999';
            if (temp >= 35) return '#d62828'; // 紫紅 (極熱)
            if (temp >= 30) return '#f77f00'; // 橘 (熱)
            if (temp >= 25) return '#fcbf49'; // 黃 (舒適偏熱)
            if (temp >= 20) return '#aacc00'; // 綠 (舒適)
            if (temp >= 15) return '#4cc9f0'; // 藍 (涼)
            return '#4361ee'; // 深藍 (冷)
        }

        // ============ 顯示/隱藏元素 ============
        function showLoading() {
            DOM.loading.classList.add('show');
        }

        function hideLoading() {
            DOM.loading.classList.remove('show');
        }

        function showError(message) {
            DOM.errorMessage.textContent = '❌ ' + message;
            DOM.errorMessage.classList.add('show');
            hideLoading();
        }

        function hideError() {
            DOM.errorMessage.classList.remove('show');
        }

        // ============ 初始化地圖 ============
        function initMap() {
            if (map) return; // 已初始化
            
            if (typeof google === 'undefined') {
                 setTimeout(initMap, 500);
                 return;
            }

            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 23.6, lng: 121.0 },
                zoom: 7,
                mapTypeControl: false,
                streetViewControl: false,
                 styles: [
                    {
                        featureType: "poi",
                        elementType: "labels",
                        stylers: [{ visibility: "off" }]
                    }
                ]
            });
        }

        // ============ 清除舊標記 ============
        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
        }

        // ============ 繪製標記 ============
        function drawMarkers(stations) {
            clearMarkers();
            
            if (!map) return;

            const infoWindow = new google.maps.InfoWindow();
            
            stations.forEach(st => {
                if (!st.lat || !st.lon) return;

                const color = getTempColor(st.temp);
                const scale = st.temp === null ? 3 : 5;

                // 圓點標記 (Google Maps Marker with Symbol)
                const marker = new google.maps.Marker({
                    position: { lat: st.lat, lng: st.lon },
                    map: map,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        fillColor: color,
                        fillOpacity: 0.8,
                        scale: scale,
                        strokeColor: '#fff',
                        strokeWeight: 1
                    },
                    title: st.name
                });

                // 彈出視窗內容
                const popupContent = `
                    <div style="text-align:center; font-size:0.95em; width: 200px;">
                        <b style="font-size:1.2em; color:${color}">${st.name}</b>
                        <br>
                        <small style="color:#666">${st.city} ${st.town}</small>
                        <hr style="margin:8px 0; border:none; border-top:1px solid #ddd;">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; text-align:left;">
                            <div>
                                <span style="font-weight:bold; color:${color}; font-size:1.4em;">
                                    ${st.temp !== null ? st.temp.toFixed(1) + '°C' : '無資料'}
                                </span>
                                <br>
                                <small style="color:#888">溫度</small>
                            </div>
                            <div>
                                <span style="font-weight:bold; color:#4361ee; font-size:1.2em;">
                                    ${st.humid !== null ? st.humid.toFixed(0) + '%' : '--'}
                                </span>
                                <br>
                                <small style="color:#888">濕度</small>
                            </div>
                        </div>
                        <hr style="margin:8px 0; border:none; border-top:1px solid #ddd;">
                        <div style="text-align:left; font-size:0.9em;">
                            💨 風速: ${st.wind_speed !== null ? st.wind_speed.toFixed(1) : '--'} m/s
                            <br>
                            🌧️ 雨量: ${st.rain !== null ? st.rain.toFixed(1) : '0'} mm
                            <br>
                            ☀️ 紫外線: ${st.uvi !== null ? st.uvi.toFixed(1) : '--'}
                            <br>
                            🕐 ${new Date(st.time).toLocaleTimeString('zh-TW')}
                        </div>
                    </div>
                `;

                marker.addListener('click', () => {
                    infoWindow.setContent(popupContent);
                    infoWindow.open(map, marker);
                });
                
                markers.push(marker);
            });

            console.log(`✅ 已在地圖上繪製 ${stations.length} 個標記`);
        }

        // ============ 更新統計資料 ============
        function updateStats(stations) {
            // 計算有效溫度的測站
            const validTemps = stations
                .filter(s => s.temp !== null)
                .map(s => s.temp);

            const validRains = stations
                .filter(s => s.rain !== null && s.rain > 0)
                .map(s => s.rain);

            const total = stations.length;
            const avgTemp = validTemps.length > 0 
                ? (validTemps.reduce((a, b) => a + b, 0) / validTemps.length).toFixed(1)
                : '--';
            const maxTemp = validTemps.length > 0 ? Math.max(...validTemps).toFixed(1) : '--';
            const minTemp = validTemps.length > 0 ? Math.min(...validTemps).toFixed(1) : '--';
            const maxRain = validRains.length > 0 ? Math.max(...validRains).toFixed(1) : '0';

            DOM.statTotal.textContent = total;
            DOM.statAvgTemp.textContent = avgTemp + (typeof avgTemp === 'number' ? '°C' : '');
            DOM.statMaxTemp.textContent = maxTemp + (typeof maxTemp === 'number' ? '°C' : '');
            DOM.statMinTemp.textContent = minTemp + (typeof minTemp === 'number' ? '°C' : '');
            DOM.statMaxRain.textContent = maxRain + (typeof maxRain === 'number' ? ' mm' : '');
        }

        // ============ 載入天氣資料 ============
        async function loadWeatherData() {
            try {
                showLoading();
                hideError();

                console.log('🔄 正在從 API 載入天氣資料...');
                const response = await fetch(CONFIG.API_URL);

                if (!response.ok) {
                    throw new Error(`API 返回狀態 ${response.status}`);
                }

                const result = await response.json();
                console.log(`✅ 成功載入 ${result.count} 個測站的資料`);

                if (!result.success || !result.data) {
                    throw new Error('API 返回資料格式錯誤');
                }

                stationsData = result.data;

                // 確保地圖已初始化
                initMap();

                // 繪製標記
                drawMarkers(stationsData);

                // 更新統計資料
                updateStats(stationsData);

                hideLoading();

            } catch (err) {
                console.error('❌ 載入天氣資料時出錯:', err.message);
                showError(err.message);
            }
        }

        // ============ 頁面初始化 ============
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 天氣儀表板正在初始化...');
            
            // 載入資料
            loadWeatherData();

            // 設定自動刷新 (5 分鐘)
            setInterval(loadWeatherData, CONFIG.REFRESH_INTERVAL);

            // 手動刷新按鈕
            DOM.btnRefresh.addEventListener('click', loadWeatherData);

            console.log('✅ 天氣儀表板初始化完成');
        });

        // ============ 全局錯誤處理 ============
        window.addEventListener('error', (e) => {
            console.error('❌ 全局錯誤:', e.message);
        });

        window.addEventListener('unhandledrejection', (e) => {
            console.error('❌ 未處理的 Promise 拒絕:', e.reason);
        });
    </script>
</body>
</html>
