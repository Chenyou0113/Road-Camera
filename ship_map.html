<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時海圖 | 臺灣天氣視界</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Maps API -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBvpcEA4hfvIg9ddt0UadRLibxwsORPVe4&libraries=places&language=zh-TW&callback=initMap"></script>
    <style>
        body { 
            margin: 0; 
            background: #0f172a; 
            color: white; 
            font-family: 'Microsoft JhengHei', sans-serif; 
        }
        nav { 
            background: rgba(15, 23, 42, 0.95); 
            padding: 15px 25px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #1e40af; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .back-btn { 
            color: white; 
            text-decoration: none; 
            margin-right: 20px; 
            font-weight: bold; 
            transition: all 0.3s;
        }
        .back-btn:hover {
            color: #06b6d4;
        }
        .nav-title {
            font-size: 1.2rem; 
            font-weight: 700;
        }
        #map { 
            height: calc(100vh - 60px); 
            width: 100%; 
        }
        .ship-arrow {
            width: 0; 
            height: 0; 
            border-left: 8px solid transparent; 
            border-right: 8px solid transparent;
            border-bottom: 18px solid #06b6d4;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.5));
        }
        .leaflet-popup-content {
            color: #333;
        }
        .leaflet-popup-content b {
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            nav {
                padding: 12px 15px;
            }
            .nav-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首頁</a>
        <div class="nav-title"><i class="fas fa-ship"></i> 全臺即時海圖 (AIS)</div>
    </nav>
    <div id="map"></div>

    <script>
        let map;
        let markers = [];
        let infoWindow;

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 23.5, lng: 120.8 },
                zoom: 7,
                mapTypeControl: false,
                streetViewControl: false,
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                    { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                    { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                    { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                    { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#263c3f" }] },
                    { featureType: "poi.park", elementType: "labels.text.fill", stylers: [{ color: "#6b9a76" }] },
                    { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
                    { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
                    { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
                    { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#746855" }] },
                    { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1f2835" }] },
                    { featureType: "road.highway", elementType: "labels.text.fill", stylers: [{ color: "#f3d19c" }] },
                    { featureType: "transit", elementType: "geometry", stylers: [{ color: "#2f3948" }] },
                    { featureType: "transit.station", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                    { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] },
                    { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#515c6d" }] },
                    { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#17263c" }] }
                ]
            });
            infoWindow = new google.maps.InfoWindow();
            updateShips();
            setInterval(updateShips, 30000);
        }

        async function updateShips() {
            try {
                // Remove old markers
                markers.forEach(marker => marker.setMap(null));
                markers = [];

                const res = await fetch('https://tdx-shipping-worker.weacamm.org/positions'); // Assuming this API works as before
                const ships = await res.json();
                
                ships.forEach(ship => {
                    if (!ship.Lat || !ship.Lon) return;
                    
                    const marker = new google.maps.Marker({
                        position: { lat: ship.Lat, lng: ship.Lon },
                        map: map,
                        title: ship.VesselNameZh || ship.VesselName || '未知船隻',
                        icon: {
                            path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
                            scale: 4,
                            rotation: ship.COG || 0,
                            fillColor: "#06b6d4",
                            fillOpacity: 1,
                            strokeWeight: 1,
                            strokeColor: "white",
                        }
                    });

                    const contentString = `
                        <div style="color:#333; font-family: 'Microsoft JhengHei', sans-serif;">
                            <b style="font-size:1.1rem">${ship.VesselNameZh || ship.VesselName || '未知船隻'}</b><hr>
                            MMSI: ${ship.MMSI}<br>
                            速度: ${ship.SOG || 0} kts<br>
                            航向: ${ship.COG || 0}°<br>
                            更新: ${new Date(ship.UpdateTime).toLocaleTimeString()}
                        </div>
                    `;
                    
                    marker.addListener('click', () => {
                         infoWindow.setContent(contentString);
                         infoWindow.open(map, marker);
                    });

                    markers.push(marker);
                });
            } catch (e) { 
                console.error('更新船隻資料失敗:', e); 
            }
        }
    </script>
</body>
</html>
