<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>載入進度條測試</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft JhengHei', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 10px; 
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 { 
            color: #667eea; 
            text-align: center; 
            margin-bottom: 30px; 
        }
        
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #f9f9f9;
        }
        
        .test-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: background 0.3s ease;
        }
        
        .test-btn:hover {
            background: #5a6fd8;
        }
        
        .test-btn.green { background: #4CAF50; }
        .test-btn.green:hover { background: #45a049; }
        
        .test-btn.orange { background: #FF9800; }
        .test-btn.orange:hover { background: #f57c00; }
        
        .test-btn.red { background: #f44336; }
        .test-btn.red:hover { background: #da190b; }
        
        .demo-content {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 6px;
            min-height: 200px;
        }
    </style>
    
    
    <script src="assets/loading-progress.js"></script>
    <script>
        // 禁用自動載入
        window.AUTO_START_LOADING = false;
    </script>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-rocket"></i> 載入進度條測試</h1>
        
        <div class="test-section">
            <h3>🎯 基本功能測試</h3>
            <button class="test-btn" onclick="testBasicProgress()">
                <i class="fas fa-play"></i> 基本載入進度
            </button>
            <button class="test-btn green" onclick="testFastProgress()">
                <i class="fas fa-forward"></i> 快速載入
            </button>
            <button class="test-btn orange" onclick="testSlowProgress()">
                <i class="fas fa-clock"></i> 慢速載入
            </button>
            <button class="test-btn red" onclick="stopProgress()">
                <i class="fas fa-stop"></i> 停止載入
            </button>
        </div>
        
        <div class="test-section">
            <h3>🎨 顏色主題測試</h3>
            <button class="test-btn" onclick="testColorTheme('#667eea', '藍色主題')">
                藍色主題
            </button>
            <button class="test-btn green" onclick="testColorTheme('#4CAF50', '綠色主題')">
                綠色主題
            </button>
            <button class="test-btn orange" onclick="testColorTheme('#FF9800', '橘色主題')">
                橘色主題
            </button>
            <button class="test-btn red" onclick="testColorTheme('#f44336', '紅色主題')">
                紅色主題
            </button>
        </div>
        
        <div class="test-section">
            <h3>📋 系統頁面模擬</h3>
            <button class="test-btn" onclick="simulateDashboard()">
                <i class="fas fa-tachometer-alt"></i> 儀表板載入
            </button>
            <button class="test-btn" onclick="simulateHighway()">
                <i class="fas fa-road"></i> 國道監視器
            </button>
            <button class="test-btn green" onclick="simulateCity()">
                <i class="fas fa-city"></i> 市區監視器
            </button>
            <button class="test-btn orange" onclick="simulateWater()">
                <i class="fas fa-droplet"></i> 水資源監控
            </button>
        </div>
        
        <div class="demo-content">
            <h4>📝 載入進度條功能說明：</h4>
            <ul style="margin: 15px 0; padding-left: 20px; line-height: 1.6;">
                <li><strong>自動進度</strong>：載入時自動增長，模擬真實載入過程</li>
                <li><strong>手動控制</strong>：可以手動設定進度百分比</li>
                <li><strong>標籤更新</strong>：可以即時更新載入狀態文字</li>
                <li><strong>顏色主題</strong>：支援不同頁面的主題配色</li>
                <li><strong>深色模式</strong>：自動適應深色模式樣式</li>
                <li><strong>API監聽</strong>：自動監聽fetch請求並顯示進度</li>
            </ul>
            
            <p style="color: #666; font-size: 14px; margin-top: 20px;">
                <i class="fas fa-info-circle"></i> 
                進度條會在每個頁面載入時自動顯示，並根據實際載入狀況更新進度。
            </p>
        </div>
    </div>

    <script>
        function testBasicProgress() {
            window.startLoading({
                labelText: '測試基本載入功能...',
                color: '#667eea',
                showLabel: true
            });
            
            // 模擬載入過程
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress >= 100) {
                    clearInterval(interval);
                    window.finishLoading();
                } else {
                    window.setLoadingProgress(progress);
                }
            }, 300);
        }
        
        function testFastProgress() {
            window.startLoading({
                labelText: '快速載入測試...',
                color: '#4CAF50',
                showLabel: true,
                trickleSpeed: 100
            });
            
            setTimeout(() => {
                window.finishLoading();
            }, 1500);
        }
        
        function testSlowProgress() {
            window.startLoading({
                labelText: '慢速載入測試...',
                color: '#FF9800',
                showLabel: true,
                trickleSpeed: 800
            });
            
            setTimeout(() => {
                window.setLoadingProgress(50);
                window.updateLoadingLabel('載入中...請稍候');
            }, 2000);
            
            setTimeout(() => {
                window.finishLoading();
            }, 5000);
        }
        
        function stopProgress() {
            window.finishLoading();
        }
        
        function testColorTheme(color, themeName) {
            window.startLoading({
                labelText: `測試${themeName}...`,
                color: color,
                showLabel: true
            });
            
            setTimeout(() => {
                window.finishLoading();
            }, 2000);
        }
        
        function simulateDashboard() {
            const steps = [
                { progress: 20, label: '初始化儀表板...' },
                { progress: 40, label: '檢查API狀態...' },
                { progress: 60, label: '載入交通監視器數據...' },
                { progress: 80, label: '載入其他系統數據...' },
                { progress: 95, label: '初始化圖表...' }
            ];
            
            window.startLoading({
                labelText: '啟動儀表板...',
                color: '#667eea',
                showLabel: true
            });
            
            steps.forEach((step, index) => {
                setTimeout(() => {
                    window.setLoadingProgress(step.progress);
                    window.updateLoadingLabel(step.label);
                }, (index + 1) * 800);
            });
            
            setTimeout(() => {
                window.finishLoading();
            }, steps.length * 800 + 500);
        }
        
        function simulateHighway() {
            window.startLoading({
                labelText: '載入國道監視器...',
                color: '#2196F3',
                showLabel: true
            });
            
            setTimeout(() => window.updateLoadingLabel('連接TDX API...'), 500);
            setTimeout(() => window.setLoadingProgress(40), 1000);
            setTimeout(() => window.updateLoadingLabel('載入國道監視器資料...'), 1500);
            setTimeout(() => window.setLoadingProgress(70), 2000);
            setTimeout(() => window.updateLoadingLabel('處理監視器資料...'), 2500);
            setTimeout(() => window.setLoadingProgress(90), 3000);
            setTimeout(() => window.updateLoadingLabel('載入監視器影像...'), 3500);
            setTimeout(() => window.finishLoading(), 4000);
        }
        
        function simulateCity() {
            window.startLoading({
                labelText: '載入市區監視器...',
                color: '#4CAF50',
                showLabel: true
            });
            
            setTimeout(() => window.updateLoadingLabel('載入全台縣市資料...'), 500);
            setTimeout(() => window.setLoadingProgress(30), 1000);
            setTimeout(() => window.updateLoadingLabel('處理19個縣市...'), 1500);
            setTimeout(() => window.setLoadingProgress(60), 2000);
            setTimeout(() => window.updateLoadingLabel('載入監視器影像...'), 2500);
            setTimeout(() => window.setLoadingProgress(85), 3000);
            setTimeout(() => window.finishLoading(), 3500);
        }
        
        function simulateWater() {
            window.startLoading({
                labelText: '載入水資源監控系統...',
                color: '#64B5F6',
                showLabel: true
            });
            
            setTimeout(() => window.updateLoadingLabel('連接水利署API...'), 500);
            setTimeout(() => window.setLoadingProgress(25), 1000);
            setTimeout(() => window.updateLoadingLabel('載入水位監測站...'), 1500);
            setTimeout(() => window.setLoadingProgress(50), 2000);
            setTimeout(() => window.updateLoadingLabel('載入水庫監視器...'), 2500);
            setTimeout(() => window.setLoadingProgress(75), 3000);
            setTimeout(() => window.updateLoadingLabel('建構監控介面...'), 3500);
            setTimeout(() => window.finishLoading(), 4000);
        }
    </script>
</body>
</html>
