<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro PIDS - TPASS 2.0 Edition</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Roboto:wght@700;900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --theme-color: #8246af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans TC', sans-serif;
        }

        body {
            background-color: #000;
            height: 100vh;
            width: 100vw;
            display: flex;
        }

        /* 📱 手機版允許滑動 */
        @media (max-width: 768px) {
            body {
                overflow: visible;
                height: auto;
                min-height: 100vh;
            }
        }

        /* 🖥️ 桌面版保持原設計 */
        @media (min-width: 769px) {
            body {
                overflow: hidden;
                height: 100vh;
            }
        }

        .pids-wrapper {
            display: grid;
            grid-template-columns: 24% 76%;
            grid-template-rows: 90% 10%;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            border-right: 2px solid #ccc;
            background-color: #fff;
            height: 100%;
            overflow: hidden;
        }

        .station-header {
            height: 10%;
            min-height: 60px;
            background-color: var(--theme-color);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 12px;
        }

        .st-badge {
            background: #fff;
            color: var(--theme-color);
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 1.4vw;
        }

        .st-name-zh {
            font-size: 1.8vw;
            font-weight: 900;
        }

        .st-name-en {
            font-size: 1.0vw;
            font-weight: 700;
            margin-left: 4px;
            opacity: 0.9;
        }

        .st-title-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.1;
        }

        .arrival-info {
            flex: 1;
            padding: 1vh 1vw;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #eee;
            justify-content: center;
        }

        .arrival-info.secondary {
            background-color: #fcfcfc;
        }

        .dir-label {
            font-size: 1.2vw;
            font-weight: 900;
            color: #555;
            margin-bottom: 2px;
        }

        .line-tag-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .line-badge-small {
            background: var(--theme-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 1vw;
            font-weight: 900;
            min-width: 45px;
            text-align: center;
        }

        .dest-zh {
            font-size: 2.2vw;
            font-weight: 900;
            color: #000;
            line-height: 1.2;
        }

        .dest-en {
            font-size: 1.1vw;
            color: #888;
            font-weight: 700;
        }

        /* 🚥 燈號顏色邏輯 - 桌面版 */
        .time-box {
            background-color: var(--theme-color);
            color: white;
            margin-top: 5px;
            text-align: center;
            font-size: 3.5vw;
            font-weight: 700;
            border-radius: 8px;
            padding: 0.5vh 0;
            font-family: 'Roboto', sans-serif;
            width: 95%;
            align-self: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 6vh;
            /* 全形冒號優化 */
            letter-spacing: 0.5px;
        }

        /* 1. 很久進站 (> 60秒)：顯示藍色 */
        .time-box.status-normal {
            background-color: #0070bd !important; /* 標準捷運藍 */
        }

        /* 2. 剩下一分鐘 (41~60秒)：顯示橘色 */
        .time-box.status-warning {
            background-color: #f58220 !important; /* 橘色 */
        }

        /* 3. 進站中 (<= 40秒)：顯示紅色 + 閃爍 */
        .time-box.status-danger {
            background-color: #d32f2f !important; /* 紅色 */
            animation: pids-pulse 1s infinite;
        }

        /* 🔥 末班車已駛離 (修正斷行與顏色被覆蓋問題) */
        .time-box.end-service {
            font-size: 2vw !important; /* 調整為適合單行塞入的字體大小 */
            background-color: #555 !important; /* 加上 !important 強制覆蓋桌面版的主題色 */
            font-family: 'Noto Sans TC', sans-serif !important;
            padding: 0 10px !important;
            white-space: nowrap !important; /* 🛑 關鍵：強制文字不換行 */
            letter-spacing: 0 !important; /* 取消倒數計時使用的字距 */
        }

        .weather-box {
            height: 18%;
            background: #fff;
            border-top: 2px solid #ccc;
            display: grid;
            grid-template-columns: 1fr 2.5fr;
            grid-template-rows: 1fr 1fr;
            align-items: stretch;
        }

        .w-icon-area {
            grid-row: 1 / span 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            background: #f4f7f9;
            border-right: 1px solid #eee;
        }

        .w-icon-large {
            font-size: 4vw;
            color: #607d8b;
        }

        .w-desc {
            font-size: 1.3vw;
            font-weight: 700;
            color: #555;
        }

        .w-top-info {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 1vw;
            border-bottom: 1px solid #eee;
        }

        .w-bottom-info {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 1vw;
        }

        .w-range-text {
            font-size: 2vw;
            font-weight: 900;
            color: #d32f2f;
        }

        .w-rain-text {
            font-size: 2vw;
            font-weight: 900;
            color: #5a9fd4;
        }

        .main-display {
            display: grid;
            grid-template-rows: 1fr 130px;
            background-color: #000;
            position: relative;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        #video-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(1.01);
        }

        /* --- PIDS 擁擠度優化版 (加大 + 數字) --- */
        .congestion-area {
            background: #fff;
            border-top: 2px solid #ccc;
            padding: 15px 30px;
            /* 增加內距 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
            /* 增加高度 */
            gap: 15px;
            /* 兩列之間的距離 */
        }

        .cong-row {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .cong-label {
            font-size: 1.5vw;
            /* 字體加大 */
            font-weight: 900;
            color: #333;
            width: 250px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .cong-bar-container {
            flex: 1;
            display: flex;
            gap: 6px;
            /* 方塊間距 */
            height: 40px;
            /* 方塊高度加大 */
            background: #e2e8f0;
            padding: 4px;
            border-radius: 8px;
        }

        .cong-car {
            flex: 1;
            border-radius: 4px;
            background-color: #cbd5e1;
            /* 預設灰 */

            /* 數字置中 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        /* 顏色定義 (稍微亮一點) */
        .cong-lvl-1 {
            background-color: #32b900;
        }

        .cong-lvl-2 {
            background-color: #ffcc00;
            color: #000;
            text-shadow: none;
        }

        /* 黃色黑字 */
        .cong-lvl-3 {
            background-color: #f58220;
        }

        .cong-lvl-4 {
            background-color: #d32f2f;
        }

        .cong-no-data {
            color: #94a3b8;
            font-size: 1vw;
            font-weight: 700;
            text-align: center;
            width: 100%;
        }

        .footer {
            grid-column: 1/3;
            display: grid;
            grid-template-columns: 24% 76%;
            background: #1a1a1a;
            color: #fff;
        }

        .clock-section {
            background: #d32f2f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2vw;
            font-weight: 900;
            font-family: 'Roboto', sans-serif;
        }

        .marquee-section {
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0;
            position: relative;
            /* 必須為相對定位 */
            width: 100%;
        }

        .marquee-text {
            white-space: nowrap;
            font-size: 2.2vw; /* 電腦版跑馬燈加大 */
            font-weight: 700;
            position: absolute;
            /* 必須為絕對定位供 JS 控制 */
            left: 100%;
            will-change: transform;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* 🚥 PIDS 閃爍動畫 (進站中狀態) */
        @keyframes pids-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* 📱 手機版響應式設計 */
        @media (max-width: 768px) {
            .pids-wrapper {
                display: flex;
                flex-direction: column;
                grid-template-columns: unset;
                grid-template-rows: unset;
                min-height: 100vh;
                overflow-y: auto;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
            }

            .station-header {
                order: 1;
                height: auto;
                min-height: 55px;
                padding: 12px 15px;
                gap: 12px;
            }

            .st-badge {
                font-size: 1.8rem;
                padding: 6px 12px;
            }

            .st-name-zh {
                font-size: 2.2rem;
                font-weight: 900;
            }

            .st-name-en {
                font-size: 1.2rem;
                font-weight: 700;
            }

            /* 手機版獨立時間框 */
            .clock-section {
                order: 2;
                background: #d32f2f;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 1.5rem;
                font-weight: 900;
                font-family: 'Roboto', sans-serif;
                padding: 8px 0;
                color: #fff;
                border-bottom: 2px solid #ccc;
                width: 100%;
            }

            /* 手機版獨立跑馬燈 */
            .marquee-section {
                order: 3;
                overflow: hidden;
                display: flex;
                align-items: center;
                padding: 0;
                position: relative;
                width: 100%;
                min-height: 46px;
                background: #1a1a1a;
                border-bottom: 2px solid #ccc;
            }

            .marquee-text {
                white-space: nowrap;
                font-size: 1.5rem !important;
                font-weight: 700;
                position: absolute;
                left: 100%;
                will-change: transform;
                color: #fff;
                letter-spacing: 1px;
                line-height: 46px;
            }

            #block-dir0 {
                order: 4;
            }

            #block-dir1 {
                order: 5;
            }

            .arrival-info {
                padding: 1.2vh 1.2vw;
                min-height: auto;
                border-bottom: 2px solid #ccc;
                background-color: #fff;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .arrival-info.secondary {
                background-color: #fcfcfc;
            }

            /* 📱 手機版月台擁擠度 */
            .mobile-congestion {
                margin-top: 10px;
                padding: 10px;
                background: #f8f9fa;
                border-radius: 8px;
                border: 1px solid #e9ecef;
            }

            .mobile-cong-label {
                font-size: 0.9rem;
                font-weight: 700;
                color: #666;
                margin-bottom: 8px;
                text-align: center;
            }

            .mobile-cong-bars {
                display: flex;
                gap: 4px;
                justify-content: center;
            }

            .mobile-cong-car {
                flex: 1;
                height: 32px;
                max-width: 45px;
                border-radius: 4px;
                background-color: #cbd5e1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 900;
                font-size: 0.85rem;
                color: #fff;
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
                transition: 0.3s;
            }

            /* 手機版擁擠度顏色等級 */
            .mobile-cong-car.cong-lvl-1 {
                background-color: #32b900;
            }

            .mobile-cong-car.cong-lvl-2 {
                background-color: #ffcc00;
                color: #000;
                text-shadow: none;
            }

            .mobile-cong-car.cong-lvl-3 {
                background-color: #f58220;
            }

            .mobile-cong-car.cong-lvl-4 {
                background-color: #d32f2f;
            }

            .dir-label {
                /* 預色加深並优化体验 */
                font-size: 1.1rem !important;
                font-weight: 900;
                color: #555;
                margin-bottom: 8px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .line-tag-row {
                gap: 8px;
                display: flex;
                align-items: center;
                margin-bottom: 8px;
            }

            .line-badge-small {
                /* 🔥 重點：使用 !important 強制覆蓋 JS 的 vw 設定 */
                font-size: 1.6rem !important;
                
                /* 調整內距與寬度，讓它看起來像個明顯的標牌 */
                padding: 2px 10px !important;
                min-width: 68px !important;
                height: 42px;
                
                /* 文字置中 */
                text-align: center;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                
                background: var(--theme-color);
                color: white;
                border-radius: 6px;
                font-weight: 900;
                
                /* 微調位置，讓視覺上跟中文更對齊 */
                margin-right: 6px;
                margin-top: 4px;
            }

            /* 📱 手機版上方區域：站名和時間並排在同一行 */
            .mobile-top-row {
                display: flex;
                align-items: center; /* 讓站名跟大時間框垂直置中對齐 */
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 5px;
            }

            .mobile-dest-section {
                flex: 1;
                min-width: 0; /* 確保 flex 子元素可以縮小 */
                padding-right: 8px; /* 跟右邊的時間框保持距離 */
            }

            .countdown-label {
                /* 倒數框：基礎樣式
                預設狀態要被 status-normal/warning/danger 覆蓋 */
                color: #fff !important;
                
                /* 稍微調小一點點，確保「進站中」能橫排塞下 */
                font-size: 1.8rem !important;
                font-weight: 900;
                min-width: 115px; /* 為全形冒號增加寬度 */
                height: 55px;
                border-radius: 8px;
                display: flex !important;
                align-items: center;
                justify-content: center;
                font-family: 'Roboto', 'Noto Sans TC', sans-serif;
                box-shadow: 0 4px 6px rgba(0,0,0,0.2);
                transition: background-color 0.4s ease;
                padding: 0 12px;
                flex-shrink: 0;
                /* 全形冒號優化 */
                letter-spacing: 1px;
            }
            
            /* 1. 很久進站 (> 60秒)：顯示藍色 */
            .countdown-label.status-normal {
                background-color: #0070bd !important; /* 標準捷運藍 */
            }
            
            /* 2. 剩下一分鐘 (41~60秒)：顯示橘色 */
            .countdown-label.status-warning {
                background-color: #f58220 !important; /* 橘色 */
            }
            
            /* 3. 進站中 (<= 40秒)：顯示紅色 + 閃爍 */
            .countdown-label.status-danger {
                background-color: #d32f2f !important; /* 紅色 */
                animation: pids-pulse 1s infinite;
            }

            /* 📱 手機版收班標籤樣式 */
            .countdown-label.end-service {
                background-color: #555 !important;
                font-size: 1.2rem !important;
                white-space: nowrap !important;
                letter-spacing: 0 !important;
                min-width: auto;
            }

            .dest-zh {
                /* 站名：字體設為 1.55rem 確保 6 個字能完整顯示 */
                font-size: 1.55rem !important;
                white-space: nowrap;
                overflow: visible;
                font-weight: 900;
                color: #000;
                line-height: 1.2;
                margin: 0;
                
                /* 稍微縮小字距，爭取更多空間 */
                letter-spacing: -0.5px;
                
                /* 確保不換行，且不再使用 ellipsis 切斷（除非真的長到誇張） */
                white-space: nowrap;
                overflow: visible;
                flex: 1;
                min-width: 0;
            }

            /* 英文站名加深一點，提升戶外閱讀性 */
            .dest-en {
                /* 🔥 縮小字體：從原本的 1.1 降到 0.95rem */
                font-size: 0.95rem !important;
                
                /* 顏色微調深化 */
                color: #666 !important;
                font-weight: 700;
                
                /* 保持單行，不換行，避免撐高版面 */
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                
                display: block;
                margin-top: 2px;
                letter-spacing: -0.2px;
            }

            .time-box {
                display: none !important; /* 手機版隱藏桌面版時間框 */
            }

            .time-box.arriving {
                background-color: #d32f2f;
                animation: pulse 1s infinite;
            }

            .time-box.approaching {
                background-color: #f58220;
            }

            .time-box.end-service {
                font-size: 1.4rem;
                background-color: #444;
                font-family: 'Noto Sans TC', sans-serif;
            }

            .weather-box {
                order: 6;
                height: auto;
                display: grid;
                grid-template-columns: 120px 1fr;
                grid-template-rows: 1fr 1fr;
                padding: 15px;
                border-bottom: 2px solid #ccc;
                background: #fff;
                gap: 10px;
                align-items: center;
            }

            .w-icon-area {
                grid-row: 1 / span 2;
                grid-column: 1;
                border-right: 1px solid #eee;
                padding-right: 10px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 8px;
            }

            .w-icon-large {
                font-size: 3.5rem;
                color: #607d8b;
            }

            .w-desc {
                font-size: 1.2rem;
                font-weight: 700;
                color: #555;
                text-align: center;
                line-height: 1.2;
            }

            .w-top-info {
                grid-row: 1;
                grid-column: 2;
                display: flex;
                justify-content: flex-start;
                align-items: center;
                padding: 0;
            }

            .w-bottom-info {
                grid-row: 2;
                grid-column: 2;
                display: flex;
                justify-content: flex-start;
                align-items: center;
                padding: 0;
            }

            .w-range-text,
            .w-rain-text {
                font-size: 1.8rem;
                font-weight: 900;
            }

            .w-range-text {
                color: #d32f2f;
            }

            .w-rain-text {
                color: #5a9fd4;
            }

            .main-display {
                order: 7;
                display: grid;
                grid-template-rows: auto;
                grid-template-columns: 1fr;
                background-color: #000;
                height: 300px;
                border-top: 2px solid #ccc;
            }

            .video-container {
                display: block !important;
                width: 100%;
                height: 100%;
                position: relative;
                overflow: hidden;
                background: #000;
            }

            .congestion-area {
                display: none;
            }

            /* 隱藏桌面版 Footer */
            .footer {
                display: none;
            }
        }

        /* 🖥️ 桌面版保持原設計 */
        @media (min-width: 769px) {
            .pids-wrapper {
                display: grid !important;
                grid-template-columns: 24% 76% !important;
                grid-template-rows: 90% 10% !important;
                width: 100% !important;
                height: 100% !important;
                background-color: #f0f0f0 !important;
            }
            
            .sidebar {
                display: flex !important;
                flex-direction: column !important;
                border-right: 2px solid #ccc !important;
                background-color: #fff !important;
                height: 100% !important;
                overflow: hidden !important;
            }
            
            .main-display {
                display: grid !important;
                grid-template-rows: 1fr 130px !important;
                background-color: #000 !important;
                position: relative !important;
            }
            
            .congestion-area {
                display: flex !important;
            }
            
            .footer {
                display: grid !important;
            }
            
            .clock-section:not(#clock) {
                display: flex;
            }
            
            .marquee-section:not(:has(#ui-marquee)) {
                display: flex;
            }
            
            /* 桌面版隱藏手機版專用元素 */
            #clock {
                display: none !important;
            }

    <script>
        const METRO_STATIONS = fetch('metro-stations-raw.json').then(r => r.json()).catch(() => null);

        // 🚨 這是 TDX Worker (給非北捷系統用)
        const METRO_API_TDX = 'https://metro-api-worker.weacamm.org/api';

        // 🔥 這是您新部署的 TRTC 專屬 Worker (注意：去掉了 /api)
        const METRO_API_TRTC = 'https://trtc-metro-api.weacamm.org';

        const WEATHER_API = 'https://cwa-weather-proxy.weacamm.org';

        const params = new URLSearchParams(window.location.search);
        const system = params.get('sys') || params.get('system') || 'TYMC';
        const station = params.get('sid') || params.get('station') || 'A8';

        let countdownSecs = { dir0: -1, dir1: -1 };
        const sysColors = { 'TRTC': '#0070bd', 'KRTC': '#f58220', 'TYMC': '#8246af', 'TMRT': '#b2d235', 'NTMC': '#0096cc', 'KLRT': '#2e7d32' };
        let GLOBAL_STATIONS = null;

        function updateClock() {
            const n = new Date();
            const d = `${String(n.getMonth() + 1).padStart(2, '0')}/${String(n.getDate()).padStart(2, '0')}`;
            const t = n.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const timeText = `${d} ${t}`;
            
            // 手機版時鐘
            const mobileClock = document.getElementById('clock');
            if (mobileClock) mobileClock.innerText = timeText;
            
            // 桌面版時鐘
            const desktopClock = document.getElementById('clock-desktop');
            if (desktopClock) desktopClock.innerText = timeText;
        }

        async function init() {
            // 非北捷系統隱藏擁擠度區塊並調整版面
            if (system !== 'TRTC') {
                document.querySelector('.congestion-area').style.display = 'none';
                document.querySelector('.main-display').style.gridTemplateRows = '1fr';
            }

            document.documentElement.style.setProperty('--theme-color', sysColors[system] || '#333');
            // 高雄輕軌（KLRT）專屬：淺綠主題並顯示「順行 / 逆行」標籤
            if (system === 'KLRT') {
                const krColor = sysColors['KLRT'] || '#8fd19e';
                document.documentElement.style.setProperty('--theme-color', krColor);
                const d0 = document.getElementById('dir0-label');
                const d1 = document.getElementById('dir1-label');
                if (d0 && !/順|逆/.test(d0.innerText)) d0.innerText = `順行 ${d0.innerText}`;
                if (d1 && !/順|逆/.test(d1.innerText)) d1.innerText = `逆行 ${d1.innerText}`;
                // 直接設定 header / badge 顏色以確保在 CSS 變數未即時生效時也能顯示淺綠
                const header = document.getElementById('ui-header');
                if (header) header.style.background = krColor;
                const badge = document.getElementById('ui-st-id');
                if (badge) badge.style.color = krColor;
            }
            document.getElementById('ui-st-id').innerText = station;

            Promise.allSettled([
                METRO_STATIONS.then(data => {
                    GLOBAL_STATIONS = data;
                    if (data?.systems[system]) {
                        // 尋找車站 (新架構：systems[sys] 是 Array)
                        const lines = data.systems[system];
                        let foundStation = null;
                        let foundLine = null;

                        for (const line of lines) {
                            const s = line.stations.find(st => st.sid === station);
                            if (s) {
                                foundStation = s;
                                foundLine = line;
                                break;
                            }
                        }

                        if (foundStation) {
                            document.getElementById('ui-st-name').innerText = foundStation.name_zh;
                            document.getElementById('ui-st-name-en').innerText = foundStation.name_en; // 確保這裡也有英文

                            let themeColor = foundLine.color;
                            if (system === 'TRTC') {
                                if (station.startsWith('GA')) themeColor = '#8fc31f';
                                if (station.startsWith('RA')) themeColor = '#fd92a3';
                            }
                            if (system === 'KRTC') {
                                if (station.startsWith('R')) themeColor = '#e3002c';
                                if (station.startsWith('O')) themeColor = '#f8b61c';
                            }
                            if (themeColor) document.documentElement.style.setProperty('--theme-color', themeColor);
                        }
                    }
                }),
                updateData(),
                updateWeather(),
                updateMarquee(),
                updateVideo()
            ]);

            // 台北捷運（TRTC）每 15 秒更新一次，其他系統每 60 秒更新一次
            const updateInterval = system === 'TRTC' ? 15000 : 60000;
            setInterval(updateData, updateInterval);
            setInterval(updateWeather, 600000);
            setInterval(updateMarquee, 300000);
            setInterval(updateVideo, 300000); // 每5分鐘檢查一次影片有無更換
            updateClock();
            setInterval(updateClock, 1000);

            setInterval(() => {
                [0, 1].forEach(i => {
                    if (countdownSecs[`dir${i}`] > 0) {
                        countdownSecs[`dir${i}`]--;
                        renderTime(i);
                    }
                });
            }, 1000);
        }

        function getOfflineStatus() {
            const h = new Date().getHours();
            const isLateNight = (h >= 23 || h < 6);
            if (isLateNight) {
                return {
                    destZh: "營運結束", destEn: "Service Ended",
                    timeText: "末班車已駛離", timeClass: "time-box end-service"
                };
            }
            return {
                destZh: "暫無列車", destEn: "No Service",
                timeText: "-- : --", timeClass: "time-box"
            };
        }

        async function updateData() {
            try {
                let nextTrains = [null, null];

                // --- 1. 北捷 (TRTC) 專用邏輯 ---
                if (system === 'TRTC') {
                    nextTrains = await fetchTRTCData();
                }
                // --- 2. 其他捷運 (TDX) 邏輯 ---
                else {
                    const res = await fetch(`${METRO_API_TDX}/liveboard?sys=${system}&sid=${station.toUpperCase()}`);
                    const sData = await res.json();

                    if (sData && sData.length > 0) {
                        if (system === 'TYMC') {
                            const toTaipei = sData.find(t => t.DestinationStationName.Zh_tw.includes('台北車站'));
                            const toSouth = sData.find(t => !t.DestinationStationName.Zh_tw.includes('台北車站'));
                            nextTrains = [toSouth, toTaipei];
                        } else if (system === 'KLRT') {
                            nextTrains = [sData[0], sData.length > 1 ? sData[1] : null];
                        } else {
                            const dests = [...new Set(sData.map(item => item.DestinationStationName.Zh_tw))];
                            if (dests.length >= 2) {
                                nextTrains[0] = sData.find(t => t.DestinationStationName.Zh_tw === dests[0]);
                                nextTrains[1] = sData.find(t => t.DestinationStationName.Zh_tw === dests[1]);
                            } else {
                                nextTrains[0] = sData[0];
                                nextTrains[1] = sData.length > 1 ? sData[1] : null;
                            }
                        }

                        // 更新車站英文
                        if (sData[0].StationName) {
                            if (sData[0].StationName.En) document.getElementById('ui-st-name-en').innerText = sData[0].StationName.En;
                            // 針對 KRTC 草衙站與其他可能缺漏
                            if (station === 'R4A' && system === 'KRTC') document.getElementById('ui-st-name-en').innerText = 'Caoya';
                        }
                    }
                }

                updateUI(0, nextTrains[0]);
                updateUI(1, nextTrains[1]);
                updateCongestion(nextTrains);

            } catch (e) {
                console.error("Fetch Data Error:", e);
                setOfflineUI(0); setOfflineUI(1);
            }
        }

        // 🔥 專業模式：PIDS 專用資料抓取 (含環狀線支援)
        async function fetchTRTCData() {
            const res = await fetch(`${METRO_API_TRTC}/arrival`);
            const rawData = await res.json();

            const targetStationID = station.toUpperCase().trim(); // 例如 Y11
            const stNameEl = document.getElementById('ui-st-name');
            const targetName = stNameEl.innerText.replace('站', '');

            // 1. 判斷當前是哪條線
            let currentLine = '';
            if (targetStationID.startsWith('BR')) currentLine = 'BR';
            else if (targetStationID.startsWith('BL')) currentLine = 'BL';
            else if (targetStationID.startsWith('Y')) currentLine = 'Y';
            else if (targetStationID.startsWith('GA')) currentLine = 'GA';
            else if (targetStationID.startsWith('RA')) currentLine = 'RA';
            else currentLine = targetStationID.substring(0, 1); // R, G, O

            // 2. 定義各路線的合法目的地 (白名單)
            const VALID_DESTINATIONS = {
                'BR': ['動物園', '南港展覽館'],
                'BL': ['南港展覽館', '頂埔', '亞東醫院', '昆陽'],
                'R': ['淡水', '象山', '北投', '大安', '新北投'],
                'G': ['松山', '新店', '台電大樓', '小碧潭'],
                'O': ['迴龍', '南勢角', '蘆洲'],
                'Y': ['大坪林', '新北產業園區'],
                'GA': ['小碧潭', '七張'],
                'RA': ['新北投', '北投']
            };

            const allowedDests = VALID_DESTINATIONS[currentLine] || [];

            // 3. 嚴格篩選
            const stationTrains = rawData.filter(t => {
                // A. 如果 ID 完全吻合，直接放行
                if (t.StationID && t.StationID === targetStationID) return true;

                // B. 針對轉乘站 (如景安)：允許 Y 線和 O 線共存，但只抓屬於本月台的
                const apiName = (t.StationName || "").replace('站', '').trim();
                if (apiName === targetName) {
                    const dest = t.DestinationName || "";
                    // 檢查這班車的目的地，是不是屬於這條線
                    return allowedDests.some(d => dest.includes(d));
                }
                return false;
            });

            if (stationTrains.length === 0) return [null, null];

            // 4. 營運模式方向定義 (決定哪邊是上行/第一月台)
            const TRTC_UPSTREAM_DESTS = {
                'BR': ['南港展覽館'],
                'R': ['淡水', '北投', '新北投'],
                'G': ['松山'],
                'O': ['迴龍', '蘆洲'],
                'BL': ['南港展覽館'],
                'Y': ['新北產業園區'],
                'GA': ['小碧潭'],
                'RA': ['新北投']
            };

            const upstreamList = TRTC_UPSTREAM_DESTS[currentLine] || [];

            // 5. 轉換並標註方向
            const formatted = stationTrains.map(t => {
                const dest = t.DestinationName.replace('站', '');
                const isUpstream = upstreamList.some(d => dest.includes(d));
                return {
                    DestinationStationName: { Zh_tw: t.DestinationName, En: '' },
                    EstimateTime: parseTRTCTime(t.CountDown),
                    TrainNumber: t.TrainNumber,
                    LineColor: ({ 'GA': '#8fc31f', 'RA': '#fd92a3' }[currentLine]) || getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim(),
                    platformSide: isUpstream ? 0 : 1
                };
            });

            const t1 = formatted.filter(t => t.platformSide === 0).sort((a, b) => a.EstimateTime - b.EstimateTime)[0] || null;
            const t2 = formatted.filter(t => t.platformSide === 1).sort((a, b) => a.EstimateTime - b.EstimateTime)[0] || null;

            return [t1, t2];
        }

        function parseTRTCTime(timeStr) {
            if (!timeStr || timeStr === '列車進站' || timeStr === '資料擷取中') return 0;
            if (timeStr.includes(':')) {
                const [mm, ss] = timeStr.split(':').map(Number);
                return (mm * 60) + ss;
            }
            return 9999;
        }

        function updateUI(idx, item) {
            const destZh = document.getElementById(`dir${idx}-dest`);
            const destEn = document.getElementById(`dir${idx}-en`);
            const timeBox = document.getElementById(`dir${idx}-time`);
            const countdownLabel = document.getElementById(`countdown-${idx}`);
            const lineBadge = document.getElementById(`ui-line-tag-${idx + 1}`);

            if (!item) {
                const status = getOfflineStatus();
                destZh.innerText = status.destZh;
                destEn.innerText = status.destEn;
                if (timeBox) {
                    timeBox.innerText = status.timeText;
                    timeBox.className = status.timeClass;
                }
                if (countdownLabel) {
                    // 🔥 修正手機版：讓手機版也能正確顯示營運結束
                    countdownLabel.innerText = status.timeText;
                    countdownLabel.className = `countdown-label ${status.timeClass && status.timeClass.includes('end') ? 'end-service' : ''}`;
                }
                lineBadge.style.opacity = '0';
                return;
            }

            lineBadge.style.opacity = '1';
            // 確保這行是這樣寫的 (保留原本的站名，包含「站」字)
            destZh.innerText = item.DestinationStationName.Zh_tw;
            // destEn.innerText 設定移到下方，確保能取到本地資料補完

            let lbText = item.LineID || system.substring(0, 1);
            let destID = null;

            // 嘗試尋找車站編號
            // 嘗試尋找車站編號
            if (GLOBAL_STATIONS && GLOBAL_STATIONS.systems[system]) {
                const lines = GLOBAL_STATIONS.systems[system];
                const destName = item.DestinationStationName.Zh_tw.replace('站', '').trim();

                let found = null;

                // 1. 優先搜尋本路線 (Current Line Priority)
                // 找出包含目前車站(station)的那個路線物件
                const currentLineObj = lines.find(l => l.stations.some(s => s.sid === station));

                if (currentLineObj) {
                    // 先嘗試精確比對
                    found = currentLineObj.stations.find(s => s.name_zh === destName);
                    // 若為高雄系統 (KRTC) 或找不到，使用較寬鬆的模糊比對（包含子字串比對），
                    // 可解決例如「岡山」對到站碼 `RK1` 的情況
                    if (!found) {
                        found = currentLineObj.stations.find(s => s.name_zh === destName || s.name_zh.includes(destName) || destName.includes(s.name_zh));
                    }
                }

                // 2. 如果本路線找不到 (例如跨線或轉乘資訊)，則搜尋所有路線
                if (!found) {
                    for (const line of lines) {
                        if (currentLineObj && line.line_id === currentLineObj.line_id) continue; // 已經找過了

                        // 優先精確比對
                        found = line.stations.find(s => s.name_zh === destName);

                        // 若仍找不到，使用寬鬆模糊比對（包含子字串比對），對於 KRTC 與其他系統都適用
                        if (!found) {
                            found = line.stations.find(s => s.name_zh === destName || s.name_zh.includes(destName) || destName.includes(s.name_zh));
                        }

                        if (found) {
                            break;
                        }
                    }
                }

                if (found) {
                    destID = found.sid;
                }
            }

            // 🔥 修正：如果 API 沒有回傳英文，則嘗試從本地資料庫抓取英文站名
            let finalEnName = item.DestinationStationName.En || "Train";
            if (!item.DestinationStationName.En && destID && GLOBAL_STATIONS.systems[system]) {
                const lines = GLOBAL_STATIONS.systems[system];
                for (const line of lines) {
                    const s = line.stations.find(st => st.sid === destID);
                    if (s && s.name_en) {
                        finalEnName = s.name_en;
                        break;
                    }
                }
            }
            
            // 🔥 新增：如果英文站名以「Taipei」開頭，就刪掉省空間（台北捷運的常用做法）
            if (finalEnName.startsWith('Taipei ')) {
                finalEnName = finalEnName.replace('Taipei ', '');
            }
            
            destEn.innerText = finalEnName;

            if (destID) {
                lbText = destID;
            } else {
                // 找不到編號則回退原本邏輯
                if (system === 'KRTC' && (lbText === 'RA' || lbText === 'R')) lbText = 'R';
            }

            lineBadge.innerText = lbText;

            // 字體大小自動調整
            if (lbText.length >= 4) lineBadge.style.fontSize = '1.0vw';
            else if (lbText.length >= 3) lineBadge.style.fontSize = '1.2vw';
            else lineBadge.style.fontSize = '1.5vw';

            // 系統專屬顏色覆蓋：
            // - KLRT（高雄輕軌）：整個系統使用淺綠
            // - KRTC（高雄捷運）：站碼 R* -> 紅色, O* -> 橘色
            if (system === 'KLRT') {
                lineBadge.style.background = sysColors['KLRT'] || '#8fd19e';
            } else if (system === 'KRTC') {
                const prefix = ((destID || lbText) || '').toString().toUpperCase();
                if (prefix.startsWith('R')) {
                    lineBadge.style.background = '#e3002c';
                } else if (prefix.startsWith('O')) {
                    lineBadge.style.background = '#f8b61c';
                } else {
                    lineBadge.style.background = item.LineColor || "#808080";
                }
            } else {
                lineBadge.style.background = item.LineColor || "#808080";
            }

            const estimateTime = item.EstimateTime != null ? item.EstimateTime : 0;
            countdownSecs[`dir${idx}`] = estimateTime;
            renderTime(idx);
        }

        function setOfflineUI(idx) {
            const status = getOfflineStatus();
            document.getElementById(`dir${idx}-dest`).innerText = status.destZh;
            document.getElementById(`dir${idx}-en`).innerText = status.destEn;
            
            const timeBox = document.getElementById(`dir${idx}-time`);
            if(timeBox) {
                timeBox.innerText = status.timeText;
                timeBox.className = status.timeClass;
            }

            // 🔥 確保手機版離線/收班時也同步變更
            const countdownLabel = document.getElementById(`countdown-${idx}`);
            if (countdownLabel) {
                countdownLabel.innerText = status.timeText;
                countdownLabel.className = `countdown-label ${status.timeClass && status.timeClass.includes('end') ? 'end-service' : ''}`;
            }
            
            document.getElementById(`ui-line-tag-${idx + 1}`).style.opacity = '0';
        }

        function renderTime(idx) {
            const el = document.getElementById(`dir${idx}-time`); // 桌面版
            const countdownLabel = document.getElementById(`countdown-${idx}`); // 手機版
            const s = countdownSecs[`dir${idx}`];

            // 如果沒資料或正在載入
            if (s == null || isNaN(s) || s < 0) {
                if (countdownLabel) {
                    countdownLabel.innerText = "---";
                    countdownLabel.className = "countdown-label";
                }
                if (el) {
                    el.innerText = "--：--"; // 同步改為全形
                    el.className = "time-box";
                }
                return;
            }

            let timeText, stateClass;

            // --- 1. 判定燈號與內容 ---
            if (s <= 40) {
                // 🔴 進站中 (40秒內)
                timeText = "進站中";
                stateClass = "status-danger";
            } else {
                // 計算分、秒
                const m = Math.floor(s / 60);
                const secs = String(s % 60).padStart(2, '0');
                const mins = String(m).padStart(2, '0');
                
                // 🔥 將冒號改為全形「：」
                timeText = `${mins}：${secs}`; 

                if (s <= 120) {
                    // 🟠 兩分鐘內
                    stateClass = "status-warning";
                } else {
                    // 🔵 兩分鐘以上
                    stateClass = "status-normal";
                }
            }

            // --- 2. 更新 UI 介面 ---
            if (countdownLabel) {
                countdownLabel.innerText = timeText;
                countdownLabel.className = `countdown-label ${stateClass}`;
            }

            if (el) {
                el.innerText = timeText;
                el.className = `time-box ${stateClass}`;
            }
        }

        // 👥 強化版擁擠度更新邏輯
        async function updateCongestion(nextTrains) {
            // 1. 基本檢查
            const area = document.querySelector('.congestion-area');
            if (system !== 'TRTC') {
                area.innerHTML = `<div class="cong-no-data">本系統暫無擁擠度資訊</div>`;
                [0, 1].forEach(i => document.getElementById(`mobile-cong-${i}`).style.display = 'none');
                return;
            }

            if (!nextTrains[0] && !nextTrains[1]) {
                area.innerHTML = `<div class="cong-no-data">待列車進站後顯示擁擠度</div>`;
                return;
            }

            // 2. 取得路線類型
            let lineId = station.replace(/[0-9]/g, '');
            if (lineId === 'Y') {
                area.innerHTML = `<div class="cong-no-data">環狀線暫不提供擁擠度訊號</div>`;
                return;
            }

            try {
                const endpoint = lineId === 'BR' ? '/crowdedness/wenhu' : '/crowdedness/high-capacity';
                const res = await fetch(`${METRO_API_TRTC}${endpoint}`);
                const data = await res.json();

                if (!Array.isArray(data)) throw new Error("API Data Error");

                // 🎯 關鍵優化：標準化目前站名 (統一將「臺」轉為「台」，並去掉「站」)
                const currentStRaw = document.getElementById('ui-st-name').innerText;
                const currentStName = currentStRaw.replace('站', '').replace('臺', '台').trim();

                let desktopHtml = '';
                let carCount = (lineId === 'BR' || lineId === 'Y') ? 4 : (lineId === 'GA' || lineId === 'RA' ? 3 : 6);

                [0, 1].forEach(idx => {
                    const train = nextTrains[idx];
                    if (!train) return;

                    // 🎯 找尋匹配的擁擠度資料
                    let match = null;
                    
                    // A. 優先用車號比對
                    if (train.TrainNumber) {
                        const targetTN = parseInt(train.TrainNumber, 10);
                        match = data.find(c => {
                            const crowdNums = String(c.TrainNumber).split(',').map(n => parseInt(n.trim(), 10));
                            return crowdNums.includes(targetTN);
                        });
                    }

                    // B. 如果車號對不到，改用站名比對 (API 的站名也要標準化)
                    if (!match) {
                        match = data.find(c => {
                            const apiStName = (c.StationName || "").replace('BR', '').replace('站', '').replace('臺', '台').trim();
                            return apiStName === currentStName;
                        });
                    }

                    // 🛠️ 建立車廂 HTML
                    let barsHtml = '';
                    for (let i = 1; i <= carCount; i++) {
                        // 讀取擁擠度等級 (高運量是 Car1, 文湖線是 Cart1L)
                        const level = match ? (match[`Car${i}`] || match[`Cart${i}L`] || 0) : 0;
                        let lvlClass = '';
                        if (level == 1) lvlClass = 'cong-lvl-1';
                        else if (level == 2) lvlClass = 'cong-lvl-2';
                        else if (level == 3) lvlClass = 'cong-lvl-3';
                        else if (level >= 4) lvlClass = 'cong-lvl-4';

                        // 如果沒資料 (level 0)，預設就是灰色 cong-car
                        barsHtml += `<div class="cong-car ${lvlClass}">${i}</div>`;
                    }

                    // 更新手機版 (如果剛好有打開的話)
                    const mobileBars = document.getElementById(`mobile-cong-bars-${idx}`);
                    if (mobileBars) {
                        mobileBars.innerHTML = barsHtml.replace(/cong-car/g, 'mobile-cong-car');
                        document.getElementById(`mobile-cong-${idx}`).style.display = 'block';
                    }

                    // 累積電腦版 HTML
                    desktopHtml += `
                        <div class="cong-row">
                            <div class="cong-label">
                                <span style="background:${train.LineColor}; width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:8px;"></span>
                                往 ${train.DestinationStationName.Zh_tw.replace('站','')}
                            </div>
                            <div class="cong-bar-container">${barsHtml}</div>
                        </div>
                    `;
                });

                area.innerHTML = desktopHtml || `<div class="cong-no-data">接收訊號中...</div>`;

            } catch (e) {
                console.error("Congestion update failed:", e);
                area.innerHTML = `<div class="cong-no-data">無法取得擁擠度資料</div>`;
            }
        }

        async function updateWeather() {
            try {
                const res = await fetch(`${WEATHER_API}?dataset=F-C0032-001`);
                const json = await res.json();
                const county = system === 'TYMC' ? '桃園市' : '臺北市';
                const loc = json.records.location.find(l => l.locationName === county);
                if (loc) {
                    const wx = loc.weatherElement.find(e => e.elementName === 'Wx').time[0].parameter.parameterName;
                    const minT = loc.weatherElement.find(e => e.elementName === 'MinT').time[0].parameter.parameterName;
                    const maxT = loc.weatherElement.find(e => e.elementName === 'MaxT').time[0].parameter.parameterName;
                    const pop = loc.weatherElement.find(e => e.elementName === 'PoP').time[0].parameter.parameterName;
                    document.getElementById('ui-weather-text').innerText = wx;
                    document.getElementById('ui-range-display').innerText = `${minT}°C ~ ${maxT}°C`;
                    document.getElementById('ui-rain-display').innerHTML = `<i class="fas fa-umbrella"></i> ${pop}%`;
                }
            } catch (e) { }
        }

        // 📢 專業通阻 + 新聞 + 後台自訂宣導邏輯
        async function updateMarquee() {
            try {
                const sysMap = { 'TRTC': '台北捷運', 'KRTC': '高雄捷運', 'TYMC': '桃園捷運', 'TMRT': '台中捷運', 'NTMC': '新北捷運', 'KLRT': '高雄輕軌' };
                const sysName = sysMap[system] || '捷運系統';
                let newsItems = [];

                try {
                    const [resAlert, resNews] = await Promise.all([
                        fetch(`${METRO_API_TDX}/alert?sys=${system}`),
                        fetch(`${METRO_API_TDX}/news?sys=${system}`)
                    ]);

                    if (resAlert && resAlert.ok) {
                        const alertData = await resAlert.json();
                        if (Array.isArray(alertData)) {
                            alertData.forEach(a => {
                                if (a.Status === 0 || a.Status === 2) {
                                    // 🔥 強制移除換行符號
                                    const title = (a.Title || '營運異常').replace(/[\r\n]+/g, '　');
                                    const desc = a.Description ? `：${a.Description.replace(/[\r\n]+/g, '　')}` : '';
                                    newsItems.push(`🚨【${sysName} 營運通報】${title}${desc}`);
                                }
                            });
                        }
                    }

                    if (resNews && resNews.ok) {
                        const newsData = await resNews.json();
                        if (Array.isArray(newsData)) {
                            newsData.slice(0, 2).forEach(n => {
                                const txt = n?.NewsTitle?.Zh_tw || n?.Title?.Zh_tw || n?.Title || n?.Description || '';
                                // 🔥 強制移除換行符號
                                const clean = txt.toString().replace(/[\r\n]+/g, '　').trim();
                                if (clean) newsItems.push(`【${sysName}】${clean}`);
                            });
                        }
                    }
                } catch (e) { console.log('TDX Fetch failed', e); }

                let customMsg = "祝您旅途愉快！";
                try {
                    const resMsg = await fetch('https://wang-weather.weacamm.org/api/metro/marquee');
                    if (resMsg.ok) {
                        const dataMsg = await resMsg.json();
                        // 🔥 強制將後台可能輸入的換行轉為空白
                        if (dataMsg.text) customMsg = dataMsg.text.replace(/[\r\n]+/g, '　　');
                    }
                } catch (e) { console.log('Custom marquee fetch failed', e); }

                const alertPrefix = newsItems.length ? (newsItems.join('　　') + '　　') : '';
                const finalMarqueeText = `${alertPrefix}${customMsg}`;

                const marqueeEl = document.getElementById('ui-marquee');
                if (marqueeEl) {
                    marqueeEl.innerText = finalMarqueeText;
                    setTimeout(() => runMarqueeLoop('ui-marquee'), 60);
                }
                
                const marqueeDesktopEl = document.getElementById('ui-marquee-desktop');
                if (marqueeDesktopEl) {
                    marqueeDesktopEl.innerText = finalMarqueeText;
                    setTimeout(() => runMarqueeLoop('ui-marquee-desktop'), 60);
                }

            } catch (e) { console.error("Marquee error:", e); }
        }

        async function updateVideo() {
            try {
                const res = await fetch('https://wang-weather.weacamm.org/api/metro/assets');
                if (res.ok) {
                    const data = await res.json();
                    if (data.video && data.video.length > 0) {
                        
                        // 1. 解析出所有您在後台輸入的 YouTube 影片 ID
                        const videoIds = data.video.map(url => {
                            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
                            return match ? match[1] : null;
                        }).filter(Boolean); // 過濾掉解析失敗的空行

                        // 2. 只要有成功解析出影片，就更新播放器
                        if (videoIds.length > 0) {
                            const firstVideoId = videoIds[0]; // 主播放器的 ID 必須是第一部
                            const playlistStr = videoIds.join(','); // 把所有影片 ID 用逗號串起來
                            
                            const iframe = document.getElementById('video-iframe');
                            
                            // 組合 YouTube 播放清單網址 (playlist 包含所有影片)
                            const newSrc = `https://www.youtube.com/embed/${firstVideoId}?autoplay=1&mute=1&loop=1&playlist=${playlistStr}&controls=0&modestbranding=1&rel=0`;
                            
                            // 檢查網址有沒有變更，有變更才重新載入畫面 (避免每5分鐘閃爍一次)
                            if (iframe.src !== newSrc) {
                                iframe.src = newSrc;
                            }
                        }
                    }
                }
            } catch (e) {
                console.error("Video update failed:", e);
            }
        }

        // 🔥 無限循環跑馬燈控制核心
        function runMarqueeLoop(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const container = el.parentElement;

            // 重置狀態
            el.style.transition = 'none';
            const containerWidth = container.offsetWidth;

            // 起點：容器最右邊
            el.style.left = containerWidth + 'px';

            // 讓瀏覽器計算寬度
            setTimeout(() => {
                const textWidth = el.offsetWidth;
                // 設定速度：每個字約 0.8 秒 (數值越大越慢)
                // 支援透過 data-speed 覆蓋預設速度（數值越小越快）
                const dataSpeed = parseFloat(el.dataset.speed);
                const speed = (!isNaN(dataSpeed) && dataSpeed > 0) ? dataSpeed : 0.006; // 預設更快的速度（比原先 0.012 快 2 倍）
                // 最低持續時間以避免過短閃爍
                const duration = Math.max(2.5, (textWidth + containerWidth) * speed);

                // 執行動畫：位移到文字寬度的負值（完全消失在左側）
                // 使用 addEventListener 且 once:true，避免重複綁定
                el.style.transition = `left ${duration}s linear`;
                // 觸發 layout
                void el.offsetWidth;
                el.style.left = `-${textWidth}px`;

                const onEnd = () => runMarqueeLoop(id);
                el.addEventListener('transitionend', onEnd, { once: true });
            }, 50);
        }

        init();
    </script>
