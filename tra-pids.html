<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵 PIDS V6.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="台鐵PIDS">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ CSS 變數系統 (Design Tokens) ============ */
        :root {
            --pids-bg-primary: #000000;
            --pids-bg-secondary: #111111;
            --pids-text-primary: #ffffff;
            --pids-text-secondary: #cccccc;
            --pids-border: #333333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #4fc3f7;
            --accent-red: #ff1744;
            --accent-orange: #ff9800;
            --header-inbound: linear-gradient(to right, #000080, #0d47a1);
            --header-outbound: linear-gradient(to right, #bf360c, #e65100);
            --row-odd-bg-inbound: #000;
            --row-even-bg-inbound: #2b2b2b;
            --row-odd-bg-outbound: #000;
            --row-even-bg-outbound: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* 🚀 修正：允許手機橫向模式可以正常上下滾動 */
        body {
            background-color: var(--pids-bg-secondary);
            color: var(--pids-text-primary);
            font-family: "Source Sans 3", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            font-weight: 550;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            overflow-x: hidden;
            overflow-y: auto; /* 預設允許滾動 */
        }

        /* 只有大螢幕電腦才強制隱藏滾動條 */
        @media (min-height: 800px) and (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
        }

        body *:not(i):not(svg):not(path) {
            font-weight: 550 !important;
        }

        /* Header */
        .unified-header {
            width: 100%;
            height: 90px;
            background: #000;
            border: none;
            border-radius: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: none;
            flex-shrink: 0;
            border-bottom: 2px solid #333;
        }

        .station-branding {
            display: flex;
            align-items: center; 
            gap: 15px; 
            flex: 1;
            min-width: 0;
        }

        .tra-logo-img {
            height: 3.8rem; 
            border-radius: 50%;
            border: 2px solid #fff;
            display: block;
        }

        .station-name-block {
            display: flex;
            flex-direction: row;
            align-items: baseline; 
            gap: 15px; 
            white-space: nowrap; 
            padding-top: 6px; 
        }

        .station-name {
            font-size: clamp(2.2rem, 4vw, 3.4rem); 
            font-weight: 900;
            line-height: 1.15; 
            margin: 0;
        }

        .station-sub {
            font-size: clamp(2.2rem, 4vw, 3.4rem); 
            color: #4fc3f7;
            font-family: "Source Sans 3", "Noto Sans TC", sans-serif;
            font-weight: 700;
            line-height: 1.15; 
            margin: 0;
        }

        .datetime-block {
            text-align: right;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            line-height: 1;
            flex-shrink: 0; 
            white-space: nowrap;
        }

        .date-text {
            font-size: 3rem;
            color: #ccc;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            line-height: 1;
            margin: 0;
        }

        .time-text {
            font-size: 3rem;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: #ffeb3b;
            line-height: 1;
            margin: 0;
        }

        /* 🚀 按鈕區塊 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: 12px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        /* Top Marquee */
        .unified-marquee-container {
            width: 100%;
            height: 60px;
            background: #e3f2fd;
            border: none;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #003366;
            flex-shrink: 0;
            margin-top: 0;
            margin-left: -8px;
            margin-right: -8px;
            padding: 0 8px;
        }

        .unified-marquee-container .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: auto;
            line-height: 1.2;
            font-size: 2.1rem;
            font-weight: 900;
            top: 50%;
            margin-top: -0.9rem;
            will-change: transform;
            letter-spacing: 1px;
        }

        /* PIDS Section */
        .pids-section {
            display: flex;
            width: 100%;
            gap: 10px;
            flex: 0 0 auto;
            min-height: 0;
            overflow: hidden;
        }

        .pids-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            border: 3px solid var(--pids-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .screen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            overflow: hidden;
        }

        .direction-header-1, .direction-header-0 {
            color: var(--pids-text-primary);
            padding: 5px 15px; 
            font-size: 1.6rem; 
            font-weight: 700;  
            display: flex;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 2px solid var(--pids-text-primary);
            flex-shrink: 0;
            height: 44px; 
            align-items: center;
            min-width: 0;
        }

        .direction-header-0 { background: var(--header-outbound); }
        .direction-header-1 { background: var(--header-inbound); }

        .dest-list {
            font-size: 1.6rem; 
            font-weight: 700;  
            flex: 1;
            min-width: 0;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 表格設定 */
        .train-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            table-layout: fixed;
        }

        .train-table th {
            padding: 5px; 
            color: #fff;
            border-bottom: 2px solid #fff;
            height: 44px; 
            font-size: 1.6rem; 
            font-weight: 700;  
        }

        .train-table tbody tr {
            border-bottom: 1px solid #333;
        }

        .train-table td {
            padding: 0 5px;
            vertical-align: middle; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 70px; 
            line-height: 70px; 
            font-size: clamp(1.1rem, 2vw, 1.8rem); 
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .train-table tr:hover td {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .train-table td:nth-child(3) { color: #29b6f6; font-weight: 600 !important; }

        .table-1 th { background: #000080; }
        .table-1 tr:nth-child(odd) { background: var(--row-odd-bg-inbound); }
        .table-1 tr:nth-child(even) { background: var(--row-even-bg-inbound); }

        .table-0 th { background: #bf360c; }
        .table-0 tr:nth-child(odd) { background: var(--row-odd-bg-outbound); }
        .table-0 tr:nth-child(even) { background: var(--row-even-bg-outbound); }

        /* 點開車次後的跑馬燈 */
        .train-inline-marquee-row { background: #212121; color: #fff; border-bottom: 1px solid #444; overflow: hidden; height: 50px; line-height: 50px; position: relative; }
        .train-inline-marquee-text { position: absolute; white-space: nowrap; font-size: 1.5rem; font-weight: 600; will-change: transform; }

        /* 底部跑馬燈 */
        .marquee-footer {
            background: #212121;
            color: #ffffff;
            height: 52px; 
            position: relative;
            overflow: hidden;
            border-top: 3px solid #ff9800;
            flex-shrink: 0;
        }

        .marquee-footer .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: 52px; 
            line-height: 52px; 
            font-size: 1.5rem; 
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            font-weight: 600; 
            letter-spacing: 1px;
            will-change: transform;
        }

        .marquee-footer .marquee-text * { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif !important; font-size: inherit !important; font-weight: 600 !important; vertical-align: baseline; }

        /* Media Section */
        .media-section {
            flex: 1;
            display: flex;
            gap: 10px;
            min-height: 150px;
            margin-top: 4px;
        }

        .media-box {
            flex: 1;
            height: 100%;
            background: #000;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🚀 手機版完全隱藏且防載入的對應 CSS */
        @media (max-width: 480px) {
            .media-section { display: none !important; }
        }

        .media-label {
            position: absolute; top: 0; left: 0; background: rgba(0, 0, 0, 0.7);
            color: #fff; padding: 4px 10px; font-size: 1rem; z-index: 10; border-bottom-right-radius: 8px;
        }

        .carousel-img { width: 100%; height: 100%; object-fit: contain; position: absolute; opacity: 0; transition: opacity 1s; }
        .carousel-img.active { opacity: 1; }
        .video-iframe { width: 100%; height: 100%; border: none; }

        /* 車種顏色與狀態 */
        .train-type-badge {
            display: inline-block; padding: 2px 6px; border-radius: 4px; color: white;
            font-size: 1.5rem; font-weight: 500; white-space: nowrap; min-width: 90px;
            max-width: 130px; overflow: hidden; text-overflow: ellipsis; text-align: center;
        }

        .type-自強 { background-color: #FF5722; }
        .type-新自強 { background: linear-gradient(135deg, #222 0%, #444 100%); border: 1px solid #999; }
        .type-普悠瑪 { background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%); }
        .type-太魯閣 { background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%); }
        .type-莒光 { background-color: #FF9800; }
        .type-區間快 { background-color: #3F51B5; }
        .type-區間 { background-color: #2196F3; }
        .type-其他 { background-color: #607D8B; }

        .status-ontime { color: #FFFFFF !important; }
        .status-delay { color: #ff1744 !important; animation: blink 1s infinite alternate; }
        .status-cancelled { color: #FF5252; font-weight: 900; }
        .status-suspended { color: #ff1744 !important; font-weight: 900; }

        .expected-time, .normal-time { font-size: 1.8rem; text-align: right; padding-right: 5px; }
        .expected-time { color: #ff5252; }

        @keyframes smooth-marquee {
            0% { transform: translateX(var(--start-pos)); }
            100% { transform: translateX(var(--end-pos)); }
        }

        /* RWD 響應式設計 */
        @media (max-width: 1280px) and (min-width: 901px) {
            .unified-header { height: 75px; padding: 0 12px; }
            .tra-logo-img { height: 2.8rem; }
            .datetime-block { gap: 10px; }
            .date-text, .time-text { font-size: 2.3rem; }
            .icon-btn { width: 44px; height: 44px; font-size: 1.3rem; }
            .unified-marquee-container { height: 50px; }
            .unified-marquee-container .marquee-text { font-size: 1.7rem; }
            .direction-header-0, .direction-header-1 { font-size: 1.4rem; padding: 8px 12px; height: 38px;}
            .dest-list { font-size: 1.4rem; }
            .train-table th { font-size: 1.4rem; height: 38px; }
            .train-table td { height: 58px; font-size: clamp(1rem, 1.8vw, 1.5rem); }
            .train-type-badge { font-size: 0.8rem; min-width: 55px; max-width: 75px; }
            .normal-time, .expected-time { font-size: 1.2rem; }
        }

        @media (max-width: 900px) and (min-width: 700px) {
            .unified-header { height: 60px; padding: 0 10px; }
            .tra-logo-img { height: 2.2rem; }
            .datetime-block { gap: 8px; }
            .date-text, .time-text { font-size: 1.8rem; }
            .icon-btn { width: 38px; height: 38px; font-size: 1.1rem; }
            .unified-marquee-container { height: 42px; }
            .unified-marquee-container .marquee-text { font-size: 1.35rem; }
            .direction-header-0, .direction-header-1 { font-size: 1.2rem; padding: 6px 8px; height: 34px; }
            .dest-list { font-size: 1.2rem; }
            .train-table th { font-size: 1.2rem; height: 34px; }
            .train-table td { height: 48px; font-size: clamp(0.75rem, 1.5vw, 1rem); }
            .train-type-badge { font-size: 0.75rem; min-width: 48px; max-width: 68px; padding: 2px 3px; }
            .normal-time, .expected-time { font-size: 0.8rem; }
            .marquee-footer { height: 48px; }
            .marquee-footer .marquee-text { font-size: 1rem; line-height: 48px; height: 48px; }
        }

        @media (max-width: 699px) {
            .unified-header { height: 65px; padding: 0 12px; gap: 8px; }
            .tra-logo-img { height: 2.4rem; }
            .station-name-block { flex-direction: column; gap: 2px; align-items: flex-start; justify-content: center; padding-top: 0; }
            .station-name { font-size: 1.5rem; line-height: 1; margin: 0; }
            .station-sub { font-size: 1.2rem; line-height: 1; margin: 0; }
            .datetime-block { flex-direction: column; align-items: flex-end; justify-content: center; gap: 2px; margin-right: 15px; }
            .date-text { font-size: 0.9rem; line-height: 1; }
            .time-text { font-size: 1.3rem; line-height: 1; }
            .btn-group { gap: 6px; margin-left: 6px; }
            .icon-btn { width: 32px; height: 32px; font-size: 1rem; }
            .unified-marquee-container { height: 38px; margin-left: -8px; margin-right: -8px; }
            .unified-marquee-container .marquee-text { font-size: 1.15rem; }
            .pids-section { flex-direction: column; gap: 8px; }
            .pids-column { min-height: 240px; flex-shrink: 0; }
            .direction-header-0, .direction-header-1 { font-size: 1.1rem; height: 30px; }
            .dest-list { font-size: 1.1rem; }
            .train-table th { font-size: 1.1rem; height: 30px; }
            .train-table td { height: 46px; font-size: 1.1rem; }
            .train-type-badge { font-size: 0.8rem; min-width: 48px; max-width: 65px; }
            .normal-time, .expected-time { font-size: 1.1rem; }
            .marquee-footer { height: 44px; }
            .marquee-footer .marquee-text { font-size: 0.95rem; line-height: 44px; height: 44px; }
            .media-box { height: 160px; flex: 0 0 auto; margin-bottom: 20px;}
        }

        @media (max-width: 480px) {
            .unified-header { height: 55px; padding: 0 10px; }
            .tra-logo-img { height: 2.0rem; }
            .station-name { font-size: 1.35rem; }
            .station-sub { font-size: 1.05rem; }
            .datetime-block { margin-right: 12px; }
            .date-text { font-size: 0.8rem; }
            .time-text { font-size: 1.15rem; }
            .btn-group { gap: 4px; margin-left: 4px; }
            .icon-btn { width: 28px; height: 28px; font-size: 0.85rem; border-radius: 6px; }
            .unified-marquee-container { height: 32px; }
            .unified-marquee-container .marquee-text { font-size: 1rem; }
            .direction-header-0, .direction-header-1 { font-size: 0.95rem; height: 28px; }
            .dest-list { font-size: 0.95rem; }
            .train-table th { font-size: 0.95rem; height: 28px; }
            .train-table td { height: 42px; font-size: 1rem; }
            .train-type-badge { font-size: 0.75rem; min-width: 42px; }
            .normal-time, .expected-time { font-size: 1rem; }
            .marquee-footer { height: 38px; }
            .marquee-footer .marquee-text { font-size: 0.85rem; line-height: 38px; height: 38px; }
            .media-section { display: none !important; }
        }
    </style>
    <script src="assets/station-code-mapping.js?v=20260424"></script>
</head>

<body>
    <!-- Header 區塊 -->
    <div class="unified-header">
        <div class="station-branding">
            <img src="assets/TRA_logo.jpg" class="tra-logo-img" alt="TRA Logo">
            <div class="station-name-block">
                <div class="station-name" id="unifiedStationName">臺鐵車站</div>
                <div class="station-sub" id="station-en">TRA STATION</div>
            </div>
        </div>
        <div class="datetime-block">
            <div class="date-text" id="unifiedDate">Loading...</div>
            <div class="time-text" id="unifiedTime">--:--:--</div>
            
            <!-- 🚀 包含回首頁按鈕 -->
            <div class="btn-group">
                <button class="icon-btn" onclick="goBack()" title="返回查詢" aria-label="返回查詢">
                    <i class="fas fa-home"></i>
                </button>
                <button class="icon-btn" id="fullscreenBtn" title="切換全螢幕" aria-label="切換全螢幕">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 頂部跑馬燈區塊 -->
    <div class="unified-marquee-container">
        <div class="marquee-text" id="unifiedTopMarquee">載入中...</div>
    </div>

    <!-- 表格區塊 -->
    <div class="pids-section">
        <div class="pids-column">
            <div class="screen-body">
                <div class="direction-header-1"><span id="dirTitle1">逆行</span><span id="destList1" class="dest-list"></span></div>
                <table class="train-table table-1">
                    <thead>
                        <tr>
                            <th style="width:20%">車次</th>
                            <th style="width:20%">開往</th>
                            <th style="width:20%">車種</th>
                            <th style="width:20%">開車時間</th>
                            <th style="width:20%">備注</th>
                        </tr>
                    </thead>
                    <tbody id="body1"></tbody>
                </table>
            </div>
            <div class="marquee-footer">
                <div class="marquee-text" id="marquee1">讀取中...</div>
            </div>
        </div>
        
        <div class="pids-column">
            <div class="screen-body">
                <div class="direction-header-0"><span id="dirTitle0">順行</span><span id="destList0" class="dest-list"></span></div>
                <table class="train-table table-0">
                    <thead>
                        <tr>
                            <th style="width:20%">車次</th>
                            <th style="width:20%">開往</th>
                            <th style="width:20%">車種</th>
                            <th style="width:20%">開車時間</th>
                            <th style="width:20%">備注</th>
                        </tr>
                    </thead>
                    <tbody id="body0"></tbody>
                </table>
            </div>
            <div class="marquee-footer">
                <div class="marquee-text" id="marquee0">讀取中...</div>
            </div>
        </div>
    </div>

    <!-- 媒體區塊 -->
    <div class="media-section">
        <div class="media-box" id="carouselBox">
            <div class="media-label">宣導資訊</div>
        </div>
        <div class="media-box" id="videoBox">
            <div class="media-label">影音專區</div>
            <div id="videoContainer" style="width:100%;height:100%"></div>
        </div>
    </div>

    <template id="train-row-template">
        <tr>
            <td class="train-no-cell"></td>
            <td class="train-dest-cell"></td>
            <td class="train-type-cell"></td>
            <td class="train-time-cell"></td>
            <td class="train-note-cell"></td>
        </tr>
    </template>

    <script src="assets/config.js"></script>
    <script>
        const TRA_WORKER_URL = "https://tra-schedule-worker.weacamm.org";
        // 🚀 判斷是否為手機版 (<= 480px)
        const IS_MOBILE_V = window.innerWidth <= 480;

        function formatMarqueeText(rawText) {
            const text = String(rawText || '');
            if (!text) return text;
            return text.replace(/([\u4e00-\u9fff]{1,6})\s*(?:-|－|–|—|~|～)\s*([\u4e00-\u9fff]{1,6})/g, '$1 ＜－－＞ $2');
        }

        const PIDS_APP = {
            STATE: { stationID: '', stationName: '', lastTrainData: [], stopsCache: {} },

            init() {
                const params = new URLSearchParams(location.search);
                const sid = params.get('station') || '1000'; // 預設 1000 (臺北)
                this.STATE.stationID = sid;

                // 🚀 修正：站名顯示防呆
                let sname = params.get('name');
                if (!sname || sname === sid) {
                    if (typeof stationDataMap !== 'undefined' && stationDataMap[sid]) {
                        sname = stationDataMap[sid].name;
                    } else {
                        sname = '臺鐵車站';
                    }
                }
                this.STATE.stationName = sname;
                
                const cleanName = sname.replace(/車站$|站$/, '');
                document.getElementById('unifiedStationName').textContent = cleanName + '車站';
                updateEnglishStationName(sid);

                this.startTimers();
                this.updateClock();
                
                // 🚀 手機版防浪費流量：非手機才載入圖片/影片
                if (!IS_MOBILE_V) updateMediaAssets();
            },

            startTimers() {
                setInterval(() => this.updateClock(), 1000);
                const delayToNextMinute = 60000 - (Date.now() % 60000);
                
                if (this.STATE.stationID) {
                    this.updatePids();
                    setTimeout(() => {
                        this.updatePids();
                        setInterval(() => this.updatePids(), 60000);
                    }, delayToNextMinute);
                }
                
                this.checkTopMarquee();
                setTimeout(() => startMarquee('unifiedTopMarquee'), 300);
                setTimeout(() => {
                    this.checkTopMarquee();
                    setInterval(() => this.checkTopMarquee(), 60000);
                }, delayToNextMinute);
            },

            updateClock() {
                const now = new Date();
                document.getElementById('unifiedTime').textContent = now.toLocaleTimeString('en-GB');
                document.getElementById('unifiedDate').textContent = now.toISOString().split('T')[0].replace(/-/g, '/');
            },

            async updatePids() {
                try {
                    const response = await fetch(`${TRA_WORKER_URL}/api/liveboard/station?station=${this.STATE.stationID}`);
                    const data = await response.json();
                    const now = new Date();
                    const nowTotalMinutes = now.getHours() * 60 + now.getMinutes();

                    let filtered = (Array.isArray(data) ? data : []).map(t => {
                        const normalized = {
                            ...t,
                            TrainNo: t.TrainNo ?? t.No,
                            Direction: t.Direction ?? t.Dir,
                            TrainTypeName: t.TrainTypeName ?? t.Type,
                            EndingStationName: t.EndingStationName ?? t.Dest,
                            ScheduledDepartureTime: t.ScheduledDepartureTime ?? t.Dep ?? t.Arr,
                            DelayTime: t.DelayTime ?? t.Delay ?? 0,
                            TrainStatus: t.TrainStatus ?? t.Status,
                            TrainSuspendedFlag: t.TrainSuspendedFlag ?? 0,
                        };

                        const timeStr = normalized.ScheduledDepartureTime || "00:00";
                        const [h, m] = timeStr.split(':').map(Number);
                        const schedMins = h * 60 + m;
                        const delayMins = parseInt(normalized.DelayTime || 0);
                        let adjustedActualMins = schedMins + delayMins;
                        if (adjustedActualMins < nowTotalMinutes - 720) adjustedActualMins += 1440;

                        return {
                            ...normalized,
                            _sort: (adjustedActualMins - nowTotalMinutes + 1440) % 1440,
                            _actualMins: adjustedActualMins,
                            _isCancelled: String(normalized.TrainStatus) === '2' || Boolean(normalized.IsSuspended) || Number(normalized.TrainSuspendedFlag) === 1,
                            _isPartiallySuspended: Boolean(normalized.IsPartiallySuspended) || Number(normalized.TrainSuspendedFlag) === 2
                        };
                    }).filter(t => t._actualMins >= nowTotalMinutes || t._isCancelled || t._isPartiallySuspended);

                    filtered.sort((a, b) => a._sort - b._sort);
                    this.STATE.lastTrainData = filtered; 
                    refreshDisplay();

                } catch (error) { console.error("PIDS 更新失敗:", error); }
            },

            async checkTopMarquee() {
                try {
                    const response = await fetch(`${TRA_WORKER_URL}/api/pids/marquee?station=${this.STATE.stationID}`);
                    const data = await response.json();
                    const el = document.getElementById('unifiedTopMarquee');

                    if (data.text !== undefined && data.text !== null) {
                        let cleanText = data.text.replace(/\\n/g, "   ").replace(/[\r\n]+/g, "   ").trim();
                        if (el.dataset.raw !== cleanText) {
                            el.dataset.raw = cleanText;
                            const newMsg = formatMarqueeText(cleanText);
                            
                            // 🚀 防斷更：正在跑就放入 nextMsg 排隊
                            if (!el.style.animationName || el.style.animationName === 'none') {
                                el.innerHTML = newMsg;
                                el.dataset.currentMsg = newMsg;
                                startMarquee('unifiedTopMarquee');
                            } else {
                                el.dataset.nextMsg = newMsg;
                            }
                        }
                    }
                } catch (error) {}
            }
        };

        function translateStation(zh) {
            if (!zh) return "";
            return zh.replace(/臺/g, '台');
        }

        function updateEnglishStationName(id) {
            const el = document.getElementById('station-en');
            if (typeof stationDataMap !== 'undefined' && stationDataMap[id]) {
                const ename = stationDataMap[id].ename.split('_')[0];
                el.textContent = ename.charAt(0).toUpperCase() + ename.slice(1).toLowerCase();
            } else { el.textContent = "TRA"; }
        }

        async function updateMediaAssets() {
            if (IS_MOBILE_V) return; // 雙重保護，不耗費手機流量
            try {
                const res = await fetch(`${TRA_WORKER_URL}/api/pids/assets`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.images && data.images.length > 0) setupCarousel(data.images);
                    if (data.video) setupVideo(Array.isArray(data.video) ? data.video : [data.video]);
                }
            } catch (e) {}
        }

        function setupCarousel(imgs) {
            const box = document.getElementById('carouselBox');
            box.innerHTML = '<div class="media-label">宣導資訊</div>';
            imgs.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src; img.className = i === 0 ? 'carousel-img active' : 'carousel-img';
                box.appendChild(img);
            });
            let idx = 0;
            setInterval(() => {
                const list = box.querySelectorAll('img');
                if (list.length > 1) {
                    list[idx].classList.remove('active');
                    idx = (idx + 1) % list.length;
                    list[idx].classList.add('active');
                }
            }, 10000);
        }

        let _videoIds = [], _currentVideoIndex = 0;
        function setupVideo(urls) {
            urls.forEach(url => {
                const match = url.match(/(?:v=|v\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
                if (match) _videoIds.push(match[1]);
            });
            if (_videoIds.length > 0) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.body.appendChild(tag);
            }
        }

        window.onYouTubeIframeAPIReady = () => {
            window.ytPlayer = new YT.Player('videoContainer', {
                videoId: _videoIds[0],
                // 🚀 影片預設不自動播放 (autoplay: 0)
                playerVars: { autoplay: 0, mute: 1, controls: 1, playsinline: 1 },
                events: { 'onStateChange': (e) => { 
                    if (e.data === YT.PlayerState.ENDED) {
                        _currentVideoIndex = (_currentVideoIndex + 1) % _videoIds.length;
                        window.ytPlayer.loadVideoById(_videoIds[_currentVideoIndex]);
                    }
                }}
            });
        };

        // 🚀 跑馬燈速度控制：下方速度是上方的 0.8 倍
        function startMarquee(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const container = el.parentElement;

            el.style.animation = 'none';
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const textWidth = el.scrollWidth;
                    const containerWidth = container.clientWidth;
                    
                    const speedMultiplier = (id === 'unifiedTopMarquee') ? 1.0 : 0.8;
                    const baseSpeed = window.innerWidth <= 900 ? 120 : 180;
                    const pixelsPerSecond = baseSpeed * speedMultiplier;
                    
                    const totalDistance = textWidth + containerWidth;
                    const duration = Math.max(5, totalDistance / pixelsPerSecond);

                    el.style.setProperty('--start-pos', `${containerWidth}px`);
                    el.style.setProperty('--end-pos', `-${textWidth}px`);
                    el.style.animation = `smooth-marquee ${duration}s linear infinite`;
                });
            });
        }

        // 🚀 全域事件：監聽所有跑馬燈一圈結束，防斷更技術
        document.addEventListener('animationiteration', (e) => {
            const el = e.target;
            if (el.classList.contains('marquee-text') || el.classList.contains('train-inline-marquee-text')) {
                if (el.dataset.nextMsg) {
                    el.innerHTML = el.dataset.nextMsg;
                    el.dataset.currentMsg = el.dataset.nextMsg;
                    el.dataset.nextMsg = '';
                    
                    // 重新計算時間
                    const container = el.parentElement;
                    const textWidth = el.scrollWidth;
                    const containerWidth = container.clientWidth;
                    const speedMultiplier = (el.id === 'unifiedTopMarquee') ? 1.0 : 0.8;
                    const pixelsPerSecond = (window.innerWidth <= 900 ? 120 : 180) * speedMultiplier;
                    const duration = Math.max(5, (textWidth + containerWidth) / pixelsPerSecond);
                    
                    el.style.setProperty('--end-pos', `-${textWidth}px`);
                    el.style.animationDuration = `${duration}s`;
                }
            }
        });

        let activeMarqueeTrainNo = null; // 紀錄目前點開的車次

        function refreshDisplay() {
            const data = PIDS_APP.STATE.lastTrainData;
            let t1 = data.filter(t => t.Direction == 1 || t.Dir == 1);
            let t0 = data.filter(t => t.Direction == 0 || t.Dir == 0);

            // 🚀 保護正在展開的車次跑馬燈 DOM，防止 00 秒畫面刷新時被砍掉
            let savedMarqueeRow = null;
            if (activeMarqueeTrainNo) {
                const existingRow = document.querySelector('.train-inline-marquee-row');
                if (existingRow) {
                    savedMarqueeRow = existingRow;
                    savedMarqueeRow.remove(); // 暫存到記憶體中
                }
            }

            renderTable('1', t1); 
            renderTable('0', t0);
            updateFooterMarquee('marquee1', t1); 
            updateFooterMarquee('marquee0', t0);

            // 🚀 把保護起來的跑馬燈裝回去對應的表格行下方
            if (savedMarqueeRow && activeMarqueeTrainNo) {
                const trToAttach = document.querySelector(`tr[data-train-no="${activeMarqueeTrainNo}"]`);
                if (trToAttach) {
                    trToAttach.insertAdjacentElement('afterend', savedMarqueeRow);
                } else {
                    activeMarqueeTrainNo = null; // 車子已經開走了，不需要再顯示
                }
            }
        }

        function updateFooterMarquee(id, list) {
            const el = document.getElementById(id);
            if (!el || list.length === 0) {
                if(el) el.innerHTML = "目前無列車資訊";
                return;
            }
            
            let parts = list.slice(0, 10).map(t => {
                let dest = translateStation(t.EndingStationName || t.Dest);
                let type = (t.TrainTypeName || t.Type || "列車").replace(/\(.*\)/g, '');
                let delay = parseInt(t.DelayTime || t.Delay || 0);
                let delayStr = delay > 0 ? `晚${delay}分` : '準點';
                if (t.TrainStatus == 2 || t.TrainSuspendedFlag == 1) delayStr = "停駛";
                return `${t.TrainNo || t.No}次 往${dest} ${type} ${delayStr}`;
            });

            const newMsg = `<span style="color:#ffeb3b">🚆 列車動態：</span> ` + parts.join(' <span style="margin: 0 15px; color:#555;">|</span> ');
            
            if (el.dataset.currentMsg !== newMsg) {
                if (!el.style.animationName || el.style.animationName === 'none') {
                    el.innerHTML = newMsg;
                    el.dataset.currentMsg = newMsg;
                    startMarquee(id);
                } else {
                    el.dataset.nextMsg = newMsg; // 🚀 放入排隊序列
                }
            }
        }

        function renderTable(dir, list) {
            const tb = document.getElementById(`body${dir}`);
            const template = document.getElementById('train-row-template');
            tb.innerHTML = ''; 

            list.slice(0, 5).forEach(t => {
                const clone = template.content.cloneNode(true);
                const tr = clone.querySelector('tr');
                tr.dataset.trainNo = t.TrainNo || t.No; 
                
                const cells = tr.querySelectorAll('td');
                let delay = parseInt(t.DelayTime || t.Delay || 0);
                let isCancel = String(t.TrainStatus) === '2' || t.TrainSuspendedFlag == 1;
                
                cells[0].textContent = String(t.TrainNo || t.No);
                cells[1].textContent = translateStation(t.EndingStationName || t.Dest);
                cells[2].textContent = (t.TrainTypeName || t.Type || "").replace(/\(.*\)/g, '');
                
                let timeDisplay = (t.ScheduledDepartureTime || t.Dep || "").slice(0, 5);
                if (delay > 0 && !isCancel && delay < 120) {
                    let [h, m] = timeDisplay.split(':').map(Number);
                    let min = h * 60 + m + delay;
                    timeDisplay = `${String(Math.floor(min / 60) % 24).padStart(2, '0')}:${String(min % 60).padStart(2, '0')}`;
                } else if (delay >= 120) { timeDisplay = "--:--"; }
                
                cells[3].textContent = timeDisplay;
                cells[3].className = (delay > 0 && !isCancel) ? 'expected-time' : 'normal-time';
                
                cells[4].textContent = isCancel ? "停駛" : (delay > 0 ? `晚 ${delay} 分` : "準點");
                if (isCancel || delay > 0) cells[4].className = 'status-delay';

                // 🚀 點擊行時展開或收起跑馬燈
                tr.addEventListener('click', () => toggleTrainMarquee(tr, t));

                tb.appendChild(clone);
            });
        }

        // 🚀 點開車次跑馬燈與即時連線
        async function toggleTrainMarquee(trEl, trainData) {
            const trainNo = trainData.TrainNo || trainData.No;
            
            if (activeMarqueeTrainNo === trainNo) {
                const existingRow = trEl.nextElementSibling;
                if (existingRow && existingRow.classList.contains('train-inline-marquee-row')) existingRow.remove();
                activeMarqueeTrainNo = null;
                return;
            }

            document.querySelectorAll('.train-inline-marquee-row').forEach(e => e.remove());
            activeMarqueeTrainNo = trainNo;

            const row = document.createElement('tr');
            row.className = 'train-inline-marquee-row';
            row.dataset.trainNo = trainNo;
            const td = document.createElement('td');
            td.colSpan = 5;
            td.style.padding = '0';
            
            const innerDiv = document.createElement('div');
            innerDiv.style = "position:relative; width:100%; height:50px; background:#212121; overflow:hidden;";
            
            const textEl = document.createElement('div');
            textEl.className = 'train-inline-marquee-text';
            textEl.id = `marquee_train_${trainNo}`;
            textEl.innerHTML = `正在連線取得 ${trainNo} 次列車即時動態...`;
            
            innerDiv.appendChild(textEl);
            td.appendChild(innerDiv);
            row.appendChild(td);
            trEl.insertAdjacentElement('afterend', row);

            startMarquee(textEl.id);

            try {
                const date = new Date().toISOString().split('T')[0];
                const resSch = await fetch(`${TRA_WORKER_URL}/api/schedule?trainNo=${trainNo}&date=${date}`);
                const data = await resSch.json();
                
                const resLive = await fetch(`${TRA_WORKER_URL}/api/live?trainNo=${trainNo}`);
                const liveData = await resLive.json();

                let status = "行駛中";
                if (liveData?.station) {
                    let st = typeof liveData.station === 'object' ? (liveData.station.Zh_tw || liveData.station.name) : liveData.station;
                    status = `目前位置：${translateStation(st)}`;
                    if (liveData.delay > 0) status += ` <span style="color:#ff5252">(晚 ${liveData.delay} 分)</span>`;
                }

                let stops = Array.isArray(data) ? (data[0]?.StopTimes || []) : (data?.StopTimes || []);
                let stopsText = stops.map(s => {
                    let t = (s.ArrivalTime || s.Arr || "").slice(0, 5);
                    return `${translateStation(s.StationName?.Zh_tw || s.StationName)}(${t})`;
                }).join(' <span style="color:#888; font-size:0.9em; margin: 0 8px;">►</span> ');

                const finalMsg = `<span style="color:#ffeb3b; font-weight:900;">${trainNo}次</span> <span style="margin: 0 15px; color:#555;">|</span> <span style="color:#4fc3f7">${status}</span> <span style="margin: 0 15px; color:#555;">|</span> 停靠站：${stopsText}`;
                
                // 🚀 套用防斷更排隊機制
                if (textEl.dataset.currentMsg !== finalMsg) {
                    textEl.dataset.nextMsg = finalMsg;
                }
            } catch (e) {
                textEl.dataset.nextMsg = `❌ 無法取得 ${trainNo} 次列車詳細資料`;
            }
        }

        // 🚀 回首頁按鈕功能
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'tra_liveboard.html';
            }
        }

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
        document.addEventListener('fullscreenchange', () => {
            const icon = fullscreenBtn.querySelector('i');
            if (document.fullscreenElement) {
                icon.className = 'fas fa-compress';
                fullscreenBtn.title = "取消全螢幕";
            } else {
                icon.className = 'fas fa-expand';
                fullscreenBtn.title = "切換全螢幕";
            }
        });

        document.addEventListener('DOMContentLoaded', () => { PIDS_APP.init(); });

    </script>
</body>
