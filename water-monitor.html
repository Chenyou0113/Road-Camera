<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經濟部水利署即時監控影像系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 頁首 */
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header h1 i {
            color: #3498db;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .header .notice {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #2196f3;
        }

        .header .notice h3 {
            color: #1976d2;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .notice ul {
            text-align: left;
            margin-left: 30px;
            color: #455a64;
        }

        .header .notice a {
            color: #1976d2;
            text-decoration: none;
            font-weight: bold;
        }

        .header .notice a:hover {
            text-decoration: underline;
        }

        /* 統計面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            color: white;
        }

        .stat-icon.total { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-icon.direct { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-icon.local { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-icon.active { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        .stat-info h3 {
            color: #7f8c8d;
            font-size: 0.9em;
            font-weight: normal;
            margin-bottom: 5px;
        }

        .stat-info p {
            color: #2c3e50;
            font-size: 2em;
            font-weight: bold;
        }

        .stat-time {
            color: #95a5a6;
            font-size: 0.9em;
            margin-top: 5px;
        }

        /* 控制面板 */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .control-row {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }

        .control-group label {
            display: block;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .control-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box {
            flex: 2;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-icon {
            position: relative;
        }

        .search-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
        }

        /* 監視器網格 */
        .cameras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .camera-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .camera-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .camera-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        .camera-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .camera-card:hover .camera-image img {
            transform: scale(1.05);
        }

        .camera-status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .camera-status.online {
            background: rgba(76, 175, 80, 0.9);
            color: white;
        }

        .camera-status.offline {
            background: rgba(244, 67, 54, 0.9);
            color: white;
        }

        .camera-status i {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .camera-info {
            padding: 20px;
        }

        .camera-title {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .camera-title i {
            color: #667eea;
        }

        .camera-details {
            color: #7f8c8d;
            font-size: 0.9em;
            line-height: 1.8;
        }

        .camera-details div {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .camera-details i {
            width: 20px;
            color: #95a5a6;
        }

        .camera-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 10px;
        }

        .badge-direct {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-local {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-state i {
            font-size: 5em;
            color: #bdc3c7;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: #7f8c8d;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #95a5a6;
            font-size: 1.1em;
        }

        /* 載入動畫 */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats-panel {
                grid-template-columns: 1fr;
            }

            .cameras-grid {
                grid-template-columns: 1fr;
            }

            .control-row {
                flex-direction: column;
            }

            .control-group,
            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <h1>
                <i class="fas fa-water"></i>
                水利署監視器影像系統
            </h1>
            <p>經濟部水利署即時監控影像系統</p>
            
            <div class="notice">
                <h3><i class="fas fa-info-circle"></i> 水利署監測影像說明</h3>
                <p>水利署視訊監測影格照片由經濟部水利署獨自建置管理，用於監測河川、水庫等水利設施。</p>
                <br>
                <p>📍 您可以前往以下官方網站查看即時水利監測資訊：</p>
                <ul>
                    <li><a href="https://fhy.wra.gov.tw/" target="_blank">經濟部水利署防災資訊服務網</a></li>
                    <li><a href="https://www.wra.gov.tw/" target="_blank">經濟部水利署官網</a></li>
                </ul>
                <br>
                <p>💡 如需整合水利署監測影像資料，請聯繫水利署申請相關 API 權限。</p>
            </div>
        </div>

        
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="fas fa-video"></i>
                </div>
                <div class="stat-info">
                    <h3>總監視器數</h3>
                    <p id="totalCameras">200</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon direct">
                    <i class="fas fa-building"></i>
                </div>
                <div class="stat-info">
                    <h3>水利署直轄</h3>
                    <p id="directCameras">100</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon local">
                    <i class="fas fa-city"></i>
                </div>
                <div class="stat-info">
                    <h3>地方合建</h3>
                    <p id="localCameras">100</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon active">
                    <i class="fas fa-signal"></i>
                </div>
                <div class="stat-info">
                    <h3>有影像監視器</h3>
                    <p id="activeCameras">200</p>
                    <div class="stat-time" id="currentTime">11/06 下午09:11</div>
                </div>
            </div>
        </div>

        
        <div class="control-panel">
            <div class="control-row">
                <div class="control-group">
                    <label>
                        <i class="fas fa-building"></i>
                        主管機關
                    </label>
                    <select id="agencyFilter">
                        <option value="all">全部機關</option>
                        <option value="direct">水利署直轄</option>
                        <option value="local">地方合建</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>
                        <i class="fas fa-signal"></i>
                        影像狀態
                    </label>
                    <select id="statusFilter">
                        <option value="all">全部監視器</option>
                        <option value="online">有影像</option>
                        <option value="offline">無影像</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>
                        <i class="fas fa-sort"></i>
                        排序方式
                    </label>
                    <select id="sortOrder">
                        <option value="name">依名稱排序</option>
                        <option value="location">依位置排序</option>
                        <option value="status">依狀態排序</option>
                    </select>
                </div>

                <div class="search-box">
                    <label>
                        <i class="fas fa-search"></i>
                        搜尋監視器
                    </label>
                    <div class="search-icon">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="輸入監視器名稱或位置...">
                    </div>
                </div>
            </div>
        </div>

        
        <div id="camerasContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p style="color: white; font-size: 1.2em;">正在載入監視器資料...</p>
            </div>
        </div>
    </div>

    <script src="assets/water-monitor-data.js"></script>
    <script src="assets/wra-api-integration.js"></script>
    <script>
        // 全域變數
        let allCameras = [];
        let filteredCameras = [];
        let useRealApi = true; // 設為 true 使用真實 API，false 使用示範資料

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadCameraData();
            updateTime();
            setInterval(updateTime, 60000); // 每分鐘更新時間

            // 綁定事件監聽器
            document.getElementById('agencyFilter').addEventListener('change', filterCameras);
            document.getElementById('statusFilter').addEventListener('change', filterCameras);
            document.getElementById('sortOrder').addEventListener('change', filterCameras);
            document.getElementById('searchInput').addEventListener('input', filterCameras);
            
            // 啟用自動更新（真實 API 模式）
            if (useRealApi && typeof enableAutoRefresh === 'function') {
                enableAutoRefresh();
            }
        });

        // 載入監視器資料
        async function loadCameraData() {
            try {
                if (useRealApi && typeof loadRealCameraData === 'function') {
                    // 使用真實 API
                    console.log('🌊 載入水利署真實監視器資料...');
                    allCameras = await loadRealCameraData();
                } else {
                    // 使用示範資料
                    console.log('📝 載入示範資料...');
                    allCameras = generateDemoData();
                }
                
                filteredCameras = [...allCameras];
                updateStats();
                renderCameras();
                
                console.log(`✅ 成功載入 ${allCameras.length} 台監視器`);
            } catch (error) {
                console.error('❌ 載入資料失敗:', error);
                // 錯誤時使用示範資料作為備援
                allCameras = generateDemoData();
                filteredCameras = [...allCameras];
                updateStats();
                renderCameras();
            }
        }
    </script>
</body>
</html>
