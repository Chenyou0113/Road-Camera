<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵 PIDS V6.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="台鐵PIDS">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ CSS 變數系統 ============ */
        :root {
            --pids-bg-primary: #000000;
            --pids-bg-secondary: #111111;
            --pids-text-primary: #ffffff;
            --pids-text-secondary: #cccccc;
            --pids-border: #333333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #4fc3f7;
            --accent-red: #ff1744;
            --accent-orange: #ff9800;
            --header-inbound: linear-gradient(to right, #000080, #0d47a1);
            --header-outbound: linear-gradient(to right, #bf360c, #e65100);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--pids-bg-secondary);
            color: var(--pids-text-primary);
            font-family: "Source Sans 3", "Noto Sans TC", sans-serif;
            font-weight: 550;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px; gap: 8px;
            overflow-x: hidden; overflow-y: auto;
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
        }

        /* Header */
        .unified-header {
            width: 100%; height: 90px; background: #000; border-bottom: 2px solid #333;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; flex-shrink: 0;
        }

        .station-branding { display: flex; align-items: center; gap: 15px; flex: 1; }
        .tra-logo-img { height: 3.8rem; border-radius: 50%; border: 2px solid #fff; }
        .station-name-block { display: flex; align-items: baseline; gap: 15px; padding-top: 6px; }
        .station-name { font-size: clamp(2.2rem, 4vw, 3.4rem); font-weight: 900; }
        .station-sub { font-size: clamp(2.2rem, 4vw, 3.4rem); color: #4fc3f7; font-weight: 700; }

        .datetime-block { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
        .date-text { font-size: 3rem; color: #ccc; }
        .time-text { font-size: 3rem; color: #ffeb3b; }

        .btn-group { display: flex; gap: 10px; margin-left: 12px; }
        .icon-btn {
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff; width: 48px; height: 48px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }

        /* Marquee */
        .unified-marquee-container {
            width: 100%; height: 60px; background: #e3f2fd; color: #003366;
            overflow: hidden; position: relative; flex-shrink: 0;
        }
        .marquee-text {
            position: absolute; white-space: nowrap; font-size: 2.1rem; font-weight: 900;
            top: 50%; transform: translateY(-50%); will-change: transform;
        }

        /* PIDS Section */
        .pids-section { display: flex; width: 100%; gap: 10px; flex: 1; min-height: 0; }
        .pids-column {
            flex: 1; display: flex; flex-direction: column; background: var(--pids-bg-primary);
            border: 3px solid var(--pids-border); border-radius: 8px; overflow: hidden;
        }
        .direction-header-1 { background: var(--header-inbound); }
        .direction-header-0 { background: var(--header-outbound); }
        .direction-header-1, .direction-header-0 {
            padding: 5px 15px; font-size: 1.6rem; font-weight: 700; border-bottom: 2px solid #fff;
        }

        .train-table { width: 100%; border-collapse: collapse; text-align: center; }
        .train-table th { background: rgba(255,255,255,0.1); padding: 8px; border-bottom: 2px solid #fff; }
        .train-table td { padding: 12px 5px; border-bottom: 1px solid #333; font-size: 1.5rem; }
        .status-delay { color: var(--accent-red); font-weight: bold; }

        .marquee-footer {
            background: #212121; height: 52px; position: relative; overflow: hidden; border-top: 3px solid #ff9800;
        }
        .marquee-footer .marquee-text { font-size: 1.5rem; line-height: 52px; color: #fff; }

        /* Media Section */
        .media-section { display: flex; gap: 10px; height: 200px; margin-top: 4px; }
        .media-box { flex: 1; background: #000; border: 3px solid #333; border-radius: 8px; position: relative; overflow: hidden; }
        .carousel-img { width: 100%; height: 100%; object-fit: contain; position: absolute; opacity: 0; transition: opacity 1s; }
        .carousel-img.active { opacity: 1; }

        @media (max-width: 480px) {
            .media-section { display: none !important; }
            .unified-header { height: 60px; padding: 0 10px; }
            .date-text, .time-text { font-size: 1.5rem; }
            .icon-btn { width: 32px; height: 32px; font-size: 1rem; }
            .pids-section { flex-direction: column; }
        }

        @keyframes smooth-marquee {
            0% { transform: translate(var(--start-pos), -50%); }
            100% { transform: translate(var(--end-pos), -50%); }
        }
    </style>
    <script src="assets/station-code-mapping.js?v=20260424"></script>
</head>

<body>
    <div class="unified-header">
        <div class="station-branding">
            <img src="assets/TRA_logo.jpg" class="tra-logo-img">
            <div class="station-name-block">
                <div class="station-name" id="unifiedStationName">載入中...</div>
                <div class="station-sub" id="station-en">TRA</div>
            </div>
        </div>
        <div class="datetime-block">
            <div class="date-text" id="unifiedDate">0000/00/00</div>
            <div class="time-text" id="unifiedTime">00:00:00</div>
            <div class="btn-group">
                <button class="icon-btn" onclick="goBack()"><i class="fas fa-home"></i></button>
                <button class="icon-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <div class="unified-marquee-container">
        <div class="marquee-text" id="unifiedTopMarquee">正在連線至台鐵伺服器...</div>
    </div>

    <div class="pids-section">
        <div class="pids-column">
            <div class="direction-header-1">逆行 (Upbound)</div>
            <table class="train-table">
                <thead><tr><th>車次</th><th>開往</th><th>車種</th><th>時間</th><th>備注</th></tr></thead>
                <tbody id="body1"></tbody>
            </table>
            <div class="marquee-footer"><div class="marquee-text" id="marquee1"></div></div>
        </div>
        <div class="pids-column">
            <div class="direction-header-0">順行 (Downbound)</div>
            <table class="train-table">
                <thead><tr><th>車次</th><th>開往</th><th>車種</th><th>時間</th><th>備注</th></tr></thead>
                <tbody id="body0"></tbody>
            </table>
            <div class="marquee-footer"><div class="marquee-text" id="marquee0"></div></div>
        </div>
    </div>

    <div class="media-section">
        <div class="media-box" id="carouselBox"></div>
        <div class="media-box" id="videoBox"><div id="videoContainer" style="width:100%;height:100%"></div></div>
    </div>

    <template id="train-row-template">
        <tr><td class="no"></td><td class="dest"></td><td class="type"></td><td class="time"></td><td class="note"></td></tr>
    </template>

    <script src="assets/config.js"></script>
    <script>
        const TRA_WORKER_URL = "https://tra-schedule-worker.weacamm.org";
        const IS_MOBILE_V = window.innerWidth <= 480;

        function translateStation(zh) {
            if (!zh) return "";
            return zh.replace(/臺/g, '台');
        }

        const PIDS_APP = {
            state: { stationID: '', lastData: [] },
            init() {
                const params = new URLSearchParams(location.search);
                const sid = params.get('station') || '1000';
                this.state.stationID = sid;

                let sname = params.get('name');
                if (!sname || sname === sid) {
                    sname = (typeof stationDataMap !== 'undefined' && stationDataMap[sid]) ? stationDataMap[sid].name : '臺鐵車站';
                }
                const cleanName = sname.replace(/車站$|站$/, '');
                document.getElementById('unifiedStationName').textContent = cleanName + '車站';
                
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                
                this.fetchPids();
                setInterval(() => this.fetchPids(), 60000);

                this.fetchMarquee();
                setInterval(() => this.fetchMarquee(), 60000);

                if (!IS_MOBILE_V) this.initMedia();
            },
            updateClock() {
                const now = new Date();
                document.getElementById('unifiedTime').textContent = now.toLocaleTimeString('en-GB');
                document.getElementById('unifiedDate').textContent = now.toISOString().split('T')[0].replace(/-/g, '/');
            },
            async fetchPids() {
                try {
                    const res = await fetch(`${TRA_WORKER_URL}/api/liveboard/station?station=${this.state.stationID}`);
                    const data = await res.json();
                    this.state.lastData = data;
                    this.render();
                } catch (e) { console.error("PIDS Fetch Error"); }
            },
            async fetchMarquee() {
                try {
                    const res = await fetch(`${TRA_WORKER_URL}/api/pids/marquee?station=${this.state.stationID}`);
                    const data = await res.json();
                    const el = document.getElementById('unifiedTopMarquee');
                    if (data.text && el.dataset.raw !== data.text) {
                        el.dataset.nextMsg = data.text.replace(/\\n/g, '  ');
                        el.dataset.raw = data.text;
                        if (!el.style.animationName || el.style.animationName === 'none') {
                            el.innerHTML = el.dataset.nextMsg;
                            startMarquee(el.id);
                        }
                    }
                } catch (e) {}
            },
            render() {
                const d1 = this.state.lastData.filter(t => t.Direction == 1 || t.Dir == 1);
                const d0 = this.state.lastData.filter(t => t.Direction == 0 || t.Dir == 0);
                this.fillTable('body1', d1);
                this.fillTable('body0', d0);
                this.updateFooter('1', d1);
                this.updateFooter('0', d0);
            },
            fillTable(id, list) {
                const tb = document.getElementById(id);
                const temp = document.getElementById('train-row-template');
                tb.innerHTML = '';
                list.slice(0, 5).forEach(t => {
                    const row = temp.content.cloneNode(true);
                    row.querySelector('.no').textContent = t.TrainNo || t.No;
                    row.querySelector('.dest').textContent = translateStation(t.EndingStationName || t.Dest);
                    row.querySelector('.type').textContent = (t.TrainTypeName || t.Type || "").replace(/\(.*\)/g, '');
                    row.querySelector('.time').textContent = (t.ScheduledDepartureTime || t.Dep || "").slice(0, 5);
                    const delay = parseInt(t.DelayTime || t.Delay || 0);
                    const note = row.querySelector('.note');
                    note.textContent = delay > 0 ? `晚 ${delay} 分` : "準點";
                    if (delay > 0) note.className = 'status-delay';
                    tb.appendChild(row);
                });
            },
            updateFooter(dir, list) {
                const el = document.getElementById(`marquee${dir}`);
                const text = list.slice(0, 8).map(t => `${t.TrainNo}次 ${translateStation(t.EndingStationName)} ${t.DelayTime > 0 ? '晚'+t.DelayTime+'分' : '準點'}`).join(' | ');
                const msg = `🚆 列車資訊：${text}`;
                if (el.dataset.currentMsg !== msg) {
                    el.dataset.nextMsg = msg;
                    if (!el.style.animationName || el.style.animationName === 'none') {
                        el.innerHTML = msg;
                        startMarquee(el.id);
                    }
                }
            },
            async initMedia() {
                try {
                    const res = await fetch(`${TRA_WORKER_URL}/api/pids/assets`);
                    const data = await res.json();
                    if (data.images) {
                        const box = document.getElementById('carouselBox');
                        data.images.forEach((src, i) => {
                            const img = document.createElement('img');
                            img.src = src; img.className = i === 0 ? 'carousel-img active' : 'carousel-img';
                            box.appendChild(img);
                        });
                        let idx = 0;
                        setInterval(() => {
                            const imgs = box.querySelectorAll('img');
                            if (imgs.length < 2) return;
                            imgs[idx].classList.remove('active');
                            idx = (idx + 1) % imgs.length;
                            imgs[idx].classList.add('active');
                        }, 10000);
                    }
                    if (data.video) {
                        const tag = document.createElement('script');
                        tag.src = "https://www.youtube.com/iframe_api";
                        document.body.appendChild(tag);
                        window.videoUrlList = Array.isArray(data.video) ? data.video : [data.video];
                    }
                } catch (e) {}
            }
        };

        window.onYouTubeIframeAPIReady = () => {
            const vid = window.videoUrlList[0].match(/(?:v=|v\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/)[1];
            window.ytPlayer = new YT.Player('videoContainer', {
                videoId: vid, playerVars: { autoplay: 0, mute: 1, controls: 1 },
                events: { 'onStateChange': (e) => {
                    if (e.data === YT.PlayerState.ENDED) {
                        // 簡單切換下一個影片邏輯略
                    }
                }}
            });
        };

        function startMarquee(id) {
            const el = document.getElementById(id);
            const container = el.parentElement;
            el.style.animation = 'none';
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const textWidth = el.scrollWidth;
                    const containerWidth = container.clientWidth;
                    const speed = (id === 'unifiedTopMarquee') ? 150 : 105; // 0.7倍速
                    const duration = (textWidth + containerWidth) / speed;
                    el.style.setProperty('--start-pos', `${containerWidth}px`);
                    el.style.setProperty('--end-pos', `-${textWidth}px`);
                    el.style.animation = `smooth-marquee ${duration}s linear infinite`;
                });
            });
        }

        document.addEventListener('animationiteration', (e) => {
            const el = e.target;
            if (el.dataset.nextMsg) {
                el.innerHTML = el.dataset.nextMsg;
                el.dataset.currentMsg = el.dataset.nextMsg;
                el.dataset.nextMsg = '';
                startMarquee(el.id);
            }
        });

        function goBack() { window.history.length > 1 ? window.history.back() : window.location.href = 'tra_liveboard.html'; }
        
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        PIDS_APP.init();
    </script>
</body>
</html>
