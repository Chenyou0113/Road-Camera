    <script>
        function formatMarqueeText(t) { const s = String(t||''); return s ? s.replace(/([\u4e00-\u9fff]{1,6})\s*(?:-|－|–|—|~|～)\s*([\u4e00-\u9fff]{1,6})/g,'$1 ＜－－＞ $2') : s; }
        const PIDS_APP = {
            CONFIG: { API_BASE:"https://tra-schedule-worker.weacamm.org", INTERVALS:{CLOCK:1000,PIDS_UPDATE:60000,LANG_SWITCH:60000,TOP_MARQUEE_CHECK:60000,CAROUSEL:10000}, ROWS:{DESKTOP:5,MOBILE:5} },
            STATE: new Proxy({ currentLang:localStorage.getItem('pids_lang')||'zh', manualLangOverride:false, rowLangs:[], stationID:'', stationName:'', lastTrainData:[], stopsCache:{}, autoSwitchTimer:null, isVideoLoaded:false, _observers:new Set() }, {
                set(t,p,v) { if(p.startsWith('_')){t[p]=v;return true} const o=t[p]; t[p]=v; t._observers.forEach(cb=>{try{cb(p,v,o)}catch(e){}}); if(p==='stationID'&&v)PIDS_APP.updatePids(); if(p==='currentLang'||p==='rowLangs'||p==='lastTrainData'){clearTimeout(t._renderTimer);t._renderTimer=setTimeout(()=>refreshDisplay(),10)} return true }
            }),
            subscribe(cb){this.STATE._observers.add(cb);return ()=>this.STATE._observers.delete(cb)},
            init(){const p=new URLSearchParams(location.search);this.STATE.stationID=p.get('station');if(this.STATE.stationID&&typeof stationDataMap!=='undefined'&&stationDataMap[this.STATE.stationID]){this.STATE.stationName=stationDataMap[this.STATE.stationID].name}else{this.STATE.stationName=p.get('name')||'\u81fa\u9435'}this.ui.updateStationName();this.ui.updateEnglishStationName();this.ui.updateUIStrings();this.startTimers();this.loadInitialData()},
            ui:{
                updateStationName(){const el=document.getElementById('unifiedStationName');if(el)el.textContent=PIDS_APP.STATE.stationName.replace(/車站$|站$/,'')+'車站'},
                updateEnglishStationName(){const en=document.getElementById('station-en');const id=PIDS_APP.STATE.stationID;const tc=s=>s.split(/[\s_-]+/).map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');if(en&&typeof stationDataMap!=='undefined'&&stationDataMap[id]){const raw=stationDataMap[id].ename;const isCJCU=id==='4271'||/Chang\s*Jung\s*Christian\s*University/i.test(raw);en.textContent=isCJCU?'C.J.C.U.':tc(raw.split('_')[0])}else if(en){en.textContent="TRA"}},

        document.addEventListener('DOMContentLoaded',()=>{PIDS_APP.init();const p=new URLSearchParams(location.search);GLOBAL_STATION_ID=p.get('station')||PIDS_APP.STATE.stationID;document.querySelectorAll('.marquee-text').forEach(el=>{el.addEventListener('animationiteration',()=>{if(el.dataset.nextMsg){el.innerHTML=el.dataset.nextMsg;el.dataset.currentMsg=el.dataset.nextMsg;el.dataset.nextMsg='';startMarquee(el.id)}})});const btn=document.getElementById('fullscreenBtn');const icon=btn.querySelector('i');function toggle(){const d=document.documentElement;if(!document.fullscreenElement){const req=d.requestFullscreen||d.mozRequestFullScreen||d.webkitRequestFullScreen||d.msRequestFullscreen;if(req)req.call(d).catch(()=>{})}else{if(document.exitFullscreen)document.exitFullscreen()}}btn.addEventListener('click',toggle);document.addEventListener('fullscreenchange',()=>{if(document.fullscreenElement){icon.classList.replace('fa-expand','fa-compress');btn.title="取消全螢幕"}else{icon.classList.replace('fa-compress','fa-expand');btn.title="切換全螢幕"}});document.addEventListener('keydown',e=>{if(e.key==='F11'){e.preventDefault();toggle()}})});
