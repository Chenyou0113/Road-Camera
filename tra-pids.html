<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵 PIDS V6.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="台鐵PIDS">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ CSS 變數系統 (Design Tokens) ============ */
        :root {
            --pids-bg-primary: #000000;
            --pids-bg-secondary: #111111;
            --pids-text-primary: #ffffff;
            --pids-text-secondary: #cccccc;
            --pids-border: #333333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #4fc3f7;
            --accent-red: #ff1744;
            --accent-orange: #ff9800;
            --header-inbound: linear-gradient(to right, #000080, #0d47a1);
            --header-outbound: linear-gradient(to right, #bf360c, #e65100);
            --row-odd-bg-inbound: #000;
            --row-even-bg-inbound: #2b2b2b;
            --row-odd-bg-outbound: #000;
            --row-even-bg-outbound: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ============ 無障礙設計：螢幕閱讀器專用 ============ */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* 🚀 修正：移除強制的 hidden，讓高度不足（如手機橫屏）時可以上下滑動 */
        body {
            background-color: var(--pids-bg-secondary);
            color: var(--pids-text-primary);
            font-family: "Source Sans 3", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            font-weight: 550;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            overflow-x: hidden;
            overflow-y: auto; /* 允許上下捲動 */
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; } /* 只有在大螢幕且高度足夠時才鎖死滾動條 */
        }

        body *:not(i):not(svg):not(path) {
            font-weight: 550 !important;
        }

        /* Header */
        .unified-header {
            width: 100%;
            height: 90px;
            background: #000;
            border: none;
            border-radius: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: none;
            flex-shrink: 0;
            border-bottom: 2px solid #333;
        }

        .station-branding {
            display: flex;
            align-items: center; 
            gap: 15px; 
            flex: 1;
            min-width: 0;
        }

        .tra-logo-img {
            height: 3.8rem; 
            border-radius: 50%;
            border: 2px solid #fff;
            display: block;
        }

        .station-name-block {
            display: flex;
            flex-direction: row;
            align-items: baseline; 
            gap: 15px; 
            white-space: nowrap; 
            padding-top: 6px; 
        }

        .station-name {
            font-size: clamp(2.2rem, 4vw, 3.4rem); 
            font-weight: 900;
            line-height: 1.15; 
            margin: 0;
        }

        .station-sub {
            font-size: clamp(2.2rem, 4vw, 3.4rem); 
            color: #4fc3f7;
            font-family: "Source Sans 3", "Noto Sans TC", sans-serif;
            font-weight: 700;
            line-height: 1.15; 
            margin: 0;
        }

        .datetime-block {
            text-align: right;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            line-height: 1;
            flex-shrink: 0; 
            white-space: nowrap;
        }

        .date-text {
            font-size: 3rem;
            color: #ccc;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            line-height: 1;
            margin: 0;
        }

        .time-text {
            font-size: 3rem;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: #ffeb3b;
            line-height: 1;
            margin: 0;
        }

        /* 按鈕區塊 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: 12px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        /* Top Marquee */
        .unified-marquee-container {
            width: 100%;
            height: 60px;
            background: #e3f2fd;
            border: none;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #003366;
            flex-shrink: 0;
            margin-top: 0;
            margin-left: -8px;
            margin-right: -8px;
            padding: 0 8px;
        }

        .unified-marquee-container .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: auto;
            line-height: 1.2;
            font-size: 2.1rem;
            font-weight: 900;
            top: 50%;
            margin-top: -0.9rem;
            will-change: transform;
            letter-spacing: 1px;
        }

        /* PIDS Section */
        .pids-section {
            display: flex;
            width: 100%;
            gap: 10px;
            flex: 0 0 auto;
            min-height: 0;
            overflow: hidden;
        }

        .pids-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            border: 3px solid var(--pids-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .screen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            overflow: hidden;
        }

        .direction-header-1, .direction-header-0 {
            color: var(--pids-text-primary);
            padding: 5px 15px; 
            font-size: 1.6rem; 
            font-weight: 700;  
            display: flex;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 2px solid var(--pids-text-primary);
            flex-shrink: 0;
            height: 44px; 
            align-items: center;
            min-width: 0;
        }

        .direction-header-0 {
            background: var(--header-outbound);
        }

        .direction-header-1 {
            background: var(--header-inbound);
        }

        .direction-header-0 > span:first-child,
        .direction-header-1 > span:first-child {
            flex-shrink: 0;
        }

        .dest-list {
            font-size: 1.6rem; 
            font-weight: 700;  
            flex: 1;
            min-width: 0;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 表格設定 */
        .train-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            table-layout: fixed;
        }

        .train-table th {
            padding: 5px; 
            color: #fff;
            border-bottom: 2px solid #fff;
            height: 44px; 
            font-size: 1.6rem; 
            font-weight: 700;  
        }

        .train-table tbody tr {
            border-bottom: 1px solid #333;
        }

        /* 5班車 */
        .train-table td {
            padding: 0 5px;
            vertical-align: middle; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 70px; 
            line-height: 70px; 
            font-size: clamp(1.1rem, 2vw, 1.8rem); 
            font-weight: 400;
        }

        /* 車種類型欄統一藍色（無底色） */
        .train-table td:nth-child(3) {
            color: #29b6f6; 
            font-weight: 600 !important; 
        }

        .table-1 th { background: #000080; }
        .table-1 tr:nth-child(odd) { background: var(--row-odd-bg-inbound); }
        .table-1 tr:nth-child(even) { background: var(--row-even-bg-inbound); }

        .table-0 th { background: #bf360c; }
        .table-0 tr:nth-child(odd) { background: var(--row-odd-bg-outbound); }
        .table-0 tr:nth-child(even) { background: var(--row-even-bg-outbound); }

        .marquee-footer {
            background: #212121;
            color: #ffffff;
            height: 52px; 
            position: relative;
            overflow: hidden;
            border-top: 3px solid #ff9800;
            flex-shrink: 0;
        }

        .marquee-footer .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: 52px; 
            line-height: 52px; 
            font-size: 1.5rem; 
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            font-weight: 600; 
            letter-spacing: 1px;
            will-change: transform;
        }

        .marquee-footer .marquee-text * {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif !important;
            font-size: inherit !important; 
            font-weight: 600 !important; 
            vertical-align: baseline;
        }

        /* Media Section */
        .media-section {
            flex: 1;
            display: flex;
            gap: 10px;
            min-height: 150px;
            margin-top: 4px;
        }

        .media-box {
            flex: 1;
            height: 100%;
            background: #000;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-label {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            font-size: 1rem;
            z-index: 10;
            border-bottom-right-radius: 8px;
        }

        .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            opacity: 0;
            transition: opacity 1s;
        }

        .carousel-img.active {
            opacity: 1;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 車種顏色 */
        .train-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            white-space: nowrap;
            min-width: 90px;
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .type-自強 { background-color: #FF5722; }
        .type-新自強 { background: linear-gradient(135deg, #222 0%, #444 100%); border: 1px solid #999; }
        .type-普悠瑪 { background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%); }
        .type-太魯閣 { background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%); }
        .type-莒光 { background-color: #FF9800; }
        .type-區間快 { background-color: #3F51B5; }
        .type-區間 { background-color: #2196F3; }
        .type-其他 { background-color: #607D8B; }

        /* 狀態與時間 */
        .status-ontime { color: #FFFFFF !important; }
        .status-delay { color: #ff1744 !important; animation: blink 1s infinite alternate; }
        .status-cancelled { color: #FF5252; font-weight: 900; }
        .status-suspended { color: #ff1744 !important; font-weight: 900; }

        .time-delay-container {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
            padding-right: 5px;
            gap: 8px;
        }

        .original-time {
            text-decoration: line-through;
            color: #777;
            font-size: 1.2rem;
            line-height: 1.8rem;
        }

        .expected-time,
        .normal-time {
            font-size: 1.8rem;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            text-align: right;
            padding-right: 5px;
        }

        .expected-time { color: #ff5252; }
        .highlight-row { background-color: inherit !important; outline: none !important; }

        @keyframes smooth-marquee {
            0% { transform: translateX(var(--start-pos)); }
            100% { transform: translateX(var(--end-pos)); }
        }

        /* 🔥 中型平板優化 (1024px-1280px) */
        @media (max-width: 1280px) and (min-width: 901px) {
            .unified-header { height: 75px; padding: 0 12px; }
            .tra-logo-img { height: 2.8rem; }
            .datetime-block { gap: 10px; }
            .date-text, .time-text { font-size: 2.3rem; }
            .icon-btn { width: 44px; height: 44px; font-size: 1.3rem; }
            .unified-marquee-container { height: 50px; }
            .unified-marquee-container .marquee-text { font-size: 1.7rem; }
            .direction-header-0, .direction-header-1 { font-size: 1.4rem; padding: 8px 12px; height: 38px;}
            .dest-list { font-size: 1.4rem; font-weight: 700; }
            .train-table th { font-size: 1.4rem; padding: 5px 2px; height: 38px; font-weight: 700; }
            .train-table td { 
                height: 58px; 
                padding: 0 3px; 
                font-size: clamp(1rem, 1.8vw, 1.5rem); 
            }
            .train-table td:nth-child(1), .train-table td:nth-child(5) { font-size: 0.9rem; }
            .train-type-badge { font-size: 0.8rem; min-width: 55px; max-width: 75px; }
            .normal-time, .expected-time { font-size: 1.2rem; }
        }

        /* 🔥 小平板優化 (700px-900px) */
        @media (max-width: 900px) and (min-width: 700px) {
            .unified-header { height: 60px; padding: 0 10px; }
            .tra-logo-img { height: 2.2rem; }
            .datetime-block { gap: 8px; }
            .date-text, .time-text { font-size: 1.8rem; }
            .icon-btn { width: 38px; height: 38px; font-size: 1.1rem; }
            .unified-marquee-container { height: 42px; }
            .unified-marquee-container .marquee-text { font-size: 1.35rem; }
            .direction-header-0, .direction-header-1 { font-size: 1.2rem; padding: 6px 8px; height: 34px; }
            .dest-list { font-size: 1.2rem; font-weight: 700; }
            .train-table th { font-size: 1.2rem; padding: 3px 1px; height: 34px; font-weight: 700; }
            .train-table td { height: 48px; padding: 0 1px; font-size: clamp(0.75rem, 1.5vw, 1rem); }
            .train-table td:nth-child(1), .train-table td:nth-child(5) { font-size: 0.65rem; }
            .train-type-badge { font-size: 0.75rem; min-width: 48px; max-width: 68px; padding: 2px 3px; }
            .normal-time, .expected-time { font-size: 0.8rem; }
            .marquee-footer { height: 48px; }
            .marquee-footer .marquee-text { font-size: 1rem; line-height: 48px; height: 48px; }
        }

        /* 🔥 RWD 修正區塊 (針對大手機 481px - 699px) - 手機直屏與橫屏優化 */
        @media (max-width: 699px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; }
            
            .unified-header { height: 65px; padding: 0 12px; gap: 8px; }
            .tra-logo-img { height: 2.4rem; }
            
            .station-name-block { 
                flex-direction: column; 
                gap: 2px; 
                align-items: flex-start; 
                justify-content: center;
                padding-top: 0; 
            }
            
            .station-name { font-size: 1.5rem; line-height: 1; margin: 0; }
            .station-sub { font-size: 1.2rem; line-height: 1; margin: 0; }

            .datetime-block { 
                flex-direction: column; 
                align-items: flex-end; 
                justify-content: center;
                gap: 2px; 
                margin-right: 15px; 
            }
            .date-text { font-size: 0.9rem; line-height: 1; }
            .time-text { font-size: 1.3rem; line-height: 1; }
            
            .btn-group { gap: 6px; margin-left: 6px; }
            .icon-btn { width: 32px; height: 32px; font-size: 1rem; }
            
            .unified-marquee-container { height: 38px; margin-left: -8px; margin-right: -8px; }
            .unified-marquee-container .marquee-text { font-size: 1.15rem; }
            
            .pids-section { flex-direction: column; gap: 8px; overflow-y: auto; }
            .pids-column { min-height: 240px; flex-shrink: 0; }
            .direction-header-0, .direction-header-1 { font-size: 1.1rem; padding: 5px 8px; height: 30px; }
            .dest-list { font-size: 1.1rem; font-weight: 700; }
            .train-table th { font-size: 1.1rem; padding: 0 4px; height: 30px; font-weight: 700; }
            .train-table td { height: 46px; padding: 0 4px; font-size: 1.1rem; }
            .train-table td:nth-child(1) { font-size: 0.95rem; }
            .train-table td:nth-child(5) { font-size: 0.9rem; }
            .train-type-badge { font-size: 0.8rem; min-width: 48px; max-width: 65px; padding: 3px 4px; }
            .normal-time, .expected-time { font-size: 1.1rem; }
            .marquee-footer { height: 44px; }
            .marquee-footer .marquee-text { font-size: 0.95rem; line-height: 44px; height: 44px; }
            
            .media-section { flex-direction: column; gap: 8px; overflow-y: visible; }
            .media-box { height: 160px; flex: 0 0 auto; margin-bottom: 20px;}
        }

        /* 🔥 RWD 一般手機區塊 (max-width: 480px) */
        @media (max-width: 480px) {
            .unified-header { height: 55px; padding: 0 10px; }
            .tra-logo-img { height: 2.0rem; }
            
            .station-name-block { 
                flex-direction: column; 
                gap: 0px; 
                padding-top: 0;
                justify-content: center;
            }
            .station-name { font-size: 1.35rem; line-height: 1; margin: 0; }
            .station-sub { font-size: 1.05rem; line-height: 1; margin: 0; }
            
            .datetime-block { 
                flex-direction: column; 
                align-items: flex-end; 
                gap: 0px; 
                margin-right: 12px; 
            }
            .date-text { font-size: 0.8rem; }
            .time-text { font-size: 1.15rem; }
            
            .btn-group { gap: 4px; margin-left: 4px; }
            .icon-btn { width: 28px; height: 28px; font-size: 0.85rem; border-radius: 6px; }
            
            .unified-marquee-container { height: 32px; }
            .unified-marquee-container .marquee-text { font-size: 1rem; }
            .direction-header-0, .direction-header-1 { font-size: 0.95rem; padding: 4px 6px; height: 28px; }
            .dest-list { font-size: 0.95rem; font-weight: 700; }
            .train-table th { font-size: 0.95rem; height: 28px; padding: 0 2px; font-weight: 700; }
            .train-table td { height: 42px; padding: 0 2px; font-size: 1rem; }
            .train-table td:nth-child(1) { font-size: 0.85rem; }
            .train-table td:nth-child(5) { font-size: 0.8rem; }
            .train-type-badge { font-size: 0.75rem; min-width: 42px; padding: 2px 2px; }
            .normal-time, .expected-time { font-size: 1rem; }
            .marquee-footer { height: 38px; }
            .marquee-footer .marquee-text { font-size: 0.85rem; line-height: 38px; height: 38px; }
            #videoBox { display: none; }
            #carouselBox { display: none; } /* 🚀 隱藏圖片廣告框節省空間 */
            .media-section { display: none; } /* 🚀 在小手機上完全隱藏媒體區塊 */
        }
    </style>
    <script src="assets/station-code-mapping.js?v=20260424"></script>
</head>

<body>
    <!-- Header 區塊 -->
    <div class="unified-header">
        <div class="station-branding">
            <img src="assets/TRA_logo.jpg" class="tra-logo-img" alt="TRA Logo">
            <div class="station-name-block">
                <div class="station-name" id="unifiedStationName">臺鐵車站</div>
                <div class="station-sub" id="station-en">TRA STATION</div>
            </div>
        </div>
        <div class="datetime-block">
            <div class="date-text" id="unifiedDate">Loading...</div>
            <div class="time-text" id="unifiedTime">--:--:--</div>
            
            <!-- 🚀 修正：加入回首頁按鈕 -->
            <div class="btn-group">
                <button class="icon-btn" onclick="goBack()" title="返回查詢" aria-label="返回查詢">
                    <i class="fas fa-home"></i>
                </button>
                <button class="icon-btn" id="fullscreenBtn" title="切換全螢幕" aria-label="切換全螢幕">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 頂部跑馬燈區塊 -->
    <div class="unified-marquee-container">
        <div class="marquee-text" id="unifiedTopMarquee">載入中...</div>
    </div>

    <!-- 表格區塊 -->
    <div class="pids-section">
        
        <div class="pids-column">
            <div class="screen-body">
                <div class="direction-header-1"><span id="dirTitle1">逆行</span><span id="destList1"
                        class="dest-list"></span></div>
                <table class="train-table table-1" role="grid" aria-live="polite" aria-label="逆行列車即時資訊">
                    <caption class="sr-only">逆行列車出發資訊表格</caption>
                    <thead>
                        <tr>
                            <th scope="col" id="col-no-1" style="width:20%">車次</th>
                            <th scope="col" id="col-dest-1" style="width:20%">開往</th>

    <template id="train-row-template">
        <tr role="row">

    <script src="assets/config.js"></script>
    <script src="assets/tdx-api.js"></script>
    <script>
        function formatMarqueeText(rawText) {
            const text = String(rawText || '');
            if (!text) return text;

            return text.replace(/([\u4e00-\u9fff]{1,6})\s*(?:-|－|–|—|~|～)\s*([\u4e00-\u9fff]{1,6})/g, '$1 ＜－－＞ $2');
        }

        // ============ PIDS 應用程式架構 ============
        const PIDS_APP = {
            CONFIG: {
                API_BASE: "https://tra-schedule-worker.weacamm.org",
                INTERVALS: {
                    CLOCK: 1000,            
                    PIDS_UPDATE: 60000,     
                    LANG_SWITCH: 60000,     
                    TOP_MARQUEE_CHECK: 60000,  
                    CAROUSEL: 10000         
                },
                ROWS: {
                    DESKTOP: 5,  
                    MOBILE: 5
                },
                TRAIN_TYPES: {
                    "1100": "\u81ea\u5f37", "1101": "\u592a\u9b6f\u95a3", "1102": "\u81ea\u5f37", "1103": "\u81ea\u5f37", "1107": "\u666e\u60a0\u746a",
                    "1108": "\u81ea\u5f37", "110B": "\u65b0\u81ea\u5f37", "110G": "\u65b0\u81ea\u5f37", "110H": "\u65b0\u81ea\u5f37", "110K": "\u65b0\u81ea\u5f37", "110M": "\u65b0\u81ea\u5f37",
                    "1110": "\u8392\u5149", "1111": "\u8392\u5149", "1112": "\u8392\u5149", "1113": "\u8392\u5149", "1114": "\u8392\u5149", "1115": "\u8392\u5149", "1120": "\u5fa9\u8208",
                    "1131": "\u5340\u9593", "1132": "\u5340\u9593\u5feb", "1140": "\u666e\u5feb", "1150": "\u67f4\u5feb", "1270": "\u666e\u901a", "1280": "\u5340\u9593", "1281": "\u5340\u9593", "1282": "\u5340\u9593"
                }
            },

            STATE: new Proxy({
                currentLang: localStorage.getItem('pids_lang') || 'zh',
                manualLangOverride: false, 
                rowLangs: [], 
                stationID: '',
                stationName: '',
                lastTrainData: [],
                stopsCache: {},
                autoSwitchTimer: null,
                isVideoLoaded: false,
                _observers: new Set()
            }, {
                set(target, prop, value) {
                    if (prop.startsWith('_')) { target[prop] = value; return true; }
                    const oldValue = target[prop];
                    target[prop] = value;
                    target._observers.forEach(cb => { try { cb(prop, value, oldValue); } catch(e){} });

                    if (prop === 'stationID' && value) PIDS_APP.updatePids();
                    
                    if (prop === 'currentLang' || prop === 'rowLangs' || prop === 'lastTrainData') {
                        clearTimeout(target._renderTimer);
                        target._renderTimer = setTimeout(() => refreshDisplay(), 10);
                    }
                    return true;
                }
            }),

            subscribe(callback) {
                this.STATE._observers.add(callback);
                return () => this.STATE._observers.delete(callback); 
            },

            init() {
                const params = new URLSearchParams(location.search);
                this.STATE.stationID = params.get('station');
                
                // 🚀 1. 站名自動查表：優先使用 API/映射表自動翻譯
                if (this.STATE.stationID && typeof stationDataMap !== 'undefined' && stationDataMap[this.STATE.stationID]) {
                    this.STATE.stationName = stationDataMap[this.STATE.stationID].name;
                } else {
                    this.STATE.stationName = params.get('name') || '\u81fa\u9435';
                }

                this.ui.updateStationName();
                this.ui.updateEnglishStationName();
                this.ui.updateUIStrings();
                this.startTimers();
                this.loadInitialData();
            },

            ui: {
                updateStationName() {
                    const el = document.getElementById('unifiedStationName');
                    if (el) {
                        const cleanName = PIDS_APP.STATE.stationName.replace(/車站$|站$/, '');
                        el.textContent = cleanName + '車站';
                    }
                },

                updateEnglishStationName() {
                    const enElement = document.getElementById('station-en');
                    const stationID = PIDS_APP.STATE.stationID;
                    
                    const toTitleCase = (str) => {
                        return str.split(/[\s_-]+/).map(word => 
                            word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
                        ).join(' ');
                    };

                    if (enElement && typeof stationDataMap !== 'undefined' && stationDataMap[stationID]) {
                        const rawName = stationDataMap[stationID].ename;
                        const isCJCU = stationID === '4271' || /Chang\s*Jung\s*Christian\s*University/i.test(rawName);
                        
                        const namePart = rawName.split('_')[0];
                        const formattedName = isCJCU ? 'C.J.C.U.' : toTitleCase(namePart);
                        
                        enElement.textContent = formattedName;
                    } else if (enElement) {
                        enElement.textContent = "TRA";
                    }
                },

                updateUIStrings() {
                    const lang = i18n[PIDS_APP.STATE.currentLang];

                    const dir1Title = document.getElementById('dirTitle1');
                    const dir0Title = document.getElementById('dirTitle0');
                    if (dir1Title) dir1Title.textContent = lang.inbound;
                    if (dir0Title) dir0Title.textContent = lang.outbound;

                    const headHtml = `
                        <tr>
                            <th scope="col" style="width:20%">${lang.trainNo}</th>
                            <th scope="col" style="width:20%">${lang.dest}</th>
                            <th scope="col" style="width:20%">${lang.type}</th>
                            <th scope="col" style="width:20%">${lang.time}</th>
                            <th scope="col" style="width:20%">${lang.note || lang.status}</th>
                        </tr>`;

                    const table1Head = document.querySelector('.table-1 thead');
                    const table0Head = document.querySelector('.table-0 thead');
                    if (table1Head) table1Head.innerHTML = headHtml;
                    if (table0Head) table0Head.innerHTML = headHtml;
                }
            },

            startTimers() {
                setInterval(() => this.updateClock(), this.CONFIG.INTERVALS.CLOCK);
                const delayToNextMinute = 60000 - (Date.now() % 60000);
                
                if (this.STATE.stationID) {
                    this.updatePids();
                    
                    setTimeout(() => {
                        this.updatePids();
                        setInterval(() => this.updatePids(), this.CONFIG.INTERVALS.PIDS_UPDATE);
                    }, delayToNextMinute);
                }
                
                this.checkTopMarquee();
                setTimeout(() => startMarquee('unifiedTopMarquee'), 300);
                setTimeout(() => {
                    this.checkTopMarquee();
                    setInterval(() => this.checkTopMarquee(), this.CONFIG.INTERVALS.TOP_MARQUEE_CHECK);
                }, delayToNextMinute);
            },

            loadInitialData() {
                this.updateClock();
                updateMediaAssets();
                this.initKeyboardNavigation();
                console.log('✅ PIDS 系統初始化完成');
            },

            initKeyboardNavigation() {
                const interactiveElements = ['#station-select', '#languageSwitchBtn', '#fullscreenBtn'];
                interactiveElements.forEach(selector => {
                    const el = document.querySelector(selector);
                    if (el && !el.hasAttribute('tabindex')) {
                        el.setAttribute('tabindex', '0');
                        el.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                el.click();
                            }
                        });
                    }
                });

                this.subscribe((prop) => {
                    if (prop === 'lastTrainData') {
                        setTimeout(() => {
                            document.querySelectorAll('.train-table tbody').forEach((tbody, tableIndex) => {
                                tbody.setAttribute('tabindex', '0');
                                tbody.setAttribute('aria-label', `使用方向鍵瀏覽列車資訊 - ${tableIndex === 0 ? '北上' : '南下'}方向`);

                                const newTbody = tbody.cloneNode(true);
                                tbody.parentNode.replaceChild(newTbody, tbody);

                                newTbody.addEventListener('keydown', (e) => {
                                    const rows = Array.from(newTbody.querySelectorAll('tr'));
                                    const currentRow = document.activeElement.closest('tr');
                                    const currentIndex = currentRow ? rows.indexOf(currentRow) : -1;

                                    switch (e.key) {
                                        case 'ArrowDown':
                                            e.preventDefault();
                                            if (currentIndex < rows.length - 1) rows[currentIndex + 1].focus();
                                            break;
                                        case 'ArrowUp':
                                            e.preventDefault();
                                            if (currentIndex > 0) rows[currentIndex - 1].focus();
                                            break;
                                        case 'Home':
                                            e.preventDefault();
                                            rows[0]?.focus();
                                            break;
                                        case 'End':
                                            e.preventDefault();
                                            rows[rows.length - 1]?.focus();
                                            break;
                                    }
                                });

                                newTbody.querySelectorAll('tr').forEach((row, index) => {
                                    row.setAttribute('tabindex', '0');
                                    row.setAttribute('aria-rowindex', String(index + 2)); 
                                });
                            });
                        }, 200); 
                    }
                });
            },

            updateClock() {
                const now = new Date();
                
                UI_Helper.setText('unifiedTime', now.toLocaleTimeString('en-GB'));
                UI_Helper.setText('unifiedDate', now.toISOString().split('T')[0].replace(/-/g, '/'));

                if (this.STATE.manualLangOverride) return;

                const t = Math.floor(now.getTime() / 1000);
                const cycleSeconds = 60;
                const cycle = Math.floor(t / cycleSeconds) % 2;
                const currentBase = (cycle === 0) ? 'zh' : 'en';

                if (this.STATE.currentLang !== currentBase) {
                    this.STATE.currentLang = currentBase;
                    PIDS_APP.ui.updateUIStrings();
                }

                const newRowLangs = [];
                const maxRows = window.innerWidth <= 900 ? this.CONFIG.ROWS.MOBILE : this.CONFIG.ROWS.DESKTOP;
                for (let i = 0; i < maxRows; i++) {
                    newRowLangs.push(currentBase);
                }

                const currentLangsStr = JSON.stringify(this.STATE.rowLangs || []);
                const newLangsStr = JSON.stringify(newRowLangs);
                if (currentLangsStr !== newLangsStr) {
                    this.STATE.rowLangs = newRowLangs; 
                }
            },

            async updatePids() {
                if (this._currentFetchController) {
                    this._currentFetchController.abort();
                }

                this._currentFetchController = new AbortController();
                const signal = this._currentFetchController.signal;

                try {
                    const url = `${this.CONFIG.API_BASE}/api/liveboard/station?station=${this.STATE.stationID}`;
                    const response = await fetch(url, { signal, timeout: 15000 });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const data = await response.json();
                    const now = new Date();
                    const nowTotalMinutes = now.getHours() * 60 + now.getMinutes();

                    let filtered = (Array.isArray(data) ? data : []).map(t => {
                        const normalized = {
                            ...t,
                            TrainNo: t.TrainNo ?? t.No,
                            Direction: t.Direction ?? t.Dir,
                            TrainTypeName: t.TrainTypeName ?? t.Type,
                            EndingStationName: t.EndingStationName ?? t.Dest,
                            ScheduledDepartureTime: t.ScheduledDepartureTime ?? t.Dep ?? t.Arr,
                            ScheduledArrivalTime: t.ScheduledArrivalTime ?? t.Arr ?? t.Dep,
                            DelayTime: t.DelayTime ?? t.Delay ?? 0,
                            TrainStatus: t.TrainStatus ?? t.Status,
                            TripLine: t.TripLine ?? t.Line,
                            TrainSuspendedFlag: t.TrainSuspendedFlag ?? 0,
                            IsSuspended: t.IsSuspended ?? (t.SuspendedFlag === 1),
                            IsPartiallySuspended: t.IsPartiallySuspended ?? (t.TrainSuspendedFlag === 2)
                        };

                        const timeStr = normalized.ScheduledDepartureTime || "00:00";
                        const [h, m] = timeStr.split(':').map(Number);
                        const schedMins = h * 60 + m;
                        const delayMins = parseInt(normalized.DelayTime || 0);
                        const actualMins = schedMins + delayMins;
                        let adjustedActualMins = actualMins;
                        if (actualMins < nowTotalMinutes - 720) adjustedActualMins += 1440;

                        return {
                            ...normalized,
                            _sort: (adjustedActualMins - nowTotalMinutes + 1440) % 1440,
                            _actualMins: adjustedActualMins,
                            _isCancelled: String(normalized.TrainStatus) === '2' || normalized.IsSuspended || Number(normalized.TrainSuspendedFlag) === 1,
                            _isPartiallySuspended: normalized.IsPartiallySuspended || Number(normalized.TrainSuspendedFlag) === 2
                        };
                    }).filter(t => t._actualMins >= nowTotalMinutes || t._isCancelled || t._isPartiallySuspended);

                    filtered.sort((a, b) => a._sort - b._sort);

                    this.STATE.lastTrainData = filtered;
                    refreshDisplay();

                } catch (error) {
                    if (error.name === 'AbortError') return;
                    console.error("❌ PIDS 更新失敗:", error);
                    UI_Helper.showErrorOverlay('列車資訊傳輸暫時中斷');
                } finally {
                    this._currentFetchController = null;
                }
            },

            async checkTopMarquee() {
                try {
                    let url = `${this.CONFIG.API_BASE}/api/pids/marquee`;
                    if (this.STATE.stationID) url += `?station=${this.STATE.stationID}`;

                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Marquee fetch failed');

                    const data = await response.json();
                    const el = document.getElementById('unifiedTopMarquee');

                    if (data.text !== undefined && data.text !== null) {
                        let cleanText = data.text
                            .replace(/\\n/g, "     ")
                            .replace(/[\r\n]+/g, "     ")
                            .replace(/\s{2,}/g, "     ") 
                            .replace(/&nbsp;/g, " ")
                            .replace(/&amp;/g, "&")
                            .trim();

                        if (el && el.dataset.raw !== cleanText) {
                            el.dataset.raw = cleanText;
                            const newMsg = formatMarqueeText(cleanText);
                            
                            if (!el.style.animationName || el.style.animationName === 'none') {
                                el.innerHTML = newMsg;
                                el.dataset.currentMsg = newMsg;
                                startMarquee('unifiedTopMarquee');
                            } else {
                                el.dataset.nextMsg = newMsg;
                            }
                        }
                    }
                } catch (error) {
                    console.warn("⚠️ 跑馬燈載入失敗:", error);
                }
            }
        };

        const UI_Helper = {
            escape: (str) => {
                if (!str) return "";
                return String(str).replace(/[&<>"']/g, m => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                })[m]);
            },

            setText: (id, text) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text || '';
            },

            showErrorOverlay: (message) => {
                const pidsSection = document.querySelector('.pids-section');
                if (!pidsSection || document.getElementById('pids-data-error')) return;

                pidsSection.style.position = 'relative';

                const errorHTML = `
                    <div id="pids-data-error" style="
                        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                        background: linear-gradient(135deg, #b71c1c 0%, #880e4f 100%);
                        color: white; z-index: 2000; border-radius: 8px;
                        display: flex; flex-direction: column; justify-content: center; align-items: center;
                        border: 4px solid #ffeb3b; box-sizing: border-box;
                        animation: fadeIn 0.3s ease-in;
                    ">
                        <i class="fas fa-exclamation-triangle" style="font-size: 8rem; margin-bottom: 20px; color: #ffeb3b;"></i>
                        <div style="text-align: center; padding: 0 40px;">
                            <h2 style="font-size: 4rem; font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">
                                列車資訊暫時中斷
                            </h2>
                            <p style="font-size: 2.2rem; font-weight: 500; opacity: 0.9; line-height: 1.4;">
                                ${UI_Helper.escape(message)}<br>
                                <span style="background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 5px; margin-top: 15px; display: inline-block;">
                                    請參考車站月台廣播或現場實體看板
                                </span>
                            </p>
                        </div>
                    </div>
                `;

                pidsSection.insertAdjacentHTML('beforeend', errorHTML);
                document.querySelectorAll('.pids-column').forEach(col => {
                    col.style.opacity = '0.3';
                    col.style.filter = 'blur(2px)';
                    col.style.transition = 'all 0.3s ease';
                });
            }
        };

        const i18n = {
            zh: {
                inbound: "逆行", outbound: "順行", trainNo: "車次", type: "車種", dest: "開往", time: "開車時間", status: "狀態", note: "備注",
                onTime: "準點", delay: "晚 {min} 分", cancelled: "停駛", partiallySuspended: "部分停駛", toward: "往", curPos: "列車目前位置：", nextPos: " ➡ ", expected: "本站預計：", arrive: " 抵達",
                adv: "宣導資訊", video: "影音專區", noTrain: "目前無列車資訊", notDeparted: "列車尚未發車", detecting: "列車訊號偵測中",
                types: { "新自強": "新自強", "自強": "自強", "普悠瑪": "普悠瑪", "太魯閣": "太魯閣", "莒光": "莒光", "區間快": "區間快", "區間": "區間", "專車": "專車", "其他": "列車" }
            },
            en: {
                inbound: "Reverse", outbound: "Forward", trainNo: "Train No.", type: "Type", dest: "Destination", time: "Dept. Time", status: "Status", note: "Remarks",
                onTime: "On Time", delay: "{min} min", cancelled: "Cancelled", partiallySuspended: "Partially Suspended", toward: "To ", curPos: "Current Location: ", nextPos: " ➡ ", expected: "ETA at Station: ", arrive: "",
                adv: "Information", video: "Media Center", noTrain: "No Train Information", notDeparted: "Not Yet Departed", detecting: "Signal Detecting",
                types: { "新自強": "New T.C.", "自強": "T.C.", "普悠瑪": "Puyuma", "太魯閣": "Taroko", "莒光": "C.K.", "區間快": "Fast Local", "區間": "Local", "專車": "Special Train", "其他": "Train" },
                notes: { "每日行駛": "Daily", "逢週五至日行駛": "Fri-Sun Only", "逢週六、日行駛": "Sat & Sun Only", "逢週六日行駛": "Weekends Only", "在彰化跨線": "Via Changhua", "跨線列車": "Cross-line", "本車次不發售無座票": "Reserved Only", "僅停靠大站": "Major Stops Only", "不停靠部分小站": "Express Service" }
            }
        };

        let currentLang = PIDS_APP.STATE.currentLang;
        let lastTrainData = PIDS_APP.STATE.lastTrainData;
        let autoSwitchTimer = PIDS_APP.STATE.autoSwitchTimer;
        let isVideoLoaded = PIDS_APP.STATE.isVideoLoaded;
        const SWITCH_INTERVAL = PIDS_APP.CONFIG.INTERVALS.LANG_SWITCH;

        const TRA_WORKER_URL = PIDS_APP.CONFIG.API_BASE;
        let GLOBAL_STATION_ID = "";
        const MAX_ROWS = PIDS_APP.CONFIG.ROWS.DESKTOP;
        const RWD_MAX_ROWS = PIDS_APP.CONFIG.ROWS.MOBILE;

        const TRAIN_TYPES = PIDS_APP.CONFIG.TRAIN_TYPES;
        const stopsCache = PIDS_APP.STATE.stopsCache;

        function updateClock() { PIDS_APP.updateClock(); }
        function updatePids(id) { PIDS_APP.STATE.stationID = id; return PIDS_APP.updatePids(); }
        function checkTopMarquee() { return PIDS_APP.checkTopMarquee(); }

        const stationEnMap = {
            "基隆": "Keelung", "七堵": "Qidu", "南港": "Nangang", "松山": "Songshan", "臺北": "Taipei", "台北": "Taipei", "板橋": "Banqiao", "樹林": "Shulin", "桃園": "Taoyuan", "中壢": "Zhongli",
            "新竹": "Hsinchu", "竹南": "Zhunan", "苗栗": "Miaoli", "豐原": "Fengyuan", "臺中": "Taichung", "台中": "Taichung", "彰化": "Changhua", "員林": "Yuanlin", "斗六": "Douliu", "嘉義": "Chiayi",
            "新營": "Xinying", "臺南": "Tainan", "台南": "Tainan", "岡山": "Gangshan", "新左營": "Xinzuoying", "左營": "Zuoying", "高雄": "Kaohsiung", "屏東": "Pingtung", "潮州": "Chaozhou", "枋寮": "Fangliao",

        function translateStation(zhName, langCode = PIDS_APP.STATE.currentLang) {
            const safeName = String(zhName || '').trim();
            if (langCode === 'zh') return safeName;
            let cleanName = safeName.replace(/\s*\(山\)/g, "").replace(/\s*\(海\)/g, "").replace(/車站$/g, "").trim();
            let suffix = "";
            if (safeName.includes("(山)")) suffix = " (MT)";
            if (safeName.includes("(海)")) suffix = " (CO)";

            if (typeof stationDataMap !== 'undefined') {
                for (let code in stationDataMap) {
                    if (stationDataMap[code].name === cleanName || stationDataMap[code].name === cleanName + "站") {
                        const mappedName = stationDataMap[code].ename.split('_')[0];
                        const isCJCU = cleanName === '長榮大學' || code === '4271' || /Chang\s*Jung\s*Christian\s*University/i.test(mappedName);
                        return (isCJCU ? 'C.J.C.U.' : mappedName) + suffix;
                    }
                }
            }
            return (stationEnMap[cleanName] || cleanName) + suffix;
        }

        function getViaTags(train, stops = []) {
            const tripLine = Number(train?.TripLine || 0);
            const names = (stops || []).map(s => s?.StationName?.Zh_tw || s?.StationName || s?.Name || "");
            const hasAny = (keys) => keys.some(k => names.some(n => String(n).includes(k)));

            const tags = [];
            if (tripLine === 1) tags.push('山');
            if (tripLine === 2) tags.push('海');
            if (hasAny(['宜蘭', '羅東', '礁溪', '頭城', '蘇澳'])) tags.push('宜蘭');
            if (hasAny(['臺東', '台東', '知本', '池上', '關山', '玉里'])) tags.push('臺東');
            if (hasAny(['枋寮', '大武', '太麻里', '金崙', '瀧溪', '內獅', '枋山'])) tags.push('南迴線');

        function getInfo(t, langCode = PIDS_APP.STATE.currentLang) {
            let rawName = t.TrainTypeName?.Zh_tw || t.TrainTypeName || '列車';
            const typeCode = String(t.TrainTypeCode || '');
            const note = String(t.Note || '');
            const merged = `${rawName} ${typeCode} ${note}`;
            let name = rawName.replace(/\(.*\)/g, '').trim();
            let cls = '其他';

            if (merged.includes('新自強') || merged.includes('3000') || ['110B', '110G', '110H', '110K', '110M'].includes(typeCode)) { name = '新自強'; cls = '新自強'; }
            else if (merged.includes('普悠瑪')) { name = '普悠瑪'; cls = '普悠瑪'; }
            else if (merged.includes('太魯閣')) { name = '太魯閣'; cls = '太魯閣'; }
            else if (merged.includes('莒光')) { name = '莒光'; cls = '莒光'; }
            else if (merged.includes('區間快')) { name = '區間快'; cls = '區間快'; }
            else if (merged.includes('區間')) { name = '區間'; cls = '區間'; }
            else if (merged.includes('自強')) { name = '自強'; cls = '自強'; }

            const lang = i18n[langCode];
            const displayName = lang.types[name] || name;
            return { name: displayName, cls };
        }

        async function fetchTrainStops(trainNo) {
            if (stopsCache[trainNo]) return stopsCache[trainNo];

            const abortController = new AbortController();
            const timeoutId = setTimeout(() => abortController.abort(), 15000);

            try {
                let r = await fetch(`${TRA_WORKER_URL}/api/schedule?trainNo=${trainNo}`, { signal: abortController.signal });
                clearTimeout(timeoutId);
                let d = await r.json();
                if (Array.isArray(d) && d.length && d[0].StopTimes) {
                    stopsCache[trainNo] = d[0].StopTimes;
                    return d[0].StopTimes;
                }
                if (d && d.StopTimes) {
                    stopsCache[trainNo] = d.StopTimes;
                    return d.StopTimes;
                }
            } catch (e) { clearTimeout(timeoutId); }

            try {
                const abortController2 = new AbortController();
                const timeoutId2 = setTimeout(() => abortController2.abort(), 15000);
                let r = await fetch(`https://tdx.transportdata.tw/api/basic/v3/Rail/TRA/DailyTrainTimetable/Today?$filter=TrainInfo/TrainNo eq '${trainNo}'&$format=JSON`, { signal: abortController2.signal });
                clearTimeout(timeoutId2);
                let d = await r.json();
                if (d?.value?.[0]?.StopTimes) {
                    stopsCache[trainNo] = d.value[0].StopTimes;
                    return d.value[0].StopTimes;
                }
            } catch (e) {}

            return [];
        }

        function getExpectedTime(timeStr, delayMins) {
            if (!timeStr || delayMins === 0) return timeStr;
            const [h, m] = timeStr.split(':').map(Number);
            const total = h * 60 + m + delayMins;
            const newH = Math.floor(total / 60) % 24;
            const newM = total % 60;
            return `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
        }

        function extractYoutubeId(input) {
            const raw = String(input || '').replace(/[\r\n\t\f\v]/g, '').trim();
            if (!raw) return null;
            if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
            try {
                const u = new URL(raw);
                const host = (u.hostname || '').toLowerCase();
                if (host.includes('youtu.be')) {
                    const id = u.pathname.replace(/^\//, '').split('/')[0];
                    return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
                }
                if (host.includes('youtube.com')) {
                    const v = u.searchParams.get('v');
                    if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
                    const parts = u.pathname.split('/').filter(Boolean);
                    if (['embed', 'shorts', 'v', 'vi', 'e'].includes(parts[0]) && /^[a-zA-Z0-9_-]{11}$/.test(parts[1] || '')) {
                        return parts[1];
                    }
                }
            } catch (_) {}
            const match = raw.match(/(?:v=|v\/|vi=|vi\/|youtu\.be\/|embed\/|e\/|shorts\/)([a-zA-Z0-9_-]{11})/i);
            return (match && match[1]) ? match[1] : null;
        }

        function _createDynamicPlayer() {
            if (!_isYTReady || window.ytPlayer || _playableVideoIds.length === 0) return;
            const cleanOrigin = window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '');

            window.ytPlayer = new YT.Player('ytPlayerDiv', {
                host: 'https://www.youtube.com',
                videoId: _playableVideoIds[_currentVideoIndex],
                // 🚀 修正：把 autoplay 改為 0，取消自動播放
                playerVars: { autoplay: 0, mute: 1, controls: 1, rel: 0, enablejsapi: 1, origin: cleanOrigin, widget_referrer: cleanOrigin, playsinline: 1 },
                events: {
                    'onReady': (event) => {
                        event.target.mute();
                        // 🚀 取消這個強制播放
                        // setTimeout(() => playCurrentVideo(), 300);
                    },
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.PLAYING) {
                            stopVideoWatchdog();
                            _videoErrorBurstCount = 0;
                            _lastVideoErrorTs = 0;
                            const currentId = event?.target?.getVideoData?.()?.video_id;
                            const idx = _playableVideoIds.indexOf(currentId);
                            if (idx >= 0) _currentVideoIndex = idx;
                            // 🚀 若使用者點擊播放，就解開靜音 (可選)
                            // event.target.unMute(); 
                        }
                        if (event.data === YT.PlayerState.ENDED) {
                            advanceToNextVideo('ended');
                        }
                    },
                    'onError': (event) => {
                        stopVideoWatchdog();
                        const nowTs = Date.now();
                        _videoErrorBurstCount = (nowTs - _lastVideoErrorTs < 8000) ? (_videoErrorBurstCount + 1) : 1;
                        _lastVideoErrorTs = nowTs;

                        if (_videoErrorBurstCount >= 3) {
                            destroyYtPlayer();
                            showVideoFallback('📹 影音來源受限制，暫時無法播放');
                            return;
                        }

                        const badId = event?.target?.getVideoData?.()?.video_id;
                        if (badId) _blockedVideoIds.add(badId);
                        else if (_playableVideoIds.length > 0) _blockedVideoIds.add(_playableVideoIds[0]);

                        refreshPlayableVideoList();
                        if (_playableVideoIds.length === 0) {
                            destroyYtPlayer();
                            showVideoFallback('📹 影音來源暫時無法播放，請稍後再試');
                            return;
                        }
                        advanceToNextVideo('error');
                    }
                }
            });
        }

        function startMarquee(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const container = el.parentElement;

            el.style.animation = 'none';
            el.style.transition = 'none';
            el.style.left = '0px';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const textWidth = el.scrollWidth;
                    const containerWidth = container.clientWidth;
                    
                    // 🚀 6. 跑馬燈速度 0.8 倍 + 防斷更排隊
                    const speedMultiplier = (id === 'unifiedTopMarquee') ? 1.0 : 0.8;
                    const basePixelsPerSecond = window.innerWidth <= 900 ? 120 : 180;
                    const pixelsPerSecond = basePixelsPerSecond * speedMultiplier;
                    
                    const totalDistance = textWidth + containerWidth;
                    const duration = Math.max(5, totalDistance / pixelsPerSecond);

                    el.style.setProperty('--start-pos', `${containerWidth}px`);
                    el.style.setProperty('--end-pos', `-${textWidth}px`);
                    el.style.animation = `smooth-marquee ${duration}s linear infinite`;
                });
            });
        }

        async function updatePids(id) {
            try {
                let r = await fetch(`${TRA_WORKER_URL}/api/liveboard/station?station=${id}`);
                let d = await r.json();
                const nowMins = new Date().getHours() * 60 + new Date().getMinutes();

                let filtered = d.filter(t => {
                    const [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                    const actualMins = (h * 60 + m) + parseInt(t.DelayTime || 0);
                    const isCancelled = String(t.TrainStatus) === '2';
                    let adjusted = actualMins < nowMins - 720 ? actualMins + 1440 : actualMins;
                    return adjusted >= nowMins || isCancelled;
                });

                filtered.forEach(t => {
                    const [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                    const actualMins = (h * 60 + m) + parseInt(t.DelayTime || 0);
                    let adjusted = actualMins < nowMins - 720 ? actualMins + 1440 : actualMins;
                    t._sort = (adjusted - nowMins + 1440) % 1440;
                });

                filtered.sort((a, b) => a._sort - b._sort);
                lastTrainData = filtered;
                refreshDisplay();

            } catch (e) {
                renderTable('1', []); renderTable('0', []);
            }
        }

        function renderTable(dir, list) {
            const tb = document.getElementById(`body${dir}`);
            const template = document.getElementById('train-row-template');
            while (tb.firstChild) tb.removeChild(tb.firstChild);

            const isMobile = window.innerWidth <= 900;
            const currentMaxRows = isMobile ? RWD_MAX_ROWS : MAX_ROWS;
            const fragment = document.createDocumentFragment();

            list.slice(0, currentMaxRows).forEach((t, i) => {
                const rowLangCode = (PIDS_APP.STATE.rowLangs && PIDS_APP.STATE.rowLangs[i]) || PIDS_APP.STATE.currentLang;
                const lang = i18n[rowLangCode];

                let info = getInfo(t, rowLangCode);
                let delay = parseInt(t.DelayTime || 0);
                const trainSuspendedFlag = Number(t.TrainSuspendedFlag || 0);
                const isSuspended = Boolean(t.IsSuspended) || Number(t.SuspendedFlag) === 1;
                const isPartiallySuspended = Boolean(t.IsPartiallySuspended) || trainSuspendedFlag === 2;
                let isCancel = String(t.TrainStatus) === '2' || trainSuspendedFlag === 1 || isSuspended;

                let status = "", cls = "";
                if (isCancel) { status = lang.cancelled; cls = 'status-cancelled'; } 
                else if (isPartiallySuspended) { status = lang.partiallySuspended; cls = 'status-suspended'; }
                else if (delay >= 120) { status = rowLangCode === 'zh' ? "時間未定" : "Delayed"; cls = 'status-delay'; } 
                else if (delay > 0) { status = lang.delay.replace('{min}', delay); cls = 'status-delay'; } 
                else { status = lang.onTime; cls = 'status-ontime'; }

                let timeStr = (t.ScheduledDepartureTime || "").slice(0, 5);
                let timeDisplay = timeStr;
                let isDelayed = false;
                
                if (delay > 0 && !isCancel) {
                    isDelayed = true;
                    if (delay >= 120) {
                        timeDisplay = "--:--"; 
                    } else {
                        let [h, m] = timeStr.split(':').map(Number);
                        let min = h * 60 + m + delay;
                        timeDisplay = `${String(Math.floor(min / 60) % 24).padStart(2, '0')}:${String(min % 60).padStart(2, '0')}`;
                    }
                }

                let dest = translateStation(t.EndingStationName, rowLangCode);
                const clone = template.content.cloneNode(true);
                const tr = clone.querySelector('tr');
                const forceStatusNote = isCancel || isPartiallySuspended;
                const noteText = forceStatusNote
                    ? status
                    : ((t.Note && String(t.Note).trim().length > 0) ? translateNote(String(t.Note).trim()) : status);
                tr.setAttribute('aria-label', `車次 ${t.TrainNo}, 開往 ${dest}, 車種 ${info.name}, 時間 ${timeDisplay}, 備注 ${noteText}`);

                const cells = tr.querySelectorAll('td');
                cells[0].textContent = String(t.TrainNo);
                cells[1].textContent = dest;
                cells[2].textContent = info.name;

                const timeSpan = document.createElement('span');
                timeSpan.className = isDelayed ? 'expected-time' : 'normal-time';
                timeSpan.textContent = timeDisplay;
                cells[3].appendChild(timeSpan);

                cells[4].textContent = noteText;
                cells[4].className = forceStatusNote ? cls : ((t.Note && String(t.Note).trim().length > 0) ? '' : cls);
                cells[4].setAttribute('role', 'gridcell');

                fragment.appendChild(clone);
            });

            for (let i = Math.min(list.length, currentMaxRows); i < currentMaxRows; i++) {
                fragment.appendChild(template.content.cloneNode(true));
            }
            tb.appendChild(fragment);
        }

        // 🚀 無縫接軌排隊系統
        async function updateMarquee(elId, list) {
            const el = document.getElementById(elId);
            const lang = i18n[PIDS_APP.STATE.currentLang];
            let msg = "";

            if (!list || list.length === 0) {
                msg = lang.noTrain; 
            } else {
                let t = list[0];
                let info = getInfo(t);
                let delay = parseInt(t.DelayTime || 0);
                const trainSuspendedFlag = Number(t.TrainSuspendedFlag || 0);
                const isSuspended = Boolean(t.IsSuspended) || Number(t.SuspendedFlag) === 1;
                const isPartiallySuspended = Boolean(t.IsPartiallySuspended) || trainSuspendedFlag === 2;
                let isCancel = String(t.TrainStatus) === '2' || trainSuspendedFlag === 1 || isSuspended;
                let destName = translateStation(t.EndingStationName);

                if (isCancel) {
                    msg = PIDS_APP.STATE.currentLang === 'zh' ? `🚫 ${t.TrainNo}次 ${info.name} ${destName} 本日停駛` : `🚫 Train ${t.TrainNo} ${info.name} to ${destName} CANCELLED`;
                } else if (isPartiallySuspended) {
                    msg = PIDS_APP.STATE.currentLang === 'zh' ? `⚠️ ${t.TrainNo}次 ${info.name} ${destName} 部分停駛` : `⚠️ Train ${t.TrainNo} ${info.name} to ${destName} PARTIALLY SUSPENDED`;
                } else {
                    const trainNoText = PIDS_APP.STATE.currentLang === 'zh' ? `${t.TrainNo}次` : `Train ${t.TrainNo}`;
                    const sep = `<span style="margin:0 15px;color:#fff">|</span>`;
                    msg = `<span style="color:#fff;font-weight:bold">${trainNoText} ${info.name} ${lang.toward}${destName}</span>${sep}`;

                    if (delay >= 60) {
                        msg += `<span style="color:#fff;font-weight:bold">${PIDS_APP.STATE.currentLang === 'zh' ? '● 營運異常：請注意上方通阻公告或洽站務員 ●' : '● Service Disruption: Please check alerts ●'}</span>${sep}`;
                    }

                    let liveData = null;
                    try {
                        liveData = await fetch(`${TRA_WORKER_URL}/api/live?trainNo=${t.TrainNo}`).then(r => r.json()).catch(() => null);
                        if (liveData?.TrainLiveBoards?.length > 0) liveData = liveData.TrainLiveBoards[0];
                        else if (liveData?.station !== undefined) liveData = { StationName: { Zh_tw: liveData.station }, DelayTime: liveData.delay ?? 0, TrainStatus: liveData.status ?? 0 };
                    } catch (e) { }

                    let locationText = "";
                    let locationDelayText = "";
                    
                    let rawStation = liveData?.StationName?.Zh_tw || liveData?.StationName || liveData?.station || "";
                    if (typeof rawStation === 'object') {
                        rawStation = rawStation.Zh_tw || rawStation.name || "";
                    }
                    const lastStationName = String(rawStation).trim();

                    if (lastStationName) {
                        const lastStationNameTranslated = translateStation(lastStationName);
                        const liveDelay = liveData?.DelayTime ?? liveData?.delay ?? 0;

                        let stops = await fetchTrainStops(t.TrainNo);
                        let nextStopName = "";
                        
                        if (stops && stops.length > 0) {
                            const passedIndex = stops.findIndex(s => {
                                let sName = s.StationName?.Zh_tw || s.StationName || s.Name || "";
                                if (typeof sName === 'object') sName = sName.Zh_tw || "";
                                return String(sName).trim() === lastStationName;
                            });
                            
                            if (passedIndex !== -1 && passedIndex < stops.length - 1) {
                                let nStop = stops[passedIndex + 1];
                                let nName = nStop.StationName?.Zh_tw || nStop.StationName || nStop.Name || "";
                                if (typeof nName === 'object') nName = nName.Zh_tw || "";
                                nextStopName = translateStation(String(nName).trim());
                            }
                        }
                        
                        locationText = nextStopName ? `${lang.curPos}${lastStationNameTranslated}${lang.nextPos}${nextStopName}` : `${lang.curPos}${lastStationNameTranslated}`;
                        if (liveDelay > 0) locationDelayText = PIDS_APP.STATE.currentLang === 'zh' ? ` (晚 ${liveDelay} 分)` : ` (${liveDelay} min)`;
                    } else {
                        const schedTime = String(t.ScheduledDepartureTime || '').slice(0, 5);
                        const schedParts = schedTime.split(':').map(Number);
                        const schedMins = Number.isFinite(schedParts[0]) && Number.isFinite(schedParts[1])
                            ? (schedParts[0] * 60 + schedParts[1])
                            : null;
                        const now = new Date();
                        const nowMins = now.getHours() * 60 + now.getMinutes();
                        const notDeparted = Boolean(t.IsTomorrow) || (schedMins !== null && schedMins > nowMins);
                        locationText = notDeparted ? lang.notDeparted : lang.detecting;
                    }

                    msg += `<span style="color:#fff">${locationText}</span>`;
                    if (locationDelayText) msg += `<span style="color:#ff5252;font-weight:bold">${locationDelayText}</span>`;
                    msg += sep;

                    let arrivalTime = t.ScheduledArrivalTime || t.ScheduledDepartureTime || "00:00";
                    let stops = await fetchTrainStops(t.TrainNo);
                    const viaTags = getViaTags(t, stops);
                    if (viaTags.length > 0) {
                        const viaText = PIDS_APP.STATE.currentLang === 'zh' ? `經由${viaTags.map(tag => tag.endsWith('線') ? tag : `${tag}線`).join('、')}` : `Via ${viaTags.map(tag => ({ '山': 'Mountain Line', '海': 'Coastal Line', '宜蘭': 'Yilan Line', '臺東': 'Taitung Line', '南迴線': 'South-Link Line' }[tag] || `${tag} Line`)).join(' / ')}`;
                        msg += `<span style="color:#fff;font-weight:bold">${viaText}</span>${sep}`;
                    }

                    if (stops && stops.length > 0) {
                        let stationStop = stops.find(s => String(s.StationID) === GLOBAL_STATION_ID);
                        if (stationStop && stationStop.ArrivalTime) arrivalTime = stationStop.ArrivalTime.slice(0, 5);
                    }

                    const predictedTime = getExpectedTime(arrivalTime, delay);
                    msg += `<span style="color:#fff">${lang.expected}</span><span style="color:${delay > 0 ? '#ff5252' : '#ffffff'};font-weight:bold">${predictedTime}${lang.arrive} (${delay > 0 ? lang.delay.replace('{min}', delay) : lang.onTime})</span>`;

                    if (t.Note && t.Note.trim().length > 0) {
                        msg += `${sep}<span style="color:#fff;font-weight:bold">${PIDS_APP.STATE.currentLang === 'zh' ? '備註：' : 'Note: '}${translateNote(t.Note)}</span>`;
                    }

                    if (stops && stops.length > 0) {
                        let idx = stops.findIndex(s => String(s.StationID) === GLOBAL_STATION_ID);
                        const formatStation = (s) => {
                            const name = translateStation(s.StationName.Zh_tw, PIDS_APP.STATE.currentLang);
                            let time = s.ArrivalTime ? s.ArrivalTime.slice(0, 5) : "";
                            if (time && delay > 0) return `${name}(<span style="color:#ff5252">${getExpectedTime(time, delay)}</span>)`;
                            return time ? `${name}(${time})` : name;
                        };

                        if (idx !== -1) {
                            let next = stops.slice(idx + 1).map(formatStation).join(PIDS_APP.STATE.currentLang === 'zh' ? '、' : ' → ');
                            if (next) msg += `${sep}<span style="color:#fff">${PIDS_APP.STATE.currentLang === 'zh' ? '沿途停靠：' : 'Stops: '}${next}</span>`;
                            else msg += `${sep}<span style="color:#fff">${PIDS_APP.STATE.currentLang === 'zh' ? '▶ 終點站' : '▶ Terminal'}</span>`;
                        } else {
                            let allStops = stops.slice(1).map(formatStation).join(PIDS_APP.STATE.currentLang === 'zh' ? '、' : ' → ');
                            if (allStops) msg += `${sep}<span style="color:#fff">${PIDS_APP.STATE.currentLang === 'zh' ? '沿途停靠：' : 'Stops: '}${allStops}</span>`;
                        }
                    }
                }
            }

            // 🚀 防斷更：完全相同就不做事
            if (el.dataset.currentMsg === msg || el.dataset.nextMsg === msg) {
                return; 
            }

            // 🚀 如果跑馬燈根本沒在跑，就直接換字並啟動
            if (!el.style.animationName || el.style.animationName === 'none') {
                el.innerHTML = msg;
                el.dataset.currentMsg = msg;
                startMarquee(elId);
            } else {
                // 🚀 如果跑馬燈正在跑，就把新資料存入排隊區 (nextMsg)
                el.dataset.nextMsg = msg;
            }
        }

        async function checkTopMarquee() {
            try {
                let url = `${TRA_WORKER_URL}/api/pids/marquee`;
                if (GLOBAL_STATION_ID) url += `?station=${GLOBAL_STATION_ID}`;
                let r = await fetch(url);
                let d = await r.json();
                let el = document.getElementById('unifiedTopMarquee');
                if (d.text !== undefined && d.text !== null) {
                    let cleanText = d.text.replace(/\\n/g, "     ").replace(/[\r\n]+/g, "     ").replace(/\s{2,}/g, "     ").replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").trim();
                    if (el.dataset.raw !== cleanText) {
                        el.dataset.raw = cleanText;
                        const newMsg = formatMarqueeText(cleanText);
                        
                        if (!el.style.animationName || el.style.animationName === 'none') {
                            el.innerHTML = newMsg;
                            el.dataset.currentMsg = newMsg;
                            startMarquee('unifiedTopMarquee');
                        } else {
                            el.dataset.nextMsg = newMsg; 
                        }
                    }
                }
            } catch (e) { }
        }

        // 🚀 導回查詢頁面的函數
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // 如果沒有歷史紀錄，預設回到 index.html 或是你想要的查詢首頁
                window.location.href = 'tra_liveboard.html';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            PIDS_APP.init();
            const p = new URLSearchParams(location.search);
            GLOBAL_STATION_ID = p.get('station') || PIDS_APP.STATE.stationID;

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/service-worker.js').catch(e => console.warn(e));
            }

            // 🚀 全面掛載「無縫接軌」動畫監聽器
            document.querySelectorAll('.marquee-text').forEach(el => {
                el.addEventListener('animationiteration', () => {
                    // 當跑馬燈動畫跑完一圈，檢查有沒有新資料在排隊
                    if (el.dataset.nextMsg) {
                        el.innerHTML = el.dataset.nextMsg; // 替換新資料
                        el.dataset.currentMsg = el.dataset.nextMsg; // 更新當前顯示紀錄
                        el.dataset.nextMsg = ''; // 清空排隊區
                        
                        // 重新計算長度與時間
                        const container = el.parentElement;
                        const textWidth = el.scrollWidth;
                        const containerWidth = container.clientWidth;
                        
                        // 依據 ID 給予不同速度
                        const speedMultiplier = (el.id === 'unifiedTopMarquee') ? 1.0 : 0.8;
                        const basePixelsPerSecond = window.innerWidth <= 900 ? 120 : 180;
                        const pixelsPerSecond = basePixelsPerSecond * speedMultiplier;
                        
                        const totalDistance = textWidth + containerWidth;
                        const duration = Math.max(5, totalDistance / pixelsPerSecond);
                        
                        // 動態更新變數，動畫會順暢接續下一圈，不會閃爍！
                        el.style.setProperty('--start-pos', `${containerWidth}px`);
                        el.style.setProperty('--end-pos', `-${textWidth}px`);
                        el.style.animationDuration = `${duration}s`;
                    }
                });
            });

            let deferredPrompt, installButton = null;
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e;
                if (!localStorage.getItem('pwa_install_dismissed')) {
                    installButton = document.createElement('div');
                    installButton.id = 'pwa-install-banner';
                    installButton.innerHTML = `
                        <div style="position:fixed;top:20px;right:20px;background:#1976d2;color:#fff;padding:15px 25px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999;cursor:pointer;font-size:1rem;display:flex;align-items:center;gap:10px;animation:slideIn 0.5s ease-out">
                            <i class="fas fa-mobile-alt"></i><span>安裝 App</span>
                            <button style="background:#fff;color:#1976d2;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-weight:bold;margin-left:10px">安裝</button>
                            <button id="pwa-dismiss" style="background:transparent;color:#fff;border:none;padding:5px;cursor:pointer;font-size:1.2rem">×</button>
                        </div>
                        <style>@keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }</style>
                    `;
                    document.body.appendChild(installButton);
                    installButton.querySelector('button:not(#pwa-dismiss)').addEventListener('click', async () => {
                        if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; installButton.remove(); }
                    });
                    installButton.querySelector('#pwa-dismiss').addEventListener('click', () => {
                        localStorage.setItem('pwa_install_dismissed', 'true'); installButton.remove();
                    });
                }
            });
            window.addEventListener('appinstalled', () => { if (installButton) installButton.remove(); });
        });

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = fullscreenBtn.querySelector('i');
        function toggleFullscreen() {
            const docEl = document.documentElement;
            if (!document.fullscreenElement) {
                const requestMethod = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
                if (requestMethod) requestMethod.call(docEl).catch(err => {});
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenIcon.classList.remove('fa-expand');
                fullscreenIcon.classList.add('fa-compress');
                fullscreenBtn.title = "取消全螢幕";
            } else {
                fullscreenIcon.classList.remove('fa-compress');
                fullscreenIcon.classList.add('fa-expand');
                fullscreenBtn.title = "切換全螢幕";
            }
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); } });
        function formatTime(t) { return (!t || typeof t !== 'string') ? '--:--' : t.substring(0, 5); }
    </script>
