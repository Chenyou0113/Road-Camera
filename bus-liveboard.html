                // 找到所有的 tt-* 元素並隱藏，只顯示選中的
                const container = document.getElementById('modal-body');
                const contents = container.querySelectorAll('[id^="tt-"]');
                contents.forEach(el => {
                    el.style.display = el.id === `tt-${textId}` ? 'block' : 'none';
                });
            };
        } catch (e) {
            console.error("Timetable Error:", e);
            body.innerHTML = '<p style="text-align:center; color:red; padding:20px;">資料載入失敗</p>';
        }
    }

    // 🌟 票價資訊彈窗 (加入起訖站互動試算功能)
    async function showFareModal() {
        document.getElementById('options-dropdown').style.display = 'none';
        const modal = document.getElementById('modal-overlay');
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');

        title.innerHTML = `<i class="fas fa-calculator"></i> <span>${currentData.route} 票價試算</span>`;
        modal.style.display = 'flex';

        if (!currentData.fare) {
            body.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i><br><br>正在載入票價資料...</div>`;
            try {
                const url = `${WORKER_URL}/?action=fare&category=${currentData.type}&city=${currentData.city}&route=${encodeURIComponent(currentData.route)}`;
                const res = await throttledFetch(url);
                const data = await res.json();
                currentData.fare = data?.fares || [];
            } catch (e) {
                body.innerHTML = `<div style="text-align:center; color:#ef4444; padding:20px;">票價資料載入失敗</div>`;
                return;
            }
        }

        const fares = currentData.fare || [];
        if (!fares.length) {
            body.innerHTML = `<div style="text-align:center; color:#9ca3af; padding:30px;">目前 TDX 未提供此路線票價</div>`;
            return;
        }

        const fareProfile = fares[0]; // 取主要票價設定
        const isOD = fareProfile.pricing_type.includes("起迄") || fareProfile.pricing_type.includes("站區間");
        const stops = currentData.stops[currentData.direction] || [];

        if (stops.length === 0) {
            body.innerHTML = `<div style="text-align:center; color:#9ca3af; padding:30px;">無法取得站牌資料進行試算</div>`;
            return;
        }

        // 產生站牌下拉選單
        const stopOptions = stops.map((s, i) => `<option value="${i}">${s.StopName?.Zh_tw || s.StopName}</option>`).join('');

        body.innerHTML = `
            <div style="background:#f8fafc; padding:16px; border-radius:12px; margin-bottom:16px; border:1px solid #e2e8f0;">
                <div style="font-size:0.85rem; color:#64748b; margin-bottom:12px; font-weight:bold;">選擇搭乘區間 (${fareProfile.pricing_type})</div>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div style="width:32px; height:32px; border-radius:50%; background:#dbeafe; color:#2563eb; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; flex-shrink:0;">起</div>
                        <select id="fare-from" onchange="calcFare()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem; outline:none; background:white;">
                            ${stopOptions}
                        </select>
                    </div>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div style="width:32px; height:32px; border-radius:50%; background:#fee2e2; color:#ef4444; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.9rem; flex-shrink:0;">迄</div>
                        <select id="fare-to" onchange="calcFare()" style="flex:1; padding:10px; border-radius:8px; border:1px solid #cbd5e1; font-size:0.95rem; outline:none; background:white;">
                            ${stopOptions}
                        </select>
                    </div>
                </div>
            </div>
            <div id="fare-result-container"></div>
        `;

        // 預設將迄站設為最後一站
        document.getElementById('fare-to').value = stops.length - 1;

        // 計算票價的核心邏輯
        window.calcFare = function() {
            const fromIdx = parseInt(document.getElementById('fare-from').value);
            const toIdx = parseInt(document.getElementById('fare-to').value);
            const resEl = document.getElementById('fare-result-container');

            if (fromIdx >= toIdx) {
                resEl.innerHTML = `<div style="text-align:center; padding:15px; color:#ef4444; font-weight:bold; background:#fef2f2; border-radius:8px;">上車點必須在下車點之前</div>`;
                return;
            }

            if (fareProfile.is_free) {
                 resEl.innerHTML = `<div style="text-align:center; padding:20px; color:#059669; font-size:1.2rem; font-weight:900;">此路線免費搭乘 🆓</div>`;
                 return;
            }

            let resultFares = [];
            let segmentHtml = '';

            if (isOD) {
                // 【客運 / 里程計費】
                const fromName = stops[fromIdx].StopName?.Zh_tw || stops[fromIdx].StopName;
                const toName = stops[toIdx].StopName?.Zh_tw || stops[toIdx].StopName;
                const odFares = fareProfile.od_fares || [];
                
                // 尋找包含關鍵字的區間 (因為TDX客運站名有時候會有中英文夾雜或備註不同)
                const match = odFares.find(od => 
                    (od.origin.includes(fromName) || fromName.includes(od.origin)) && 
                    (od.destination.includes(toName) || toName.includes(od.destination))
                );
                
                if (match) {
                    resultFares = match.fares;
                } else {
                     resEl.innerHTML = `<div style="text-align:center; padding:20px; color:#64748b; background:#f1f5f9; border-radius:8px;">無法精確匹配此區間的里程票價<br><span style="font-size:0.8rem;">(TDX 起訖站名可能不完全對應)</span></div>`;
                     return;
                }
            } else {
                // 【市區公車 / 段次計費】
                const secFares = fareProfile.section_fares && fareProfile.section_fares.length > 0 ? fareProfile.section_fares[0] : null;
                if (!secFares) {
                    resEl.innerHTML = `<div style="text-align:center; padding:20px; color:#64748b;">該路線無段次票價明細設定</div>`;
                    return;
                }

                let segments = 1;
                const buffers = secFares.buffer_zones || [];
                
                // 自動偵測是否跨越緩衝區增加段次
                buffers.forEach(bz => {
                    const bStartIdx = stops.findIndex(s => (s.StopName?.Zh_tw || s.StopName) === bz.origin);
                    const bEndIdx = stops.findIndex(s => (s.StopName?.Zh_tw || s.StopName) === bz.destination);
                    
                    if (bStartIdx !== -1 && bEndIdx !== -1) {
                        const trueStart = Math.min(bStartIdx, bEndIdx);
                        const trueEnd = Math.max(bStartIdx, bEndIdx);
                        // 規則: 若上車於緩衝區前，且下車於緩衝區後，則加收一段票
                        if (fromIdx < trueStart && toIdx > trueEnd) segments++;
                    }
                });

                const baseFares = secFares.fares || [];
                resultFares = baseFares.map(f => ({ ...f, price: f.price * segments }));
                segmentHtml = `<div style="text-align:center; font-weight:800; color:#d97706; margin-bottom:12px; background:#fffbeb; padding:8px; border-radius:8px; border:1px solid #fef3c7;">本區間需收取 ${segments} 段票</div>`;
            }

            if (!resultFares || resultFares.length === 0) {
                 resEl.innerHTML = `<div style="text-align:center; padding:20px; color:#64748b;">無票價資料</div>`;
                 return;
            }

            // 渲染最終金額
            resEl.innerHTML = `
                ${segmentHtml}
                <div class="fare-types-grid">
                    ${resultFares.map(f => `
                        <div class="fare-type-cell ${f.class === '成人' || f.class === '全票' || f.class === '一般票' ? 'highlight' : ''}">
                            <div class="fare-type-label">${f.class || '票種'}</div>
                            <div class="fare-type-price">$${f.price}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        // 第一次開啟自動執行一次計算
        window.calcFare();
    }

    function parseWKT(wkt) {
        if (!wkt) return [];
        const points = [];
        const matches = wkt.match(/-?\d+\.\d+\s+-?\d+\.\d+/g);
        if (matches) {
            matches.forEach(match => {
                const [lng, lat] = match.split(/\s+/);
                points.push({ lat: parseFloat(lat), lng: parseFloat(lng) });
            });
        }
        return points;
    }

    function drawStaticMap(dir) {
        if(!map) return;
        
        mapMarkers.stops.forEach(m => m.setMap(null));
        mapMarkers.stops = [];
        
        if (routeLine) routeLine.setMap(null); 

        let path = [];
        if (currentData.shapes && currentData.shapes.length > 0) {
            const shapeObj = currentData.shapes.find(s => s.Direction == dir) || currentData.shapes[0];
            if (shapeObj && shapeObj.Geometry) {
                path = parseWKT(shapeObj.Geometry);
            }
        }

        if (path.length > 0) {
            routeLine = new google.maps.Polyline({
                path: path,
                geodesic: true,
                strokeColor: '#2563eb', 
                strokeOpacity: 0.8,
                strokeWeight: 5,
                map: map
            });
            
            const bounds = new google.maps.LatLngBounds();
            path.forEach(p => bounds.extend(p));
            map.fitBounds(bounds);
        }

        const stops = currentData.stops[dir] || [];
        stops.forEach((s, idx) => {
            const dotEl = document.createElement('div');
            dotEl.style.width = '8px';
            dotEl.style.height = '8px';
            dotEl.style.backgroundColor = '#2563eb'; 
            dotEl.style.borderRadius = '50%';
            dotEl.style.border = '1px solid white';
            dotEl.style.boxShadow = '0 1px 2px rgba(0,0,0,0.3)';
            
            const pinEl = new google.maps.marker.PinElement({
                glyphText: (idx + 1).toString(),
                glyphColor: 'white',
                background: '#2563eb', 
                borderColor: 'white',
                scale: 0.8
            });

            const marker = new google.maps.marker.AdvancedMarkerElement({
                position: { lat: s.StopPosition.PositionLat, lng: s.StopPosition.PositionLon },
                map: map,
                content: dotEl, 
                title: s.StopName?.Zh_tw || s.StopName,
                zIndex: 10 
            });

            marker.dotContent = dotEl;
            marker.pinContent = pinEl.element;

            marker.addListener('gmp-click', () => {
                if (activeInfoWindow) activeInfoWindow.close();
                const infoWindow = new google.maps.InfoWindow();
                const stopName = s.StopName?.Zh_tw || s.StopName;
                infoWindow.setContent(`
                    <div style="padding:10px; text-align:center;">
                        <div style="font-weight:bold; margin-bottom:5px; color:#1e40af;">${stopName}</div>
                        <i class="fas fa-spinner fa-spin" style="color:#2563eb;"></i> 查詢行經路線...
                    </div>
                `);
                activeInfoWindow = infoWindow;
                infoWindow.open(map, marker);
                fetchRealStopRoutes(stopName, infoWindow);
            });

            mapMarkers.stops.push(marker);
        });

        if (window.zoomListener) google.maps.event.removeListener(window.zoomListener);
        
        window.zoomListener = map.addListener('zoom_changed', () => {
            const currentZoom = map.getZoom();
            const threshold = 15; 
            mapMarkers.stops.forEach(marker => {
                if (currentZoom >= threshold) {
                    if (marker.content !== marker.pinContent) marker.content = marker.pinContent;
                } else {
                    if (marker.content !== marker.dotContent) marker.content = marker.dotContent;
                }
            });
        });
        google.maps.event.trigger(map, 'zoom_changed');
    }

    async function fetchRealStopRoutes(stopName, infoWindow) {
        try {
            const url = `${WORKER_URL}/?action=stop_info&city=${currentData.city}&name=${encodeURIComponent(stopName)}`;
            const res = await throttledFetch(url);
            const data = await res.json();
            const routes = data.routes || [];
            
            if (routes.length === 0) {
                infoWindow.setContent(`<div style="padding:10px; color:#999;">查無其他路線</div>`);
                return;
            }
            
            let content = `
                <div class="stop-popup">
                    <div class="stop-popup-header">
                        <i class="fas fa-map-marker-alt"></i><h3>${stopName}</h3>
                    </div>
                    <div class="stop-popup-section-title">
                        <i class="fas fa-bus"></i> 經過的路線 (${routes.length})
                    </div>
                    <div class="stop-popup-grid">
                        ${routes.map(r => `
                            <button class="stop-popup-btn" onclick="event.stopPropagation(); loadRoute('${r}', '${currentData.city}', '${currentData.type}')">${r}</button>
                        `).join('')}
                    </div>
                </div>
            `;
            infoWindow.setContent(content);
        } catch (e) {
            infoWindow.setContent(`<div style="padding:10px; color:red;">查詢失敗</div>`);
        }
    }

    function updateBusesMap(buses) {
        if(!map) return;
        
        const currentPlates = new Set(buses.filter(b => b.lat && b.lon).map(b => b.plate));

        mapMarkers.buses = mapMarkers.buses.filter(marker => {
            if (!currentPlates.has(marker.title)) {
                marker.setMap(null);
                return false;
            }
            return true;
        });

        buses.forEach(bus => {
            if(!bus.lat || !bus.lon) return;
            const plate = bus.plate || bus.PlateNumb || '';

            let existingMarker = mapMarkers.buses.find(m => m.title === plate);

            if (existingMarker) {
                existingMarker.position = { lat: bus.lat, lng: bus.lon };
                const svgContainer = existingMarker.content;
                if(svgContainer) {
                    svgContainer.style.transform = `rotate(${bus.azi || 0}deg)`;
                }
            } else {
                const busEl = document.createElement('div');
                busEl.innerHTML = `
                    <svg width="24" height="40" viewBox="-12 -22 24 40" style="display:block; overflow:visible;">
                        <path d="M -10,-14 L 10,-14 L 10,14 L -10,14 Z M 0,-20 L 8,-14 L -8,-14 Z" fill="#ef4444" stroke="white" stroke-width="2" />
                    </svg>
                `;
                busEl.style.transform = `rotate(${bus.azi || 0}deg)`;
                busEl.style.transformOrigin = 'center center';
                busEl.style.transition = 'transform 0.5s ease-out'; 

                const marker = new google.maps.marker.AdvancedMarkerElement({
                    position: { lat: bus.lat, lng: bus.lon },
                    map: map,
                    content: busEl,
                    title: plate,
                    zIndex: 100 
                });

                marker.addListener('gmp-click', () => {
                    if (activeInfoWindow) activeInfoWindow.close();
                    const cityRegistry = vehicleMap[currentData.city] || {};
                    const vReg = cityRegistry[plate] || {};
                    const year = vReg.year && vReg.year !== '不詳' ? `${vReg.year}年` : '年份未知';
                    const isElectric = plate.startsWith('E') || plate.endsWith('FV') || vReg.isElectric; 

                    const infoWindow = new google.maps.InfoWindow();
                    infoWindow.setContent(`
                        <div style="padding:10px; font-family: 'Noto Sans TC', sans-serif;">
                            <div style="font-size:1.1rem; font-weight:900; color:#2563eb; margin-bottom:8px;">
                                <i class="fas fa-bus"></i> ${plate}
                            </div>
                            <div style="font-size:0.9rem; color:#4b5563;">
                                <div>出廠年份：${year}</div>
                                <div style="margin-top:6px; color:#10b981; font-weight:bold;">
                                    ${isElectric ? '<i class="fas fa-bolt"></i> 電動公車' : ''}
                                    ${vReg.isLowFloor ? '<i class="fas fa-wheelchair"></i> 低底盤' : ''}
                                </div>
                            </div>
                        </div>
                    `);
                    activeInfoWindow = infoWindow;
                    infoWindow.open(map, marker);
                });
                
                mapMarkers.buses.push(marker);
            }
        });
    }

    function focusMap(lat, lng) {
        if (!map) return;
        map.panTo({ lat, lng });
        map.setZoom(17);
    }

    let userLocationMarker = null;

    function locateMe() {
        if (!navigator.geolocation) {
            alert("您的瀏覽器不支援地理定位功能。");
            return;
        }

        const btn = document.getElementById('locate-btn');
        btn.classList.add('locating');

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                btn.classList.remove('locating');

                if (!map) return;
                
                map.panTo({ lat, lng });
                map.setZoom(16);

                if (!userLocationMarker) {
                    const dot = document.createElement('div');
                    dot.style.width = '16px';
                    dot.style.height = '16px';
                    dot.style.backgroundColor = '#3b82f6';
                    dot.style.border = '3px solid white';
                    dot.style.borderRadius = '50%';
                    dot.style.boxShadow = '0 0 10px rgba(59, 130, 246, 0.5)';
                    
                    userLocationMarker = new google.maps.marker.AdvancedMarkerElement({
                        position: { lat, lng },
                        map: map,
                        content: dot,
                        title: "您的位置",
                        zIndex: 200
                    });
                } else {
                    userLocationMarker.position = { lat, lng };
                }

                if (currentData.route && currentData.stops[currentData.direction]) {
                    let minDistance = Infinity;
                    let nearestStopId = null;

                    currentData.stops[currentData.direction].forEach(s => {
                        if(s.StopPosition) {
                            const d = getDistance(lat, lng, s.StopPosition.PositionLat, s.StopPosition.PositionLon);
                            if (d < minDistance) {
                                minDistance = d;
                                nearestStopId = s.StopUID;
                            }
                        }
                    });

                    if (nearestStopId) {
                        const stopEl = document.getElementById(`stop-${nearestStopId}`);
                        if (stopEl) {
                            stopEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            stopEl.style.backgroundColor = '#ecfdf5';
                            setTimeout(() => stopEl.style.backgroundColor = '', 2000);
                        }
                    }
                }
            },
            () => {
                btn.classList.remove('locating');
                alert("無法獲取您的位置，請確認是否開啟定位權限。");
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    }

    async function handleSearchPlate(plate) {
        if (!plate || plate === '---') return false;
        let bus = lastBuses.find(b => (b.PlateNumb === plate || b.plate === plate));
        if (bus && bus.lat) {
            focusMap(bus.lat, bus.lon);
            return true;
        }
        alert(`找不到車牌 ${plate} 的即時位置。`);
        return false;
    }

    function decodeHtmlEntities(str) {
        if (!str) return "";
        const txt = document.createElement("textarea");
        txt.innerHTML = str;
        return txt.value;
    }

    async function openCityNewsModal(targetCity = null) {
        const modal = document.getElementById('modal-overlay');
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');
        
        const city = targetCity || (currentData.city ? currentData.city : 'Taipei');
        const type = (city === 'InterCity') ? 'InterCity' : 'CityBus';

        const cityNameMap = {
            'Taipei': '臺北市', 'NewTaipei': '新北市', 'Keelung': '基隆市',
            'Taoyuan': '桃園市', 'Hsinchu': '新竹市', 'HsinchuCounty': '新竹縣',
            'YilanCounty': '宜蘭縣', 'MiaoliCounty': '苗栗縣', 'Taichung': '臺中市',
            'ChanghuaCounty': '彰化縣', 'NantouCounty': '南投縣', 'YunlinCounty': '雲林縣',
            'Chiayi': '嘉義市', 'ChiayiCounty': '嘉義縣', 'Tainan': '臺南市',
            'Kaohsiung': '高雄市', 'PingtungCounty': '屏東縣',
            'HualienCounty': '花蓮縣', 'TaitungCounty': '臺東縣',
            'PenghuCounty': '澎湖縣', 'KinmenCounty': '金門縣', 'LienchiangCounty': '連江縣',
            'InterCity': '公路客運'
        };

        title.innerHTML = `<i class="fas fa-bullhorn"></i> <span>營運公告</span>`;

        let selectHtml = `
            <div style="margin-bottom: 20px; padding: 12px; background: #f1f5f9; border-radius: 12px; border: 1px solid #e2e8f0;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <i class="fas fa-filter" style="color:#64748b;"></i>
                    <span style="font-weight:700; color:#475569; font-size:0.9rem;">切換公告縣市/類型</span>
                </div>
                <select id="news-city-select" onchange="openCityNewsModal(this.value)" style="width:100%; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none; background:white; font-weight:600; color:#334155; cursor:pointer;">
        `;
        
        selectHtml += `<optgroup label="全台路網">`;
        const isInterSelected = (city === 'InterCity') ? 'selected' : '';
        selectHtml += `<option value="InterCity" ${isInterSelected}>公路客運</option>`;
        selectHtml += `</optgroup>`;

        selectHtml += `<optgroup label="市區公車">`;
        for (const [code, name] of Object.entries(cityNameMap)) {
            if (code === 'InterCity') continue;
            const isSelected = (code === city) ? 'selected' : '';
            selectHtml += `<option value="${code}" ${isSelected}>${name}</option>`;
        }
        selectHtml += `</optgroup></select></div>`;

        body.innerHTML = `
            ${selectHtml}
            <div id="news-content-area">
                <div style="text-align:center; padding:40px;">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i><br><br>正在載入 ${cityNameMap[city] || city} 公告...
                </div>
            </div>
        `;
        modal.style.display = 'flex';

        try {
            const [newsRes, alertRes] = await Promise.all([
                throttledFetch(`${WORKER_URL}/?action=news&category=${type}&city=${city}`).then(r => r.json()),
                throttledFetch(`${WORKER_URL}/?action=alert&category=${type}&city=${city}`).then(r => r.json())
            ]);

            const allItems = [...(Array.isArray(alertRes) ? alertRes : []).map(a => ({ title: a.Title, desc: a.Description, date: a.StartTime, tag: '通阻', cls: 'tag-alert' })),
                              ...(Array.isArray(newsRes) ? newsRes : []).map(n => ({ title: n.Title, desc: n.Description, date: n.PublishTime, tag: '消息', cls: 'tag-news' }))]
                              .sort((a, b) => new Date(b.date) - new Date(a.date));

            const contentArea = document.getElementById('news-content-area');

            if (!allItems.length) {
                contentArea.innerHTML = `<div style="text-align:center; color:#9ca3af; padding:40px;">無公告</div>`;
                return;
            }

            contentArea.innerHTML = '<div style="display:flex; flex-direction:column; gap:12px;">' + 
                allItems.map(i => {
                    let descHtml = decodeHtmlEntities(i.desc);
                    descHtml = descHtml.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
                    if (!/<[a-z][\s\S]*>/i.test(descHtml)) {
                        descHtml = descHtml.replace(/\n/g, '<br>');
                    }
                    
                    return `
                    <div style="border-bottom:1px solid #eee; padding-bottom:12px;">
                        <div style="font-size:0.8rem; color:#9ca3af; margin-bottom:4px;">${i.date ? i.date.substring(0, 10) : ''}</div>
                        <div style="font-weight:700; font-size:1rem; margin-bottom:6px;"><span class="${i.cls}">${i.tag}</span> ${i.title}</div>
                        <div class="news-desc-content">${descHtml}</div>
                    </div>`;
                }).join('') + '</div>';
        } catch (e) {
            document.getElementById('news-content-area').innerHTML = `<div style="text-align:center; color:#ef4444; padding:40px;">載入失敗</div>`;
        }
    }

    async function updateMarqueeSection(elementId, city, type) {
        const textEl = document.getElementById(elementId);
        if (!textEl) return;
        try {
            const res = await throttledFetch(`${WORKER_URL}/?action=alert&category=${type || 'CityBus'}&city=${city}`);
            const data = await res.json();
            const alerts = Array.isArray(data) ? data.filter(a => a.Status !== 1) : [];
            
            if (alerts.length > 0) {
                const text = alerts.map(a => `【${a.Title}】${a.Description}`).join("　　　");
                textEl.innerText = text;
                textEl.className = 'marquee-content';
                textEl.style.animationDuration = Math.max(10, text.length * 0.1) + 's';
            } else {
                textEl.innerText = "🚍 公車營運正常";
                textEl.className = ''; 
            }
        } catch (e) { textEl.innerText = "暫無資訊"; }
    }
</script>
