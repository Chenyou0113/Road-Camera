<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣報吼哩知後臺管理系統 - 管理儀表板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === 全局基礎樣式 === */
        body {
            background: #121212;
            /* 更深的背景色 */
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === 登入頁面樣式 (置中單欄) === */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        /* === 後台儀表板樣式 (寬版 - 修改處) === */
        .dashboard-wrapper {
            width: 100%;
            /* 修改處：原本是 1200px，改成 98% 讓它幾乎填滿整個螢幕，留一點點邊距比較好看 */
            max-width: 98%;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
            /* 確保 padding 不會撐破版面 */
            display: none;
        }

        .dashboard-wrapper.active {
            display: block;
        }

        /* 卡片通用樣式 */
        .card {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .card:hover {
            border-color: #444;
        }

        /* 標題與文字 */
        h2 {
            text-align: center;
            color: #4fc3f7;
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }

        h3 {
            color: #fff;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 表單元件 */
        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: #4fc3f7;
            background: #333;
        }

        textarea {
            resize: vertical;
            line-height: 1.5;
            min-height: 100px;
        }

        /* 按鈕群組 */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .btn-login {
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        .btn-save {
            background: linear-gradient(135deg, #43a047, #2e7d32);
        }

        /* 綠色系 */
        .btn-pids {
            background: linear-gradient(135deg, #e91e63, #c2185b);
        }

        /* 桃紅系 */
        .btn-warn {
            background: linear-gradient(135deg, #ff9800, #f57c00);
        }

        /* 橘色系 */
        .btn-invite {
            background: linear-gradient(135deg, #673ab7, #512da8);
        }

        /* 紫色系 */

        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
            color: #aaa;
        }

        .link {
            display: block;
            text-align: center;
            color: #aaa;
            font-size: 14px;
            text-decoration: none;
            margin-top: 15px;
        }

        .link:hover {
            color: #fff;
        }

        /* === 儀表板佈局 (Grid System) === */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .user-badge {
            background: #333;
            padding: 5px 12px;
            border-radius: 20px;
            color: #4fc3f7;
            font-weight: bold;
        }

        .logout-btn {
            color: #ff5252;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            border: 1px solid #ff5252;
            border-radius: 5px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff5252;
            color: white;
        }

        .home-link {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .home-link:hover {
            color: #4fc3f7;
        }

        .dashboard-grid {
            display: grid;
            /* 修改處：原本是 2fr 1fr，改成 3fr 1fr，讓左邊主要的文字編輯區更寬，右邊工具欄維持適當比例 */
            grid-template-columns: 3fr 1fr;
            gap: 25px;
            align-items: start;
        }

        /* 邀請碼區塊 */
        .code-display {
            background: #000;
            border: 2px dashed #673ab7;
            color: #b388ff;
            padding: 15px;
            text-align: center;
            font-size: 1.4rem;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .code-display:hover {
            background: #1a1a1a;
        }

        .hint {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        /* PIDS 預覽區塊優化 */
        #pidsCurrentText {
            color: #ffeb3b;
            font-family: monospace;
            display: block;
            white-space: pre-wrap;
            /* 🔥 關鍵：讓內容正確換行，不會被撐成一長條 */
            word-wrap: break-word;
            /* 超長單字也會自動換行 */
            overflow-wrap: break-word;
        }

        /* 開關按鈕 */
        .switch-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            background: #252525;
            padding: 10px;
            border-radius: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
            margin-right: 12px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #ff9800;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
        }

        .switch-label {
            font-weight: bold;
        }

        /* RWD: 手機版變回單欄 */
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .top-nav {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .nav-right {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper" id="loginSection">
        <div class="login-container">
            <div class="card">
                <a href="index.html"
                    style="display:inline-flex; align-items:center; gap:5px; color:#aaa; text-decoration:none; margin-bottom:20px;">
                    <i class="fas fa-arrow-left"></i> 返回天氣首頁
                </a>
                <h2>🔐 後台登入</h2>
                <input type="text" id="loginUser" placeholder="帳號">
                <input type="password" id="loginPass" placeholder="密碼">
                <button class="btn-login" onclick="doLogin()">登入系統</button>
                <a href="register.html" class="link">註冊管理員帳號</a>
                <div class="status" id="loginStatus"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-wrapper" id="editSection">

        <div class="top-nav">
            <div class="nav-left">
                <a href="index.html" class="home-link">
                    <i class="fas fa-cloud-sun-rain" style="font-size: 1.2rem;"></i>
                    王偉預報管理後台
                </a>
            </div>
            <div class="nav-right">
                <span>登入身分：<span id="currentUser" class="user-badge">User</span></span>
                <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> 登出</a>
            </div>
        </div>

        <div class="dashboard-grid">

            <div class="grid-col-main">

                <div class="card">
                    <h3 style="color: #4caf50;"><i class="fas fa-bullhorn"></i> 首頁跑馬燈設定</h3>
                    <textarea id="message" placeholder="載入中..."></textarea>
                    <button class="btn-save" onclick="saveMessage()">
                        <i class="fas fa-save"></i> 更新首頁跑馬燈
                    </button>
                    <div class="status" id="editStatus"></div>
                </div>

                <div class="card" style="border-top: 4px solid #e91e63;">
                    <h3 style="color: #e91e63;"><i class="fas fa-desktop"></i> PIDS 跑馬燈控制台</h3>

                    <!-- 上方顯示區：限制300px高 -->
                    <div
                        style="background:#252525; padding:12px; border-radius:6px; margin-bottom:15px; font-size:0.9rem; max-height: 300px; overflow-y: auto;">
                        <span
                            style="color:#aaa; display:block; margin-bottom: 5px; position:sticky; top:0; background:#252525;">📍
                            目前顯示：</span>
                        <span id="pidsCurrentText"
                            style="color:#ffeb3b; font-family:monospace; display:block; white-space: pre-wrap;">載入中...</span>
                    </div>

                    <!-- 修改處：將輸入框高度改為 300px，與上方顯示區對應 -->
                    <textarea id="pidsMarqueeInput" style="height: 300px;"
                        placeholder="輸入 PIDS 看板文字 (支援 HTML 語法)..."></textarea>
                    <button class="btn-pids" onclick="updatePidsMarquee()">
                        <i class="fas fa-paper-plane"></i> 發送至所有車站看板
                    </button>
                    <div class="status" id="pidsStatus"></div>
                </div>

                <!-- 🔥 新增：多媒體設定卡片 -->
                <div class="card" style="border-top: 4px solid #2196f3;">
                    <h3 style="color: #2196f3;"><i class="fas fa-photo-video"></i> PIDS 多媒體素材</h3>

                    <span style="color:#aaa; display:block; margin-bottom:10px; font-size:0.9rem;">📸 輪播圖片網址 (一行一張，支援
                        JPG/PNG)</span>
                    <textarea id="pidsImagesInput" style="height: 150px;"
                        placeholder="https://example.com/img1.jpg&#10;https://example.com/img2.jpg"></textarea>

                    <span style="color:#aaa; display:block; margin-bottom:10px; margin-top:10px; font-size:0.9rem;">🎥
                        影片網址 (一行一部，YouTube 連結或 ID)</span>
                    <textarea id="pidsVideoInput"
                        placeholder="https://www.youtube.com/watch?v=XXXXXX&#10;https://youtu.be/YYYYYY&#10;https://www.youtube.com/watch?v=ZZZZZZ"></textarea>

                    <button class="btn-media" onclick="savePidsAssets()"
                        style="background: linear-gradient(135deg, #2196f3, #1565c0); color:white; margin-top:10px;">
                        <i class="fas fa-cloud-upload-alt"></i> 儲存多媒體設定
                    </button>
                    <div class="status" id="pidsAssetsStatus"></div>
                </div>

            </div>

            <div class="grid-col-side">

                <div class="card" style="border-top: 4px solid #ff9800;">
                    <h3 style="color: #ff9800;"><i class="fas fa-exclamation-circle"></i> 系統彈窗公告</h3>

                    <div class="switch-container">
                        <label class="switch">
                            <input type="checkbox" id="ann_active">
                            <span class="slider"></span>
                        </label>
                        <span class="switch-label" id="ann_label">狀態：關閉</span>
                    </div>

                    <input type="text" id="ann_title" placeholder="公告標題">
                    <textarea id="ann_content" style="height: 80px;" placeholder="公告內文..."></textarea>
                    <textarea id="ann_list" style="height: 100px;"
                        placeholder="清單項目 (一行一個)&#10;✅ 項目一&#10;✅ 項目二"></textarea>

                    <button class="btn-warn" onclick="saveAnnouncement()">
                        <i class="fas fa-check-circle"></i> 發布公告
                    </button>
                    <div class="status" id="annStatus"></div>
                </div>

                <div class="card" style="border-top: 4px solid #00bcd4;">
                    <h3 style="color: #00bcd4;"><i class="fas fa-sync"></i> PIDS 數據維護</h3>
                    <p style="font-size:0.8rem; color:#888; margin-bottom:10px;">手動強制從 TDX 抓取最新資料至 D1 資料庫</p>
                    <button onclick="triggerSync('live')" style="background: #00bcd4; margin-bottom:10px;">
                        <i class="fas fa-bolt"></i> 同步即時動態 (Live)
                    </button>
                    <button onclick="triggerSync('schedule')" style="background: #0097a7;">
                        <i class="fas fa-calendar-alt"></i> 同步時刻表 (Schedule)
                    </button>
                    <div class="status" id="syncStatus"></div>
                </div>

                <div class="card" style="border-top: 4px solid #673ab7;">
                    <h3 style="color: #b388ff;"><i class="fas fa-ticket-alt"></i> 邀請碼產生器</h3>
                    <div id="newCodeBox" class="code-display" onclick="copyCode()" title="點擊複製"></div>
                    <div id="copyHint" class="hint">👆 點擊代碼複製</div>
                    <button class="btn-invite" onclick="generateInviteCode()">
                        <i class="fas fa-magic"></i> 生成新邀請碼
                    </button>
                    <div class="status" id="inviteStatus"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ★ 修改 1: 修正 Worker 網址 (請確保這與你實際運行的網址一致)
        const API_BASE = 'https://wang-weather.xiaoyouwu5-fd3.workers.dev';
        const PIDS_WORKER_URL = 'https://tra-schedule-worker.weacamm.org'; // 🔥 這裡改回你實際的網域

        // 檢查是否已登入
        function checkAuth() {
            const user = localStorage.getItem('wangwei_user');
            const pass = localStorage.getItem('wangwei_pass');

            if (user && pass) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('editSection').classList.add('active');
                document.getElementById('currentUser').innerText = user;
                loadCurrent();
            }
        }

        // 登入
        function doLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (user && pass) {
                localStorage.setItem('wangwei_user', user);
                localStorage.setItem('wangwei_pass', pass);
                checkAuth();
            } else {
                showError('loginStatus', "請輸入帳號密碼");
            }
        }

        function logout() {
            localStorage.removeItem('wangwei_user');
            localStorage.removeItem('wangwei_pass');
            location.reload();
        }

        // 載入所有資料
        async function loadCurrent() {
            try {
                // 1. 載入天氣跑馬燈
                const resMsg = await fetch(`${API_BASE}/message`);
                const dataMsg = await resMsg.json();
                document.getElementById('message').value = dataMsg.message;

                // 2. 載入公告設定
                const resAnn = await fetch(`${API_BASE}/announcement`);
                const dataAnn = await resAnn.json();

                document.getElementById('ann_active').checked = dataAnn.active;
                updateSwitchLabel(dataAnn.active);
                document.getElementById('ann_title').value = dataAnn.title || "";
                document.getElementById('ann_content').value = dataAnn.content || "";
                document.getElementById('ann_list').value = (dataAnn.list || []).join('\n');

                document.getElementById('ann_active').onchange = function () {
                    updateSwitchLabel(this.checked);
                };

                // 3. 載入 PIDS 跑馬燈
                loadPidsMarquee();

            } catch (e) {
                console.error(e);
                alert("⚠️ 部分資料讀取失敗，請檢查網路");
            }
        }

        function updateSwitchLabel(checked) {
            const label = document.getElementById('ann_label');
            if (checked) {
                label.innerText = "狀態：開啟 (顯示中)";
                label.style.color = "#ff9800";
            } else {
                label.innerText = "狀態：關閉";
                label.style.color = "#aaa";
            }
        }

        // 儲存天氣跑馬燈
        async function saveMessage() {
            updateData(`${API_BASE}/message`, { message: document.getElementById('message').value }, 'editStatus', '首頁跑馬燈更新成功！');
        }

        // 儲存公告
        async function saveAnnouncement() {
            const payload = {
                active: document.getElementById('ann_active').checked,
                title: document.getElementById('ann_title').value,
                content: document.getElementById('ann_content').value,
                list: document.getElementById('ann_list').value.split('\n').filter(line => line.trim() !== '')
            };
            updateData(`${API_BASE}/announcement`, payload, 'annStatus', '公告設定已儲存！');
        }

        // 通用更新函式
        async function updateData(url, payload, statusId, successMsg) {
            const user = localStorage.getItem('wangwei_user');
            const pass = localStorage.getItem('wangwei_pass');
            const statusEl = document.getElementById(statusId);

            statusEl.innerText = "⏳ 處理中...";
            statusEl.style.color = "#aaa";

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Username': user, 'X-Password': pass },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    statusEl.innerText = "✅ " + successMsg;
                    statusEl.style.color = "#4caf50";
                    setTimeout(() => statusEl.innerText = "", 3000);
                } else {
                    handleError(statusEl, data.error);
                }
            } catch (e) {
                statusEl.innerText = "❌ 連線失敗";
                statusEl.style.color = "#ff5252";
            }
        }

        // 生成邀請碼
        async function generateInviteCode() {
            const user = localStorage.getItem('wangwei_user');
            const pass = localStorage.getItem('wangwei_pass');
            const statusEl = document.getElementById('inviteStatus');
            const codeBox = document.getElementById('newCodeBox');
            const hintBox = document.getElementById('copyHint');

            statusEl.innerText = "⏳ 生成中...";
            codeBox.style.display = 'none';
            hintBox.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE}/generate-invite`, {
                    method: 'POST',
                    headers: { 'X-Username': user, 'X-Password': pass }
                });
                const data = await res.json();
                if (data.success) {
                    statusEl.innerText = "";
                    codeBox.innerText = data.code;
                    codeBox.style.display = 'block';
                    hintBox.style.display = 'block';
                } else {
                    handleError(statusEl, data.error);
                }
            } catch (e) {
                statusEl.innerText = "❌ 生成失敗";
                statusEl.style.color = "#ff5252";
            }
        }

        function copyCode() {
            const code = document.getElementById('newCodeBox').innerText;
            navigator.clipboard.writeText(code).then(() => alert("✅ 已複製到剪貼簿！"));
        }

        // === PIDS 控制 ===

        // ★ 修改 2: 增加手動同步函式
        async function triggerSync(type) {
            const statusEl = document.getElementById('syncStatus');
            const user = localStorage.getItem('wangwei_user');
            const pass = localStorage.getItem('wangwei_pass');
            
            statusEl.innerText = `⏳正在進行 ${type} 同步，請稍候...`;
            statusEl.style.color = "#aaa";

            try {
                // 如果是 schedule，因為資料量大，我們把 timeout 設長一點
                const res = await fetch(`${PIDS_WORKER_URL}/api/sync?type=${type}`, {
                    method: 'GET',
                    headers: { 'X-Username': user, 'X-Password': pass }
                });
                const text = await res.text();
                if (res.ok) {
                    statusEl.innerText = "✅ " + text;
                    statusEl.style.color = "#4caf50";
                } else {
                    statusEl.innerText = "❌ 同步失敗：" + text;
                    statusEl.style.color = "#ff5252";
                }
            } catch (e) {
                statusEl.innerText = "❌ 連線錯誤或請求超時";
                statusEl.style.color = "#ff5252";
            }
        }

        async function loadPidsMarquee() {
            try {
                // 🔥 加上 ?raw=true，告訴 Worker 只要給「純宣導文字」，不要混入即時通阻！
                const res = await fetch(`${PIDS_WORKER_URL}/api/pids/marquee?raw=true`);
                const data = await res.json();
                if (data.text) {
                    document.getElementById('pidsMarqueeInput').value = data.text;
                    // 上方的預覽區也可以單純顯示目前儲存的文字
                    document.getElementById('pidsCurrentText').innerText = data.text;
                }
            } catch (e) {
                document.getElementById('pidsCurrentText').innerText = "❌ 無法連線 PIDS Worker";
            }
        }

        // ★ 修改 3: 更新 PIDS 文字發送 (加入驗證 Header)
        async function updatePidsMarquee() {
            const btn = event.target;
            const newText = document.getElementById('pidsMarqueeInput').value;
            const statusEl = document.getElementById('pidsStatus');
            const user = localStorage.getItem('wangwei_user');
            const pass = localStorage.getItem('wangwei_pass');

            if (!newText.trim()) return showError('pidsStatus', "內容不能為空");

            btn.disabled = true;
            statusEl.innerText = "⏳ 發送中...";

            try {
                const res = await fetch(`${PIDS_WORKER_URL}/api/admin/update-pids`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Username': user, 
                        'X-Password': pass 
                    },
                    body: JSON.stringify({ text: newText })
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    statusEl.innerText = "✅ 發送成功！";
                    statusEl.style.color = "#4caf50";
                    document.getElementById('pidsCurrentText').innerText = newText;
                } else {
                    statusEl.innerText = "❌ 錯誤：" + (result.error || "權限不足");
                    statusEl.style.color = "#ff5252";
                }
            } catch (e) {
                statusEl.innerText = "❌ 連線錯誤";
                statusEl.style.color = "#ff5252";
            } finally {
                btn.disabled = false;
            }
        }

        // 🔥 === PIDS 多媒體控制 ===
        async function loadPidsAssets() {
            try {
                const res = await fetch(`${PIDS_WORKER_URL}/api/pids/assets`);
                const data = await res.json();
                if (data.images && Array.isArray(data.images)) {
                    document.getElementById('pidsImagesInput').value = data.images.join('\n');
                }
                if (data.video) {
                    const videoUrls = Array.isArray(data.video) ? data.video : [data.video];
                    document.getElementById('pidsVideoInput').value = videoUrls.join('\n');
                }
            } catch (e) {
                console.warn("無法載入多媒體資源:", e);
            }
        }

        // ★ 修改 4: 更新多媒體儲存 (加入驗證 Header)
        async function savePidsAssets() {
            const btn = event.target;
            const images = document.getElementById('pidsImagesInput').value.split('\n').map(s => s.trim()).filter(s => s);
            const videoUrls = document.getElementById('pidsVideoInput').value.split('\n').map(s => s.trim()).filter(s => s);
            const statusEl = document.getElementById('pidsAssetsStatus');
            const user = localStorage.getItem('wangwei_user');
            const pass = localStorage.getItem('wangwei_pass');

            btn.disabled = true;
            statusEl.innerText = "⏳ 儲存中...";

            try {
                const res = await fetch(`${PIDS_WORKER_URL}/api/admin/update-assets`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Username': user, 
                        'X-Password': pass 
                    },
                    body: JSON.stringify({ images, video: videoUrls })
                });
                const result = await res.json();
                if (res.ok && result.success) {
                    statusEl.innerText = "✅ 多媒體設定已儲存！";
                    statusEl.style.color = "#4caf50";
                } else {
                    statusEl.innerText = "❌ 儲存失敗：" + (result.error || "權限不足");
                    statusEl.style.color = "#ff5252";
                }
            } catch (e) {
                statusEl.innerText = "❌ 連線錯誤";
                statusEl.style.color = "#ff5252";
            } finally {
                btn.disabled = false;
            }
        }

        function handleError(el, error) {
            el.innerText = "❌ 失敗：" + (error || "未知錯誤");
            el.style.color = "#ff5252";
            if (error === "密碼錯誤" || error === "帳號不存在") logout();
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.innerText = "❌ " + msg;
            el.style.color = "#ff5252";
        }

        checkAuth();
        loadPidsMarquee();
        loadPidsAssets();
    </script>
</body>

</html>
