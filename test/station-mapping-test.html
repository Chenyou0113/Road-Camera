<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StationID 對照表測試頁面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { margin-bottom: 10px; font-size: 2em; }
        .header p { opacity: 0.9; }
        .content {
            padding: 30px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }
        .test-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .test-section code {
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            display: block;
            margin: 10px 0;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .input-group {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        .input-group button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .input-group button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .result {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 4px solid #10b981;
        }
        .result.error {
            border-left-color: #ef4444;
            color: #ef4444;
        }
        .result pre {
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.4;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .stat-box .label {
            opacity: 0.9;
            font-size: 0.9em;
        }
        .success { color: #10b981; }
        .info { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚂 台鐵 StationID 對照表測試</h1>
            <p>驗證車站資料和查詢功能</p>
        </div>

        <div class="content">
            
            <div class="stats">
                <div class="stat-box">
                    <div class="number" id="stationCount">-</div>
                    <div class="label">包含車站數</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="scriptLoaded">❌</div>
                    <div class="label">腳本加載</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="functionCount">-</div>
                    <div class="label">可用函數</div>
                </div>
            </div>

            
            <div class="test-section">
                <h3>📍 查詢單個車站資訊</h3>
                <div class="input-group">
                    <input type="text" id="stationCodeInput" placeholder="輸入車站代碼（如：1000）" value="1000">
                    <button onclick="testGetStationData()">查詢</button>
                </div>
                <div id="stationDataResult"></div>
            </div>

            
            <div class="test-section">
                <h3>🔤 查詢車站名稱</h3>
                <div class="input-group">
                    <input type="text" id="stationCodeInput2" placeholder="輸入車站代碼" value="3300">
                    <button onclick="testGetStationName()">查詢中文名</button>
                    <button onclick="testGetStationEName()">查詢英文名</button>
                </div>
                <div id="stationNameResult"></div>
            </div>

            
            <div class="test-section">
                <h3>📡 查詢GPS座標</h3>
                <div class="input-group">
                    <input type="text" id="stationCodeInput3" placeholder="輸入車站代碼" value="4400">
                    <button onclick="testGetStationGPS()">查詢座標</button>
                </div>
                <div id="gpsResult"></div>
            </div>

            
            <div class="test-section">
                <h3>🔍 搜索車站（模糊查詢）</h3>
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="輸入搜索詞（如：台北、Taipei）" value="台北">
                    <button onclick="testSearchStations()">搜索</button>
                </div>
                <div id="searchResult"></div>
            </div>

            
            <div class="test-section">
                <h3>✓ 驗證車站代碼有效性</h3>
                <div class="input-group">
                    <input type="text" id="validateInput" placeholder="輸入車站代碼驗證" value="1000">
                    <button onclick="testValidateStationCode()">驗證</button>
                </div>
                <div id="validateResult"></div>
            </div>

            
            <div class="test-section">
                <h3>📋 主要車站清單</h3>
                <button onclick="displayMainStations()" style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">顯示所有車站</button>
                <div id="mainStationsResult"></div>
            </div>
        </div>
    </div>

    
    <script src="assets/station-code-mapping.js"></script>

    <script>
        // 初始化
        function initTest() {
            try {
                // 檢查是否加載成功
                if (typeof stationDataMap !== 'undefined') {
                    document.getElementById('scriptLoaded').textContent = '✅';
                    document.getElementById('stationCount').textContent = Object.keys(stationDataMap).length;
                    
                    // 計算可用函數數
                    let funcCount = 0;
                    if (typeof getStationIdFromCode === 'function') funcCount++;
                    if (typeof getStationData === 'function') funcCount++;
                    if (typeof getStationName === 'function') funcCount++;
                    if (typeof getStationEName === 'function') funcCount++;
                    if (typeof getStationGPS === 'function') funcCount++;
                    if (typeof getAllStations === 'function') funcCount++;
                    if (typeof isValidStationCode === 'function') funcCount++;
                    
                    document.getElementById('functionCount').textContent = funcCount;
                } else {
                    document.getElementById('scriptLoaded').textContent = '❌';
                }
            } catch (e) {
                console.error('初始化錯誤:', e);
            }
        }

        // 查詢單個車站
        function testGetStationData() {
            const code = document.getElementById('stationCodeInput').value;
            const result = document.getElementById('stationDataResult');
            
            try {
                const station = getStationData(code);
                if (station) {
                    result.innerHTML = `<div class="result">
                        <strong class="success">✓ 找到車站資訊</strong>
                        <pre>${JSON.stringify(station, null, 2)}</pre>
                    </div>`;
                } else {
                    result.innerHTML = `<div class="result error">
                        <strong>✗ 未找到車站代碼: ${code}</strong>
                    </div>`;
                }
            } catch (e) {
                result.innerHTML = `<div class="result error">
                    <strong>✗ 錯誤:</strong> ${e.message}
                </div>`;
            }
        }

        // 查詢車站名稱
        function testGetStationName() {
            const code = document.getElementById('stationCodeInput2').value;
            const result = document.getElementById('stationNameResult');
            
            try {
                const name = getStationName(code);
                result.innerHTML = `<div class="result">
                    <strong class="success">✓ 中文名稱: ${name || '(未找到)'}</strong>
                </div>`;
            } catch (e) {
                result.innerHTML = `<div class="result error">錯誤: ${e.message}</div>`;
            }
        }

        // 查詢英文名
        function testGetStationEName() {
            const code = document.getElementById('stationCodeInput2').value;
            const result = document.getElementById('stationNameResult');
            
            try {
                const ename = getStationEName(code);
                result.innerHTML = `<div class="result">
                    <strong class="success">✓ 英文名稱: ${ename || '(未找到)'}</strong>
                </div>`;
            } catch (e) {
                result.innerHTML = `<div class="result error">錯誤: ${e.message}</div>`;
            }
        }

        // 查詢GPS座標
        function testGetStationGPS() {
            const code = document.getElementById('stationCodeInput3').value;
            const result = document.getElementById('gpsResult');
            
            try {
                const gps = getStationGPS(code);
                const station = getStationData(code);
                
                if (gps) {
                    const [lat, lon] = gps.split(' ').map(parseFloat);
                    result.innerHTML = `<div class="result">
                        <strong class="success">✓ GPS座標找到</strong>
                        <pre>
車站: ${station.name} (${station.ename})
座標: ${gps}
緯度: ${lat}
經度: ${lon}

Google Maps: <a href="https://maps.google.com/?q=${lat},${lon}" target="_blank">查看地圖</a>
                        </pre>
                    </div>`;
                } else {
                    result.innerHTML = `<div class="result error">✗ 未找到座標</div>`;
                }
            } catch (e) {
                result.innerHTML = `<div class="result error">錯誤: ${e.message}</div>`;
            }
        }

        // 搜索車站
        function testSearchStations() {
            const search = document.getElementById('searchInput').value;
            const result = document.getElementById('searchResult');
            
            try {
                const stations = getAllStations(search);
                if (stations.length > 0) {
                    let html = `<div class="result">
                        <strong class="success">✓ 找到 ${stations.length} 個車站</strong>
                        <pre>`;
                    
                    stations.slice(0, 10).forEach(station => {
                        html += `${station.name} (${station.ename}) - ${station.stationCode}\n`;
                    });
                    
                    if (stations.length > 10) {
                        html += `\n... 還有 ${stations.length - 10} 個 ...`;
                    }
                    
                    html += `</pre></div>`;
                    result.innerHTML = html;
                } else {
                    result.innerHTML = `<div class="result error">✗ 未找到匹配的車站</div>`;
                }
            } catch (e) {
                result.innerHTML = `<div class="result error">錯誤: ${e.message}</div>`;
            }
        }

        // 驗證車站代碼
        function testValidateStationCode() {
            const code = document.getElementById('validateInput').value;
            const result = document.getElementById('validateResult');
            
            try {
                const valid = isValidStationCode(code);
                result.innerHTML = `<div class="result ${valid ? '' : 'error'}">
                    ${valid ? '✓ <strong class="success">有效的車站代碼</strong>' : '✗ <strong>無效的車站代碼</strong>'}
                </div>`;
            } catch (e) {
                result.innerHTML = `<div class="result error">錯誤: ${e.message}</div>`;
            }
        }

        // 顯示主要車站
        function displayMainStations() {
            const result = document.getElementById('mainStationsResult');
            
            try {
                const mainCodes = ["0900", "1000", "1020", "1210", "3300", "4080", "4220", "4400", "5000", "6000", "7000"];
                let html = `<div class="result">
                    <strong class="success">✓ 主要車站列表</strong>
                    <pre>
號碼 | 代碼 | 中文名稱 | 英文名稱
----|------|--------|--------
`;
                
                mainCodes.forEach((code, idx) => {
                    const station = getStationData(code);
                    if (station) {
                        html += `${(idx+1).toString().padStart(2, ' ')} | ${code} | ${station.name.padEnd(6, ' ')} | ${station.ename}\n`;
                    }
                });
                
                html += `</pre></div>`;
                result.innerHTML = html;
            } catch (e) {
                result.innerHTML = `<div class="result error">錯誤: ${e.message}</div>`;
            }
        }

        // 頁面加載完成後初始化
        window.addEventListener('load', initTest);
    </script>
</body>
</html>
