<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵即時看板 - 專業控制中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #D84315; --bg: #0a0a0a; --card: #181818; --border: #333; --accent: #ff9800; --blue: #03a9f4; --success: #2ecc71; --danger: #e74c3c; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding-bottom: 60px; }
        
        /* Header */
        .header { background: #000; padding: 15px 20px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .back-btn { background: #016d68; color: #fff; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        #updateTime { color: #ffeb3b; font-family: monospace; font-size: 1.1rem; }

        .container { max-width: 900px; margin: 0 auto; padding: 15px; }

        /* 公告面板 */
        .info-panel { background: #3e2723; border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .tra-marquee { background: #fff; color: #333; height: 45px; border-radius: 8px; overflow: hidden; display: flex; align-items: center; padding: 0 15px; margin-bottom: 15px; font-weight: bold; }
        .marquee-content { white-space: nowrap; animation: marquee 25s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 控制台 */
        .control-panel { background: #1565c0; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab-nav { display: flex; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; background: transparent; color: #fff; font-weight: bold; cursor: pointer; opacity: 0.6; }
        .tab-btn.active { background: #fff; color: #1565c0; opacity: 1; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr 120px; gap: 10px; align-items: flex-end; }
        .form-group { position: relative; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.75rem; color: rgba(255,255,255,0.8); font-weight: bold; }
        input, select { background: #fff; border: none; color: #333; padding: 12px; border-radius: 8px; outline: none; font-size: 0.95rem; }

        /* 🔥 Autocomplete 修復：鎖定在 Input 下方 */
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ccc; border-radius: 8px; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; max-height: 200px; overflow-y: auto; color: #333; }
        .sugg-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .sugg-item:hover { background: #f0f0f0; color: var(--primary); }

        /* 結果顯示 */
        .dir-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin: 25px 0 15px; }
        .dir-title { font-size: 1.1rem; font-weight: 900; color: var(--accent); }
        .btn-switch { background: var(--blue); color: #000; border: none; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .pids-btn { background: #222; color: #ffeb3b; border: 1px solid #ffeb3b; padding: 5px 12px; border-radius: 5px; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        .train-card { background: #111; border-radius: 12px; border: 1px solid #222; margin-bottom: 10px; overflow: hidden; transition: 0.2s; }
        .train-card:hover { border-color: #555; }
        .train-summary { padding: 15px; display: grid; grid-template-columns: 110px 1fr 80px 100px; align-items: center; cursor: pointer; }
        .t-badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; color: #fff; margin-right: 8px; font-weight: bold; }
        .type-tc { background: #e74c3c; } .type-ck { background: #d35400; } .type-lc { background: #2980b9; } .type-ot { background: #7f8c8d; }

        .t-no { font-weight: 900; }
        .t-dest { color: var(--blue); font-weight: bold; }
        .t-time { font-family: monospace; font-size: 1.2rem; font-weight: bold; text-align: center; }
        .t-status { text-align: right; font-weight: bold; font-size: 0.9rem; }
        .status-ok { color: var(--success); }
        .status-late { color: var(--danger); }

        /* 詳情面板 */
        .detail-pane { display: none; background: #050505; padding: 15px; border-top: 1px solid #222; }
        .hist-info { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; border: 1px solid #444; }
        .timeline { border-left: 2px solid #333; margin-left: 10px; padding-left: 20px; }
        .step { position: relative; margin-bottom: 12px; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .step::before { content: ''; position: absolute; left: -26px; top: 6px; width: 10px; height: 10px; background: #444; border-radius: 50%; }
        .step.passed { color: #555; } .step.passed::before { background: var(--success); }
        .step.current { color: var(--accent); font-weight: bold; } .step.current::before { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .disclaimer { background: #1a1a1a; border-left: 4px solid var(--accent); padding: 15px; font-size: 0.85rem; color: #888; line-height: 1.6; margin-top: 10px; }
        
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .train-summary { grid-template-columns: 1fr 1fr; gap: 8px; }
            .t-time, .t-status { text-align: left; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
    <h1 style="color:#ff5722; font-weight:900;">台鐵即時看板</h1>
    <div id="updateTime">--:--:--</div>
</header>

<div class="container">
    <div id="traAlertPanel" class="info-panel">
        <h3 style="margin:0 0 10px 0; color:var(--accent);">⚠️ 營運通阻</h3>
        <div id="traAlertContent"></div>
    </div>

    <div class="tra-marquee">
        <div class="marquee-content" id="marqueeText">正在與台鐵資料庫同步...</div>
    </div>

    <section class="control-panel">
        <nav class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('station')"><i class="fas fa-torii-gate"></i> 車站看板</button>
            <button class="tab-btn" onclick="switchTab('route')"><i class="fas fa-route"></i> 站到站</button>
            <button class="tab-btn" onclick="switchTab('train')"><i class="fas fa-history"></i> 車次歷史</button>
        </nav>

        <!-- 1. 車站看板 -->
        <div id="tab-station">
            <div class="form-row">
                <div class="form-group">
                    <label>搜尋車站</label>
                    <input type="text" id="stationIn" placeholder="輸入站名 (如：台北)" oninput="handleSearch(this, 'st')" autocomplete="off">
                    <div id="suggestions-st" class="suggestions"></div>
                    <input type="hidden" id="stationID">
                </div>
                <div class="form-group">
                    <label>過濾方向</label>
                    <select id="dirIn"><option value="">全部方向</option><option value="0">順行 (南下)</option><option value="1">逆行 (北上)</option></select>
                </div>
                <button class="btn-query" onclick="queryStation()"><i class="fas fa-search"></i> 查詢</button>
            </div>
        </div>

        <!-- 2. 站到站 -->
        <div id="tab-route" style="display:none;">
            <div class="form-row" style="grid-template-columns: 1fr 1fr auto;">
                <div class="form-group">
                    <label>起點站</label>
                    <input type="text" id="startIn" placeholder="起點" oninput="handleSearch(this, 'start')" autocomplete="off">
                    <div id="suggestions-start" class="suggestions"></div>
                    <input type="hidden" id="startID">
                </div>
                <div class="form-group">
                    <label>終點站</label>
                    <input type="text" id="endIn" placeholder="終點" oninput="handleSearch(this, 'end')" autocomplete="off">
                    <div id="suggestions-end" class="suggestions"></div>
                    <input type="hidden" id="endID">
                </div>
                <button class="btn-query" onclick="queryOD()"><i class="fas fa-ticket-alt"></i> 查票價</button>
            </div>
        </div>

        <!-- 3. 車次歷史 -->
        <div id="tab-train" style="display:none;">
            <div class="form-row" style="grid-template-columns: 1fr 1fr auto;">
                <div class="form-group">
                    <label>車次號碼</label>
                    <input type="text" id="tNoIn" placeholder="如：408" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>查詢日期 (支援近7日)</label>
                    <input type="date" id="tDateIn">
                </div>
                <button class="btn-query" onclick="queryHistory()"><i class="fas fa-clock-rotate-left"></i> 查軌跡</button>
            </div>
        </div>
    </section>

    <div class="disclaimer">
        <strong>⚠️ 提醒：</strong> 資料約有 1~3 分鐘延遲。請以車站現場廣播為準。
    </div>

    <div id="resultArea"></div>
</div>

<script src="assets/station-code-mapping.js"></script>
<script>
    const API = "https://tra-schedule-worker.weacamm.org";
    let stations = [];
    let curStation = { id: "", name: "" };

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof stationDataMap !== 'undefined') {
            stations = Object.entries(stationDataMap).map(([id, d]) => ({ id, name: d.name.replace('站','') }));
        }
        document.getElementById('tDateIn').valueAsDate = new Date();
        loadAlerts();
        setInterval(() => {
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleTimeString('en-GB');
            if (now.getSeconds() === 0 && curStation.id) queryStation(true);
        }, 1000);
    });

    async function loadAlerts() {
        try {
            const res = await fetch(`${API}/api/alerts`);
            const data = await res.json();
            if (data.length > 0) {
                document.getElementById('traAlertPanel').style.display = 'block';
                document.getElementById('traAlertContent').innerHTML = data.map(a => `<div>${a.Description}</div>`).join('');
                document.getElementById('marqueeText').innerHTML = data.map(a => `【${a.Title}】${a.Description}`).join('   ❖   ');
            }
        } catch (e) {}
    }

    function switchTab(tab) {
        document.getElementById('resultArea').innerHTML = "";
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        ['station','route','train'].forEach(t => document.getElementById(`tab-${t}`).style.display = (t === tab ? 'block' : 'none'));
    }

    function handleSearch(el, type) {
        const val = el.value.trim().replace(/台/g, '臺');
        const box = document.getElementById(`suggestions-${type}`);
        if (!val) { box.style.display = 'none'; return; }
        const matches = stations.filter(s => s.name.includes(val) || s.id.includes(val)).slice(0, 6);
        if (matches.length) {
            box.innerHTML = matches.map(s => `<div class="sugg-item" onclick="selectStation('${type}', '${s.id}', '${s.name}')"><span>${s.name}站</span><span style="color:#999">${s.id}</span></div>`).join('');
            box.style.display = 'block';
        } else box.style.display = 'none';
    }

    function selectStation(type, id, name) {
        const prefix = type === 'st' ? 'station' : type;
        document.getElementById(`${prefix}In`).value = name;
        document.getElementById(`${prefix}ID`).value = id;
        document.getElementById(`suggestions-${type}`).style.display = 'none';
        if (type === 'st') { curStation = { id, name }; }
    }

    async function queryStation(isAuto = false) {
        const id = document.getElementById('stationID').value;
        const dirFilter = document.getElementById('dirIn').value;
        if (!id) return alert("請選車站");
        if (!isAuto) document.getElementById('resultArea').innerHTML = '<div style="text-align:center; padding:40px;">⏳ 同步 D1 資料庫中...</div>';
        
        try {
            const res = await fetch(`${API}/api/liveboard/station?station=${id}`);
            const data = await res.json();
            renderBoard(data, dirFilter);
        } catch (e) { document.getElementById('resultArea').innerHTML = "❌ 連線失敗"; }
    }

    function renderBoard(data, filter) {
        const resArea = document.getElementById('resultArea');
        resArea.innerHTML = "";
        const pidsUrl = `tra-pids.html?station=${curStation.id}&name=${encodeURIComponent(curStation.name)}`;

        const renderGroup = (dir, title) => {
            let list = data.filter(t => String(t.Direction) === dir).slice(0, 10);
            if (list.length === 0) return "";
            let html = `<div class="dir-header"><span class="dir-title">${title}</span>`;
            if (filter !== "") {
                const nextDir = dir === '0' ? '1' : '0';
                html += `<button class="btn-switch" onclick="setDir('${nextDir}')">切換方向</button>`;
            }
            html += `<a href="${pidsUrl}" target="_blank" class="pids-btn">大螢幕 PIDS</a></div>`;
            list.forEach(t => {
                const delay = parseInt(t.DelayTime || 0);
                const status = t.TrainStatus == 2 ? "停駛" : (delay === 0 ? "準點" : `晚 ${delay} 分`);
                const type = t.TrainTypeName.Zh_tw.replace(/\(.*\)/g, '');
                const cls = type.includes('自強')||type.includes('普優') ? 'type-tc' : (type.includes('莒光')?'type-ck':'type-lc');
                html += `
                    <div class="train-card">
                        <div class="train-summary" onclick="showDetail('${t.TrainNo}', this)">
                            <div><span class="t-badge ${cls}">${type}</span><span class="t-no">${t.TrainNo}</span></div>
                            <div class="t-dest">往 ${t.EndingStationName}</div>
                            <div class="t-time">${t.ScheduledDepartureTime.slice(0,5)}</div>
                            <div class="t-status ${delay>0?'status-late':'status-ok'}">${status}</div>
                        </div>
                        <div class="detail-pane" id="detail-${t.TrainNo}"></div>
                    </div>`;
            });
            return html;
        };
        resArea.innerHTML = (filter==="" || filter==="1") ? renderGroup('1', "逆行 (北上/東行)") : "";
        resArea.innerHTML += (filter==="" || filter==="0") ? renderGroup('0', "順行 (南下/西行)") : "";
    }

    function setDir(d) { document.getElementById('dirIn').value = d; queryStation(); }

    async function showDetail(trainNo, el, date = "") {
        const pane = el.nextElementSibling;
        if (pane.style.display === 'block') { pane.style.display = 'none'; return; }
        document.querySelectorAll('.detail-pane').forEach(p => p.style.display = 'none');
        pane.style.display = 'block';
        pane.innerHTML = '⏳ 讀取時刻與位置...';

        try {
            const urlDate = date ? `&date=${date}` : "";
            const [schRes, liveRes] = await Promise.all([
                fetch(`${API}/api/schedule?trainNo=${trainNo}${urlDate}`).then(r => r.json()),
                fetch(`${API}/api/live?trainNo=${trainNo}`).then(r => r.json()).catch(()=>({}))
            ]);

            let histHtml = "";
            if (schRes.FinalDelayTime !== undefined) {
                const hStatus = schRes.TrainStatus == 2 ? "本日停駛" : (schRes.FinalDelayTime > 0 ? `最終晚 ${schRes.FinalDelayTime} 分` : "最終準點");
                histHtml = `<div class="hist-info">📅 歷史紀錄：${schRes.TrainDate} | ${hStatus}</div>`;
            }

            const currentPos = liveRes.TrainLiveBoards?.[0]?.StationName?.Zh_tw || "";
            let html = histHtml + '<div class="timeline">';
            let passed = true;
            schRes.StopTimes.forEach(s => {
                let cls = passed ? "passed" : "";
                if (s.StationName.Zh_tw === currentPos) { cls = "current"; passed = false; }
                if (s.StationName.Zh_tw === curStation.name) passed = false;
                html += `<div class="step ${cls}"><span>${s.StationName.Zh_tw}站</span><span>${s.ArrivalTime.slice(0,5)}</span></div>`;
            });
            pane.innerHTML = html + '</div>';
        } catch (e) { pane.innerHTML = "無法載入詳情"; }
    }

    async function queryOD() {
        const s = document.getElementById('startID').value, e = document.getElementById('endID').value;
        if(!s || !e) return alert("請選站");
        document.getElementById('resultArea').innerHTML = '⏳ 正在查詢票價...';
        try {
            const res = await fetch(`${API}/api/fare?start=${s}&end=${e}`);
            const data = await res.json();
            const fares = data[0]?.Fares || [];
            let html = `<div class="dir-header"><span class="dir-title">票價查詢結果</span></div><div class="train-card" style="padding:20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:10px;">`;
            html += fares.map(f => `<div><div style="font-size:0.8rem; color:#888;">${f.TicketType}</div><div style="font-size:1.2rem; font-weight:900; color:var(--accent);">$${f.Price}</div></div>`).join('');
            document.getElementById('resultArea').innerHTML = html + '</div>';
        } catch(e) { alert("查詢失敗"); }
    }

    async function queryHistory() {
        const no = document.getElementById('tNoIn').value, date = document.getElementById('tDateIn').value;
        if(!no || !date) return alert("請輸入車次與日期");
        document.getElementById('resultArea').innerHTML = `<div class="train-card"><div class="train-summary"><div><span class="t-badge type-ot">歷史</span><span class="t-no">${no}次</span></div><div>車次軌跡追蹤</div></div><div class="detail-pane" id="hist-detail" style="display:block"></div></div>`;
        showDetail(no, { nextElementSibling: document.getElementById('hist-detail') }, date);
    }

    document.addEventListener('click', e => {
        if (!e.target.closest('.form-group')) document.querySelectorAll('.suggestions').forEach(b => b.style.display = 'none');
    });
</script>
</body>
</html>
