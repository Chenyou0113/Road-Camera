<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵 PIDS V6.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="台鐵PIDS">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Condensed:wght@700&family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --pids-bg-primary: #000000;
            --pids-bg-secondary: #111111;
            --pids-text-primary: #ffffff;
            --pids-text-secondary: #cccccc;
            --pids-border: #333333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #4fc3f7;
            --accent-red: #ff1744;
            --accent-orange: #ff9800;
            --header-inbound: linear-gradient(to right, #000080, #0d47a1);
            --header-outbound: linear-gradient(to right, #bf360c, #e65100);
            --row-odd-bg-inbound: #000;
            --row-even-bg-inbound: #2b2b2b;
            --row-odd-bg-outbound: #000;
            --row-even-bg-outbound: #2b2b2b;
        }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
        body { background: var(--pids-bg-secondary); color: var(--pids-text-primary); font-family: 'Roboto', 'Noto Sans TC', sans-serif; font-weight: 500; min-height: 100vh; display: flex; flex-direction: column; padding: 8px; gap: 8px; overflow-x: hidden; overflow-y: auto; }
        @media (min-height:800px) and (min-width:1024px) { body { overflow: hidden; height: 100vh; } }
        
        .unified-header { width: 100%; height: 90px; background: #000; border: none; border-radius: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: none; flex-shrink: 0; border-bottom: 2px solid #333; }
        .station-branding { display: flex; align-items: center; gap: 15px; flex: 1; min-width: 0; }
        .tra-logo-img { height: 3.8rem; border-radius: 50%; border: 2px solid #fff; display: block; object-fit: contain; }
        .station-name-block { display: flex; flex-direction: row; align-items: baseline; gap: 12px; white-space: nowrap; margin: 0; padding: 0; }
        .station-name { font-size: clamp(2.2rem,4vw,3.4rem); font-weight: 700; line-height: 1; margin: 0; font-family: "Noto Sans TC", sans-serif; }
        .station-sub { font-size: calc(clamp(2.2rem,4vw,3.4rem) * 0.8); color: #4fc3f7; font-family: "Roboto", sans-serif; font-weight: 700; line-height: 1; margin: 0; padding-bottom: 2px; }
        .header-right-panel { display: flex; flex-direction: row; align-items: center; justify-content: flex-end; gap: 12px; flex-shrink: 0; }
        .datetime-block { text-align: right; display: flex; flex-direction: row; align-items: center; gap: 12px; line-height: 1; white-space: nowrap; }
        .date-text { font-size: 3rem; color: #ffffff; font-weight: 700; font-family: "Roboto Condensed", sans-serif; line-height: 1; margin: 0; }
        .time-text { font-size: 3rem; font-weight: 900; font-family: "Roboto Condensed", sans-serif; color: #ffeb3b; line-height: 1; margin: 0; }
        .btn-group { display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 1.5rem; width: 48px; height: 48px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .icon-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); transform: scale(1.05); }
        .icon-btn:active { transform: scale(0.95); }
        .unified-marquee-container { width: 100%; height: 60px; background: #e3f2fd; border: none; display: flex; align-items: center; overflow: hidden; position: relative; color: #003366; flex-shrink: 0; margin-top: 0; margin-left: -8px; margin-right: -8px; padding: 0 8px; }
        .unified-marquee-container .marquee-text { position: absolute; white-space: nowrap; height: auto; line-height: 1.2; font-size: 2.1rem; font-weight: 500; top: 50%; margin-top: -1.2rem; left: 100%; transform: translateX(0); will-change: transform; letter-spacing: 1.5px; }
        .pids-section { display: flex; width: 100%; gap: 10px; flex: 0 0 auto; min-height: 0; overflow: hidden; }
        .pids-column { flex: 1; display: flex; flex-direction: column; background: var(--pids-bg-primary); border: 3px solid var(--pids-border); border-radius: 8px; overflow: hidden; }
        .screen-body { flex: 1; display: flex; flex-direction: column; background: var(--pids-bg-primary); overflow: hidden; }
        .direction-header-1,.direction-header-0 { color: var(--pids-text-primary); padding: 5px 15px; font-size: 1.6rem; font-weight: 700; display: flex; justify-content: space-between; gap: 10px; border-bottom: 2px solid var(--pids-text-primary); flex-shrink: 0; height: 44px; align-items: center; min-width: 0; }
        .direction-header-0 { background: var(--header-outbound); }
        .direction-header-1 { background: var(--header-inbound); }
        .direction-header-0>span:first-child,.direction-header-1>span:first-child { flex-shrink: 0; }
        .dest-list { font-size: 1.6rem; font-weight: 700; flex: 1; min-width: 0; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .train-table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        .train-table th { padding: 5px; color: #fff; border-bottom: 2px solid #fff; height: 44px; font-size: 1.6rem; font-weight: 700; }
        .train-table tbody tr { border-bottom: 1px solid #333; }
        .train-table td { padding: 0 5px; vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; height: 70px; line-height: 70px; font-size: clamp(1.1rem,2vw,1.8rem); font-weight: 500; }
        .train-table td:first-child { font-family: "Roboto Condensed", sans-serif; font-weight: 700; }
        .table-1 th { background: #000080; }
        .table-1 tr:nth-child(odd) { background: var(--row-odd-bg-inbound); }
        .table-1 tr:nth-child(even) { background: var(--row-even-bg-inbound); }
        .table-0 th { background: #bf360c; }
        .table-0 tr:nth-child(odd) { background: var(--row-odd-bg-outbound); }
        .table-0 tr:nth-child(even) { background: var(--row-even-bg-outbound); }
        .marquee-footer { background: #212121; color: #ffffff; height: 52px; position: relative; overflow: hidden; border-top: 3px solid #ff9800; flex-shrink: 0; }
        .marquee-footer .marquee-text { position: absolute; white-space: nowrap; height: 52px; line-height: 52px; font-size: 1.5rem; font-family: "Noto Sans TC", sans-serif; font-weight: 500; left: 100%; top: 0; transform: translateX(0); letter-spacing: 0.5px; will-change: transform; }
        .marquee-footer .marquee-text * { font-family: "Noto Sans TC", sans-serif !important; font-size: inherit !important; font-weight: inherit !important; vertical-align: baseline; }
        .media-section { flex: 1; display: flex; gap: 10px; min-height: 200px; margin-top: 4px; }
        .media-box { flex: 1; height: 100%; background: #000; border: 3px solid #333; border-radius: 8px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        .media-label { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 10px; font-size: 1rem; z-index: 10; border-bottom-right-radius: 8px; }
        .carousel-img { width: 100%; height: 100%; object-fit: contain; position: absolute; opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 1; }
        .carousel-img.active { opacity: 1; pointer-events: auto; z-index: 2; }
        
        /* 讓影片填滿容器，保留 YouTube 原生控制列，允許點擊 */
        #videoContainer { 
            width: 100%; 
            height: 100%;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #videoContainer iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
        
        /* 影片覆蓋層設計 */
        .video-overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }
        
        .video-overlay-title {
            padding: 30px 20px 0;
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 3rem);
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            line-height: 1.2;
        }
        
        .video-overlay-title .main-title {
            color: #ffffff;
            display: block;
            margin-bottom: 8px;
        }
        
        .video-overlay-title .highlight {
            color: #00ff00;
            display: block;
            font-weight: 900;
        }
        
        .video-overlay-caption {
            padding: 30px 20px 80px;
            text-align: center;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            color: #ffffff;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        
        /* 控制按鈕組 */
        .video-controls {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 20;
            pointer-events: none;
        }
        
        .video-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            color: #ffffff;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            pointer-events: all;
        }
        
        .video-btn:hover {
            background: rgba(0,255,0,0.2);
            border-color: #00ff00;
            color: #00ff00;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }
        
        .video-btn:active {
            transform: scale(0.95);
        }
        
        .video-btn i {
            text-shadow: 0 2px 4px rgba(0,0,0,0.7);
        }
        
        /* 覆蓋大按鈕：在隱藏原生控制列時提供播放/暫停操作 */
        #videoContainer .yt-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1;
            background: rgba(0,0,0,0.25);
            cursor: pointer;
            transition: background 0.2s ease;
        }
        #videoContainer .yt-overlay:hover { background: rgba(0,0,0,0.35); }
        #videoContainer .yt-overlay i { font-size: 4rem; color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.7); }
        
        /* 車種顏色 - 使用文字顏色，支援深淺模式 */
        .type-太魯閣 { color: #e6a822 !important; }
        .type-普悠瑪 { color: #de3923 !important; }
        .type-新自強 { color: #b5b5b5 !important; }
        .type-自強 { color: #eb7405 !important; }
        .type-莒光 { color: #9c612a !important; }
        .type-專車 { color: #a3175d !important; }
        .type-區間快 { color: #6ac242 !important; }
        .type-區間 { color: #48c5db !important; }
        .type-普快 { color: #5047d1 !important; }
        .type-其他 { color: #333333 !important; }
        @media (prefers-color-scheme:light) {
            .type-太魯閣 { color: #e6a822 !important; }
            .type-普悠瑪 { color: #de3923 !important; }
            .type-新自強 { color: #b5b5b5 !important; }
            .type-自強 { color: #eb7405 !important; }
            .type-莒光 { color: #9c612a !important; }
            .type-專車 { color: #a3175d !important; }
            .type-區間快 { color: #6ac242 !important; }
            .type-區間 { color: #48c5db !important; }
            .type-普快 { color: #5047d1 !important; }
            .type-其他 { color: #333333 !important; }
        }

        .status-ontime { color: #FFFFFF !important; }
        .status-delay { color: #ff1744 !important; animation: blink 1s infinite alternate; }
        .status-cancelled { color: #ff1744; font-weight: 900; }
        .status-suspended { color: #ff1744 !important; font-weight: 900; }
        .original-time { text-decoration: line-through; color: #777; font-size: 1.2rem; line-height: 1.8rem; }
        .expected-time,.normal-time { font-size: 1.8rem; text-align: right; padding-right: 5px; font-family: "Roboto Condensed", sans-serif; font-weight: 700; }
        .expected-time { color: #ff1744; }
        @keyframes smooth-marquee { 0% { transform: translateX(0); } 100% { transform: translateX(var(--end-pos)); } }
        @media (max-width:1280px) and (min-width:901px) {
            .unified-header { height: 75px; padding: 0 12px; }
            .tra-logo-img { height: 2.8rem; }
            .header-right-panel { gap: 10px; }
            .datetime-block { gap: 10px; }
            .date-text,.time-text { font-size: 2.3rem; }
            .icon-btn { width: 44px; height: 44px; font-size: 1.3rem; }
            .unified-marquee-container { height: 50px; }
            .unified-marquee-container .marquee-text { font-size: 1.7rem; margin-top: -1.0rem; }
            .direction-header-0,.direction-header-1 { font-size: 1.4rem; padding: 8px 12px; height: 38px; }
            .dest-list { font-size: 1.4rem; font-weight: 700; }
            .train-table th { font-size: 1.4rem; padding: 5px 2px; height: 38px; font-weight: 700; }
            .train-table td { height: 58px; padding: 0 3px; font-size: clamp(1rem,1.8vw,1.5rem); }
            .train-table td:nth-child(5) { font-size: 0.9rem; }
            .normal-time,.expected-time { font-size: 1.2rem; }
        }
        @media (max-width:900px) and (min-width:700px) {
            .unified-header { height: 60px; padding: 0 10px; }
            .tra-logo-img { height: 2.2rem; }
            .header-right-panel { gap: 8px; }
            .datetime-block { gap: 8px; }
            .date-text,.time-text { font-size: 1.8rem; }
            .icon-btn { width: 38px; height: 38px; font-size: 1.1rem; }
            .unified-marquee-container { height: 42px; }
            .unified-marquee-container .marquee-text { font-size: 1.35rem; margin-top: -0.8rem; }
            .direction-header-0,.direction-header-1 { font-size: 1.2rem; padding: 6px 8px; height: 34px; }
            .dest-list { font-size: 1.2rem; font-weight: 700; }
            .train-table th { font-size: 1.2rem; padding: 3px 1px; height: 34px; font-weight: 700; }
            .train-table td { height: 48px; padding: 0 1px; font-size: clamp(0.75rem,1.5vw,1rem); }
            .train-table td:nth-child(5) { font-size: 0.65rem; }
            .normal-time,.expected-time { font-size: 0.8rem; }
            .marquee-footer { height: 48px; }
            .marquee-footer .marquee-text { font-size: 1rem; line-height: 48px; height: 48px; }
        }
        @media (max-width:699px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; }
            .unified-header { height: 70px; padding: 0 12px; gap: 8px; }
            .tra-logo-img { height: 2.8rem; }
            .station-name-block { flex-direction: column; gap: 2px; align-items: flex-start; justify-content: center; padding-top: 0; }
            .station-name { font-size: 1.7rem; line-height: 1; margin: 0; }
            .station-sub { font-size: 1.3rem; line-height: 1; margin: 0; }
            .header-right-panel { gap: 8px; }
            .datetime-block { flex-direction: column; align-items: flex-end; justify-content: center; gap: 2px; }
            .date-text { font-size: 1.2rem; color: #ffffff; line-height: 1; }
            .time-text { font-size: 1.4rem; line-height: 1; }
            .btn-group { gap: 6px; }
            .icon-btn { width: 36px; height: 36px; font-size: 1.1rem; }
            .unified-marquee-container { height: 42px; margin-left: -8px; margin-right: -8px; }
            .unified-marquee-container .marquee-text { font-size: 1.3rem; margin-top: -0.8rem; }
            .pids-section { flex-direction: column; gap: 8px; overflow-y: auto; }
            .pids-column { min-height: 240px; flex-shrink: 0; }
            
            /* 放大方向標題與開往列表 */
            .direction-header-0,.direction-header-1 { font-size: 1.25rem; padding: 6px 8px; height: 36px; }
            .dest-list { font-size: 1.25rem; font-weight: 700; }
            
            /* 放大表格標題與內容 */
            .train-table th { font-size: 1.25rem; padding: 0 4px; height: 34px; font-weight: 700; }
            .train-table td { height: 52px; padding: 0 4px; font-size: 1.3rem; }
            
            /* 將字體改為自適應縮小，並微調字距擠下長英文 */
            .train-dest-cell, .train-type-cell { 
                font-size: clamp(0.95rem, 3.2vw, 1.25rem) !important; 
                letter-spacing: -0.3px;
            }
            .train-table td:nth-child(5) { font-size: 1.1rem; } /* 備註稍微小一點 */
            .normal-time,.expected-time { font-size: 1.3rem; }
            
            /* 放大底部跑馬燈 */
            .marquee-footer { height: 48px; }
            .marquee-footer .marquee-text { font-size: 1.15rem; line-height: 48px; height: 48px; }
            
            .media-section { flex-direction: column; gap: 1px; overflow-y: visible; }
            .media-box { height: 240px; flex: 0 0 auto; margin-bottom: 20px; }
        }

        @media (max-width:480px) {
            .unified-header { height: 65px; padding: 0 10px; }
            .tra-logo-img { height: 2.4rem; }
            .station-name-block { flex-direction: column; gap: 0; padding-top: 0; justify-content: center; }
            .station-name { font-size: 1.5rem; line-height: 1; margin: 0; }
            .station-sub { font-size: 1.15rem; line-height: 1; margin: 0; }
            .header-right-panel { gap: 6px; }
            .datetime-block { flex-direction: column; align-items: flex-end; gap: 2px; }
            .date-text { font-size: 1.15rem; color: #ffffff; }
            .time-text { font-size: 1.3rem; }
            .btn-group { gap: 4px; }
            .icon-btn { width: 32px; height: 32px; font-size: 1rem; border-radius: 6px; }
            .unified-marquee-container { height: 38px; }
            .unified-marquee-container .marquee-text { font-size: 1.2rem; margin-top: -0.7rem; }
            
            /* 放大方向標題與開往列表 */
            .direction-header-0,.direction-header-1 { font-size: 1.15rem; padding: 5px 6px; height: 32px; }
            .dest-list { font-size: 1.15rem; font-weight: 700; }
            
            /* 放大表格標題與內容 */
            .train-table th { font-size: 1.15rem; height: 30px; padding: 0 2px; font-weight: 700; }
            .train-table td { height: 48px; padding: 0 2px; font-size: 1.2rem; }
            
            /* 螢幕更小時進一步縮小字體極限 */
            .train-dest-cell, .train-type-cell { 
                font-size: clamp(0.85rem, 3vw, 1.15rem) !important; 
                letter-spacing: -0.5px;
            }
            .train-table td:nth-child(5) { font-size: 1rem; }
            .normal-time,.expected-time { font-size: 1.2rem; }
            
            /* 放大底部跑馬燈 */
            .marquee-footer { height: 42px; }
            .marquee-footer .marquee-text { font-size: 1.05rem; line-height: 42px; height: 42px; }
        }
    </style>
    <script src="assets/station-code-mapping.js?v=20260424"></script>
</head>

<body>
    <div class="unified-header">
        <div class="station-branding">
            <img src="assets/TRA_logo.jpg" class="tra-logo-img" alt="TRA Logo">
            <div class="station-name-block">
                <div class="station-name" id="unifiedStationName">臺鐵車站</div>
                <div class="station-sub" id="station-en">TRA STATION</div>
            </div>
        </div>
        <div class="header-right-panel">
            <div class="datetime-block">
                <div class="date-text" id="unifiedDate">Loading...</div>
                <div class="time-text" id="unifiedTime">--:--:--</div>
            </div>
            <div class="btn-group">
                <button class="icon-btn" onclick="goBack()" title="返回查詢" aria-label="返回查詢"><i class="fas fa-home"></i></button>
                <button class="icon-btn" id="fullscreenBtn" title="切換全螢幕" aria-label="切換全螢幕"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>
    <div class="unified-marquee-container"><div class="marquee-text" id="unifiedTopMarquee">載入中...</div></div>
    <div class="pids-section">
        <div class="pids-column">
            <div class="screen-body">
                <div class="direction-header-1"><span id="dirTitle1">逆行</span><span id="destList1" class="dest-list"></span></div>
                <table class="train-table table-1" role="grid" aria-live="polite" aria-label="逆行列車即時資訊">
                    <caption class="sr-only">逆行列車出發資訊表格</caption>
                    <thead><tr><th scope="col" style="width:20%">車次</th><th scope="col" style="width:20%">開往</th><th scope="col" style="width:20%">車種</th><th scope="col" style="width:20%">實際開車</th><th scope="col" style="width:20%">備注</th></tr></thead>
                    <tbody id="body1"></tbody>

        function formatMarqueeText(t) { const s = String(t||''); return s ? s.replace(/([\u4e00-\u9fff]{1,6})\s*(?:-|－|–|—|~|～)\s*([\u4e00-\u9fff]{1,6})/g,'$1 ＜－－＞ $2') : s; }
        const PIDS_APP = {
            CONFIG: { API_BASE:"https://tra-schedule-worker.weacamm.org", INTERVALS:{CLOCK:1000,PIDS_UPDATE:60000,LANG_SWITCH:60000,TOP_MARQUEE_CHECK:60000,CAROUSEL:10000}, ROWS:{DESKTOP:5,MOBILE:5} },
            STATE: new Proxy({ currentLang:localStorage.getItem('pids_lang')||'zh', manualLangOverride:false, rowLangs:[], stationID:'', stationName:'', lastTrainData:[], stopsCache:{}, autoSwitchTimer:null, isVideoLoaded:false, _observers:new Set() }, {
                set(t,p,v) { if(p.startsWith('_')){t[p]=v;return true} const o=t[p]; t[p]=v; t._observers.forEach(cb=>{try{cb(p,v,o)}catch(e){}}); if(p==='stationID'&&v)PIDS_APP.updatePids(); if(p==='currentLang'||p==='rowLangs'||p==='lastTrainData'){clearTimeout(t._renderTimer);t._renderTimer=setTimeout(()=>refreshDisplay(),10)} return true }

            init(){const p=new URLSearchParams(location.search);this.STATE.stationID=p.get('station');if(this.STATE.stationID&&typeof stationDataMap!=='undefined'&&stationDataMap[this.STATE.stationID]){this.STATE.stationName=stationDataMap[this.STATE.stationID].name}else{this.STATE.stationName=p.get('name')||'\u81fa\u9435'}this.ui.updateStationName();this.ui.updateEnglishStationName();this.ui.updateUIStrings();this.startTimers();this.loadInitialData()},
            ui:{
                updateStationName(){const el=document.getElementById('unifiedStationName');if(el)el.textContent=PIDS_APP.STATE.stationName.replace(/車站$|站$/,'')+'車站'},
                updateEnglishStationName(){const en=document.getElementById('station-en');const id=PIDS_APP.STATE.stationID;const tc=s=>s.split(/[\s_-]+/).map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ');if(en&&typeof stationDataMap!=='undefined'&&stationDataMap[id]){const raw=stationDataMap[id].ename;const isCJCU=id==='4271'||/Chang\s*Jung\s*Christian\s*University/i.test(raw);en.textContent=isCJCU?'C.J.C.U.':tc(raw.split('_')[0])}else if(en){en.textContent="TRA"}},
                updateUIStrings(){const l=i18n[PIDS_APP.STATE.currentLang];const d1=document.getElementById('dirTitle1');const d0=document.getElementById('dirTitle0');if(d1)d1.textContent=l.inbound;if(d0)d0.textContent=l.outbound;const h=`<tr><th style="width:20%">${l.trainNo}</th><th style="width:20%">${l.dest}</th><th style="width:20%">${l.type}</th><th style="width:20%">${l.time}</th><th style="width:20%">${l.note||l.status}</th></tr>`;const t1=document.querySelector('.table-1 thead');const t0=document.querySelector('.table-0 thead');if(t1)t1.innerHTML=h;if(t0)t0.innerHTML=h}
            },
            startTimers(){setInterval(()=>this.updateClock(),this.CONFIG.INTERVALS.CLOCK);const d=60000-(Date.now()%60000);if(this.STATE.stationID){this.updatePids();setTimeout(()=>{this.updatePids();setInterval(()=>this.updatePids(),this.CONFIG.INTERVALS.PIDS_UPDATE)},d)}this.checkTopMarquee();setTimeout(()=>startMarquee('unifiedTopMarquee'),300);setTimeout(()=>{this.checkTopMarquee();setInterval(()=>this.checkTopMarquee(),this.CONFIG.INTERVALS.TOP_MARQUEE_CHECK)},d)},
            loadInitialData(){this.updateClock();updateMediaAssets()},
            updateClock(){const n=new Date();document.getElementById('unifiedTime').textContent=n.toLocaleTimeString('en-GB');document.getElementById('unifiedDate').textContent=n.toISOString().split('T')[0].replace(/-/g,'/');if(this.STATE.manualLangOverride)return;const c=Math.floor(Math.floor(n.getTime()/1000)/60)%2;const b=c===0?'zh':'en';if(this.STATE.currentLang!==b){this.STATE.currentLang=b;PIDS_APP.ui.updateUIStrings()}const r=Array(window.innerWidth<=900?this.CONFIG.ROWS.MOBILE:this.CONFIG.ROWS.DESKTOP).fill(b);if(JSON.stringify(this.STATE.rowLangs||[])!==JSON.stringify(r)){this.STATE.rowLangs=r}},
            async updatePids(){if(this._currentFetchController)this._currentFetchController.abort();this._currentFetchController=new AbortController();try{const r=await fetch(`${this.CONFIG.API_BASE}/api/liveboard/station?station=${this.STATE.stationID}`,{signal:this._currentFetchController.signal,timeout:15000});if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();const n=new Date().getHours()*60+new Date().getMinutes();let f=(Array.isArray(d)?d:[]).map(t=>{const norm={...t,TrainNo:t.TrainNo??t.No,Direction:t.Direction??t.Dir,TrainTypeName:t.TrainTypeName??t.Type,EndingStationName:t.EndingStationName??t.Dest,ScheduledDepartureTime:t.ScheduledDepartureTime??t.Dep??t.Arr,ScheduledArrivalTime:t.ScheduledArrivalTime??t.Arr??t.Dep,DelayTime:t.DelayTime??t.Delay??0,TrainStatus:t.TrainStatus??t.Status,TripLine:t.TripLine??t.Line,TrainSuspendedFlag:t.TrainSuspendedFlag??0,IsSuspended:t.IsSuspended??(t.SuspendedFlag===1),IsPartiallySuspended:t.IsPartiallySuspended??(t.TrainSuspendedFlag===2)};const ts=norm.ScheduledDepartureTime||"00:00";const sm=ts.split(':').reduce((h,m)=>h*60+Number(m),0);let am=sm+parseInt(norm.DelayTime||0);if(am<n-720)am+=1440;return{...norm,_sort:(am-n+1440)%1440,_actualMins:am,_isCancelled:String(norm.TrainStatus)==='2'||norm.IsSuspended||Number(norm.TrainSuspendedFlag)===1,_isPartiallySuspended:norm.IsPartiallySuspended||Number(norm.TrainSuspendedFlag)===2}}).filter(t=>t._actualMins>=n||t._isCancelled||t._isPartiallySuspended);f.sort((a,b)=>a._sort-b._sort);this.STATE.lastTrainData=f;refreshDisplay()}catch(e){if(e.name!=='AbortError')console.error("❌ PIDS 更新失敗:",e)}finally{this._currentFetchController=null}},
            async checkTopMarquee(){try{let u=`${this.CONFIG.API_BASE}/api/pids/marquee${this.STATE.stationID?`?station=${this.STATE.stationID}`:''}`;const r=await fetch(u);const d=await r.json();const el=document.getElementById('unifiedTopMarquee');if(d.text!==undefined&&d.text!==null){let t=d.text.replace(/\\n/g,"   ").replace(/[\r\n]+/g,"   ").replace(/\s{2,}/g,"   ").replace(/&nbsp;/g," ").replace(/&/g,"&").trim();if(el&&el.dataset.raw!==t){el.dataset.raw=t;const m=formatMarqueeText(t);if(!el.style.animationName||el.style.animationName==='none'){el.innerHTML=m;el.dataset.currentMsg=m;startMarquee('unifiedTopMarquee')}else{el.dataset.nextMsg=m}}}}catch(e){}} 
        };
        const i18n = {
            zh:{inbound:"逆行",outbound:"順行",trainNo:"車次",type:"車種",dest:"開往",time:"實際開車",status:"狀態",note:"備注",onTime:"準點",delay:"晚 {min} 分",cancelled:"停駛",partiallySuspended:"部分停駛",toward:"往",curPos:"列車目前位置：",nextPos:" ➡ ",expected:"本站預計：",arrive:" 抵達",noTrain:"目前無列車資訊",notDeparted:"列車尚未發車",detecting:"列車訊號偵測中",types:{"新自強":"新自強",自強:"自強",普悠瑪:"普悠瑪",太魯閣:"太魯閣",莒光:"莒光","區間快":"區間快",區間:"區間",專車:"專車",普快:"普快",其他:"列車"}},
            en:{inbound:"Reverse",outbound:"Forward",trainNo:"Train No.",type:"Type",dest:"Destination",time:"Dept. Time",status:"Status",note:"Remarks",onTime:"On Time",delay:"{min} min",cancelled:"Cancelled",partiallySuspended:"Partially Suspended",toward:"To ",curPos:"Current Location: ",nextPos:" ➡ ",expected:"ETA at Station: ",arrive:"",noTrain:"No Train Information",notDeparted:"Not Yet Departed",detecting:"Signal Detecting",types:{"新自強":"New T.C.",自強:"T.C.",普悠瑪:"Puyuma",太魯閣:"Taroko",莒光:"C.K.","區間快":"Fast Local",區間:"Local",專車:"Special Train",普快:"Ordinary",其他:"Train"},notes:{"每日行駛":"Daily","逢週五至日行駛":"Fri-Sun Only","逢週六、日行駛":"Sat & Sun Only","逢週六日行駛":"Weekends Only","在彰化跨線":"Via Changhua","跨線列車":"Cross-line","本車次不發售無座票":"Reserved Only","僅停靠大站":"Major Stops Only","不停靠部分小站":"Express Service"}} 
        };
        const TRA_WORKER_URL=PIDS_APP.CONFIG.API_BASE;let GLOBAL_STATION_ID="";const MAX_ROWS=PIDS_APP.CONFIG.ROWS.DESKTOP;const RWD_MAX_ROWS=PIDS_APP.CONFIG.ROWS.MOBILE;const stopsCache=PIDS_APP.STATE.stopsCache;const stationEnMap={"基隆":"Keelung","臺北":"Taipei"};
        function translateStation(zh,lc=PIDS_APP.STATE.currentLang){const s=String(zh||'').trim();if(lc==='zh')return s;let c=s.replace(/\s*\(山\)/g,"").replace(/\s*\(海\)/g,"").replace(/車站$/g,"").trim();let suf=s.includes("(山)")?" (MT)":(s.includes("(海)")?" (CO)":"");if(typeof stationDataMap!=='undefined'){for(let code in stationDataMap){if(stationDataMap[code].name===c||stationDataMap[code].name===c+"站"){const mn=stationDataMap[code].ename.split('_')[0];return(c==='長榮大學'||code==='4271'?'C.J.C.U.':mn)+suf}}}return(stationEnMap[c]||c)+suf}
        function translateNote(n){return(PIDS_APP.STATE.currentLang==='zh'||!n)?n:(i18n[PIDS_APP.STATE.currentLang].notes?.[n.trim()]||n)}
        function getViaTags(train,stops=[]){const t=Number(train?.TripLine||0);const names=(stops||[]).map(s=>s?.StationName?.Zh_tw||s?.StationName||s?.Name||"");const hasAny=keys=>keys.some(k=>names.some(n=>String(n).includes(k)));const tags=[];if(t===1)tags.push('山');if(t===2)tags.push('海');if(hasAny(['宜蘭','羅東','礁溪','頭城','蘇澳']))tags.push('宜蘭');if(hasAny(['臺東','台東','知本','池上','關山','玉里']))tags.push('臺東');if(hasAny(['枋寮','大武','太麻里','金崙','內獅','枋山']))tags.push('南迴線');return[...new Set(tags)]}
        function getInfo(t,lc=PIDS_APP.STATE.currentLang){let r=t.TrainTypeName?.Zh_tw||t.TrainTypeName||'列車';const tc=String(t.TrainTypeCode||'');const m=`${r} ${tc}`;let n=r.replace(/\(.*\)/g,'').trim();let c='其他';if(m.includes('新自強')||m.includes('3000')||['110B','110G','110H','110K','110M'].includes(tc)){n='新自強';c='新自強'}else if(m.includes('普悠瑪')){n='普悠瑪';c='普悠瑪'}else if(m.includes('太魯閣')){n='太魯閣';c='太魯閣'}else if(m.includes('莒光')){n='莒光';c='莒光'}else if(m.includes('區間快')){n='區間快';c='區間快'}else if(m.includes('區間')){n='區間';c='區間'}else if(m.includes('自強')){n='自強';c='自強'}else if(m.includes('專車')){n='專車';c='專車'}else if(m.includes('普快')){n='普快';c='普快'}return{name:i18n[lc].types[n]||n,cls:c}}
        async function fetchTrainStops(no){if(stopsCache[no])return stopsCache[no];try{let d=await fetch(`${TRA_WORKER_URL}/api/schedule?trainNo=${no}`).then(r=>r.json());let st=(Array.isArray(d)&&d.length&&d[0].StopTimes)?d[0].StopTimes:(d.StopTimes||null);if(st){stopsCache[no]=st;return st}}catch(e){}return[]}
        function getExpectedTime(ts,delay){if(!ts||delay===0)return ts;const[h,m]=ts.split(':').map(Number);const t=h*60+m+delay;return`${String(Math.floor(t/60)%24).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`}
        
        // ==========================================
        // 📺 多媒體區塊 (圖片輪播 + YouTube 播放器模組)
        // ==========================================
        let isVideoLoaded = false;
        let carTimer;
        
        // 1. 從 API 更新多媒體資源
        async function updateMediaAssets() {
            try {
                const r = await fetch(`${TRA_WORKER_URL}/api/pids/assets`);
                if (r.ok) {
                    const d = await r.json();
                    if (d.images?.length > 0) setupCarousel(d.images);
                    if (!isVideoLoaded) {
                        const v = Array.isArray(d.video) ? d.video : (d.video ? [d.video] : []);
                        setupVideo(v);
                        isVideoLoaded = true;
                    }
                }
            } catch (e) {
                console.error("無法取得多媒體資源:", e);
            }
        }
        
        // 2. 圖片輪播器
        function setupCarousel(imgs) {
            const box = document.getElementById('carouselBox');
            box.querySelectorAll('img').forEach(i => i.remove());
            imgs.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = i === 0 ? 'carousel-img active' : 'carousel-img';
                box.appendChild(img);
            });
            let idx = 0;
            clearInterval(carTimer);
            carTimer = setInterval(() => {
                const list = box.querySelectorAll('img');
                if (list.length > 1) {
                    list[idx].classList.remove('active');
                    idx = (idx + 1) % list.length;
                    list[idx].classList.add('active');
                }
            }, 10000);
        }

        // ==========================================
        // 🎬 YouTube IFrame API 官方核心模組 (手動開始 + 播完自動連播)
        // ==========================================
        let ytPlayer = null;
        let ytPlaylist = [];
        let currentPlaylistIndex = 0;
        let isYtApiReady = false;
        let isPlaylistPlaying = false; // 🌟 新增：記錄使用者是否已經按下「播放」

        // 1. 提取 YouTube 影片 ID
        function extractYoutubeId(input) {
            const raw = String(input || '').trim();
            if (!raw) return null;
            if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
            const match = raw.match(/(?:v=|v\/|vi=|vi\/|youtu\.be\/|embed\/|e\/|shorts\/)([a-zA-Z0-9_-]{11})/i);
            return match ? match[1] : null;
        }

        // 2. 載入官方 YouTube IFrame API 腳本
        function loadYouTubeAPI() {
            if (document.getElementById('yt-api-script')) return;
            const tag = document.createElement('script');
            tag.id = 'yt-api-script';
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        }

        // 3. YouTube 官方 API 準備就緒的回呼函數 (必須是全域變數)
        window.onYouTubeIframeAPIReady = function() {
            isYtApiReady = true;
            console.log("✅ YouTube API 載入完成");
            if (ytPlaylist.length > 0) {
                initOrUpdatePlayer();
            }
        };

        // 4. 設定影片清單
        function setupVideo(urls) {
            const con = document.getElementById('videoContainer');
            if (!con) return;
            
            const ids = urls.map(url => extractYoutubeId(url)).filter(Boolean);
            
            if (ids.length > 0) {
                ytPlaylist = ids;
                if (!isYtApiReady) {
                    loadYouTubeAPI();
                } else {
                    initOrUpdatePlayer();
                }
            } else {
                con.innerHTML = `<div style="padding:20px;color:#b0bec5;text-align:center;line-height:1.8;">📹 暫無影音內容</div>`;
            }
        }

        // 5. 初始化或切換播放器
        function initOrUpdatePlayer() {
            const con = document.getElementById('videoContainer');
            if (ytPlaylist.length === 0 || !isYtApiReady) return;

            const videoId = ytPlaylist[currentPlaylistIndex];

            // 🌟 如果播放器已經存在，根據目前的播放狀態決定是「直接播放」還是「只載入縮圖」
            if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
                if (isPlaylistPlaying) {
                    console.log(`▶️ 連播模式：自動播放第 ${currentPlaylistIndex + 1} 部影片: ${videoId}`);
                    ytPlayer.loadVideoById(videoId); // loadVideoById 會直接開始播放
                } else {
                    console.log(`⏳ 暫停模式：僅載入第 ${currentPlaylistIndex + 1} 部影片縮圖: ${videoId}`);
                    ytPlayer.cueVideoById(videoId);  // cueVideoById 只載入不播放
                }
                return;
            }

            console.log(`⏳ 首次載入影片: ${videoId} (等待手動播放)`);

            // 重置容器內容，移除中間的播放按鈕，只保留切換按鈕
            con.innerHTML = `
                <div id="yt-player-div"></div>
                <div class="video-controls">
                    <button class="video-btn" id="prevVideoBtn" title="上一部 (按 3)"><i class="fas fa-chevron-left"></i></button>
                    <button class="video-btn" id="nextVideoBtn" title="下一部 (按 5)"><i class="fas fa-chevron-right"></i></button>
                </div>
            `;

            // 綁定按鈕事件
            document.getElementById('prevVideoBtn').addEventListener('click', playPrevVideo);
            document.getElementById('nextVideoBtn').addEventListener('click', playNextVideo);

            // 初始化官方播放器
            ytPlayer = new YT.Player('yt-player-div', {
                width: '100%',
                height: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,       // 🚫 首次載入一律不自動播放
                    'mute': 1,           // 靜音
                    'controls': 0,       // 🚫 關閉 YouTube 原生控制列
                    'rel': 0,            // 不顯示相關影片
                    'modestbranding': 1, // 隱藏 YouTube Logo
                    'playsinline': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onStateChange': function(event) {
                        // 確保狀態同步
                        if (event.data === 1) isPlaylistPlaying = true;
                        if (event.data === 2) isPlaylistPlaying = false; // 2=暫停
                        
                        // 🌟 0 = ENDED (播完時)
                        if (event.data === 0) {
                            console.log('✅ 影片播放完畢，自動連播下一部');
                            isPlaylistPlaying = true; // 確保連播旗標開啟
                            playNextVideo();          // 載入下一部，因為旗標開啟，所以會自動播
                        }
                    }
                }
            });
        }

        // 6. 播放控制邏輯
        function togglePlayPause() {
            if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
            const state = ytPlayer.getPlayerState();
            
            if (state === 1 || state === 3) { // 正在播放或緩衝中
                isPlaylistPlaying = false;    // 標記為暫停
                ytPlayer.pauseVideo();
            } else {                          // 暫停或尚未開始
                isPlaylistPlaying = true;     // 標記為播放中
                ytPlayer.playVideo();
            }
        }

        function playNextVideo() {
            if (ytPlaylist.length === 0) return;
            currentPlaylistIndex = (currentPlaylistIndex + 1) % ytPlaylist.length;
            initOrUpdatePlayer();
        }

        function playPrevVideo() {
            if (ytPlaylist.length === 0) return;
            currentPlaylistIndex = (currentPlaylistIndex - 1 + ytPlaylist.length) % ytPlaylist.length;
            initOrUpdatePlayer();
        }

        function startMarquee(id){const el=document.getElementById(id);if(!el)return;const c=el.parentElement;el.style.animation='none';el.style.transition='none';requestAnimationFrame(()=>{requestAnimationFrame(()=>{const tw=el.scrollWidth;const cw=c.clientWidth;const sm=id==='unifiedTopMarquee'?1.0:0.9;const bps=window.innerWidth<=900?120:180;const pps=bps*sm;const td=tw+cw;const d=Math.max(5,td/pps);el.style.setProperty('--end-pos',`-${td}px`);el.style.animation=`smooth-marquee ${d}s linear infinite`})})}
        function refreshDisplay(){const d=PIDS_APP.STATE.lastTrainData;let t1=d.filter(t=>t.Direction==1);let t0=d.filter(t=>t.Direction==0);renderTable('1',t1);renderTable('0',t0);updateMarquee('marquee1',t1);updateMarquee('marquee0',t0);populateDestinationMarquee('destList1',t1,1);populateDestinationMarquee('destList0',t0,0)}
        function populateDestinationMarquee(id,list,direction){const el=document.getElementById(id);const l=i18n[PIDS_APP.STATE.currentLang];if(!list||!list.length){el.innerText=l.noTrain;return}let d=list.slice(0,3).map(t=>translateStation(t.EndingStationName));let u=[...new Set(d)].join(PIDS_APP.STATE.currentLang==='zh'?'、':', ');el.innerText=u.length>0?(PIDS_APP.STATE.currentLang==='zh'?'開往: ':'To: ')+u:l.noTrain}
        function renderTable(dir,list){const tb=document.getElementById(`body${dir}`);const tpl=document.getElementById('train-row-template');while(tb.firstChild)tb.removeChild(tb.firstChild);const isMob=window.innerWidth<=900;const max=isMob?RWD_MAX_ROWS:MAX_ROWS;const frag=document.createDocumentFragment();list.slice(0,max).forEach((t,i)=>{const rc=(PIDS_APP.STATE.rowLangs&&PIDS_APP.STATE.rowLangs[i])||PIDS_APP.STATE.currentLang;const l=i18n[rc];const info=getInfo(t,rc);const delay=parseInt(t.DelayTime||0);const isCancel=String(t.TrainStatus)==='2'||t.IsSuspended||Number(t.TrainSuspendedFlag)===1;const isPartial=t.IsPartiallySuspended||Number(t.TrainSuspendedFlag)===2;let status="",cls="";if(isCancel){status=l.cancelled;cls='status-cancelled'}else if(isPartial){status=l.partiallySuspended;cls='status-suspended'}else if(delay>=120){status=rc==='zh'?"時間未定":"Delayed";cls='status-delay'}else if(delay>0){status=l.delay.replace('{min}',delay);cls='status-delay'}else{status=l.onTime;cls='status-ontime'}let ts=(t.ScheduledDepartureTime||"").slice(0,5);let td=ts;let isDel=false;if(delay>0&&!isCancel){isDel=true;if(delay>=120){td="--:--"}else{let[h,m]=ts.split(':').map(Number);let min=h*60+m+delay;td=`${String(Math.floor(min/60)%24).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`}}let dest=translateStation(t.EndingStationName,rc);const clone=tpl.content.cloneNode(true);const cells=clone.querySelectorAll('td');cells[0].textContent=String(t.TrainNo);cells[1].textContent=dest;cells[2].textContent=info.name;cells[2].className='train-type-cell type-'+info.cls;const span=document.createElement('span');span.className=isDel?'expected-time':'normal-time';span.textContent=td;cells[3].appendChild(span);cells[4].textContent=(isCancel||isPartial)?status:((t.Note&&String(t.Note).trim().length>0)?translateNote(String(t.Note).trim()):status);cells[4].className=(isCancel||isPartial)?cls:((t.Note&&String(t.Note).trim().length>0)?'':cls);frag.appendChild(clone)});for(let i=Math.min(list.length,max);i<max;i++)frag.appendChild(tpl.content.cloneNode(true));tb.appendChild(frag)}
        async function updateMarquee(elId,list){const el=document.getElementById(elId);const l=i18n[PIDS_APP.STATE.currentLang];let msg="";if(!list||!list.length){msg=l.noTrain}else{let t=list[0];let info=getInfo(t);let delay=parseInt(t.DelayTime||0);let isCancel=String(t.TrainStatus)==='2'||t.IsSuspended||Number(t.TrainSuspendedFlag)===1;let isPartial=t.IsPartiallySuspended||Number(t.TrainSuspendedFlag)===2;let dest=translateStation(t.EndingStationName);if(isCancel){msg=PIDS_APP.STATE.currentLang==='zh'?`🚫 ${t.TrainNo}次 ${info.name} ${dest} 本日停駛`:`🚫 Train ${t.TrainNo} ${info.name} to ${dest} CANCELLED`}else if(isPartial){msg=PIDS_APP.STATE.currentLang==='zh'?`⚠️ ${t.TrainNo}次 ${info.name} ${dest} 部分停駛`:`⚠️ Train ${t.TrainNo} ${info.name} to ${dest} PARTIALLY SUSPENDED`}else{const tn=PIDS_APP.STATE.currentLang==='zh'?`${t.TrainNo}次`:`Train ${t.TrainNo}`;const sep=`<span style="margin:0 15px;color:#fff">|</span>`;msg=`<span style="color:#fff;font-weight:bold">${tn} ${info.name} ${l.toward}${dest}</span>${sep}`;if(delay>=60)msg+=`<span style="color:#fff;font-weight:bold">${PIDS_APP.STATE.currentLang==='zh'?'● 營運異常：請注意上方通阻公告或洽站務員 ●':'● Service Disruption: Please check alerts ●'}</span>${sep}`;let live=null;try{live=await fetch(`${TRA_WORKER_URL}/api/live?trainNo=${t.TrainNo}`).then(r=>r.json()).catch(()=>null);if(live?.TrainLiveBoards?.length>0)live=live.TrainLiveBoards[0];else if(live?.station!==undefined)live={StationName:{Zh_tw:live.station},DelayTime:live.delay??0}}catch(e){}let loc="",locD="";let rs=live?.StationName?.Zh_tw||live?.StationName||live?.station||"";if(typeof rs==='object')rs=rs.Zh_tw||rs.name||"";const last=String(rs).trim();if(last){const lastT=translateStation(last);const ld=live?.DelayTime??live?.delay??0;let stops=await fetchTrainStops(t.TrainNo);let next="";if(stops&&stops.length>0){const idx=stops.findIndex(s=>{let sn=s.StationName?.Zh_tw||s.StationName||s.Name||"";if(typeof sn==='object')sn=sn.Zh_tw||"";return String(sn).trim()===last});if(idx!==-1&&idx<stops.length-1){let ns=stops[idx+1];let nn=ns.StationName?.Zh_tw||ns.StationName||ns.Name||"";if(typeof nn==='object')nn=nn.Zh_tw||"";next=translateStation(String(nn).trim())}}loc=next?`${l.curPos}${lastT}${l.nextPos}${next}`:`${l.curPos}${lastT}`;if(ld>0)locD=PIDS_APP.STATE.currentLang==='zh'?` (晚 ${ld} 分)`:` (${ld} min)`}else{const st=String(t.ScheduledDepartureTime||'').slice(0,5);const sp=st.split(':').map(Number);const sm=Number.isFinite(sp[0])&&Number.isFinite(sp[1])?(sp[0]*60+sp[1]):null;const nm=new Date().getHours()*60+new Date().getMinutes();loc=(Boolean(t.IsTomorrow)||(sm!==null&&sm>nm))?l.notDeparted:l.detecting}msg+=`<span style="color:#fff">${loc}</span>`;if(locD)msg+=`<span style="color:#ff1744;font-weight:bold">${locD}</span>`;msg+=sep;let at=t.ScheduledArrivalTime||t.ScheduledDepartureTime||"00:00";let stops=await fetchTrainStops(t.TrainNo);const via=getViaTags(t,stops);if(via.length>0){const vt=PIDS_APP.STATE.currentLang==='zh'?`經由${via.map(tag=>tag.endsWith('線')?tag:`${tag}線`).join('、')}`:`Via ${via.map(tag=>({山:'Mountain Line',海:'Coastal Line',宜蘭:'Yilan Line',臺東:'Taitung Line','南迴線':'South-Link Line'}[tag]||`${tag} Line`)).join(' / ')}`;msg+=`<span style="color:#fff;font-weight:bold">${vt}</span>${sep}`}if(stops&&stops.length>0){let ss=stops.find(s=>String(s.StationID)===GLOBAL_STATION_ID);if(ss&&ss.ArrivalTime)at=ss.ArrivalTime.slice(0,5)}const pt=getExpectedTime(at,delay);msg+=`<span style="color:#fff">${l.expected}</span><span style="color:${delay>0?'#ff1744':'#ffffff'};font-weight:bold">${pt}${l.arrive} (${delay>0?l.delay.replace('{min}',delay):l.onTime})</span>`;if(t.Note&&t.Note.trim().length>0)msg+=`${sep}<span style="color:#fff;font-weight:bold">${PIDS_APP.STATE.currentLang==='zh'?'備註：':'Note: '}${translateNote(t.Note)}</span>`;if(stops&&stops.length>0){let idx=stops.findIndex(s=>String(s.StationID)===GLOBAL_STATION_ID);const fs=(s)=>{const n=translateStation(s.StationName.Zh_tw,PIDS_APP.STATE.currentLang);let t=s.ArrivalTime?s.ArrivalTime.slice(0,5):"";if(t&&delay>0)return`${n}(<span style="color:#ff1744">${getExpectedTime(t,delay)}</span>)`;return t?`${n}(${t})`:n};if(idx!==-1){let next=stops.slice(idx+1).map(fs).join('、');if(next)msg+=`${sep}<span style="color:#fff">${PIDS_APP.STATE.currentLang==='zh'?'沿途停靠：':'Stops: '}${next}</span>`;else msg+=`${sep}<span style="color:#fff">${PIDS_APP.STATE.currentLang==='zh'?'▶ 終點站':'▶ Terminal'}</span>`}else{let all=stops.slice(1).map(fs).join('、');if(all)msg+=`${sep}<span style="color:#fff">${PIDS_APP.STATE.currentLang==='zh'?'沿途停靠：':'Stops: '}${all}</span>`}}}}if(el.dataset.currentMsg===msg||el.dataset.nextMsg===msg)return;el.innerHTML=msg;el.dataset.currentMsg=msg;el.dataset.nextMsg='';startMarquee(elId)} 
        function goBack(){if(window.history.length>1){window.history.back()}else{window.location.href='tra_liveboard.html'}}
        document.addEventListener('DOMContentLoaded',()=>{
            PIDS_APP.init();
            const p=new URLSearchParams(location.search);
            GLOBAL_STATION_ID=p.get('station')||PIDS_APP.STATE.stationID;
            
            document.querySelectorAll('.marquee-text').forEach(el=>{
                el.addEventListener('animationiteration',()=>{
                    if(el.dataset.nextMsg){
                        el.innerHTML=el.dataset.nextMsg;
                        el.dataset.currentMsg=el.dataset.nextMsg;
                        el.dataset.nextMsg='';
                        startMarquee(el.id)
                    }
                })
            });
            
            const btn=document.getElementById('fullscreenBtn');
            const icon=btn.querySelector('i');
            function toggle(){
                const d=document.documentElement;
                if(!document.fullscreenElement){
                    const req=d.requestFullscreen||d.mozRequestFullScreen||d.webkitRequestFullScreen||d.msRequestFullscreen;
                    if(req)req.call(d).catch(()=>{})
                }else{
                    if(document.exitFullscreen)document.exitFullscreen()
                }
            }
            btn.addEventListener('click',toggle);
            document.addEventListener('fullscreenchange',()=>{
                if(document.fullscreenElement){
                    icon.classList.replace('fa-expand','fa-compress');
                    btn.title="取消全螢幕"
                }else{
                    icon.classList.replace('fa-compress','fa-expand');
                    btn.title="切換全螢幕"
                }
            });
            
            // 快捷鍵綁定
            document.addEventListener('keydown',e=>{
                if(e.key==='F11'){
                    e.preventDefault();
                    toggle()
                }
                // 按下 4 播放視頻
                if(e.key==='4'){
                    e.preventDefault();
                    console.log('按下快捷鍵 4 - 播放視頻');
                    if(ytPlaylist.length === 0){
                        alert('請先設定影片清單');
                        return;
                    }
                    startVideoPlayback();
                }
                // 按下 5 播放下一部
                if(e.key==='5'){
                    e.preventDefault();
                    console.log('按下快捷鍵 5 - 播放下一部');
                    playNextVideo();
                }
                // 按下 3 播放上一部
                if(e.key==='3'){
                    e.preventDefault();
                    console.log('按下快捷鍵 3 - 播放上一部');
                    playPrevVideo();
                }
            })
        });
    </script>
