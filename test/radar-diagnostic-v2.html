<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 雷達診斷工具 v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .station-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #667eea;
        }

        .station-card h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .station-code {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-test {
            background: #667eea;
            color: white;
        }

        .btn-test:hover {
            background: #5568d3;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-test:active {
            transform: scale(0.98);
        }

        .btn-copy {
            background: #48bb78;
            color: white;
            flex: 0.3;
        }

        .btn-copy:hover {
            background: #38a169;
        }

        .output-section {
            margin-top: 15px;
            background: #f7fafc;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .output-section.active {
            display: block;
        }

        .output-section.loading {
            color: #667eea;
        }

        .output-section.success {
            background: #f0fff4;
            border-left: 3px solid #48bb78;
        }

.output-section.error {
    background: #fff5f5;
    border-left: 3px solid #f56565;
    color: #c53030;
}

/* 添加無資料樣式 */
.output-section.warn {
    background: #fffaf0;
    border-left: 3px solid #f6ad55;
    color: #7c2d12;
}

        .log-line {
            margin: 5px 0;
            line-height: 1.4;
            word-break: break-word;
        }

        .log-line.info {
            color: #2d3748;
        }

        .log-line.success {
            color: #276749;
        }

        .log-line.error {
            color: #742a2a;
        }

        .log-line.warn {
            color: #7c2d12;
        }

        .divider {
            margin: 20px 0;
            border-top: 1px solid #e2e8f0;
        }

        .console-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .console-section h3 {
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #console {
            background: #1a202c;
            color: #68d391;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .control-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .control-section h3 {
            color: #333;
            margin-bottom: 12px;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .image-preview {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 8px;
            background: #f7fafc;
            padding: 10px;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
        }

        @media (max-width: 768px) {
            .stations-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <h1>🔧 雷達診斷工具 v2 - 完整 API 測試</h1>
            <p>測試每個雷達站的 API 連接、資料格式、XML 解析和圖片顯示</p>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="stat-total">5</div>
                    <div class="stat-label">總雷達站</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-success">0</div>
                    <div class="stat-label">成功</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-failed">0</div>
                    <div class="stat-label">失敗</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-pending">5</div>
                    <div class="stat-label">待測試</div>
                </div>
            </div>
        </div>

        
        <div class="control-section">
            <h3>🎛️ 控制</h3>
            <div class="control-buttons">
                <button class="btn-primary" onclick="testAllRadars()">🚀 測試全部雷達</button>
                <button class="btn-secondary" onclick="clearAllOutput()">🗑️ 清除所有輸出</button>
                <button class="btn-secondary" onclick="exportResults()">💾 匯出結果</button>
            </div>
        </div>

        
        <div class="stations-grid" id="stations-container"></div>

        
        <div class="console-section">
            <h3>📋 瀏覽器控制台 (實時)</h3>
            <div id="console"></div>
        </div>
    </div>

    <script>
        // 雷達站點配置
        const RADAR_STATIONS = {
            '001': { name: '水林雷達', type: '個別', county: '雲林縣' },
            '002': { name: '南屯雷達', type: '個別', county: '台中市' },
            '003': { name: '林園雷達', type: '個別', county: '高雄市' },
            '101': { name: '台灣附近雷達', type: '整合', county: '全台' },
            '102': { name: '更大範圍雷達', type: '整合', county: '全台' }
        };

        // CWA API 配置
        const CWA_CONFIG = {
            baseUrl: 'https://opendata.cwa.gov.tw/fileapi/v1/opendataapi',
            apiKey: 'CWA-675CED45-09DF-4249-9599-B9B5A5AB761A',
            dataIds: {
                '001': 'O-A0084-001',
                '002': 'O-A0084-002',
                '003': 'O-A0084-003',
                '101': 'O-A0084-101',
                '102': 'O-A0084-102'
            }
        };

        // 測試結果存儲
        const testResults = {};

        // 自定義控制台日誌
        const consoleLogs = [];
        const origLog = console.log;
        const origError = console.error;
        const origWarn = console.warn;

        console.log = function(...args) {
            origLog.apply(console, args);
            logToConsole(args.join(' '), 'info');
        };
        console.error = function(...args) {
            origError.apply(console, args);
            logToConsole(args.join(' '), 'error');
        };
        console.warn = function(...args) {
            origWarn.apply(console, args);
            logToConsole(args.join(' '), 'warn');
        };

        function logToConsole(message, type = 'info') {
            consoleLogs.push({ message, type, time: new Date().toLocaleTimeString('zh-TW') });
            updateConsoleDisplay();
        }

        function updateConsoleDisplay() {
            const consoleEl = document.getElementById('console');
            consoleEl.innerHTML = consoleLogs.slice(-50).map(log => 
                `<div style="color: ${getLogColor(log.type)}">[${log.time}] ${log.message}</div>`
            ).join('');
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function getLogColor(type) {
            const colors = { info: '#68d391', error: '#fc8181', warn: '#f6ad55' };
            return colors[type] || '#68d391';
        }

        // 初始化 UI
        function initUI() {
            const container = document.getElementById('stations-container');
            Object.keys(RADAR_STATIONS).forEach(code => {
                const station = RADAR_STATIONS[code];
                const card = document.createElement('div');
                card.className = 'station-card';
                card.id = `station-${code}`;
                card.innerHTML = `
                    <h3>
                        ${station.type === '整合' ? '🌐' : '🎯'}
                        ${station.name}
                        <span class="station-code">${code}</span>
                    </h3>
                    <div class="button-group">
                        <button class="btn-test" onclick="testStation('${code}')">📡 測試 API</button>
                        <button class="btn-copy" onclick="copyStationCode('${code}')">📋</button>
                    </div>
                    <div class="output-section" id="output-${code}"></div>
                    <div class="image-preview" id="image-${code}"></div>
                `;
                container.appendChild(card);
            });
        }

        // 測試單個雷達
        async function testStation(code) {
            const outputEl = document.getElementById(`output-${code}`);
            const imageEl = document.getElementById(`image-${code}`);
            const station = RADAR_STATIONS[code];

            outputEl.innerHTML = '⏳ 正在測試...';
            outputEl.classList.add('active', 'loading');
            imageEl.innerHTML = '';

            try {
                console.log(`\n${'='.repeat(60)}`);
                console.log(`開始測試站點 ${code}: ${station.name}`);
                console.log(`${'='.repeat(60)}`);

                // 構建 URL
                const dataId = CWA_CONFIG.dataIds[code];
                const url = `${CWA_CONFIG.baseUrl}/${dataId}?Authorization=${CWA_CONFIG.apiKey}&downloadType=WEB&format=JSON`;
                console.log(`🔗 API URL: ${url.substring(0, 100)}...`);

                // 發送請求
                console.log(`📡 發送 HTTP 請求...`);
// 添加重試機制和CORS檢查
async function fetchWithRetry(url, options, retries = 3) {
    for (let i = 0; i < retries; i++) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000); // 10秒超時
            
            const response = await fetch(url, { 
                ...options,
                signal: controller.signal 
            });
            
            clearTimeout(timeoutId);
            return response;
            
        } catch (error) {
            if (error.message.includes('Failed to fetch')) {
                console.warn(`嘗試 ${i+1}/${retries} 失敗: 可能是 CORS 或網路問題`);
            } else if (error.name === 'AbortError') {
                throw new Error('請求超時');
            } else {
                throw new Error(`網路錯誤: ${error.message}`);
            }
        }
        
        if (i < retries - 1) {
            await new Promise(resolve => setTimeout(resolve, 2000)); // 重試間隔2秒
        }
    }
    throw new Error('多次重試仍失敗，請檢查網路或CORS設置');
}

const response = await fetchWithRetry(url, {});

// 合併響應處理
const [contentType, rawBody] = await Promise.all([
    response.headers.get('content-type'),
    response.text()
]);

console.log(`📄 Content-Type: ${contentType}`);
console.log(`📦 回應內容: ${rawBody.substring(0, 200)}...`);

if (!response.ok) {
    let errorMessage = `HTTP 錯誤 ${response.status}`;
    if (rawBody) {
        errorMessage += `: ${rawBody.substring(0, 100)}`;
    } else if (response.statusText) {
        errorMessage += ` (${response.statusText})`;
    }
    throw new Error(errorMessage);
}

const responseBody = rawBody;

// 實現無資料顯示函數
function displayNoData(code, outputEl) {
    const station = RADAR_STATIONS[code];
    outputEl.classList.remove('loading');
    outputEl.classList.add('warn'); // 使用警告樣式
    outputEl.innerHTML = `
        <div class="log-line warn">⚠️ 無資料</div>
        <div class="log-line">📍 ${station.name} (${station.county})</div>
        <div class="log-line">🕒 ${new Date().toLocaleString('zh-TW')}</div>
        <div class="log-line">ℹ️ API 返回空數據</div>
    `;
}

if (!responseBody || responseBody.length < 50) {
    // 特殊處理無資料情況
    console.warn('⚠️ 無可用資料');
    displayNoData(code, outputEl);
    testResults[code] = { success: false, error: '無資料', emptyResponse: true };
    updateStats();
    return;
}
// 移除重複的錯誤檢查

                // 讀取回應
// 移除重複聲明，直接使用 responseBody
console.log(`📏 回應大小: ${responseBody.length} 字符`);
console.log(`📄 前 200 字符: ${responseBody.substring(0, 200)}`);

                // 偵測格式
                let result = null;
// 使用統一的 responseBody 變量
if (responseBody.includes('<?xml') || responseBody.includes('<cwaopendata') || responseBody.includes('<dataset')) {
    console.log(`✅ 偵測到 XML 格式`);
    result = parseXML(responseBody);
} else if (responseBody.trim().startsWith('{')) {
    console.log(`✅ 偵測到 JSON 格式`);
    result = parseJSON(responseBody);
} else {
    throw new Error(`未知的資料格式: ${responseBody.substring(0, 200)}`);
}

                if (result.success) {
                    console.log(`✅ 成功解析資料`);
                    console.log(`🖼️ 圖片 URL: ${result.imageUrl.substring(0, 80)}...`);
                    console.log(`🕐 時間戳: ${result.timestamp}`);

                    displayResults(code, result, outputEl, imageEl);
                    testResults[code] = { success: true, ...result };
                    updateStats();
                } else {
                    throw new Error(`解析失敗: ${result.error}`);
                }

            } catch (error) {
                console.error(`❌ 錯誤: ${error.message}`);
                console.error(error.stack);
                
                outputEl.classList.remove('loading');
                outputEl.classList.add('error');
                outputEl.innerHTML = `❌ 測試失敗: ${error.message}`;
                
                testResults[code] = { success: false, error: error.message };
                updateStats();
            }
        }

        // 解析 XML
        function parseXML(xmlText) {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'application/xml');

                if (xmlDoc.getElementsByTagName('parsererror').length > 0) {
                    throw new Error('XML 解析錯誤');
                }

                const getElement = (tag) => xmlDoc.getElementsByTagName(tag)[0];
                
                const productUrl = getElement('ProductURL')?.textContent;
                const dateTime = getElement('DateTime')?.textContent;
                const resourceDesc = getElement('resourceDesc')?.textContent;

                console.log(`📋 提取的欄位:`);
                console.log(`   - ProductURL: ${productUrl?.substring(0, 60)}...`);
                console.log(`   - DateTime: ${dateTime}`);
                console.log(`   - resourceDesc: ${resourceDesc}`);

                if (!productUrl) {
                    throw new Error('ProductURL 為空');
                }

                return {
                    success: true,
                    imageUrl: productUrl,
                    timestamp: dateTime || new Date().toISOString(),
                    resourceDesc: resourceDesc || ''
                };
            } catch (error) {
                console.error(`❌ XML 解析失敗: ${error.message}`);
                return { success: false, error: error.message };
            }
        }

        // 解析 JSON
        function parseJSON(jsonText) {
            try {
                const jsonData = JSON.parse(jsonText);
                console.log(`📋 JSON 結構: ${JSON.stringify(jsonData).substring(0, 100)}...`);

                let imageUrl = null;
                let dateTime = null;

                if (jsonData.data?.length > 0) {
                    imageUrl = jsonData.data[0].url || jsonData.data[0].imageUrl;
                    dateTime = jsonData.data[0].importDate;
                } else if (jsonData.records?.length > 0) {
                    imageUrl = jsonData.records[0].ProductURL;
                    dateTime = jsonData.records[0].DateTime;
                }

                if (!imageUrl) {
                    throw new Error('無法找到圖片 URL');
                }

                return {
                    success: true,
                    imageUrl: imageUrl,
                    timestamp: dateTime || new Date().toISOString()
                };
            } catch (error) {
                console.error(`❌ JSON 解析失敗: ${error.message}`);
                return { success: false, error: error.message };
            }
        }

        // 顯示結果
        function displayResults(code, result, outputEl, imageEl) {
            const time = new Date(result.timestamp).toLocaleString('zh-TW');
            
            outputEl.classList.remove('loading');
            outputEl.classList.add('success');
            outputEl.innerHTML = `
                <div class="log-line success">✅ 成功</div>
                <div class="log-line">🕐 ${time}</div>
                <div class="log-line">📄 ${result.resourceDesc}</div>
                <div class="log-line">🔗 URL: ${result.imageUrl.substring(0, 80)}...</div>
            `;

            // 嘗試顯示圖片
            imageEl.innerHTML = `<img src="${result.imageUrl}" alt="雷達圖" onerror="this.parentElement.innerHTML='❌ 圖片載入失敗'">`;
        }

        // 測試所有雷達
        async function testAllRadars() {
            for (const code of Object.keys(RADAR_STATIONS)) {
                await testStation(code);
                await new Promise(resolve => setTimeout(resolve, 1000)); // 延遲 1 秒
            }
        }

        // 複製站點代碼
        function copyStationCode(code) {
            navigator.clipboard.writeText(code).then(() => {
                console.log(`已複製: ${code}`);
            });
        }

        // 清除所有輸出
        function clearAllOutput() {
            Object.keys(RADAR_STATIONS).forEach(code => {
                document.getElementById(`output-${code}`).innerHTML = '';
                document.getElementById(`output-${code}`).classList.remove('active', 'loading', 'success', 'error');
                document.getElementById(`image-${code}`).innerHTML = '';
            });
            consoleLogs.length = 0;
            updateConsoleDisplay();
            updateStats();
        }

        // 更新統計
        function updateStats() {
            const total = Object.keys(testResults).length;
            const success = Object.values(testResults).filter(r => r.success).length;
            const failed = total - success;
            const pending = 5 - total;

            document.getElementById('stat-success').textContent = success;
            document.getElementById('stat-failed').textContent = failed;
            document.getElementById('stat-pending').textContent = pending;
        }

        // 匯出結果
        function exportResults() {
            const results = {
                timestamp: new Date().toISOString(),
                results: testResults,
                console: consoleLogs.slice(-20)
            };
            const dataStr = JSON.stringify(results, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `radar-diagnostic-${Date.now()}.json`;
            link.click();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', initUI);
    </script>
</body>
</html>
