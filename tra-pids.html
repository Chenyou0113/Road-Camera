<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵 PIDS V6.0</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="台鐵PIDS">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ CSS 變數系統 (Design Tokens) ============ */
        :root {
            --pids-bg-primary: #000000;
            --pids-bg-secondary: #111111;
            --pids-text-primary: #ffffff;
            --pids-text-secondary: #cccccc;
            --pids-border: #333333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #4fc3f7;
            --accent-red: #ff1744;
            --accent-orange: #ff9800;
            --header-inbound: linear-gradient(to right, #000080, #0d47a1);
            --header-outbound: linear-gradient(to right, #bf360c, #e65100);
            --row-odd-bg-inbound: #000;
            --row-even-bg-inbound: #2b2b2b;
            --row-odd-bg-outbound: #000;
            --row-even-bg-outbound: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        body {
            background-color: var(--pids-bg-secondary);
            color: var(--pids-text-primary);
            font-family: "Source Sans 3", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            font-weight: 550;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        @media (min-height: 800px) and (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
        }

        body *:not(i):not(svg):not(path) {
            font-weight: 550 !important;
        }

        /* Header */
        .unified-header {
            width: 100%;
            height: 90px;
            background: #000;
            border: none;
            border-radius: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: none;
            flex-shrink: 0;
            border-bottom: 2px solid #333;
        }

        .station-branding {
            display: flex;
            align-items: center; 
            gap: 15px; 
            flex: 1;
            min-width: 0;
        }

        .tra-logo-img {
            height: 3.8rem; 
            border-radius: 50%;
            border: 2px solid #fff;
            display: block;
        }

        .station-name-block {
            display: flex;
            flex-direction: row;
            align-items: baseline; 
            gap: 15px; 
            white-space: nowrap; 
            padding-top: 6px; 
        }

        .station-name {
            font-size: clamp(2.2rem, 4vw, 3.4rem); 
            font-weight: 900;
            line-height: 1.15; 
            margin: 0;
        }

        .station-sub {
            font-size: clamp(2.2rem, 4vw, 3.4rem); 
            color: #4fc3f7;
            font-family: "Source Sans 3", "Noto Sans TC", sans-serif;
            font-weight: 700;
            line-height: 1.15; 
            margin: 0;
        }

        .datetime-block {
            text-align: right;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            line-height: 1;
            flex-shrink: 0; 
            white-space: nowrap;
        }

        .date-text {
            font-size: 3rem;
            color: #ccc;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            line-height: 1;
            margin: 0;
        }

        .time-text {
            font-size: 3rem;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: #ffeb3b;
            line-height: 1;
            margin: 0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-left: 12px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        /* Top Marquee */
        .unified-marquee-container {
            width: 100%;
            height: 60px;
            background: #e3f2fd;
            border: none;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #003366;
            flex-shrink: 0;
            margin-top: 0;
            margin-left: -8px;
            margin-right: -8px;
            padding: 0 8px;
        }

        .unified-marquee-container .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: auto;
            line-height: 1.2;
            font-size: 2.1rem;
            font-weight: 900;
            top: 50%;
            margin-top: -0.9rem;
            will-change: transform;
            letter-spacing: 1px;
        }

        /* PIDS Section */
        .pids-section {
            display: flex;
            width: 100%;
            gap: 10px;
            flex: 0 0 auto;
            min-height: 0;
            overflow: hidden;
        }

        .pids-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            border: 3px solid var(--pids-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .screen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            overflow: hidden;
        }

        .direction-header-1, .direction-header-0 {
            color: var(--pids-text-primary);
            padding: 5px 15px; 
            font-size: 1.6rem; 
            font-weight: 700;  
            display: flex;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 2px solid var(--pids-text-primary);
            flex-shrink: 0;
            height: 44px; 
            align-items: center;
            min-width: 0;
        }

        .direction-header-0 {
            background: var(--header-outbound);
        }

        .direction-header-1 {
            background: var(--header-inbound);
        }

        .dest-list {
            font-size: 1.6rem; 
            font-weight: 700;  
            flex: 1;
            min-width: 0;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 表格設定 */
        .train-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            table-layout: fixed;
        }

        .train-table th {
            padding: 5px; 
            color: #fff;
            border-bottom: 2px solid #fff;
            height: 44px; 
            font-size: 1.6rem; 
            font-weight: 700;  
        }

        .train-table tbody tr {
            border-bottom: 1px solid #333;
        }

        .train-table td {
            padding: 0 5px;
            vertical-align: middle; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 70px; 
            line-height: 70px; 
            font-size: clamp(1.1rem, 2vw, 1.8rem); 
            font-weight: 400;
        }

        .train-table td:nth-child(3) {
            color: #29b6f6; 
            font-weight: 600 !important; 
        }

        .table-1 th { background: #000080; }
        .table-1 tr:nth-child(odd) { background: var(--row-odd-bg-inbound); }
        .table-1 tr:nth-child(even) { background: var(--row-even-bg-inbound); }

        .table-0 th { background: #bf360c; }
        .table-0 tr:nth-child(odd) { background: var(--row-odd-bg-outbound); }
        .table-0 tr:nth-child(even) { background: var(--row-even-bg-outbound); }

        .marquee-footer {
            background: #212121;
            color: #ffffff;
            height: 52px; 
            position: relative;
            overflow: hidden;
            border-top: 3px solid #ff9800;
            flex-shrink: 0;
        }

        .marquee-footer .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: 52px; 
            line-height: 52px; 
            font-size: 1.5rem; 
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            font-weight: 600; 
            letter-spacing: 1px;
            will-change: transform;
        }

        /* Media Section */
        .media-section {
            flex: 1;
            display: flex;
            gap: 10px;
            min-height: 150px;
            margin-top: 4px;
        }

        .media-box {
            flex: 1;
            height: 100%;
            background: #000;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🚀 修正：手機直向時完全隱藏媒體區塊 */
        @media (max-width: 480px) {
            .media-section { display: none !important; }
        }

        .media-label {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            font-size: 1rem;
            z-index: 10;
            border-bottom-right-radius: 8px;
        }

        .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            opacity: 0;
            transition: opacity 1s;
        }

        .carousel-img.active {
            opacity: 1;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 車種顏色 */
        .train-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            white-space: nowrap;
            min-width: 90px;
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .type-自強 { background-color: #FF5722; }
        .type-新自強 { background: linear-gradient(135deg, #222 0%, #444 100%); border: 1px solid #999; }
        .type-普悠瑪 { background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%); }
        .type-太魯閣 { background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%); }
        .type-莒光 { background-color: #FF9800; }
        .type-區間快 { background-color: #3F51B5; }
        .type-區間 { background-color: #2196F3; }
        .type-其他 { background-color: #607D8B; }

        /* 狀態與時間 */
        .status-ontime { color: #FFFFFF !important; }
        .status-delay { color: #ff1744 !important; animation: blink 1s infinite alternate; }
        .status-cancelled { color: #FF5252; font-weight: 900; }
        .status-suspended { color: #ff1744 !important; font-weight: 900; }

        .time-delay-container {
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            height: 100%;
            padding-right: 5px;
            gap: 8px;
        }

        .expected-time, .normal-time {
            font-size: 1.8rem;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            text-align: right;
            padding-right: 5px;
        }

        .expected-time { color: #ff5252; }

        @keyframes smooth-marquee {
            0% { transform: translateX(var(--start-pos)); }
            100% { transform: translateX(var(--end-pos)); }
        }

        /* RWD 修正區塊 */
        @media (max-width: 699px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; }
            .unified-header { height: 65px; padding: 0 12px; gap: 8px; }
            .station-name-block { flex-direction: column; gap: 2px; align-items: flex-start; justify-content: center; padding-top: 0; }
            .station-name { font-size: 1.5rem; }
            .station-sub { font-size: 1.2rem; }
            .datetime-block { flex-direction: column; align-items: flex-end; justify-content: center; gap: 2px; margin-right: 15px; }
            .date-text { font-size: 0.9rem; }
            .time-text { font-size: 1.3rem; }
            .icon-btn { width: 32px; height: 32px; font-size: 1rem; }
            .pids-section { flex-direction: column; gap: 8px; }
        }
    </style>
    <script src="assets/station-code-mapping.js?v=20260424"></script>
</head>

<body>
    <!-- Header -->
    <div class="unified-header">
        <div class="station-branding">
            <img src="assets/TRA_logo.jpg" class="tra-logo-img" alt="TRA Logo">
            <div class="station-name-block">
                <div class="station-name" id="unifiedStationName">臺鐵車站</div>
                <div class="station-sub" id="station-en">TRA STATION</div>
            </div>
        </div>
        <div class="datetime-block">
            <div class="date-text" id="unifiedDate">Loading...</div>
            <div class="time-text" id="unifiedTime">--:--:--</div>
            <div class="btn-group">
                <button class="icon-btn" onclick="goBack()" title="返回查詢"><i class="fas fa-home"></i></button>
                <button class="icon-btn" id="fullscreenBtn" title="切換全螢幕"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <div class="unified-marquee-container">
        <div class="marquee-text" id="unifiedTopMarquee">載入中...</div>
    </div>

    <!-- PIDS Section -->
    <div class="pids-section">
        <div class="pids-column">
            <div class="screen-body">
                <div class="direction-header-1"><span id="dirTitle1">逆行</span><span id="destList1" class="dest-list"></span></div>
                <table class="train-table table-1">
                    <thead>
                        <tr><th style="width:20%">車次</th><th style="width:20%">開往</th><th style="width:20%">車種</th><th style="width:20%">開車時間</th><th style="width:20%">備注</th></tr>
                    </thead>
                    <tbody id="body1"></tbody>
                </table>
            </div>
            <div class="marquee-footer">
                <div class="marquee-text" id="marquee1">讀取中...</div>
            </div>
        </div>
        
        <div class="pids-column">
            <div class="screen-body">
                <div class="direction-header-0"><span id="dirTitle0">順行</span><span id="destList0" class="dest-list"></span></div>
                <table class="train-table table-0">
                    <thead>
                        <tr><th style="width:20%">車次</th><th style="width:20%">開往</th><th style="width:20%">車種</th><th style="width:20%">開車時間</th><th style="width:20%">備注</th></tr>
                    </thead>
                    <tbody id="body0"></tbody>
                </table>
            </div>
            <div class="marquee-footer">
                <div class="marquee-text" id="marquee0">讀取中...</div>
            </div>
        </div>
    </div>

    <!-- Media Section -->
    <div class="media-section">
        <div class="media-box" id="carouselBox">
            <div class="media-label">宣導資訊</div>
        </div>
        <div class="media-box" id="videoBox">
            <div class="media-label">影音專區</div>
            <div id="videoContainer" style="width:100%;height:100%"></div>
        </div>
    </div>

    <template id="train-row-template">
        <tr>
            <td class="train-no-cell"></td>
            <td class="train-dest-cell"></td>
            <td class="train-type-cell"></td>
            <td class="train-time-cell"></td>
            <td class="train-note-cell"></td>
        </tr>
    </template>

    <script src="assets/config.js"></script>
    <script src="assets/tdx-api.js"></script>
    <script>
        // 🚀 核心修改：判斷是否為手機版 (<= 480px)
        const IS_MOBILE_V = window.innerWidth <= 480;

        function formatMarqueeText(rawText) {
            const text = String(rawText || '');
            if (!text) return text;
            return text.replace(/([\u4e00-\u9fff]{1,6})\s*(?:-|－|–|—|~|～)\s*([\u4e00-\u9fff]{1,6})/g, '$1 ＜－－＞ $2');
        }

        const PIDS_APP = {
            CONFIG: {
                API_BASE: "https://tra-schedule-worker.weacamm.org",
                INTERVALS: { CLOCK: 1000, PIDS_UPDATE: 60000, LANG_SWITCH: 60000, TOP_MARQUEE_CHECK: 60000, CAROUSEL: 10000 },
                ROWS: { DESKTOP: 5, MOBILE: 5 }
            },
            STATE: new Proxy({
                currentLang: 'zh', manualLangOverride: false, rowLangs: [], stationID: '', stationName: '',
                lastTrainData: [], stopsCache: {}, isVideoLoaded: false, _observers: new Set()
            }, {
                set(target, prop, value) {
                    target[prop] = value;
                    target._observers.forEach(cb => cb(prop, value));
                    if (prop === 'stationID' && value) PIDS_APP.updatePids();
                    if (['currentLang', 'rowLangs', 'lastTrainData'].includes(prop)) refreshDisplay();
                    return true;
                }
            }),
            init() {
                const params = new URLSearchParams(location.search);
                const sid = params.get('station');
                this.STATE.stationID = sid;

                // 🚀 修正站名顯示邏輯：若網址沒帶 name，或 name 剛好等於代碼，就自動查表翻譯
                let sname = params.get('name');
                if (!sname || sname === sid) {
                    if (typeof stationDataMap !== 'undefined' && stationDataMap[sid]) {
                        sname = stationDataMap[sid].name;
                    } else {
                        sname = '臺鐵車站';
                    }
                }
                this.STATE.stationName = sname;

                // 確保顯示的是例如「樹林車站」而非「1040車站」
                const cleanName = sname.replace(/車站$|站$/, '');
                document.getElementById('unifiedStationName').textContent = cleanName + '車站';
                
                updateEnglishStationName(sid);
                this.startTimers();
                
                // 🚀 只有非手機版才載入資源
                if (!IS_MOBILE_V) updateMediaAssets();
            },
            startTimers() {
                setInterval(() => this.updateClock(), 1000);
                this.updatePids();
                setInterval(() => this.updatePids(), 60000);
                this.checkTopMarquee();
                setInterval(() => this.checkTopMarquee(), 60000);
            },
            updateClock() {
                const now = new Date();
                document.getElementById('unifiedTime').textContent = now.toLocaleTimeString('en-GB');
                document.getElementById('unifiedDate').textContent = now.toISOString().split('T')[0].replace(/-/g, '/');
                if (!this.STATE.manualLangOverride) {
                    const cycle = Math.floor(now.getTime() / 60000) % 2;
                    const lang = cycle === 0 ? 'zh' : 'en';
                    if (this.STATE.currentLang !== lang) this.STATE.currentLang = lang;
                }
            },
            async updatePids() {
                if (!this.STATE.stationID) return;
                try {
                    const res = await fetch(`${this.CONFIG.API_BASE}/api/liveboard/station?station=${this.STATE.stationID}`);
                    const data = await res.json();
                    this.STATE.lastTrainData = data;
                } catch (e) { console.error(e); }
            },
            async checkTopMarquee() {
                try {
                    const res = await fetch(`${this.CONFIG.API_BASE}/api/pids/marquee?station=${this.STATE.stationID}`);
                    const data = await res.json();
                    const el = document.getElementById('unifiedTopMarquee');
                    if (data.text && el.dataset.raw !== data.text) {
                        el.dataset.raw = data.text;
                        const msg = formatMarqueeText(data.text);
                        if (!el.style.animationName || el.style.animationName === 'none') {
                            el.innerHTML = msg; el.dataset.currentMsg = msg; startMarquee('unifiedTopMarquee');
                        } else { el.dataset.nextMsg = msg; }
                    }
                } catch (e) {}
            }
        };

        function updateEnglishStationName(id) {
            const el = document.getElementById('station-en');
            if (typeof stationDataMap !== 'undefined' && stationDataMap[id]) {
                el.textContent = stationDataMap[id].ename.split('_')[0].charAt(0).toUpperCase() + stationDataMap[id].ename.split('_')[0].slice(1).toLowerCase();
            } else { el.textContent = "TRA"; }
        }

        async function updateMediaAssets() {
            // 🚀 防呆：如果是手機版，直接退出，不發起請求
            if (IS_MOBILE_V) return;

            try {
                const res = await fetch(`${TRA_WORKER_URL}/api/pids/assets`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.images) setupCarousel(data.images);
                    if (data.video) setupVideo(Array.isArray(data.video) ? data.video : [data.video]);
                }
            } catch (e) {}
        }

        function setupCarousel(imgs) {
            const box = document.getElementById('carouselBox');
            imgs.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src; img.className = i === 0 ? 'carousel-img active' : 'carousel-img';
                box.appendChild(img);
            });
            let idx = 0;
            setInterval(() => {
                const list = box.querySelectorAll('img');
                if (list.length > 1) {
                    list[idx].classList.remove('active');
                    idx = (idx + 1) % list.length;
                    list[idx].classList.add('active');
                }
            }, 10000);
        }

        let _videoIds = [], _currentVideoIndex = 0;
        function setupVideo(urls) {
            urls.forEach(url => {
                const match = url.match(/(?:v=|v\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
                if (match) _videoIds.push(match[1]);
            });
            if (_videoIds.length > 0) {
                const tag = document.createElement('script');
                tag.src = "https://www.youtube.com/iframe_api";
                document.body.appendChild(tag);
            }
        }

        window.onYouTubeIframeAPIReady = () => {
            window.ytPlayer = new YT.Player('videoContainer', {
                height: '100%', width: '100%', videoId: _videoIds[0],
                playerVars: { autoplay: 0, mute: 1, controls: 1, playsinline: 1 },
                events: { 'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) {
                    _currentVideoIndex = (_currentVideoIndex + 1) % _videoIds.length;
                    window.ytPlayer.loadVideoById(_videoIds[_currentVideoIndex]);
                }}}
            });
        };

        function startMarquee(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const container = el.parentElement;
            el.style.animation = 'none';
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const textWidth = el.scrollWidth;
                    const containerWidth = container.clientWidth;
                    const speedMultiplier = (id === 'unifiedTopMarquee') ? 1.0 : 0.7;
                    const pixelsPerSecond = (window.innerWidth <= 900 ? 120 : 180) * speedMultiplier;
                    const duration = (textWidth + containerWidth) / pixelsPerSecond;
                    el.style.setProperty('--start-pos', `${containerWidth}px`);
                    el.style.setProperty('--end-pos', `-${textWidth}px`);
                    el.style.animation = `smooth-marquee ${duration}s linear infinite`;
                });
            });
        }

        function refreshDisplay() {
            const data = PIDS_APP.STATE.lastTrainData;
            const dir1 = data.filter(t => t.Direction == 1);
            const dir0 = data.filter(t => t.Direction == 0);
            renderTable('1', dir1);
            renderTable('0', dir0);
            // 🚀 更新底部跑馬燈並從右邊開始滾動
            updateFooterMarquee('1', dir1);
            updateFooterMarquee('0', dir0);
        }

        function updateFooterMarquee(dir, list) {
            const el = document.getElementById(`marquee${dir}`);
            if (!el || list.length === 0) return;
            const parts = list.slice(0, 10).map(t => {
                const dest = (typeof translateStation === 'function') ? (translateStation(t.EndingStationName) || t.EndingStationName) : t.EndingStationName;
                const type = t.TrainTypeName ? t.TrainTypeName.replace(/\(.*\)/g, '') : '';
                const status = t.DelayTime > 0 ? `晚${t.DelayTime}分` : '準點';
                return `${t.TrainNo}次 ${dest} ${type} ${status}`;
            });
            const msg = `🚆 ${parts.join(' | ')}`;
            el.innerHTML = msg;
            el.dataset.currentMsg = msg;
            startMarquee(el.id);
        }

        function renderTable(dir, list) {
            const tb = document.getElementById(`body${dir}`);
            const template = document.getElementById('train-row-template');
            tb.innerHTML = '';
            list.slice(0, 5).forEach(t => {
                const clone = template.content.cloneNode(true);
                const cells = clone.querySelectorAll('td');
                cells[0].textContent = t.TrainNo;
                cells[1].textContent = translateStation(t.EndingStationName);
                cells[2].textContent = t.TrainTypeName.replace(/\(.*\)/g, '');
                cells[3].textContent = (t.ScheduledDepartureTime || "").slice(0, 5);
                cells[4].textContent = t.DelayTime > 0 ? `晚 ${t.DelayTime} 分` : '準點';
                if (t.DelayTime > 0) cells[4].className = 'status-delay';
                tb.appendChild(clone);
            });
        }

        function goBack() { window.history.length > 1 ? window.history.back() : window.location.href = 'tra_liveboard.html'; }

        document.addEventListener('DOMContentLoaded', () => {
            PIDS_APP.init();
            document.querySelectorAll('.marquee-text').forEach(el => {
                el.addEventListener('animationiteration', () => {
                    if (el.dataset.nextMsg) {
                        el.innerHTML = el.dataset.nextMsg;
                        el.dataset.currentMsg = el.dataset.nextMsg;
                        el.dataset.nextMsg = '';
                        startMarquee(el.id);
                    }
                });
            });
        });

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
    </script>
</body>

</html>
