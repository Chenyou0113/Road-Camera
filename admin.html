<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>天氣即時快訊 Ｘ 臺灣天氣視界管理後台 - V9.2.5 整合版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === 保留您最愛的黑色系樣式 === */
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .login-wrapper { display: flex; justify-content: center; align-items: center; flex: 1; padding: 20px; }
        .login-container { width: 100%; max-width: 400px; }
        .dashboard-wrapper { width: 100%; max-width: 98%; margin: 0 auto; padding: 20px; box-sizing: border-box; display: none; }
        .dashboard-wrapper.active { display: block; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); border: 1px solid #333; margin-bottom: 20px; }
        h2 { text-align: center; color: #4fc3f7; margin-bottom: 20px; }
        h3 { color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #2c2c2c; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 15px; outline: none; }
        button { width: 100%; padding: 12px; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { filter: grayscale(1); cursor: not-allowed; }
        .btn-login { background: linear-gradient(135deg, #2196F3, #1976D2); }
        .btn-save { background: linear-gradient(135deg, #43a047, #2e7d32); }
        .btn-pids { background: linear-gradient(135deg, #e91e63, #c2185b); }
        .btn-warn { background: linear-gradient(135deg, #ff9800, #f57c00); }
        .btn-sync { background: linear-gradient(135deg, #00bcd4, #0097a7); }
        .status { text-align: center; margin-top: 10px; font-size: 14px; min-height: 20px; color: #aaa; }
        .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 0.95rem; color: #ddd; }
        .toggle-row input[type="checkbox"] { width: auto; margin: 0; transform: scale(1.2); accent-color: #ff9800; }
        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4fc3f7;
            text-decoration: none;
            border: 1px solid #4fc3f7;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 0.9rem;
            font-weight: 700;
            transition: 0.2s;
        }
        .back-home-btn:hover { background: rgba(79,195,247,0.15); }
        .top-nav { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        .user-badge { background: #333; padding: 5px 12px; border-radius: 20px; color: #4fc3f7; font-weight: bold; }
        .logout-btn { color: #ff5252; text-decoration: none; font-weight: bold; padding: 5px 10px; border: 1px solid #ff5252; border-radius: 5px; }
        .dashboard-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 25px; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="login-wrapper" id="loginSection">
        <div class="login-container">
            <div class="card">
                <h2>🔐 後台管理登入</h2>
                <div style="display:flex; justify-content:center; margin-bottom:15px;">
                    <a href="index.html" class="back-home-btn"><i class="fas fa-arrow-left"></i> 回首頁</a>
                </div>
                <input type="text" id="loginUser" placeholder="管理員帳號">
                <input type="password" id="loginPass" placeholder="管理員密碼">
                <button class="btn-login" onclick="doLogin()">登入系統</button>
                <div class="status" id="loginStatus"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-wrapper" id="editSection">
        <div class="top-nav">
            <div class="nav-left" style="display:flex; align-items:center; gap:10px;">
                <a href="index.html" class="back-home-btn"><i class="fas fa-arrow-left"></i> 回首頁</a>
                <strong>王偉預報 & 台鐵 PIDS 整合後台</strong>
            </div>
            <div class="nav-right">
                <span id="currentUser" class="user-badge">User</span>
                <a href="#" onclick="logout()" class="logout-btn">登出</a>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="grid-col-main">
                
                <div class="card">
                    <h3 style="color: #4caf50;"><i class="fas fa-bullhorn"></i> 天氣首頁跑馬燈</h3>
                    <textarea id="message" placeholder="載入中..."></textarea>
                    <button class="btn-save" onclick="saveWeatherMessage()">更新天氣跑馬燈</button>
                    <div class="status" id="weatherStatus"></div>
                </div>

                
                <div class="card" style="border-top: 4px solid #e91e63;">
                    <h3 style="color: #e91e63;"><i class="fas fa-desktop"></i> PIDS 跑馬燈內容</h3>
                    <textarea id="pidsMarqueeInput" style="height: 250px;" placeholder="輸入 PIDS 看板宣導文字..."></textarea>
                    <button class="btn-pids" onclick="savePidsMarquee()">同步至車站看板</button>
                    <div class="status" id="pidsStatus"></div>
                </div>

                
                <div class="card" style="border-top: 4px solid #2196f3;">
                    <h3 style="color: #2196f3;"><i class="fas fa-photo-video"></i> PIDS 多媒體素材</h3>
                    <label style="font-size:0.8rem; color:#888;">📸 輪播圖片 (一行一個網址)</label>
                    <textarea id="pidsImagesInput" style="height: 100px;"></textarea>
                    <label style="font-size:0.8rem; color:#888;">🎥 影片網址 (一行一個 YouTube 連結)</label>
                    <textarea id="pidsVideoInput" style="height: 100px;"></textarea>
                    <button onclick="savePidsAssets()" style="background: #2196f3;">儲存媒體設定</button>
                    <div class="status" id="pidsAssetsStatus"></div>
                </div>

                <div class="card" style="border-top: 4px solid #8246af;">
                    <h3 style="color: #8246af;"><i class="fas fa-subway"></i> 捷運 PIDS 看板設定</h3>
                    
                    <label style="font-size:0.8rem; color:#888;">📝 捷運宣導跑馬燈</label>
                    <textarea id="metroMarqueeInput" style="height: 200px;" placeholder="輸入捷運看板宣導文字..."></textarea>
                    
                    <label style="font-size:0.8rem; color:#888;">🎥 捷運播放影片 (一行一個 YouTube 連結)</label>
                    <textarea id="metroVideoInput" style="height: 60px;" placeholder="https://www.youtube.com/watch?v=..."></textarea>
                    
                    <button style="background: linear-gradient(135deg, #8246af, #5e35b1);" onclick="saveMetroSettings()">儲存捷運看板設定</button>
                    <div class="status" id="metroStatus"></div>
                </div>

                <!-- 🆕 列車與區段停駛管理 -->
                <div class="card" style="border-top: 4px solid #ff1744;">
                    <h3 style="color: #ff1744;"><i class="fas fa-ban"></i> 列車與區段停駛管理</h3>
                    
                    <label style="font-size:0.8rem; color:#888;">⚡ 快速指令解析（輸入後按解析按鈕即可自動填寫下方欄位）</label>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <input type="text" id="quickSuspensionInp" placeholder="例如：408 臺北-花蓮 因地震 或 對號 宜蘭-羅東 或 121 停駛">
                        <button onclick="parseQuickSuspension()" style="background:#555; width:120px; flex-shrink:0; padding: 0;">解析指令</button>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                        <div>
                            <label style="font-size:0.8rem; color:#888;">規則類型</label>
                            <select id="ruleType" onchange="toggleRuleFields()" style="width:100%; padding:12px; background:#2c2c2c; border:1px solid #444; color:#fff; border-radius:6px; outline:none;">
                                <option value="train">特定車次全線或區間停駛</option>
                                <option value="segment">特定區間所有/分類列車停駛</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#888;">車次 (若為特定車次)</label>
                            <input type="text" id="ruleTrainNo" placeholder="例如: 408" style="margin-bottom:0;">
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px; margin-bottom:15px;">
                        <div>
                            <label style="font-size:0.8rem; color:#888;">起點站名</label>
                            <input type="text" id="ruleStart" placeholder="例如: 臺北" style="margin-bottom:0;">
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#888;">終點站名</label>
                            <input type="text" id="ruleEnd" placeholder="例如: 花蓮" style="margin-bottom:0;">
                        </div>
                        <div>
                            <label style="font-size:0.8rem; color:#888;">列車範圍 (區段停駛)</label>
                            <select id="ruleScope" style="width:100%; padding:12px; background:#2c2c2c; border:1px solid #444; color:#fff; border-radius:6px; outline:none;">
                                <option value="all">所有列車</option>
                                <option value="reserved">僅對號列車</option>
                                <option value="local">僅非對號列車 (區間)</option>
                            </select>
                        </div>
                    </div>

                    <label style="font-size:0.8rem; color:#888;">📝 停駛備註/原因</label>
                    <input type="text" id="ruleNote" placeholder="例如: 因坍方土石流影響、電車線設備故障" style="margin-bottom:15px;">

                    <button class="btn-warn" onclick="addSuspensionRule()" style="background: linear-gradient(135deg, #ff1744, #d50000); margin-bottom:20px;">新增停駛規則</button>

                    <label style="font-size:0.95rem; color:#fff; font-weight:bold; display:block; margin-bottom:10px;">📋 目前生效中的停駛規則</label>
                    <div style="overflow-x:auto;">
                        <table style="width:100%; border-collapse:collapse; background:#1e1e1e; font-size:0.9rem; border:1px solid #333; text-align:left;">
                            <thead>
                                <tr style="background:#2c2c2c;">
                                    <th style="padding:10px; border-bottom:1px solid #333;">類型</th>
                                    <th style="padding:10px; border-bottom:1px solid #333;">車次</th>
                                    <th style="padding:10px; border-bottom:1px solid #333;">停駛區段</th>
                                    <th style="padding:10px; border-bottom:1px solid #333;">適用範圍</th>
                                    <th style="padding:10px; border-bottom:1px solid #333; width:60px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="suspensionRulesBody">
                                <tr><td colspan="5" style="padding:15px; text-align:center; color:#888;">載入中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- 💾 專用儲存與批量刪除按鈕 -->
                    <div style="display: flex; gap: 15px; margin-top: 15px;">
                        <button class="btn-save" onclick="saveSuspensionRulesToServer()" style="background: linear-gradient(135deg, #2e7d32, #1b5e20); flex: 1; margin: 0;">
                            <i class="fas fa-save"></i> 💾 儲存目前停駛設定
                        </button>
                        <button class="btn-warn" onclick="clearAllSuspensionRules()" style="background: linear-gradient(135deg, #d32f2f, #c62828); flex: 1; margin: 0;">
                            <i class="fas fa-trash-alt"></i> 🗑️ 批量刪除停駛規則
                        </button>
                    </div>
                    <div class="status" id="suspensionStatus"></div>
                </div>
            </div>

            
            <div class="grid-col-side">
                
                <div class="card" style="border-top: 4px solid #00bcd4;">
                    <h3 style="color: #00bcd4;"><i class="fas fa-sync"></i> 數據手動同步</h3>
                    <button class="btn-sync" onclick="triggerPidsSync('live')" style="margin-bottom:10px;">同步即時動態</button>
                    <button class="btn-sync" onclick="triggerPidsSync('schedule')" style="background:#0097a7;">同步全台時刻表</button>
                    <button class="btn-sync" onclick="triggerPidsSync('alerts')" style="background:#00838f; margin-top:10px;">同步通阻公告</button>
                    <div class="status" id="syncStatus"></div>
                </div>

                
                <div class="card" style="border-top: 4px solid #ff9800;">
                    <h3><i class="fas fa-exclamation-triangle"></i> 系統彈窗公告</h3>
                    <label class="toggle-row"><input type="checkbox" id="ann_active"> 啟用公告彈窗</label>
                    <input type="text" id="ann_title" placeholder="公告標題">
                    <textarea id="ann_content" style="height: 80px;" placeholder="公告內文..."></textarea>
                    <label style="font-size:0.8rem; color:#888;">📌 詳細項目 (一行一項，顯示在內文下方)</label>
                    <textarea id="ann_list" style="height: 100px;" placeholder="例如：&#10;新增台北捷運即時動態&#10;公車路線穩定性優化"></textarea>
                    <button class="btn-warn" onclick="saveWeatherAnnouncement()">儲存公告設定</button>
                    <div class="status" id="annStatus"></div>
                </div>

                
                <div class="card">
                    <h3><i class="fas fa-ticket-alt"></i> 邀請碼生成</h3>
                    <div id="newCodeBox" class="code-display" onclick="copyCode()" style="display:none;"></div>
                    <button onclick="generateInvite()" style="background:#673ab7; margin-top:10px;">生成代碼</button>
                    <div class="status" id="inviteStatus"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★ 配置：請確保網址正確
        const WEATHER_API = 'https://wang-weather.weacamm.org';
        const PIDS_API = 'https://tra-schedule-worker.weacamm.org';
        const ADMIN_BUILD = '2026-04-16-reroute-v1';

        // 登入邏輯
        function doLogin() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            if (u && p) {
                localStorage.setItem('wangwei_user', u);
                localStorage.setItem('wangwei_pass', p);
                checkAuth();
            }
        }

        function checkAuth() {
            const u = localStorage.getItem('wangwei_user');
            if (u) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('editSection').classList.add('active');
                document.getElementById('currentUser').innerText = u;
                loadAllData();
                loadSuspensionRules(); // ⚡ 獨立加載，不與其他 API 綁定，防止連鎖中斷
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // 統一請求函式 (帶認證 Header)
        async function apiRequest(url, method = 'GET', body = null, withAuth = true) {
            // 防呆：PIDS 管理資料一律經由 WEATHER_API 寫入 D1
            if (typeof url === 'string' && /\/api\/(admin\/update-(pids|assets)|pids\/(marquee|assets))/.test(url)) {
                url = url.replace(PIDS_API, WEATHER_API);
            }

            const headers = {};

            if (withAuth) {
                headers['X-Username'] = localStorage.getItem('wangwei_user') || '';
                headers['X-Password'] = localStorage.getItem('wangwei_pass') || '';
            }
            if (body) {
                headers['Content-Type'] = 'application/json';
            }

            return fetch(url, {
                method,
                headers,
                body: body ? JSON.stringify(body) : null
            });
        }

        async function loadAllData() {
            try {
                // 載入天氣
                const resW = await apiRequest(`${WEATHER_API}/message`, 'GET', null, false);
                const dataW = await resW.json();
                document.getElementById('message').value = dataW.message;

                // 載入系統公告
                const resAnn = await apiRequest(`${WEATHER_API}/announcement`, 'GET', null, false);
                const dataAnn = await resAnn.json();
                document.getElementById('ann_active').checked = !!dataAnn?.active;
                document.getElementById('ann_title').value = dataAnn?.title || '';
                document.getElementById('ann_content').value = dataAnn?.content || '';
                document.getElementById('ann_list').value = Array.isArray(dataAnn?.list) ? dataAnn.list.join('\n') : '';

                // 載入 PIDS 字
                const resP = await apiRequest(`${WEATHER_API}/api/pids/marquee`, 'GET', null, false);
                const dataP = await resP.json();
                document.getElementById('pidsMarqueeInput').value = dataP.text;

                // 載入捷運跑馬燈
                const resMetro = await apiRequest(`${WEATHER_API}/api/metro/marquee`, 'GET', null, false);
                const dataMetro = await resMetro.json();
                document.getElementById('metroMarqueeInput').value = dataMetro.text;

                // 載入捷運影片
                const resMetroVid = await apiRequest(`${WEATHER_API}/api/metro/assets`, 'GET', null, false);
                const dataMetroVid = await resMetroVid.json();
                if(dataMetroVid.video) {
                    document.getElementById('metroVideoInput').value = dataMetroVid.video.join('\n');
                }

                // 載入 PIDS 素材
                const resA = await apiRequest(`${WEATHER_API}/api/pids/assets`, 'GET', null, false);
                const dataA = await resA.json();
                document.getElementById('pidsImagesInput').value = dataA.images.join('\n');
                document.getElementById('pidsVideoInput').value = dataA.video.join('\n');
                
            } catch (e) { console.error("資料載入失敗", e); }
        }

        // 儲存全域停駛規則陣列
        let activeSuspensionRules = [];

        function toggleRuleFields() {
            const type = document.getElementById('ruleType').value;
            const trainInp = document.getElementById('ruleTrainNo');
            const scopeInp = document.getElementById('ruleScope');
            
            if (type === 'train') {
                trainInp.disabled = false;
                trainInp.style.opacity = '1';
                scopeInp.disabled = true;
                scopeInp.style.opacity = '0.5';
            } else {
                trainInp.disabled = true;
                trainInp.style.opacity = '0.5';
                scopeInp.disabled = false;
                scopeInp.style.opacity = '1';
            }
        }

        // 🤖 升級版：批量多行指令解析器
        function parseQuickSuspension() {
            const input = document.getElementById('quickSuspensionInp').value.trim();
            if (!input) return;

            let parsedRulesCount = 0;
            const normalizeStation = name => String(name || "").replace(/台/g, "臺").replace(/站$/g, "").trim();

            // 1. 批量正則匹配：[站名] ＜－－＞ [站名] : [狀態] (支援多行與各種箭頭符號)
            const bulkRegex = /([\u4e00-\u9fff]+)\s*(?:＜－－＞|⇄|==|=|至|與|和|－|-)\s*([\u4e00-\u9fff]+)\s*:\s*([^\n\s，。；\(\)]+)/g;
            let match;
            
            while ((match = bulkRegex.exec(input)) !== null) {
                const start = normalizeStation(match[1]);
                const end = normalizeStation(match[2]);
                const statusText = match[3];
                let scope = 'all';

                // 根據狀態文字，智慧型判定列車受影響範圍
                if (statusText.includes("各級列車停駛") || statusText.includes("各類列車停駛") || statusText.includes("全部停駛") || (statusText.includes("停駛") && !statusText.includes("對號") && !statusText.includes("非對號"))) {
                    scope = 'all';
                } else if (statusText.includes("非對號") && statusText.includes("正常")) {
                    scope = 'reserved'; // 非對號正常 -> 對號停駛
                } else if (statusText.includes("對號") && statusText.includes("正常")) {
                    scope = 'local';    // 對號正常 -> 非對號停駛
                } else if (statusText.includes("對號") && statusText.includes("停駛")) {
                    scope = 'reserved';
                } else if (statusText.includes("非對號") && statusText.includes("停駛")) {
                    scope = 'local';
                }

                // 直接推入規則陣列
                activeSuspensionRules.push({
                    type: 'segment',
                    trainNo: '',
                    startStation: start,
                    endStation: end,
                    scope: scope,
                    note: statusText
                });
                parsedRulesCount++;
            }

            // 2. 單行備用解析 (如果上面批量完全沒有匹配到，才走單行匹配)
            if (parsedRulesCount === 0) {
                // 備用 A: 車次 區段 備註
                const reg1 = /^(\d+)\s+([^\s\-]+)\s*[\-至往]\s*([^\s\-]+)(?:\s+(.*))?$/;
                const m1 = input.match(reg1);
                if (m1) {
                    activeSuspensionRules.push({
                        type: 'train',
                        trainNo: m1[1],
                        startStation: normalizeStation(m1[2]),
                        endStation: normalizeStation(m1[3]),
                        scope: 'all',
                        note: m1[4] || '區間停駛'
                    });
                    parsedRulesCount++;
                }
                
                // 備用 B: 類型 區段 備註
                if (parsedRulesCount === 0) {
                    const reg2 = /^(全部|對號|非對號|區間)\s+([^\s\-]+)\s*[\-至往]\s*([^\s\-]+)(?:\s+(.*))?$/;
                    const m2 = input.match(reg2);
                    if (m2) {
                        const scopeMap = { '全部': 'all', '對號': 'reserved', '非對號': 'local', '區間': 'local' };
                        activeSuspensionRules.push({
                            type: 'segment',
                            trainNo: '',
                            startStation: normalizeStation(m2[2]),
                            endStation: normalizeStation(m2[3]),
                            scope: scopeMap[m2[1]] || 'all',
                            note: m2[4] || '區間停駛'
                        });
                        parsedRulesCount++;
                    }
                }

                // 備用 C: 單一車次停駛
                if (parsedRulesCount === 0) {
                    const reg3 = /^(\d+)\s+停駛(?:\s+(.*))?$/;
                    const m3 = input.match(reg3);
                    if (m3) {
                        activeSuspensionRules.push({
                            type: 'train',
                            trainNo: m3[1],
                            startStation: '',
                            endStation: '',
                            scope: 'all',
                            note: m3[2] || '本日停駛'
                        });
                        parsedRulesCount++;
                    }
                }
            }

            // 3. 渲染與提示
            if (parsedRulesCount > 0) {
                renderSuspensionRulesTable();
                // 修正提示：明確引導點擊新加入的儲存按鈕
                alert(`🎉 成功解析並批量匯入 ${parsedRulesCount} 筆停駛規則！\n\n請在下方列表進行檢視，如有不需要的區段，可點擊紅色垃圾桶刪除。\n\n確認無誤後，請務必點擊下方的「💾 儲存目前停駛設定」按鈕完成存檔！`);
                document.getElementById('quickSuspensionInp').value = '';
            } else {
                alert('⚠️ 無法辨識此格式。\n\n批量解析請確認格式類似：\n「彰化 ＜－－＞ 基隆 : 各級列車停駛」\n\n或您也可以直接手動填寫下方表單！');
            }
        }

        async function loadSuspensionRules() {
            try {
                const res = await apiRequest(`${WEATHER_API}/api/admin/suspension-rules`, 'GET', null, false);
                activeSuspensionRules = await res.json();
                renderSuspensionRulesTable();
            } catch (e) {
                console.error("無法加載停駛規則", e);
            }
        }

        function renderSuspensionRulesTable() {
            const tbody = document.getElementById('suspensionRulesBody');
            if (activeSuspensionRules.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="padding:15px; text-align:center; color:#888;">目前無生效中的停駛規則</td></tr>`;
                return;
            }

            const typeMap = { 'train': '特定車次', 'segment': '特定區間' };
            const scopeMap = { 'all': '所有列車', 'reserved': '僅對號車', 'local': '僅非對號' };

            tbody.innerHTML = activeSuspensionRules.map((rule, idx) => `
                <tr style="border-bottom:1px solid #333;">
                    <td style="padding:10px;">${typeMap[rule.type] || rule.type}</td>
                    <td style="padding:10px; font-weight:bold; color:#ffeb3b;">${rule.trainNo || '-'}</td>
                    <td style="padding:10px;">${(rule.startStation && rule.endStation) ? `${rule.startStation} ⇄ ${rule.endStation}` : '全線停駛'}</td>
                    <td style="padding:10px;">${scopeMap[rule.scope] || '-'}</td>
                    <td style="padding:10px;">
                        <button onclick="deleteSuspensionRule(${idx})" style="background:#ff5252; padding:4px 8px; font-size:12px; width:auto; display:inline-block;"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function addSuspensionRule() {
            const statusEl = document.getElementById('suspensionStatus');
            const type = document.getElementById('ruleType').value;
            const trainNo = document.getElementById('ruleTrainNo').value.trim();
            const startStation = document.getElementById('ruleStart').value.trim().replace(/台/g, '臺');
            const endStation = document.getElementById('ruleEnd').value.trim().replace(/台/g, '臺');
            const scope = document.getElementById('ruleScope').value;
            const note = document.getElementById('ruleNote').value.trim() || '停駛';

            if (type === 'train' && !trainNo) {
                alert('請輸入車次編號');
                return;
            }
            if (type === 'segment' && (!startStation || !endStation)) {
                alert('設定區間停駛時，起點站與終點站皆不得為空');
                return;
            }

            const newRule = { type, trainNo, startStation, endStation, scope, note };
            activeSuspensionRules.push(newRule);
            
            await saveSuspensionRulesToServer();
        }

        async function deleteSuspensionRule(index) {
            if (confirm('確定要刪除此項停駛規則嗎？')) {
                activeSuspensionRules.splice(index, 1);
                await saveSuspensionRulesToServer();
            }
        }

        async function clearAllSuspensionRules() {
            if (activeSuspensionRules.length === 0) {
                alert("目前沒有任何生效中的停駛規則。");
                return;
            }
            if (confirm("⚠️ 確定要刪除所有生效中的停駛規則嗎？此操作將清空所有停駛設定並即時同步前台！")) {
                activeSuspensionRules = [];
                await saveSuspensionRulesToServer();
            }
        }

        async function saveSuspensionRulesToServer() {
            const statusEl = document.getElementById('suspensionStatus');
            statusEl.innerText = "⏳ 儲存中...";
            try {
                const res = await apiRequest(`${WEATHER_API}/api/admin/update-suspension-rules`, 'POST', activeSuspensionRules, true);
                if (res.ok) {
                    statusEl.innerText = "✅ 停駛規則已更新，並即時同步前台";
                    
                    // 🔔 加上一個明確的彈窗提示
                    alert("🎉 停駛規則已成功儲存，並即時同步至全台看板！");
                    
                    renderSuspensionRulesTable();
                    
                    // 清空各個輸入欄位
                    document.getElementById('ruleTrainNo').value = '';
                    document.getElementById('ruleStart').value = '';
                    document.getElementById('ruleEnd').value = '';
                    document.getElementById('ruleNote').value = '';
                    document.getElementById('quickSuspensionInp').value = '';
                } else {
                    statusEl.innerText = "❌ 儲存失敗，請確認登入狀態";
                    alert("❌ 儲存失敗，請檢查登入狀態是否過期！");
                }
            } catch (e) {
                statusEl.innerText = "❌ 連線異常";
                alert("❌ 連線失敗，請檢查網路或背景伺服器狀態！");
            }
        }

        // 儲存功能
        async function saveWeatherMessage() {
            const statusEl = document.getElementById('weatherStatus');
            const res = await apiRequest(`${WEATHER_API}/message`, 'POST', { message: document.getElementById('message').value });
            statusEl.innerText = res.ok ? "✅ 天氣跑馬燈已更新" : "❌ 儲存失敗";
        }

        async function savePidsMarquee() {
            const statusEl = document.getElementById('pidsStatus');
            const newText = document.getElementById('pidsMarqueeInput').value;
            try {
                console.log(`[admin ${ADMIN_BUILD}] savePidsMarquee -> ${WEATHER_API}/api/admin/update-pids`);
                const res = await apiRequest(`${WEATHER_API}/api/admin/update-pids`, 'POST', { text: newText }, true);
                const raw = await res.text();
                if (res.ok) {
                    statusEl.innerText = "✅ PIDS 文字已更新";
                } else {
                    statusEl.innerText = `❌ 儲存失敗：${raw || `HTTP ${res.status}`}`;
                }
            } catch (e) {
                statusEl.innerText = "❌ 儲存失敗：連線異常";
            }
        }

        async function saveMetroSettings() {
            const statusEl = document.getElementById('metroStatus');
            statusEl.innerText = "⏳ 儲存中...";
            
            const newText = document.getElementById('metroMarqueeInput').value;
            const newVideo = document.getElementById('metroVideoInput').value.split('\n').filter(s => s.trim());
            
            try {
                // 平行發送更新跑馬燈與更新影片的請求
                const [resText, resVid] = await Promise.all([
                    apiRequest(`${WEATHER_API}/api/admin/update-metro-marquee`, 'POST', { text: newText }, true),
                    apiRequest(`${WEATHER_API}/api/admin/update-metro-assets`, 'POST', { video: newVideo }, true)
                ]);
                
                if (resText.ok && resVid.ok) {
                    statusEl.innerText = "✅ 捷運文字與影片已成功更新";
                } else {
                    statusEl.innerText = "❌ 儲存失敗，請檢查登入狀態";
                }
            } catch (e) {
                statusEl.innerText = "❌ 儲存失敗：連線異常";
            }
        }

        async function savePidsAssets() {
            const statusEl = document.getElementById('pidsAssetsStatus');
            const payload = {
                images: document.getElementById('pidsImagesInput').value.split('\n').filter(s => s.trim()),
                video: document.getElementById('pidsVideoInput').value.split('\n').filter(s => s.trim())
            };
            console.log(`[admin ${ADMIN_BUILD}] savePidsAssets -> ${WEATHER_API}/api/admin/update-assets`);
            const res = await apiRequest(`${WEATHER_API}/api/admin/update-assets`, 'POST', payload, true);
            statusEl.innerText = res.ok ? "✅ 媒體資源已儲存" : "❌ 儲存失敗";
        }

        async function triggerPidsSync(type) {
            const statusEl = document.getElementById('syncStatus');
            statusEl.innerText = "⏳ 正在同步 ... (可能需要 30 秒)";
            try {
                const res = await apiRequest(`${PIDS_API}/api/sync?type=${encodeURIComponent(type)}`, 'GET', null, false);
                const txt = await res.text();
                statusEl.innerText = res.ok ? "✅ " + txt : "❌ 同步失敗";
            } catch (e) { statusEl.innerText = "❌ 連線超時，請檢查背景同步狀態"; }
        }

        async function saveWeatherAnnouncement() {
            const statusEl = document.getElementById('annStatus');
            const isActive = !!document.getElementById('ann_active').checked;
            const title = document.getElementById('ann_title').value.trim();
            const content = document.getElementById('ann_content').value.trim();
            const list = document.getElementById('ann_list').value.split('\n').map(s => s.trim()).filter(Boolean);
            const payload = {
                active: isActive,
                title,
                content,
                list
            };

            if (isActive && (!title || !content)) {
                statusEl.innerText = "⚠️ 啟用公告時，請輸入公告標題與內容";
                return;
            }

            try {
                const res = await apiRequest(`${WEATHER_API}/announcement`, 'POST', payload, true);
                statusEl.innerText = res.ok ? "✅ 系統公告已發布" : "❌ 發布失敗";
            } catch (e) {
                statusEl.innerText = "❌ 發布失敗，請稍後再試";
            }
        }

        async function generateInvite() {
            const res = await apiRequest(`${WEATHER_API}/generate-invite`, 'POST', {});
            const data = await res.json();
            if (data.success) {
                const box = document.getElementById('newCodeBox');
                box.innerText = data.code;
                box.style.display = 'block';
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('newCodeBox').innerText);
            alert("已複製！");
        }

        console.log(`[admin ${ADMIN_BUILD}] loaded. WEATHER_API=${WEATHER_API}`);

        checkAuth();
    </script>
</body>
</html>
