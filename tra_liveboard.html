                    html += `<div class="timeline-item ${isPassed ? 'is-passed' : ''}" style="${isStopSuspended ? 'opacity: 0.6;' : ''}"><div class="time-box"><div style="${isStopSuspended ? 'text-decoration: line-through; color: #888;' : ''}">${(s.ArrivalTime || s.Arr || "").slice(0,5)} ${delay > 0 && !isPassed && !isStopSuspended && !isCancelled ? `<span class="delay-tag">+${delay}</span>` : ''}</div><div style="font-size:0.8rem; color:#666; ${isStopSuspended ? 'text-decoration: line-through;' : ''}">${(s.DepartureTime || s.Dep || "").slice(0,5)}</div></div><div class="node ${isCurrent ? 'active' : ''}" style="${isStopSuspended ? 'border-color: #ff5252; background: #331111;' : ''}"></div><div class="station-box"><div class="station-name-text" style="${isStopSuspended ? 'color: #ff5252;' : ''}">${sName} ${isStopSuspended ? '<span style="font-size: 0.9rem; background: #ff5252; color: #fff; padding: 2px 6px; border-radius: 4px; margin-left: 8px;">停靠取消</span>' : ''}</div></div></div>`;
                });
            }
            resBox.innerHTML = html + `</div></div>`;
        }

        // 🌟 參數改為接收 actualArr 與 actualDep
        function showTrainMarquee(cardEl, trainNo, delayStr, actualArr, actualDep, typeName, destName) {
            const board = document.getElementById('trainsBoard');
            const date = document.getElementById('queryDate').value;
            const delay = parseInt(delayStr || 0);
            const oldExpandedCard = board.querySelector('.train-card.expanded');
            if (oldExpandedCard && oldExpandedCard === cardEl) {
                let infoRow = cardEl.nextElementSibling;
                if (infoRow && infoRow.classList.contains('train-inline-marquee-row')) infoRow.remove();
                cardEl.classList.remove('expanded');
                expandedTrainNo = "";
                return;
            }
            if (oldExpandedCard) oldExpandedCard.classList.remove('expanded');
            board.querySelectorAll('.train-inline-marquee-row').forEach(el => el.remove());
            cardEl.classList.add('expanded'); 
            expandedTrainNo = String(trainNo || '');
            let infoRow = document.createElement('div');
            infoRow.className = 'train-inline-marquee-row';
            infoRow.innerHTML = '<div class="train-inline-marquee-track"><div class="train-inline-marquee-inner"></div></div>';
            cardEl.insertAdjacentElement('afterend', infoRow);
            const inner = infoRow.querySelector('.train-inline-marquee-inner');
            let expTime = (actualArr && actualArr !== '--:--') ? actualArr : actualDep;
            const sep = `<span style="color:#555; margin:0 15px;">|</span>`;
            const basicHtml = `<span style="color:#ffeb3b; font-weight:700;">${trainNo} 次</span> <span style="color:#fff;">往 ${destName} ${typeName}</span> ${sep} <span style="color:#fff;">本站預計 <span style="color:#00e676; font-weight:700;">${expTime}</span> 抵達</span> ${sep} <span style="color:#aaa;"><i class="fas fa-spinner fa-spin"></i> 正在連線取得即時位置與詳細停靠站...</span>`;
            inner.innerHTML = basicHtml;
            inner.style.animation = `train-inline-scroll 15s linear infinite`;
            const todayStr = new Date(Date.now() + 8 * 3600000).toISOString().split('T')[0];
            Promise.all([fetchTrainScheduleCached(trainNo, date), date === todayStr ? fetchTrainLiveCached(trainNo) : Promise.resolve(null)]).then(([data, liveData]) => {
                if (expandedTrainNo !== String(trainNo)) return; 
                let statusText = "列車訊號偵測中";
                const schedSuspended = Number(data?.TrainSuspendedFlag || data?.TrainInfo?.SuspendedFlag || 0);
                const stops = Array.isArray(data) ? (data[0]?.StopTimes || data[0]?.Stops || []) : (data?.StopTimes || data?.Stops || []);
                const stopSuspended = stops.some(s => String(s?.StationID || s?.ID || '') === String(currentStationID || '') && Number(s?.SuspendedFlag || 0) === 1);
                if (stopSuspended) statusText = "本站停駛";
                else if (schedSuspended === 2) statusText = "本車次部分停駛";
                else if ((liveData && liveData.status === 2) || schedSuspended === 1) statusText = "本車次今日停駛";
                else if (liveData && liveData.station) { let st = liveData.station; if (typeof st === 'object') st = st.Zh_tw || st.StationName?.Zh_tw || st.name || ""; statusText = `列車目前位置：${normalizeTaiText(st)}`; }
                else if (date === todayStr) { const compareTime = (actualDep && actualDep !== '--:--') ? actualDep : actualArr; const [h, m] = String(compareTime || '').slice(0, 5).split(':').map(Number); if (Number.isFinite(h) && Number.isFinite(m) && (h * 60 + m) > (new Date().getHours() * 60 + new Date().getMinutes())) statusText = "列車尚未發車"; }
                let effType = String(typeName || '').trim() || normalizeTrainTypeLabel(data?.TrainTypeName || data?.Type || data?.Note || '', data?.Note || '');
                let effDest = String(destName || '').trim() || normalizeTaiText(stops[stops.length - 1]?.StationName?.Zh_tw || stops[stops.length - 1]?.Name || '');
                const curIdx = stops.findIndex(s => (s.StationID || s.ID) === currentStationID);
                let stopsHtml = curIdx !== -1 && curIdx < stops.length - 1 ? stops.slice(curIdx + 1).map(s => { let st = (s.ArrivalTime || s.Arr || "").slice(0,5); if (delay > 0 && st) { const tm = st.split(':').map(Number).reduce((a,c,i)=>a+(i===0?c*60:c),0)+delay; st = `${String(Math.floor(tm/60)%24).padStart(2,'0')}:${String(tm%60).padStart(2,'0')}`; } return `<span style="color:#ffeb3b;">${normalizeTaiText(s.StationName?.Zh_tw || s.Name)}</span> <span style="color:#ccc;">(${st})</span>`; }).join(' <span style="color:#888; font-size:0.9em; margin: 0 8px;">►</span> ') : (curIdx === stops.length - 1 ? '<span style="color:#aaa;">本站為終點站</span>' : '<span style="color:#aaa;">無法取得後續停靠站</span>');
                const viaTags = getViaTags(data, stops);
                const rawNote = String(data?.Note || '').trim();
                const noteHtml = rawNote ? `<span style="color:#ff9800; font-weight:bold;">備註：${rawNote}</span> ${sep} ` : '';
                // 停駛時直接覆蓋預計抵達文字，避免顯示凍結的延誤時間
                let expTimeHtml = `<span style="color:#fff;">本站預計 <span style="color:#00e676; font-weight:700;">${expTime}</span> 抵達</span> ${sep} `;
                if (statusText.includes('停駛')) {
                    expTimeHtml = `<span style="color:#ff5252; font-weight:700;">🚫 本站停靠取消</span> ${sep} `;
                }
                const marqueeHtml = `<span style="color:#ffeb3b; font-weight:700;">${trainNo} 次</span> <span style="color:#fff;">往 ${effDest} ${effType}</span> ${sep} ${expTimeHtml} <span style="color:#4fc3f7;">${statusText}</span> ${sep} ${viaTags.length > 0 ? `<span style="color:#ffeb3b; font-weight:bold;">經由${viaTags.join('、')}</span> ${sep} ` : ''} ${noteHtml}<span style="color:#fff;">沿途停靠：</span>${stopsHtml}`;
                inner.innerHTML = marqueeHtml;
                inner.style.animation = `train-inline-scroll ${Math.max(15, marqueeHtml.replace(/<[^>]*>/g, '').trim().length * TRAIN_MARQUEE_SEC_PER_CHAR)}s linear infinite`;
            }).catch(e => {
                if (expandedTrainNo === String(trainNo)) { inner.innerHTML = `<span style="color:#ffeb3b; font-weight:700;">${trainNo} 次</span> ${sep} <span style="color:#ff5252;">❌ 取得詳細資訊失敗，請關閉後重試。</span>`; inner.style.animation = `train-inline-scroll 15s linear infinite`; }
            });
        }
    </script>
</body>
</html>
