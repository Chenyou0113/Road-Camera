<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>里程格式測試</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #FF9800;
            text-align: center;
            margin-bottom: 20px;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .test-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }
        .test-title {
            font-weight: bold;
            color: #FF9800;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        .test-data {
            background: #ffffff;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 0.9rem;
            border-left: 3px solid #FF9800;
        }
        .test-result {
            background: #e8f5e8;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 3px solid #4CAF50;
        }
        .mileage-info {
            color: #FF9800;
            font-weight: bold;
        }
        .segment-info {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛣️ 省道監視器里程格式測試</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            測試不同里程格式的識別和顯示效果
        </p>
        
        <div class="test-grid" id="testGrid">
            
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button onclick="runAllTests()" style="padding: 12px 24px; background: #FF9800; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem;">
                🧪 重新測試所有格式
            </button>
        </div>
    </div>

    <script>
        // 測試數據模擬不同的里程格式
        const testCameras = [
            {
                CCTVID: 'TEST001',
                RoadName: '台1線圓山交流道',
                LocationMile: '125K+500',
                LocationDescription: '圓山交流道附近',
                City: '台北市'
            },
            {
                CCTVID: 'TEST002', 
                RoadName: '台3線',
                LocationMile: '98.5K',
                LocationDescription: '大溪橋南端',
                City: '桃園市'
            },
            {
                CCTVID: 'TEST003',
                RoadName: '台9線蘇花改',
                LocationMile: '',
                LocationDescription: '里程：45.2 南澳隧道口',
                City: '宜蘭縣'
            },
            {
                CCTVID: 'TEST004',
                RoadName: '台61線西濱快速道路',
                LocationMile: '180公里',
                LocationDescription: '新竹系統交流道',
                City: '新竹縣'
            },
            {
                CCTVID: 'TEST005',
                RoadName: '台2線北部濱海公路',
                LocationMile: '25km',
                LocationDescription: '野柳地質公園路口',
                City: '新北市'
            },
            {
                CCTVID: 'TEST006',
                RoadName: '台17線',
                LocationMile: '155K+200',
                LocationDescription: '近好美里海堤收費站',
                City: '嘉義縣'
            }
        ];

        // 從 road.html 複製的函數
        function formatMileageDisplay(camera) {
            const locationMile = camera.LocationMile || '';
            const locationDesc = camera.LocationDescription || '';
            const roadName = camera.RoadName || '';
            const allText = `${locationMile} ${locationDesc} ${roadName}`;
            
            let mileageDisplay = '';
            let segmentInfo = '';
            
            // 提取原始里程格式
            const mileagePatterns = [
                /(\d+K\+\d+)/i,           // 125K+500 (保持原格式)
                /(\d+\.?\d*K)/i,          // 125K 或 125.5K
                /(\d+\.?\d*)公里/,        // 125公里
                /(\d+\.?\d*)km/i,         // 125km
                /里程[：:]\s*(\d+\.?\d*)/ // 里程：125
            ];
            
            for (const pattern of mileagePatterns) {
                const match = allText.match(pattern);
                if (match) {
                    mileageDisplay = match[1];
                    // 如果不是K+格式，轉換為K格式
                    if (!mileageDisplay.includes('K')) {
                        const num = parseFloat(match[1]);
                        mileageDisplay = `${num}K`;
                    }
                    break;
                }
            }
            
            // 提取路段資訊（交流道、橋樑、隧道等地標）
            const segmentPatterns = [
                /([^，,。\s]*(?:交流道|系統交流道))/g,     // 各種交流道
                /([^，,。\s]*(?:橋|大橋|陸橋|天橋))/g,     // 各種橋樑  
                /([^，,。\s]*(?:隧道))/g,                // 隧道
                /([^，,。\s]*(?:收費站|服務區))/g,        // 收費站、服務區
                /([^，,。\s]*(?:匝道|聯絡道))/g,          // 匝道、聯絡道
                /([^，,。\s]*(?:路口|十字路口))/g,        // 路口
                /([^，,。\s]*(?:車站|火車站|高鐵站))/g,    // 車站
                /([^，,。\s]*(?:工業區|科學園區|工業園區))/g, // 工業區等
                /(近\s*[^，,。\s]+)/g,                   // 近某地點
                /(距\s*[^，,。\s]+)/g                    // 距某地點
            ];
            
            const segments = [];
            for (const pattern of segmentPatterns) {
                const matches = allText.match(pattern);
                if (matches) {
                    segments.push(...matches);
                }
            }
            
            // 去重並取最相關的路段資訊（通常是最後一個或最長的）
            const uniqueSegments = [...new Set(segments)];
            if (uniqueSegments.length > 0) {
                // 優先選擇包含交流道、橋、隧道等重要地標的
                const importantSegments = uniqueSegments.filter(seg => 
                    /交流道|橋|隧道|收費站|服務區/.test(seg)
                );
                segmentInfo = importantSegments.length > 0 ? importantSegments[0] : uniqueSegments[0];
            }
            
            return {
                mileage: mileageDisplay,
                segment: segmentInfo
            };
        }

        function runAllTests() {
            const testGrid = document.getElementById('testGrid');
            testGrid.innerHTML = '';
            
            testCameras.forEach((camera, index) => {
                const result = formatMileageDisplay(camera);
                
                const testCard = document.createElement('div');
                testCard.className = 'test-card';
                testCard.innerHTML = `
                    <div class="test-title">測試案例 ${index + 1}: ${camera.RoadName}</div>
                    
                    <div class="test-data">
                        <strong>原始數據:</strong><br>
                        📍 LocationMile: "${camera.LocationMile}"<br>
                        📝 LocationDescription: "${camera.LocationDescription}"<br>
                        🛣️ RoadName: "${camera.RoadName}"
                    </div>
                    
                    <div class="test-result">
                        <strong>解析結果:</strong><br>
                        <span class="mileage-info">
                            <i class="fas fa-road"></i> 里程：${result.mileage || '未識別'}
                            ${result.segment ? `<span class="segment-info">(${result.segment})</span>` : ''}
                        </span>
                    </div>
                `;
                
                testGrid.appendChild(testCard);
            });
        }

        // 頁面載入時自動運行測試
        document.addEventListener('DOMContentLoaded', () => {
            runAllTests();
        });
    </script>
</body>
</html>
