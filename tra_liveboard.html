<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵即時看板 - 行動控制台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --accent-orange: #ff9800;
            --accent-blue: #4fc3f7;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --status-green: #2ecc71;
            --status-red: #e74c3c;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* === Header === */
        .main-header {
            background: linear-gradient(to bottom, #111, #000);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #333;
        }
        .header-brand { display: flex; align-items: center; gap: 12px; }
        .header-brand h1 { font-size: 1.5rem; margin: 0; font-weight: 900; }
        .header-brand i { color: var(--accent-orange); font-size: 1.8rem; }
        #updateTime { color: #ffeb3b; font-family: monospace; font-size: 1.2rem; font-weight: bold; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; width: 100%; box-sizing: border-box; }

        /* === Tab Switcher === */
        .tab-nav {
            display: flex; gap: 10px; margin-bottom: 20px;
            background: #222; padding: 5px; border-radius: 50px;
        }
        .tab-btn {
            flex: 1; border: none; padding: 12px; border-radius: 50px;
            background: transparent; color: #888; font-weight: bold;
            cursor: pointer; transition: 0.3s; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tab-btn.active { background: var(--accent-orange); color: #000; }

        /* === Control Card === */
        .control-card {
            background: var(--card-bg); padding: 25px; border-radius: 15px;
            border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .route-grid { display: grid; grid-template-columns: 1fr 50px 1fr 1fr auto; gap: 15px; align-items: flex-end; }

        .form-group { position: relative; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: var(--text-secondary); font-size: 0.85rem; font-weight: bold; }
        
        input, select {
            background: #252525; border: 1px solid #444; color: #fff;
            padding: 12px 15px; border-radius: 8px; font-size: 1rem; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-orange); }

        .query-btn {
            background: var(--accent-orange); color: #000; border: none;
            padding: 12px 25px; border-radius: 8px; font-weight: 900;
            cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .query-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .swap-btn {
            background: #333; border: 1px solid #444; color: #fff; height: 45px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* === Autocomplete 修復 === */
        .autocomplete-wrapper { position: relative; width: 100%; }
        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: #2c2c2c; border: 1px solid #444; border-radius: 8px;
            margin-top: 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 1000; display: none; overflow: hidden;
        }
        .suggestion-item {
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #3d3d3d;
            display: flex; justify-content: space-between;
        }
        .suggestion-item:hover { background: #3d3d3d; color: var(--accent-orange); }
        .suggestion-item .code { color: #666; font-size: 0.8rem; }

        /* === Result List === */
        .result-container { display: none; margin-top: 20px; }
        .section-header { 
            border-left: 5px solid var(--accent-orange); padding-left: 15px; 
            margin: 30px 0 15px 0; font-size: 1.2rem; font-weight: 900; 
        }
        
        .train-card {
            background: #151515; border-radius: 10px; padding: 15px 20px;
            display: grid; grid-template-columns: 100px 1fr 100px 120px;
            align-items: center; border: 1px solid #222; margin-bottom: 10px;
            transition: 0.2s; cursor: pointer;
        }
        .train-card:hover { border-color: #555; background: #222; }

        .train-no { font-weight: 900; color: #fff; font-size: 1.1rem; }
        .train-type-badge {
            background: #444; color: #fff; padding: 3px 8px; border-radius: 4px;
            font-size: 0.8rem; margin-right: 10px;
        }
        .destination { color: var(--accent-blue); font-weight: bold; }
        .time-box { text-align: center; font-family: monospace; font-size: 1.2rem; font-weight: bold; }
        .status-badge { text-align: right; font-weight: bold; }

        /* 延誤顏色 */
        .delay-red { color: var(--status-red); }
        .ontime-green { color: var(--status-green); }

        /* 響應式微調 */
        @media (max-width: 768px) {
            .input-row, .route-grid { grid-template-columns: 1fr; }
            .train-card { grid-template-columns: 1fr 1fr; gap: 10px; }
            .status-badge { text-align: left; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-brand">
            <i class="fas fa-train-subway"></i>
            <h1>台鐵行動控制台</h1>
        </div>
        <div id="updateTime">--:--:--</div>
    </header>

    <div class="container">
        <nav class="tab-nav">
            <button class="tab-btn active" id="btn-station" onclick="switchTab('station')"><i class="fas fa-list-ul"></i> 車站看板</button>
            <button class="tab-btn" id="btn-route" onclick="switchTab('route')"><i class="fas fa-route"></i> 站到站</button>
            <button class="tab-btn" id="btn-train" onclick="switchTab('train')"><i class="fas fa-magnifying-glass"></i> 車次追蹤</button>
        </nav>

        <main class="control-card">
            <!-- 1. 車站看板模式 -->
            <div id="panel-station" class="panel">
                <div class="input-row">
                    <div class="form-group autocomplete-wrapper">
                        <label>搜尋車站</label>
                        <input type="text" id="stationInput" placeholder="如：台北" oninput="handleStationSearch(this, 'station')" autocomplete="off">
                        <div id="stationSuggestions" class="suggestions"></div>
                        <input type="hidden" id="selectedStationID">
                    </div>
                    <div class="form-group">
                        <label>方向</label>
                        <select id="dirSelect">
                            <option value="">全部方向</option>
                            <option value="0">順行 (南下/西行)</option>
                            <option value="1">逆行 (北上/東行)</option>
                        </select>
                    </div>
                    <button class="query-btn" onclick="executeStationQuery()">查詢</button>
                </div>
            </div>

            <!-- 2. 站到站模式 -->
            <div id="panel-route" class="panel" style="display:none;">
                <div class="route-grid">
                    <div class="form-group autocomplete-wrapper">
                        <label>起點站</label>
                        <input type="text" id="routeStart" placeholder="起點" oninput="handleStationSearch(this, 'start')" autocomplete="off">
                        <div id="startSuggestions" class="suggestions"></div>
                        <input type="hidden" id="startID">
                    </div>
                    <button class="swap-btn" onclick="swapStations()"><i class="fas fa-exchange-alt"></i></button>
                    <div class="form-group autocomplete-wrapper">
                        <label>終點站</label>
                        <input type="text" id="routeEnd" placeholder="終點" oninput="handleStationSearch(this, 'end')" autocomplete="off">
                        <div id="endSuggestions" class="suggestions"></div>
                        <input type="hidden" id="endID">
                    </div>
                    <button class="query-btn" onclick="executeRouteQuery()">查班次</button>
                </div>
            </div>

            <!-- 3. 車次查詢模式 -->
            <div id="panel-train" class="panel" style="display:none;">
                <div class="input-row" style="grid-template-columns: 1fr auto;">
                    <div class="form-group">
                        <label>車次代碼</label>
                        <input type="text" id="trainNoInput" placeholder="如：408" inputmode="numeric">
                    </div>
                    <button class="query-btn" onclick="executeTrainQuery()">開始追蹤</button>
                </div>
            </div>
        </main>

        <section id="results" class="result-container">
            <div id="resultTitle" class="section-header"></div>
            <div id="resultList"></div>
        </section>
    </div>

    <script src="assets/station-code-mapping.js"></script>
    <script>
        const CONFIG = {
            API: "https://tra-schedule-worker.weacamm.org",
            AUTO_REFRESH_MINUTES: 1
        };

        let currentTab = 'station';
        let activeQueryID = ''; // 紀錄目前查詢的車站 ID
        let allStations = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 轉換 stationDataMap 為易搜尋的陣列
            if (typeof stationDataMap !== 'undefined') {
                allStations = Object.entries(stationDataMap).map(([id, data]) => ({
                    id, name: data.name.replace('站', ''), ename: data.ename
                }));
            }
            startHeartbeat();
        });

        // 💓 心跳與整分鐘更新
        function startHeartbeat() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('updateTime').textContent = now.toLocaleTimeString('en-GB');
                
                if (now.getSeconds() === 0) {
                    if (currentTab === 'station' && activeQueryID) {
                        console.log("⏱️ 整分鐘自動刷新...");
                        executeStationQuery(true);
                    }
                }
            }, 1000);
        }

        // === Tab 切換 ===
        function switchTab(tab) {
            currentTab = tab;
            // 1. 清空 UI
            document.getElementById('results').style.display = 'none';
            document.getElementById('resultList').innerHTML = '';
            document.getElementById('resultTitle').innerText = '';
            
            // 2. 切換按鈕樣式
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');

            // 3. 切換面板
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            document.getElementById(`panel-${tab}`).style.display = 'block';
        }

        // === 車站搜尋 (Autocomplete) ===
        function handleStationSearch(input, type) {
            const val = input.value.trim().replace(/台/g, '臺');
            const targetID = type === 'station' ? 'stationSuggestions' : (type === 'start' ? 'startSuggestions' : 'endSuggestions');
            const box = document.getElementById(targetID);

            if (!val) { box.style.display = 'none'; return; }

            const matches = allStations.filter(s => s.name.includes(val) || s.id.includes(val)).slice(0, 5);
            
            if (matches.length > 0) {
                box.innerHTML = matches.map(s => `
                    <div class="suggestion-item" onclick="selectStation('${type}', '${s.id}', '${s.name}')">
                        <span>${s.name}</span>
                        <span class="code">${s.id}</span>
                    </div>
                `).join('');
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }

        function selectStation(type, id, name) {
            if (type === 'station') {
                document.getElementById('stationInput').value = name;
                document.getElementById('selectedStationID').value = id;
                document.getElementById('stationSuggestions').style.display = 'none';
            } else if (type === 'start') {
                document.getElementById('routeStart').value = name;
                document.getElementById('startID').value = id;
                document.getElementById('startSuggestions').style.display = 'none';
            } else {
                document.getElementById('routeEnd').value = name;
                document.getElementById('endID').value = id;
                document.getElementById('endSuggestions').style.display = 'none';
            }
        }

        // === 執行查詢 ===
        async function executeStationQuery(isAuto = false) {
            const id = document.getElementById('selectedStationID').value;
            const name = document.getElementById('stationInput').value;
            const dir = document.getElementById('dirSelect').value;
            if (!id) return alert("請先選擇車站");

            activeQueryID = id;
            if (!isAuto) document.getElementById('resultList').innerHTML = '<p style="text-align:center;">⏳ 載入中...</p>';
            document.getElementById('results').style.display = 'block';
            document.getElementById('resultTitle').innerText = `${name}車站 即時動態`;

            try {
                const res = await fetch(`${CONFIG.API}/api/liveboard/station?station=${id}`);
                const data = await res.json();
                
                let filtered = data;
                if (dir !== "") filtered = data.filter(t => String(t.Direction) === dir);

                renderStationTable(filtered);
            } catch (e) {
                document.getElementById('resultList').innerHTML = '<p style="color:red;text-align:center;">讀取失敗，請稍後再試</p>';
            }
        }

        function renderStationTable(list) {
            const listEl = document.getElementById('resultList');
            if (list.length === 0) { listEl.innerHTML = '<p style="text-align:center;color:#666;">目前無列車資訊</p>'; return; }

            listEl.innerHTML = list.map(t => {
                const delay = parseInt(t.DelayTime || 0);
                const statusStr = delay === 0 ? '準點' : `晚 ${delay} 分`;
                const statusCls = delay === 0 ? 'ontime-green' : 'delay-red';
                const time = t.ScheduledDepartureTime.slice(0, 5);

                return `
                    <div class="train-card" onclick="window.open('tra-pids.html?station=${activeQueryID}&name=${t.EndingStationName}', '_blank')">
                        <div class="train-no">
                            <span class="train-type-badge">${t.TrainTypeName.Zh_tw}</span>
                            ${t.TrainNo}
                        </div>
                        <div class="destination">往 ${t.EndingStationName}</div>
                        <div class="time-box">${time}</div>
                        <div class="status-badge ${statusCls}">${statusStr}</div>
                    </div>
                `;
            }).join('');
        }

        function swapStations() {
            const s = document.getElementById('routeStart'), e = document.getElementById('routeEnd');
            const sid = document.getElementById('startID'), eid = document.getElementById('endID');
            [s.value, e.value] = [e.value, s.value];
            [sid.value, eid.value] = [eid.value, sid.value];
        }

        async function executeRouteQuery() {
            const sid = document.getElementById('startID').value;
            const eid = document.getElementById('endID').value;
            const sname = document.getElementById('routeStart').value;
            const ename = document.getElementById('routeEnd').value;
            if (!sid || !eid) return alert("請輸入起訖站");

            document.getElementById('resultList').innerHTML = '<p style="text-align:center;">⏳ 規劃路徑中...</p>';
            document.getElementById('results').style.display = 'block';
            document.getElementById('resultTitle').innerText = `${sname} ➡ ${ename}`;

            try {
                const res = await fetch(`${CONFIG.API}/api/fare?start=${sid}&end=${eid}`);
                const data = await res.json();
                // 這裡簡化處理，僅顯示搜尋成功
                document.getElementById('resultList').innerHTML = `<p style="text-align:center;color:var(--accent-orange);">✅ 已找到資料，請點擊車次追蹤查看詳細歷史紀錄。</p>`;
            } catch (e) { alert("查詢失敗"); }
        }

        // 點擊空白處關閉選單
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.autocomplete-wrapper')) {
                document.querySelectorAll('.suggestions').forEach(s => s.style.display = 'none');
            }
        });
    </script>
</body>
</html>
