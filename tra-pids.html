<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵 PIDS (V6.0 Master Class - PWA + 大師級架構)</title>

    <!-- 🔥 PWA 支援 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="台鐵PIDS">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ CSS 變數系統 (Design Tokens) ============ */
        :root {
            --pids-bg-primary: #000000;
            --pids-bg-secondary: #111111;
            --pids-text-primary: #ffffff;
            --pids-text-secondary: #cccccc;
            --pids-border: #333333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #4fc3f7;
            --accent-red: #ff1744;
            --accent-orange: #ff9800;
            --header-inbound: linear-gradient(to right, #000080, #0d47a1);
            --header-outbound: linear-gradient(to right, #bf360c, #e65100);
            --row-odd-bg-inbound: #000;
            --row-even-bg-inbound: #002f4b;
            --row-odd-bg-outbound: #000;
            --row-even-bg-outbound: #3e2723;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ============ 無障礙設計：螢幕閱讀器專用 ============ */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        body {
            background-color: var(--pids-bg-secondary);
            color: var(--pids-text-primary);
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
        }

        /* Header */
        .unified-header {
            width: 100%;
            height: 90px;
            background: #000;
            border: none;
            /* 🔥 修正: 移除邊框 */
            border-radius: 0;
            /* 🔥 修正: 移除圓角 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: none;
            /* 移除陰影 */
            flex-shrink: 0;
            border-bottom: 2px solid #333;
            /* 加上底部線條以分隔 */
        }

        .station-branding {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            line-height: 1;
        }

        .tra-logo-img {
            height: 3.5rem;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .station-name-block {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 10px;
            line-height: 1;
        }

        .station-name {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
        }

        .station-sub {
            font-size: 3.5rem;
            color: #4fc3f7;
            font-family: Consolas, sans-serif;
            letter-spacing: 0px;
            font-weight: bold;
            line-height: 1;
            margin: 0;
        }

        .datetime-block {
            text-align: right;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            line-height: 1;
        }

        .date-text {
            font-size: 3rem;
            color: #ccc;
            font-weight: bold;
            font-family: Consolas, monospace;
            line-height: 1;
            margin: 0;
        }

        .time-text {
            font-size: 3rem;
            font-weight: bold;
            font-family: Consolas, monospace;
            color: #ffeb3b;
            line-height: 1;
            margin: 0;
        }

        /* 全螢幕按鈕 */
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            margin-left: 12px;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        /* Top Marquee */
        .unified-marquee-container {
            width: 100%;
            height: 60px;
            background: #e3f2fd;
            border: none;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #003366;
            flex-shrink: 0;
            margin-top: 0;
            /* 修正: 移除負邊距，讓它緊貼 Header */
            margin-left: -8px;
            margin-right: -8px;
            padding: 0 8px;
        }

        .unified-marquee-container .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: 60px;
            line-height: 60px;
            font-size: 2.5rem;
            font-weight: 900;
            left: 100%;
            will-change: transform;
            letter-spacing: 1px;
        }

        /* 🔥 移除: 不再自動添加箭頭，完全使用 D1 中的內容 */

        /* PIDS Section */
        .pids-section {
            display: flex;
            width: 100%;
            gap: 10px;
            flex: 0 0 auto;
            /* ✅ 不自動增長，由內容決定 */
            min-height: 0;
            overflow: hidden;
        }

        .pids-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            border: 3px solid var(--pids-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .screen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            overflow: hidden;
        }

        .direction-header-1 {
            background: var(--header-inbound);
            color: var(--pids-text-primary);
            padding: 10px 15px;
            font-size: 1.5rem;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--pids-text-primary);
            flex-shrink: 0;
        }

        .direction-header-0 {
            background: var(--header-outbound);
            color: var(--pids-text-primary);
            padding: 10px 15px;
            font-size: 1.5rem;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--pids-text-primary);
            flex-shrink: 0;
        }

        .dest-list {
            font-size: 1.5rem;
        }

        /* 表格設定 (5欄 + 7班車) */
        .train-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            table-layout: fixed;
        }

        .train-table th {
            padding: 8px;
            color: #fff;
            border-bottom: 2px solid #fff;
            height: 40px;
            font-size: 1.3rem;
        }

        .train-table tbody tr {
            border-bottom: 1px solid #333;
        }

        /* 5班車 */
        .train-table td {
            padding: 0 5px;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 65px;
            /* ✅ 5班車專用：稍微加高，讓每班車更清晰 */
            font-size: 1.8rem;
            /* 加大字體 */
        }

        .table-1 th {
            background: #000080;
        }

        .table-1 tr:nth-child(odd) {
            background: var(--row-odd-bg-inbound);
        }

        .table-1 tr:nth-child(even) {
            background: var(--row-even-bg-inbound);
        }

        .table-0 th {
            background: #bf360c;
        }

        .table-0 tr:nth-child(odd) {
            background: var(--row-odd-bg-outbound);
        }

        .table-0 tr:nth-child(even) {
            background: var(--row-even-bg-outbound);
        }

        .marquee-footer {
            background: #212121;
            color: #ffeb3b;
            height: 50px;
            position: relative;
            overflow: hidden;
            border-top: 3px solid #ff9800;
            flex-shrink: 0;
        }

        .marquee-footer .marquee-text {
            position: absolute;
            white-space: nowrap;
            left: 100%;
            height: 50px;
            line-height: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Media Section - ✅ V6.1 黃金比例：自動填滿剩餘空間 */
        .media-section {
            flex: 1;
            /* ✅ 關鍵：自動佔滿畫面垂直剩餘的所有空間 */
            display: flex;
            gap: 10px;
            min-height: 150px;
            /* 確保最小高度 */
            margin-top: 4px;
        }

        .media-box {
            flex: 1;
            height: 100%;
            /* ✅ 填滿父容器 */
            background: #000;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-label {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            font-size: 1rem;
            z-index: 10;
            border-bottom-right-radius: 8px;
        }

        .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            opacity: 0;
            transition: opacity 1s;
        }

        .carousel-img.active {
            opacity: 1;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 車種顏色 */
        .train-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            white-space: nowrap;
            min-width: 90px;
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .type-自強 {
            background-color: #FF5722;
        }

        .type-新自強 {
            background: linear-gradient(135deg, #222 0%, #444 100%);
            border: 1px solid #999;
        }

        .type-普悠瑪 {
            background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%);
        }

        .type-太魯閣 {
            background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%);
        }

        .type-莒光 {
            background-color: #FF9800;
        }

        .type-區間快 {
            background-color: #3F51B5;
        }

        .type-區間 {
            background-color: #2196F3;
        }

        .type-其他 {
            background-color: #607D8B;
        }

        /* 狀態與時間 */
        .status-ontime {
            color: #FFFFFF !important;
        }

        .status-delay {
            color: #ff1744 !important;
            animation: blink 1s infinite alternate;
        }

        .status-cancelled {
            color: #FF5252;
            font-weight: 900;
        }

        /* 延誤時間容器 -> 橫向並排顯示 */
        .time-delay-container {
            display: flex;
            flex-direction: row;
            /* 橫向排列 */
            justify-content: flex-end;
            /* 靠右對齊 */
            align-items: center;
            /* 垂直置中 */
            height: 100%;
            padding-right: 5px;
            gap: 8px;
            /* 兩個時間之間的間隔 */
        }

        .original-time {
            text-decoration: line-through;
            color: #777;
            font-size: 1.2rem;
            line-height: 1.8rem;
            /* 與預計時間對齐 */
        }

        .expected-time {
            color: #4fc3f7;
            font-weight: bold;
            font-size: 1.8rem;
        }

        .normal-time {
            font-size: 1.8rem;
            font-family: Consolas;
            text-align: right;
            padding-right: 5px;
        }

        .highlight-row {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border: 2px solid #ffeb3b !important;
        }

        @keyframes dynamic-marquee {
            from {
                transform: translateX(var(--start-pos));
            }

            to {
                transform: translateX(var(--end-pos));
            }
        }

        /* 🔥 中型平板優化 (1024px-1280px，如 1280×800 平板) */
        @media (max-width: 1280px) and (min-width: 901px) {
            .unified-header {
                height: 75px;
                padding: 0 12px;
            }

            .tra-logo-img {
                height: 2.8rem;
            }

            .station-name {
                font-size: 2.8rem;
            }

            .station-sub {
                font-size: 2.8rem;
            }

            .datetime-block {
                gap: 10px;
            }

            .date-text {
                font-size: 2.3rem;
            }

            .time-text {
                font-size: 2.3rem;
            }

            /* 中型平板全螢幕按鈕 */
            .fullscreen-btn {
                width: 44px;
                height: 44px;
                font-size: 1.3rem;
                margin-left: 10px;
            }

            .unified-marquee-container {
                height: 50px;
            }

            .unified-marquee-container .marquee-text {
                line-height: 50px;
                font-size: 1.5rem;
            }

            .direction-header-0,
            .direction-header-1 {
                font-size: 1.2rem;
                padding: 8px 12px;
            }

            .dest-list {
                font-size: 1rem;
            }

            .train-table {
                font-size: 1.1rem;
            }

            .train-table th {
                font-size: 0.95rem;
                padding: 5px 2px;
                height: 30px;
            }

            .train-table td {
                height: 58px;
                padding: 0 3px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* 車次欄位特別縮小 */
            .train-table td:nth-child(1) {
                font-size: 0.9rem;
            }

            /* 狀態欄位特別縮小 */
            .train-table td:nth-child(5) {
                font-size: 0.9rem;
            }

            .train-type-badge {
                font-size: 0.8rem;
                min-width: 55px;
                max-width: 75px;
            }

            .normal-time,
            .expected-time {
                font-size: 1.2rem;
            }

            .original-time {
                font-size: 0.9rem;
            }
        }

        /* 🔥 小平板全螢幕優化 (800px-900px，如 800×600 或 1024×768 小平板) */
        @media (max-width: 900px) and (min-width: 700px) {
            .unified-header {
                height: 60px;
                padding: 0 10px;
            }

            .tra-logo-img {
                height: 2.2rem;
            }

            .station-branding {
                gap: 8px;
            }

            .station-name {
                font-size: 2.2rem;
            }

            .station-sub {
                font-size: 2.2rem;
            }

            .datetime-block {
                gap: 8px;
            }

            .date-text {
                font-size: 1.8rem;
            }

            .time-text {
                font-size: 1.8rem;
            }

            /* 小平板全螢幕按鈕 */
            .fullscreen-btn {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
                margin-left: 8px;
            }

            .unified-marquee-container {
                height: 42px;
            }

            .unified-marquee-container .marquee-text {
                line-height: 42px;
                font-size: 1.2rem;
            }

            .direction-header-0,
            .direction-header-1 {
                font-size: 1rem;
                padding: 6px 8px;
            }

            .dest-list {
                font-size: 0.85rem;
            }

            .train-table {
                font-size: 0.75rem;
            }

            .train-table th {
                font-size: 0.7rem;
                padding: 3px 1px;
                height: 22px;
            }

            .train-table td {
                height: 48px;
                padding: 0 1px;
                font-size: 0.75rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* 車次欄位特別縮小 */
            .train-table td:nth-child(1) {
                font-size: 0.65rem;
            }

            /* 狀態欄位特別縮小 */
            .train-table td:nth-child(5) {
                font-size: 0.65rem;
            }

            .train-type-badge {
                font-size: 0.75rem;
                min-width: 48px;
                max-width: 68px;
                padding: 2px 3px;
            }

            .normal-time,
            .expected-time {
                font-size: 0.8rem;
            }

            .original-time {
                font-size: 0.6rem;
            }

            .marquee-footer {
                height: 36px;
            }

            .marquee-footer .marquee-text {
                font-size: 0.9rem;
                line-height: 36px;
            }
        }

        /* 🔥 RWD 修正區塊 (針對小螢幕，如手機/平板) */
        @media (max-width: 699px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
            .unified-header {
                height: 65px;
                padding: 0 8px;
                gap: 8px;
            }

            .tra-logo-img {
                height: 2.3rem;
            }

            .station-branding {
                gap: 8px;
            }

            .station-name-block {
                flex-direction: column;
                gap: 0;
                align-items: flex-start;
            }

            .station-name {
                font-size: 1.5rem;
            }

            .station-sub {
                font-size: 1.3rem;
            }

            .datetime-block {
                gap: 6px;
            }

            .date-text {
                font-size: 1.1rem;
            }

            .time-text {
                font-size: 1.4rem;
            }

            /* 平板版全螢幕按鈕 */
            .fullscreen-btn {
                width: 34px;
                height: 34px;
                font-size: 1rem;
                margin-left: 6px;
            }

            .unified-marquee-container {
                height: 38px;
                margin-left: -8px;
                margin-right: -8px;
            }

            .unified-marquee-container .marquee-text {
                line-height: 38px;
                font-size: 1rem;
            }

            .pids-section {
                flex-direction: column;
                gap: 8px;
                overflow-y: auto;
            }

            .pids-column {
                min-height: 240px;
                flex-shrink: 0;
            }

            .direction-header-0,
            .direction-header-1 {
                font-size: 0.9rem;
                padding: 5px 8px;
            }

            .dest-list {
                font-size: 0.75rem;
            }

            .train-table {
                font-size: 0.85rem;
            }

            .train-table th {
                font-size: 0.75rem;
                padding: 3px 2px;
                height: 24px;
            }

            .train-table td {
                height: 46px;
                padding: 0 3px;
                font-size: 0.85rem;
            }

            /* 車次欄位特別縮小，避免截斷成省略號 */
            .train-table td:nth-child(1) {
                font-size: 0.7rem;
            }

            /* 狀態欄位特別縮小 */
            .train-table td:nth-child(5) {
                font-size: 0.7rem;
            }

            /* 手機版5班車佔滿空間 */

            .train-type-badge {
                font-size: 0.65rem;
                min-width: 42px;
                max-width: 60px;
                padding: 2px 3px;
            }

            .normal-time,
            .expected-time {
                font-size: 0.85rem;
            }

            .original-time {
                font-size: 0.65rem;
            }

            .marquee-footer {
                height: 32px;
            }

            .marquee-footer .marquee-text {
                font-size: 0.8rem;
                line-height: 32px;
            }

            /* 🔥 修正: 手機版媒體區塊改為垂直堆疊並可滑動 */
            .media-section {
                flex-direction: column;
                gap: 8px;
                overflow-y: auto;
            }

            .media-box {
                height: 120px;
                /* 每個盒子固定高度 */
                flex: 0 0 auto;
                /* 不自動伸縮 */
            }
        }

        @media (max-width: 480px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
            .unified-header {
                height: 60px;
                padding: 0 5px;
            }

            .tra-logo-img {
                height: 1.8rem;
            }

            .station-name-block {
                flex-direction: column;
                gap: 0;
                align-items: flex-start;
            }

            .station-name {
                font-size: 1.3rem;
            }

            .station-sub {
                font-size: 0.65rem;
            }

            .date-text {
                font-size: 0.6rem;
            }

            .time-text {
                font-size: 1.2rem;
            }

            /* 手機版全螢幕按鈕 */
            .fullscreen-btn {
                width: 28px;
                height: 28px;
                font-size: 0.85rem;
                margin-left: 4px;
                border-radius: 6px;
            }

            .unified-marquee-container {
                height: 32px;
            }

            .unified-marquee-container .marquee-text {
                line-height: 32px;
                font-size: 0.85rem;
            }

            .direction-header-0,
            .direction-header-1 {
                font-size: 0.8rem;
                padding: 3px 6px;
            }

            .dest-list {
                font-size: 0.65rem;
            }

            .pids-section {
                overflow-y: auto;
            }

    <!-- 🔥 HTML Templates (資料驅動 UI，從源頭杜絕 XSS) -->
    <template id="train-row-template">
        <tr role="row">
            <td role="gridcell" class="train-no-cell" style="font-family:Consolas"></td>
            <td role="gridcell" class="train-type-cell"></td>
            <td role="gridcell" class="train-dest-cell"></td>
            <td role="gridcell" class="train-time-cell"></td>
            <td role="gridcell" class="train-status-cell"></td>
        </tr>
    </template>

    <script src="assets/config.js"></script>
    <script src="assets/tdx-api.js"></script>
    <script>
        // ============ PIDS 應用程式架構 ============
        const PIDS_APP = {
            // 配置常數（解決硬編碼問題）
            CONFIG: {
                API_BASE: "https://tra-schedule-worker.weacamm.org",
                INTERVALS: {
                    CLOCK: 1000,            // 時鐘更新間隔
                    PIDS_UPDATE: 60000,     // PIDS 數據更新間隔 (1分鐘)
                    LANG_SWITCH: 80000,     // 語言自動切換間隔 (80秒)
                    TOP_MARQUEE_CHECK: 60000,  // 頂部跑馬燈檢查間隔 (1分鐘)
                    CAROUSEL: 10000         // 輪播圖切換間隔
                },
                ROWS: {
                    DESKTOP: 5,  // ✅ 黃金比例：5 行列車，每行更大更清晰
                    MOBILE: 5
                },
                TRAIN_TYPES: {
                    "1100": "\u81ea\u5f37", "1101": "\u592a\u9b6f\u95a3", "1102": "\u81ea\u5f37", "1103": "\u81ea\u5f37", "1107": "\u666e\u60a0\u746a",
                    "1108": "\u81ea\u5f37", "110B": "\u65b0\u81ea\u5f37", "110G": "\u65b0\u81ea\u5f37", "110H": "\u65b0\u81ea\u5f37", "110K": "\u65b0\u81ea\u5f37", "110M": "\u65b0\u81ea\u5f37",
                    "1110": "\u8392\u5149", "1111": "\u8392\u5149", "1112": "\u8392\u5149", "1113": "\u8392\u5149", "1114": "\u8392\u5149", "1115": "\u8392\u5149", "1120": "\u5fa9\u8208",
                    "1131": "\u5340\u9593", "1132": "\u5340\u9593\u5feb", "1140": "\u666e\u5feb", "1150": "\u67f4\u5feb", "1270": "\u666e\u901a", "1280": "\u5340\u9593", "1281": "\u5340\u9593", "1282": "\u5340\u9593"
                }
            },

            // 應用狀態（使用 Proxy 實現響應式）
            STATE: new Proxy({
                currentLang: localStorage.getItem('pids_lang') || 'zh',
                manualLangOverride: false, // 記錄是否為手動切換
                rowLangs: [], // 🔥 儲存每一行目前的獨立語言
                stationID: '',
                stationName: '',
                lastTrainData: [],
                stopsCache: {},
                autoSwitchTimer: null,
                isVideoLoaded: false,
                _observers: new Set()
            }, {
                set(target, prop, value) {
                    if (prop.startsWith('_')) { target[prop] = value; return true; }
                    const oldValue = target[prop];
                    target[prop] = value;
                    target._observers.forEach(cb => { try { cb(prop, value, oldValue); } catch(e){} });

                    if (prop === 'stationID' && value) PIDS_APP.updatePids();
                    
                    // 🔥 防抖動 (Debounce) 渲染機制：當語言或資料改變時，延遲 10ms 再重繪，避免同一秒內重複渲染
                    if (prop === 'currentLang' || prop === 'rowLangs' || prop === 'lastTrainData') {
                        clearTimeout(target._renderTimer);
                        target._renderTimer = setTimeout(() => refreshDisplay(), 10);
                    }
                    return true;
                }
            }),

            // 訂閱狀態變化
            subscribe(callback) {
                this.STATE._observers.add(callback);
                return () => this.STATE._observers.delete(callback); // 返回取消訂閱函數
            },

            // 初始化
            init() {
                const params = new URLSearchParams(location.search);
                this.STATE.stationID = params.get('station');
                this.STATE.stationName = params.get('name') || '\u81fa\u9435';

                this.ui.updateStationName();
                this.ui.updateEnglishStationName();
                this.ui.updateUIStrings();
                this.startTimers();
                this.loadInitialData();
            },

            // UI 方法
            ui: {
                updateStationName() {
                    const el = document.getElementById('unifiedStationName');
                    if (el) {
                        const cleanName = PIDS_APP.STATE.stationName.replace(/車站$|站$/, '');
                        el.textContent = cleanName + '車站';
                    }
                },

                updateEnglishStationName() {
                    const enElement = document.getElementById('station-en');
                    const stationID = PIDS_APP.STATE.stationID;
                    if (enElement && typeof stationDataMap !== 'undefined' && stationDataMap[stationID]) {
                        const rawName = stationDataMap[stationID].ename;
                        const formattedName = rawName.split('_')[0].toUpperCase();
                        enElement.textContent = `${formattedName} STATION`;
                    } else if (enElement) {
                        enElement.textContent = "TRA STATION";
                    }
                },

                updateUIStrings() {
                    const lang = i18n[PIDS_APP.STATE.currentLang];

                    const dir1Title = document.getElementById('dirTitle1');
                    const dir0Title = document.getElementById('dirTitle0');
                    if (dir1Title) dir1Title.textContent = lang.inbound;
                    if (dir0Title) dir0Title.textContent = lang.outbound;

                    const headHtml = `
                        <tr>
                            <th scope="col" style="width:15%">${lang.trainNo}</th>
                            <th scope="col" style="width:20%">${lang.type}</th>
                            <th scope="col" style="width:28%">${lang.dest}</th>
                            <th scope="col" style="width:20%">${lang.time}</th>
                            <th scope="col" style="width:17%">${lang.status}</th>
                        </tr>`;

                    const table1Head = document.querySelector('.table-1 thead');
                    const table0Head = document.querySelector('.table-0 thead');
                    if (table1Head) table1Head.innerHTML = headHtml;
                    if (table0Head) table0Head.innerHTML = headHtml;
                }
            },

            startTimers() {
                // 每秒更新時鐘與語言檢查
                setInterval(() => this.updateClock(), this.CONFIG.INTERVALS.CLOCK);
                
                if (this.STATE.stationID) {
                    this.updatePids();
                    setInterval(() => this.updatePids(), this.CONFIG.INTERVALS.PIDS_UPDATE);
                }
                
                this.checkTopMarquee();
                setTimeout(() => startMarquee('unifiedTopMarquee'), 1500);
                setInterval(() => this.checkTopMarquee(), this.CONFIG.INTERVALS.TOP_MARQUEE_CHECK);
                
                // 🔥 移除這行：不再使用舊的 setInterval 切換語言
                // this.startAutoLangSwitch(); 
            },

            loadInitialData() {
                this.updateClock();
                updateMediaAssets();
                this.initKeyboardNavigation();
                console.log('✅ PIDS 系統初始化完成');
            },

            // 🔥 鍵盤導航支援（政府專案無障礙檢測要求）
            initKeyboardNavigation() {
                // 為所有互動元素添加鍵盤支援
                const interactiveElements = [
                    '#station-select',
                    '#languageSwitchBtn',
                    '#fullscreenBtn'
                ];

                interactiveElements.forEach(selector => {
                    const el = document.querySelector(selector);
                    if (el && !el.hasAttribute('tabindex')) {
                        el.setAttribute('tabindex', '0');
                        el.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                el.click();
                            }
                        });
                    }
                });

                // 為表格添加鍵盤導航
                this.subscribe((prop) => {
                    if (prop === 'lastTrainData') {
                        setTimeout(() => {
                            document.querySelectorAll('.train-table tbody').forEach((tbody, tableIndex) => {
                                tbody.setAttribute('tabindex', '0');
                                tbody.setAttribute('aria-label', `使用方向鍵瀏覽列車資訊 - ${tableIndex === 0 ? '北上' : '南下'}方向`);

                                // 移除舊監聽器避免重複
                                const newTbody = tbody.cloneNode(true);
                                tbody.parentNode.replaceChild(newTbody, tbody);

                                newTbody.addEventListener('keydown', (e) => {
                                    const rows = Array.from(newTbody.querySelectorAll('tr'));
                                    const currentRow = document.activeElement.closest('tr');
                                    const currentIndex = currentRow ? rows.indexOf(currentRow) : -1;

                                    switch (e.key) {
                                        case 'ArrowDown':
                                            e.preventDefault();
                                            if (currentIndex < rows.length - 1) {
                                                rows[currentIndex + 1].focus();
                                            }
                                            break;
                                        case 'ArrowUp':
                                            e.preventDefault();
                                            if (currentIndex > 0) {
                                                rows[currentIndex - 1].focus();
                                            }
                                            break;
                                        case 'Home':
                                            e.preventDefault();
                                            rows[0]?.focus();
                                            break;
                                        case 'End':
                                            e.preventDefault();
                                            rows[rows.length - 1]?.focus();
                                            break;
                                        case 'Tab':
                                            // 允許 Tab 離開表格
                                            break;
                                        default:
                                            return;
                                    }
                                });

                                // 為每一行添加 tabindex
                                newTbody.querySelectorAll('tr').forEach((row, index) => {
                                    row.setAttribute('tabindex', '0');
                                    row.setAttribute('aria-rowindex', String(index + 2)); // +2 因為 header 是 row 1
                                });
                            });
                        }, 200); // 增加延遲確保 DOM 更新完成
                    }
                });

                console.log('⌨️ 鍵盤導航已啟用：使用 Tab/方向鍵瀏覽');
            },

            // 🔥 不需要這個函數了
            // startAutoLangSwitch() { ... },

            updateClock() {
                const now = new Date();
                
                // 1. 更新畫面時間
                UI_Helper.setText('unifiedTime', now.toLocaleTimeString('en-GB'));
                UI_Helper.setText('unifiedDate', now.toISOString().split('T')[0].replace(/-/g, '/'));

                if (this.STATE.manualLangOverride) return;

                // 🔥 2. 絕對時間數學公式 (全部一起切換)
                const t = Math.floor(now.getTime() / 1000);
                
                // 設定切換週期：每 60 秒 (1分鐘) 切換一次語言
                const cycleSeconds = 60;
                const cycle = Math.floor(t / cycleSeconds) % 2;
                
                // 0: zh (中文), 1: en (英文)
                const currentBase = (cycle === 0) ? 'zh' : 'en';

                // 處理表頭與跑馬燈的語言
                if (this.STATE.currentLang !== currentBase) {
                    this.STATE.currentLang = currentBase;
                    PIDS_APP.ui.updateUIStrings();
                }

                // 計算每一行的專屬語言：全部統一 (同步切換)
                const newRowLangs = [];
                const maxRows = window.innerWidth <= 900 ? this.CONFIG.ROWS.MOBILE : this.CONFIG.ROWS.DESKTOP;
                for (let i = 0; i < maxRows; i++) {
                    newRowLangs.push(currentBase);
                }

                // 檢查如果列語言陣列有改變，才觸發更新
                const currentLangsStr = JSON.stringify(this.STATE.rowLangs || []);
                const newLangsStr = JSON.stringify(newRowLangs);
                if (currentLangsStr !== newLangsStr) {
                    this.STATE.rowLangs = newRowLangs; // 觸發 Proxy 自動呼叫 refreshDisplay()
                }
            },

            async updatePids() {
                // 🔥 取消上一次請求，防止 Race Condition
                if (this._currentFetchController) {
                    this._currentFetchController.abort();
                    console.log('⚠️ 已取消上一次請求');
                }

                this._currentFetchController = new AbortController();
                const signal = this._currentFetchController.signal;

                try {
                    const url = `${this.CONFIG.API_BASE}/api/liveboard/station?station=${this.STATE.stationID}`;
                    const response = await fetch(url, {
                        signal,
                        // 添加超時保護
                        timeout: 15000
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();

                    const now = new Date();
                    const currentHours = now.getHours();
                    const currentMins = now.getMinutes();
                    const nowTotalMinutes = currentHours * 60 + currentMins;

                    let filtered = data.filter(t => {
                        const [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                        const schedMins = h * 60 + m;
                        const delayMins = parseInt(t.DelayTime || 0);
                        const actualMins = schedMins + delayMins;
                        const isCancelled = String(t.TrainStatus) === '2';
                        return actualMins >= nowTotalMinutes || isCancelled;
                    });

                    filtered.forEach(t => {
                        let [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                        let delayMins = parseInt(t.DelayTime || 0);
                        let actualMins = (h * 60 + m) + delayMins;
                        t._sort = actualMins % 1440;
                    });
                    filtered.sort((a, b) => a._sort - b._sort);

                    this.STATE.lastTrainData = filtered;
                    refreshDisplay();

                } catch (error) {
                    // 忽略被取消的請求（正常行為）
                    if (error.name === 'AbortError') {
                        console.log('🔄 請求已被新請求取代');
                        return;
                    }

                    console.error("❌ PIDS 更新失敗:", error);
                    UI_Helper.showErrorOverlay('列車資訊傳輸暫時中斷，請以車站現場資訊為主。');
                    renderTable('1', []);
                    renderTable('0', []);
                } finally {
                    this._currentFetchController = null;
                }
            },

            async checkTopMarquee() {
                try {
                    let url = `${this.CONFIG.API_BASE}/api/pids/marquee`;
                    if (this.STATE.stationID) url += `?station=${this.STATE.stationID}`;

                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Marquee fetch failed');

                    const data = await response.json();
                    const el = document.getElementById('unifiedTopMarquee');

                    if (data.text !== undefined && data.text !== null) {
                        let cleanText = data.text
                            .replace(/<[^>]*>/g, "") // 強制移除所有 HTML 標籤
                            .replace(/\\n/g, "     ")
                            .replace(/[\r\n]+/g, "     ")
                            .replace(/\s{2,}/g, "     ") // 合併多餘空白
                            .replace(/&nbsp;/g, " ")
                            .replace(/&amp;/g, "&")
                            .trim();

                        if (el && el.innerHTML !== cleanText) {
                            el.innerHTML = cleanText;
                            startMarquee('unifiedTopMarquee');
                        }
                    }
                } catch (error) {
                    console.warn("⚠️ 跑馬燈載入失敗:", error);
                }
            }
        };

        // ============ UI 安全工具（防 XSS） ============
        const UI_Helper = {
            escape: (str) => {
                if (!str) return "";
                return String(str).replace(/[&<>"']/g, m => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                })[m]);
            },

            setText: (id, text) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text || '';
            },

            showErrorOverlay: (message) => {
                console.error('🚨 PIDS Data Error:', message);

                // 🎯 精準鎖定中央表格區域
                const pidsSection = document.querySelector('.pids-section');
                if (!pidsSection || document.getElementById('pids-data-error')) return;

                // 確保父容器有相對定位，以便蓋子精準對齊
                pidsSection.style.position = 'relative';

                const errorHTML = `
                    <div id="pids-data-error" style="
                        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                        background: linear-gradient(135deg, #b71c1c 0%, #880e4f 100%);
                        color: white; z-index: 2000; border-radius: 8px;
                        display: flex; flex-direction: column; justify-content: center; align-items: center;
                        border: 4px solid #ffeb3b; box-sizing: border-box;
                        animation: fadeIn 0.3s ease-in;
                    ">
                        <i class="fas fa-exclamation-triangle" style="font-size: 8rem; margin-bottom: 20px; color: #ffeb3b;"></i>
                        
                        <div style="text-align: center; padding: 0 40px;">
                            <h2 style="font-size: 4rem; font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">
                                列車資訊暫時中斷
                            </h2>
                            <p style="font-size: 2.2rem; font-weight: 500; opacity: 0.9; line-height: 1.4;">
                                ${UI_Helper.escape(message)}<br>
                                <span style="background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 5px; margin-top: 15px; display: inline-block;">
                                    請參考車站月台廣播或現場實體看板
                                </span>
                            </p>
                        </div>

                        <style>
                            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                        </style>
                    </div>
                `;

                // 將錯誤遮罩插入到表格區域中
                pidsSection.insertAdjacentHTML('beforeend', errorHTML);

                // 🎨 同步把兩個 Column 的內容變暗+模糊，確保視覺整潔
                document.querySelectorAll('.pids-column').forEach(col => {
                    col.style.opacity = '0.3';
                    col.style.filter = 'blur(2px)';
                    col.style.transition = 'all 0.3s ease';
                });
            }
        };

        // --- 語言字典 ---
        const i18n = {
            zh: {
                inbound: "逆行", outbound: "順行",
                trainNo: "車次", type: "車種", dest: "開往", time: "實際開車時間", status: "狀態",

        // 翻譯車站名稱的函式 (加入 rowLangCode 參數)
        function translateStation(zhName, langCode = PIDS_APP.STATE.currentLang) {
            if (langCode === 'zh') return zhName;

            let cleanName = zhName.replace(/\s*\(山\)/g, "").replace(/\s*\(海\)/g, "").replace(/車站$/g, "").trim();
            let suffix = "";
            if (zhName.includes("(山)")) suffix = " (MT)";
            if (zhName.includes("(海)")) suffix = " (CO)";

            if (typeof stationDataMap !== 'undefined') {
                for (let code in stationDataMap) {
                    if (stationDataMap[code].name === cleanName || stationDataMap[code].name === cleanName + "站") {
                        return stationDataMap[code].ename.split('_')[0] + suffix;
                    }
                }
            }


            // 再找手動字典
            return (stationEnMap[cleanName] || cleanName) + suffix;
        }

        async function fetchTrainStops(trainNo) {
            if (stopsCache[trainNo]) return stopsCache[trainNo];

            // 🔥 新增：15秒超時保護
            const abortController = new AbortController();
            const timeoutId = setTimeout(() => {
                abortController.abort();
                console.warn(`⚠️ [${trainNo}] 請求超時，已取消`);
            }, 15000);

            try {
                // 嘗試方案 1: 從 Worker 的 /api/schedule 取得
                let r = await fetch(`${TRA_WORKER_URL}/api/schedule?trainNo=${trainNo}`, {
                    signal: abortController.signal
                });
                clearTimeout(timeoutId);
                let d = await r.json();
                console.log(`[${trainNo}] Worker /api/schedule 結果:`, d);
                if (Array.isArray(d) && d.length && d[0].StopTimes) {
                    console.log(`✅ [${trainNo}] 取得 ${d[0].StopTimes.length} 筆停靠站 (Worker 陣列)`);
                    stopsCache[trainNo] = d[0].StopTimes;
                    return d[0].StopTimes;
                }
                if (d && d.StopTimes) {
                    console.log(`✅ [${trainNo}] 取得 ${d.StopTimes.length} 筆停靠站 (Worker 直接)`);
                    stopsCache[trainNo] = d.StopTimes;
                    return d.StopTimes;
                }
            } catch (e) {
                clearTimeout(timeoutId);
                if (e.name === 'AbortError') {
                    console.warn(`⚠️ [${trainNo}] Worker API 超時`);
                } else {
                    console.warn(`[${trainNo}] Worker API 失敗:`, e);
                }
            }

            try {
                // 嘗試方案 2: 直接從 TDX V3 取得
                const abortController2 = new AbortController();
                const timeoutId2 = setTimeout(() => abortController2.abort(), 15000);

                let r = await fetch(`https://tdx.transportdata.tw/api/basic/v3/Rail/TRA/DailyTrainTimetable/Today?$filter=TrainInfo/TrainNo eq '${trainNo}'&$format=JSON`, {
                    signal: abortController2.signal
                });
                clearTimeout(timeoutId2);
                let d = await r.json();
                console.log(`[${trainNo}] TDX V3 結果:`, d);
                if (d?.value?.[0]?.StopTimes) {
                    console.log(`✅ [${trainNo}] 取得 ${d.value[0].StopTimes.length} 筆停靠站 (TDX V3)`);
                    stopsCache[trainNo] = d.value[0].StopTimes;
                    return d.value[0].StopTimes;
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    console.warn(`⚠️ [${trainNo}] TDX V3 API 超時`);
                } else {
                    console.warn(`[${trainNo}] TDX V3 API 失敗:`, e);
                }
            }

            console.error(`❌ [${trainNo}] 無法從任何來源取得停靠站資料`);
            return [];
        }

        function getExpectedTime(timeStr, delayMins) {
            if (!timeStr || delayMins === 0) return timeStr;
            const [h, m] = timeStr.split(':').map(Number);
            const total = h * 60 + m + delayMins;
            const newH = Math.floor(total / 60) % 24;
            const newM = total % 60;
            return `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
        }

        // 影片播放狀態
        let _videoIds = [];
        let _videoIdx = 0;
        let _videoRetryTimer = null;

        function setupVideo(urls) {
            const con = document.getElementById('videoContainer');
            _videoIds = [];

            // 強化的 YouTube ID 擷取邏輯 (支援 Shorts, 手機版連結)
            urls.forEach(url => {
                const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]{11}).*/;
                const match = url.match(regExp);
                if (match && match[2].length === 11) {
                    _videoIds.push(match[2]);
                }
            });

            if (_videoIds.length > 0) {
                // 從第一部開始順序播放
                _videoIdx = 0;
                _playVideoAt(_videoIdx);
            } else if (urls.length > 0 && typeof urls[0] === 'string' && !urls[0].includes('youtube')) {
                // 原生影片檔案 (.mp4)
                con.innerHTML = `<video src="${urls[0]}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:contain;"></video>`;
                console.log(`✅ 本地影片已載入: ${urls[0]}`);
            } else {
                con.innerHTML = `<div style="padding:20px; color:#666; text-align:center; font-size:1.2rem;">📹 暫無影音內容</div>`;
            }
        }

        function _playVideoAt(idx) {
            const con = document.getElementById('videoContainer');
            if (!con || _videoIds.length === 0) return;

            // 從 idx 開始，把清單重排（idx 後面的 + idx 前面的），讓 YouTube 從這部開始順序播
            const ordered = [..._videoIds.slice(idx), ..._videoIds.slice(0, idx)];
            const first = ordered[0];
            const playlist = ordered.join(',');
            const originParam = location.protocol.startsWith('http')
                ? `&origin=${location.origin}` : '';

            con.innerHTML = `
                <iframe
                    id="ytFrame"
                    class="video-iframe"
                    src="https://www.youtube.com/embed/${first}?autoplay=1&mute=1&loop=1&playlist=${playlist}&controls=0&rel=0&enablejsapi=1${originParam}"
                    allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                    allowfullscreen
                    style="width:100%; height:100%; border:none;">
                </iframe>`;
            console.log(`▶️ 從第 [${idx + 1}/${_videoIds.length}] 部開始播放，清單共 ${_videoIds.length} 部`);

            if (_videoRetryTimer) clearTimeout(_videoRetryTimer);

            // iframe 載入完成即取消跳過計時器
            const frame = document.getElementById('ytFrame');
            let hasLoaded = false;
            if (frame) {
                frame.addEventListener('load', () => {
                    hasLoaded = true;
                    clearTimeout(_videoRetryTimer);
                }, { once: true });
            }

            // 逾時保護：20 秒內 iframe 完全沒載入才跳過（影片被封鎖時）
            _videoRetryTimer = setTimeout(() => {
                if (!hasLoaded && _videoIds.length > 1) {
                    console.warn(`⚠️ 影片 ${first} 無法載入，跳過`);
                    _advanceVideo();
                }
            }, 20000);
        }

        function _advanceVideo() {
            _videoIdx = (_videoIdx + 1) % _videoIds.length;
            _playVideoAt(_videoIdx);
        }

        function startMarquee(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const container = el.parentElement;

            // 清除舊的監聽與狀態
            el.ontransitionend = null;
            el.style.transition = 'none';

            // 讓瀏覽器有時間渲染文字後再取寬度
            setTimeout(() => {
                const textWidth = el.scrollWidth;
                const containerWidth = container.clientWidth;

                // 起始位置：容器最右邊
                el.style.left = containerWidth + 'px';

                // 計算速度：設定每像素跑多少秒 (數值越小越快)
                // 電腦版超加速、手機版正常速度
                const isMobileScreen = window.innerWidth <= 900;
                let speed;
                if (id === 'unifiedTopMarquee') {
                    speed = isMobileScreen ? 0.010 : 0.006;  // 電腦版公告超加速
                } else {
                    speed = isMobileScreen ? 0.008 : 0.006;  // 列車資料維持
                }
                const duration = Math.max(10, (textWidth + containerWidth) * speed);

                // 強制重繪
                void el.offsetWidth;

                // 開始動畫：位移到文字寬度的負值（確保完全消失）
                el.style.transition = `left ${duration}s linear`;
                el.style.left = `-${textWidth}px`;

                // 結束後重啟
                el.ontransitionend = () => {
                    startMarquee(id);
                };
            }, 100);
        }

        async function updatePids(id) {

                let r = await fetch(`${TRA_WORKER_URL}/api/liveboard/station?station=${id}`);
                let d = await r.json();

                // 🔥 新增：篩選已開出的列車 (預計發車時間 < 現在時間)
                const now = new Date();
                const currentHours = now.getHours();
                const currentMins = now.getMinutes();
                const nowTotalMinutes = currentHours * 60 + currentMins;

                let filtered = d.filter(t => {
                    const [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                    const schedMins = h * 60 + m;
                    const delayMins = parseInt(t.DelayTime || 0);
                    const actualMins = schedMins + delayMins;

                    // 停駛列車保留，未來班次也保留
                    const isCancelled = String(t.TrainStatus) === '2';
                    const shouldShow = actualMins >= nowTotalMinutes || isCancelled;

                    console.log(`[${t.TrainNo}] ${t.ScheduledDepartureTime} 實際=${actualMins}分 現在=${nowTotalMinutes}分 停駛=${isCancelled} 顯示=${shouldShow}`);
                    return shouldShow;
                });

                // 🔥 修正: 按「實際開車時間」排序（純粹按分鐘數）
                filtered.forEach(t => {
                    let [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                    let delayMins = parseInt(t.DelayTime || 0);
                    // 實際時間 = 表定時間 + 誤點
                    let actualMins = (h * 60 + m) + delayMins;
                    // 只按實際時間的相對分鐘數排序（取 mod 1440 確保凌晨班次排在前面）
                    t._sort = actualMins % 1440;
                });
                filtered.sort((a, b) => a._sort - b._sort);

                // 儲存到快取
                lastTrainData = filtered;

                refreshDisplay();

            } catch (e) {
                console.error("更新PIDS失敗:", e);
                renderTable('1', []);
                renderTable('0', []);
            }
        }

        // 負責把 lastTrainData 畫到畫面上
        function refreshDisplay() {
            // ✅ 改為直接從 STATE 讀取，確保抓到 Proxy 更新後的資料
            const data = PIDS_APP.STATE.lastTrainData;

            let t1 = data.filter(t => t.Direction == 1);
            let t0 = data.filter(t => t.Direction == 0);

            renderTable('1', t1);
            renderTable('0', t0);
            updateMarquee('marquee1', t1);
            updateMarquee('marquee0', t0);

            // 🔥 修正: 顯示前 3 個目的地
            populateDestinationMarquee('destList1', t1, 1);
            populateDestinationMarquee('destList0', t0, 0);
        }

        // 🔥 新增: 處理方向標題下的站名列表顯示
        function populateDestinationMarquee(id, list, direction) {
            const el = document.getElementById(id);
            const lang = i18n[PIDS_APP.STATE.currentLang]; // ✅ 統一使用 STATE

            if (!list || list.length === 0) {
                // ✅ 修正：顯示「無列車資訊」而非一直 Loading
                el.innerText = lang.noTrain;
                return;
            }

            // 獲取前 3 筆列車的最終目的地
            let destinations = list.slice(0, 3).map(t => {
                return translateStation(t.EndingStationName);
            });
            let uniqueDestinations = [...new Set(destinations)].join(PIDS_APP.STATE.currentLang === 'zh' ? '、' : ', ');

            if (uniqueDestinations.length > 0) {
                const prefix = PIDS_APP.STATE.currentLang === 'zh' ? '開往: ' : 'To: ';
                el.innerText = prefix + uniqueDestinations;
            } else {
                el.innerText = lang.noTrain;
            }
        }

        // 🔥 大師級優化：使用 DocumentFragment 取代 innerHTML 拼接（從源頭杜絕 XSS）
        function renderTable(dir, list) {
            const tb = document.getElementById(`body${dir}`);
            // ✅ 關鍵修正：直接讀取 STATE，確保語言同步
            // const lang = i18n[PIDS_APP.STATE.currentLang]; (這行在下面會根據 row 取消)
            const template = document.getElementById('train-row-template');

            // 清空表格（使用 textContent 比 innerHTML = '' 更安全）
            while (tb.firstChild) {
                tb.removeChild(tb.firstChild);
            }

            const isMobile = window.innerWidth <= 900;
            const currentMaxRows = isMobile ? RWD_MAX_ROWS : MAX_ROWS;

            // 🔥 使用 DocumentFragment 提升性能
            const fragment = document.createDocumentFragment();

            list.slice(0, currentMaxRows).forEach((t, i) => {
                // 🌟 關鍵：取得這一行目前的專屬語言！
                const rowLangCode = (PIDS_APP.STATE.rowLangs && PIDS_APP.STATE.rowLangs[i]) || PIDS_APP.STATE.currentLang;
                const lang = i18n[rowLangCode];

                let info = getInfo(t, rowLangCode); // 傳入行語言
                let delay = parseInt(t.DelayTime || 0);
                let isCancel = String(t.TrainStatus) === '2';

                let status = isCancel ? lang.cancelled : (delay > 0 ? lang.delay.replace('{min}', delay) : lang.onTime);
                let cls = isCancel ? 'status-cancelled' : (delay > 0 ? 'status-delay' : 'status-ontime');

                let timeStr = (t.ScheduledDepartureTime || "").slice(0, 5);
                let timeDisplay = timeStr;
                let isDelayed = false;
                
                if (delay > 0 && !isCancel) {
                    let [h, m] = timeStr.split(':').map(Number);
                    let min = h * 60 + m + delay;
                    timeDisplay = `${String(Math.floor(min / 60) % 24).padStart(2, '0')}:${String(min % 60).padStart(2, '0')}`;
                    isDelayed = true;
                    // timeStr = `<span class="delay-time">${timeDisplay}</span><span class="original-time">${timeStr}</span>`;
                }

                 // 目的地處理 (傳入行語言)
                let dest = translateStation(t.EndingStationName, rowLangCode);
                if (t.TripLine == 1) dest += rowLangCode === 'zh' ? ' (山)' : ' (MT)';
                else if (t.TripLine == 2) dest += rowLangCode === 'zh' ? ' (海)' : ' (CO)';

                // 🔥 使用 Template 克隆（完全避免 innerHTML）
                const clone = template.content.cloneNode(true);
                const tr = clone.querySelector('tr');

                // 設置屬性
                if (i === 0) tr.classList.add('highlight-row');
                tr.setAttribute('aria-label', `車次 ${t.TrainNo}, ${info.name}, 開往 ${dest}, ${status}`);

                // 🔥 使用 textContent 安全設置內容（完全防止 XSS）
                const cells = tr.querySelectorAll('td');
                cells[0].textContent = String(t.TrainNo);

                // 車種 badge（唯一需要 HTML 的地方，但內容已被 textContent 保護）
                const badge = document.createElement('span');
                badge.className = `train-type-badge type-${info.cls}`;
                badge.textContent = info.name;
                cells[1].appendChild(badge);

                cells[2].textContent = dest;

                // 時間顯示
                const timeSpan = document.createElement('span');
                timeSpan.className = isDelayed ? 'expected-time' : 'normal-time';
                timeSpan.textContent = timeDisplay;
                cells[3].appendChild(timeSpan);

                cells[4].textContent = status;
                cells[4].className = cls;
                cells[4].setAttribute('role', 'gridcell');

                fragment.appendChild(clone);
            });

            // 填充空行
            for (let i = Math.min(list.length, currentMaxRows); i < currentMaxRows; i++) {
                const clone = template.content.cloneNode(true);
                fragment.appendChild(clone);
            }

            // 🔥 一次性插入（性能最佳）
            tb.appendChild(fragment);
        }

        async function updateMarquee(elId, list) {
            const el = document.getElementById(elId);
            // ✅ 關鍵修正：直接讀取 STATE
            const lang = i18n[PIDS_APP.STATE.currentLang];

            if (!list || list.length === 0) {
                el.textContent = lang.noTrain; // 使用 textContent 更安全
                startMarquee(elId);
                return;
            }

            let t = list[0];
            let info = getInfo(t);
            let delay = parseInt(t.DelayTime || 0);
            let isCancel = String(t.TrainStatus) === '2';

            if (isCancel) {
                const destName = translateStation(t.EndingStationName);
                // ✅ 使用 PIDS_APP.STATE.currentLang
                const cancelMsg = PIDS_APP.STATE.currentLang === 'zh'
                    ? `🚫 ${t.TrainNo} 次 ${info.name} 往 ${destName} 本日停駛`
                    : `🚫 Train ${t.TrainNo} ${info.name} to ${destName} CANCELLED`;
                el.textContent = cancelMsg; // 使用 textContent 更安全
                startMarquee(elId);
                return;
            }

            // 多語言目的地
            let destName = translateStation(t.EndingStationName);

            let msg = `<span style="color:#ffeb3b;font-weight:bold">${t.TrainNo} ${info.name} ${lang.toward}${destName}</span>`;
            msg += `<span style="margin:0 15px;color:#555">|</span>`;

            let liveData = null;
            try {
                const liveWorkerPromise = fetch(`${TRA_WORKER_URL}/api/live?trainNo=${t.TrainNo}`).then(r => r.json()).catch(() => null);
                liveData = await liveWorkerPromise;

                if (liveData?.TrainLiveBoards?.length > 0) liveData = liveData.TrainLiveBoards[0];
                else if (liveData?.StationName) liveData = liveData;
                else liveData = null;
            } catch (e) { }

            let locationText = "";
            let liveDelay = 0;
            if (liveData && liveData.StationName) {
                const lastStationName = liveData.StationName.Zh_tw || liveData.StationName;
                const lastStationNameTranslated = translateStation(lastStationName);
                liveDelay = liveData.DelayTime ? parseInt(liveData.DelayTime) : 0;

                let stops = await fetchTrainStops(t.TrainNo);
                let nextStopName = "";
                if (stops && stops.length > 0) {
                    const passedIndex = stops.findIndex(s => s.StationName.Zh_tw === lastStationName);
                    if (passedIndex !== -1 && passedIndex < stops.length - 1) {
                        // 🔥 移除重複站名（使用 Set 去重）
                        const nextStops = stops.slice(passedIndex + 1);
                        const uniqueNextStops = [...new Set(nextStops.map(s => translateStation(s.StationName.Zh_tw)))];
                        nextStopName = uniqueNextStops[0] || '';
                    }
                }

                locationText = nextStopName
                    ? `${lang.curPos}${lastStationNameTranslated}${lang.nextPos}${nextStopName}`
                    : `${lang.curPos}${lastStationNameTranslated}`;
                // ✅ 使用 PIDS_APP.STATE.currentLang
                if (liveDelay > 0) locationText += PIDS_APP.STATE.currentLang === 'zh' ? ` (晚 ${liveDelay} 分)` : ` (${liveDelay} min late)`;

            } else {
                locationText = (t.IsTomorrow) ? lang.notDeparted : lang.detecting;
            }

            msg += `<span style="color:#4fc3f7">${locationText}</span>`;
            msg += `<span style="margin:0 15px;color:#555">|</span>`;

            // 🔥 修正: 優先使用 Worker 回傳的 ScheduledArrivalTime (表定抵達時間)
            let arrivalTime = t.ScheduledArrivalTime || t.ScheduledDepartureTime || "00:00";

            // 嘗試取得更精確的停靠站資料 (如果有的話)
            let stops = await fetchTrainStops(t.TrainNo);
            if (stops && stops.length > 0) {
                let stationStop = stops.find(s => String(s.StationID) === GLOBAL_STATION_ID);
                if (stationStop && stationStop.ArrivalTime) {
                    arrivalTime = stationStop.ArrivalTime.slice(0, 5);
                }
            }

            const predictedTime = getExpectedTime(arrivalTime, delay);
            const timeColor = delay > 0 ? '#ff5252' : '#ffffff';
            const statusText = delay > 0 ? lang.delay.replace('{min}', delay) : lang.onTime;

            msg += `${lang.expected}<span style="color:${timeColor};font-weight:bold;font-size:1.1em">${predictedTime}${lang.arrive} (${statusText})</span>`;

            // 🔥 新增：顯示列車備註（支持翻译）
            if (t.Note && t.Note.trim().length > 0) {
                msg += `<span style="margin:0 15px;color:#555">|</span>`;
                // ✅ 使用 PIDS_APP.STATE.currentLang
                const noteLabel = PIDS_APP.STATE.currentLang === 'zh' ? '備註：' : 'Note: ';
                const translatedNote = translateNote(t.Note);
                msg += `<span style="color:#ff9800;font-weight:bold">${noteLabel}${translatedNote}</span>`;
            }

            if (stops && stops.length > 0) {
                let idx = stops.findIndex(s => String(s.StationID) === GLOBAL_STATION_ID);
                console.log(`[${t.TrainNo}] 尋找本站 ${GLOBAL_STATION_ID}: 找到索引=${idx}, 總停靠站數=${stops.length}`);
                
                // 🔥 小幫手：格式化站名+時間
                const formatStation = (s) => {
                    const name = translateStation(s.StationName.Zh_tw);
                    const time = s.ArrivalTime ? s.ArrivalTime.slice(0, 5) : "";
                    return time ? `${name}(${time})` : name;
                };

                if (idx !== -1) {
                    // ✅ 使用 PIDS_APP.STATE.currentLang
                    let next = stops.slice(idx + 1).map(formatStation).join(PIDS_APP.STATE.currentLang === 'zh' ? '、' : ' → ');
                    console.log(`[${t.TrainNo}] 後續停靠站：${next || '無(終點)'}`);
                    if (next) {
                        const stopsLabel = PIDS_APP.STATE.currentLang === 'zh' ? '沿途停靠：' : 'Stops: ';
                        msg += `<span style="margin:0 15px;color:#555">|</span>${stopsLabel}${next}`;
                    }
                    else {
                        const terminalLabel = PIDS_APP.STATE.currentLang === 'zh' ? '▶ 終點站' : '▶ Terminal';
                        msg += `<span style="margin:0 15px;color:#555">|</span>${terminalLabel}`;
                    }
                } else {
                    // 找不到本站，顯示除了起點外的所有停靠站
                    let allStops = stops.slice(1).map(formatStation).join(PIDS_APP.STATE.currentLang === 'zh' ? '、' : ' → ');
                    console.log(`[${t.TrainNo}] 找不到本站，顯示所有停靠站：${allStops}`);
                    if (allStops) {
                        const stopsLabel = PIDS_APP.STATE.currentLang === 'zh' ? '沿途停靠：' : 'Stops: ';
                        msg += `<span style="margin:0 15px;color:#555">|</span>${stopsLabel}${allStops}`;
                    }
                }
            } else {
                console.warn(`[${t.TrainNo}] 停靠站資料為空或未載入`);
            }

            el.innerHTML = msg;
            startMarquee(elId);
        }

        async function checkTopMarquee() {
            try {
                // 🔥 修正: 帶入 station 參數，讓 Worker 能回傳沿途停靠站資訊
                let url = `${TRA_WORKER_URL}/api/pids/marquee`;
                if (GLOBAL_STATION_ID) url += `?station=${GLOBAL_STATION_ID}`;

                let r = await fetch(url);
                let d = await r.json();
                let el = document.getElementById('unifiedTopMarquee');

                if (d.text !== undefined && d.text !== null) {
                    let cleanText = d.text
                        .replace(/<[^>]*>/g, "") // 強制移除所有 HTML 標籤
                        .replace(/\\n/g, "     ")
                        .replace(/[\r\n]+/g, "     ")
                        .replace(/\s{2,}/g, "     ") // 合併多餘空白
                        .replace(/&nbsp;/g, " ")
                        .replace(/&amp;/g, "&")
                        .trim();

                    // 🔥 關鍵優化：如果內容跟現在一樣，就不要重啟跑馬燈，讓它繼續跑完
                    if (el.innerHTML === cleanText) {
                        return;
                    }

                    el.innerHTML = cleanText;
                    startMarquee('unifiedTopMarquee');
                }
            } catch (e) { console.warn("Top Marquee Error:", e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // ============ 使用新架構初始化 PIDS 系統 ============
            console.log('🚀 PIDS 系統啟動中...');

            // 初始化 PIDS_APP（新架構）
            PIDS_APP.init();

            // 向後兼容：設置舊的全域變數
            const p = new URLSearchParams(location.search);
            GLOBAL_STATION_ID = p.get('station') || PIDS_APP.STATE.stationID;
            currentLang = PIDS_APP.STATE.currentLang;
            lastTrainData = PIDS_APP.STATE.lastTrainData;

            // 🔥 註冊 Service Worker（PWA 離線支援）
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker 註冊成功:', registration.scope);

                        // 檢查更新
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('🔄 新版本可用，請重新整理頁面');
                                    // 可選：顯示更新提示
                                    if (confirm('發現新版本，是否立即更新？')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.warn('⚠️ Service Worker 註冊失敗:', error);
                    });

                // 監聽 Service Worker 控制變化
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('🔄 Service Worker 已更新');
                });
            }

            // 🔥 安裝到桌面提示（PWA）- 優化版
            let deferredPrompt;
            let installButton = null;

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;

                // 🎯 優化：創建自定義安裝按鈕（而非自動 confirm）
                console.log('📱 可安裝為 App');

                // 創建浮動安裝按鈕
                if (!localStorage.getItem('pwa_install_dismissed')) {
                    installButton = document.createElement('div');
                    installButton.id = 'pwa-install-banner';
                    installButton.innerHTML = `
                        <div style="position:fixed;top:20px;right:20px;background:#1976d2;color:#fff;padding:15px 25px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999;cursor:pointer;font-size:1rem;display:flex;align-items:center;gap:10px;animation:slideIn 0.5s ease-out">
                            <i class="fas fa-mobile-alt"></i>
                            <span>安裝 App</span>
                            <button style="background:#fff;color:#1976d2;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-weight:bold;margin-left:10px">安裝</button>
                            <button id="pwa-dismiss" style="background:transparent;color:#fff;border:none;padding:5px;cursor:pointer;font-size:1.2rem">×</button>
                        </div>
                        <style>
                            @keyframes slideIn {
                                from { transform: translateX(400px); opacity: 0; }
                                to { transform: translateX(0); opacity: 1; }
                            }
                        </style>
                    `;
                    document.body.appendChild(installButton);

                    // 安裝按鈕事件
                    installButton.querySelector('button:not(#pwa-dismiss)').addEventListener('click', async () => {
                        if (deferredPrompt) {
                            deferredPrompt.prompt();
                            const { outcome } = await deferredPrompt.userChoice;
                            console.log(outcome === 'accepted' ? '✅ 使用者接受安裝' : '❌ 使用者拒絕安裝');
                            deferredPrompt = null;
                            installButton.remove();
                        }
                    });

                    // 關閉按鈕
                    installButton.querySelector('#pwa-dismiss').addEventListener('click', () => {
                        localStorage.setItem('pwa_install_dismissed', 'true');
                        installButton.remove();
                    });
                }
            });

            // 安裝成功後移除按鈕
            window.addEventListener('appinstalled', () => {
                console.log('✅ PWA 安裝成功！');
                if (installButton) installButton.remove();
            });

            console.log('✅ PIDS 系統初始化完成');
            console.log(`📍 車站: ${PIDS_APP.STATE.stationName} (ID: ${PIDS_APP.STATE.stationID})`);
            console.log(`🌐 語言: ${PIDS_APP.STATE.currentLang.toUpperCase()}`);
            console.log('🚀 Master Class 功能已啟用：');
            console.log('  ✅ Proxy 狀態管理');
            console.log('  ✅ AbortController 防止 Race Condition');
            console.log('  ✅ DocumentFragment 渲染');
            console.log('  ✅ 鍵盤導航支援');
            console.log('  ✅ PWA 離線能力');
        });

        /**
         * 全螢幕功能 (Master Class 版)
         */
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = fullscreenBtn.querySelector('i');

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                // 進入全螢幕
                document.documentElement.requestFullscreen().then(() => {
                    fullscreenIcon.classList.remove('fa-expand');
                    fullscreenIcon.classList.add('fa-compress');
                    fullscreenBtn.title = '退出全螢幕';
                    console.log('✅ 已進入全螢幕模式');
                }).catch(err => {
                    console.error('⚠️ 無法進入全螢幕:', err);
                });
            } else {
                // 退出全螢幕
                document.exitFullscreen().then(() => {
                    fullscreenIcon.classList.remove('fa-compress');
                    fullscreenIcon.classList.add('fa-expand');
                    fullscreenBtn.title = '切換全螢幕';
                    console.log('✅ 已退出全螢幕模式');
                });
            }
        }

        // 按鈕點擊事件
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // 監聴全螢幕狀態變化（例如用戶按 ESC）
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenIcon.classList.remove('fa-compress');
                fullscreenIcon.classList.add('fa-expand');
                fullscreenBtn.title = '切換全螢幕';
            }
        });

        // 快捷鍵 F11 也可以切換（可選）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
        });

        /**
         * 格式化時間工具 (Master Class 版)
         * 用於向後兼容和未來擴充
         */
        function formatTime(t) {
            if (!t || typeof t !== 'string') return '--:--';
            return t.substring(0, 5);
        }
    </script>
