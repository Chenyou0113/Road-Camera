
<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵 PIDS (V6.0 Master Class - PWA + 大師級架構)</title>

    <!-- 🔥 PWA 支援 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="台鐵PIDS">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ CSS 變數系統 (Design Tokens) ============ */
        :root {
            --pids-bg-primary: #000000;
            --pids-bg-secondary: #111111;
            --pids-text-primary: #ffffff;
            --pids-text-secondary: #cccccc;
            --pids-border: #333333;
            --accent-yellow: #ffeb3b;
            --accent-blue: #4fc3f7;
            --accent-red: #ff1744;
            --accent-orange: #ff9800;
            --header-inbound: linear-gradient(to right, #000080, #0d47a1);
            --header-outbound: linear-gradient(to right, #bf360c, #e65100);
            --row-odd-bg-inbound: #000;
            --row-even-bg-inbound: #2b2b2b;
            --row-odd-bg-outbound: #000;
            --row-even-bg-outbound: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ============ 無障礙設計：螢幕閱讀器專用 ============ */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        body {
            background-color: var(--pids-bg-secondary);
            color: var(--pids-text-primary);
            font-family: "Source Sans 3", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            font-weight: 550;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
        }

        body *:not(i):not(svg):not(path) {
            font-weight: 550 !important;
        }

        /* Header */
        .unified-header {
            width: 100%;
            height: 90px;
            background: #000;
            border: none;
            /* 🔥 修正: 移除邊框 */
            border-radius: 0;
            /* 🔥 修正: 移除圓角 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-shadow: none;
            /* 移除陰影 */
            flex-shrink: 0;
            border-bottom: 2px solid #333;
            /* 加上底部線條以分隔 */
        }

        .station-branding {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            line-height: 1;
        }

        .tra-logo-img {
            height: 3.5rem;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .station-name-block {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 10px;
            line-height: 1;
        }

        .station-name {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
        }

        .station-sub {
            font-size: 3.5rem;
            color: #4fc3f7;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            letter-spacing: 0px;
            font-weight: bold;
            line-height: 1;
            margin: 0;
        }

        .datetime-block {
            text-align: right;
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            line-height: 1;
        }

        .date-text {
            font-size: 3rem;
            color: #ccc;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            line-height: 1;
            margin: 0;
        }

        .time-text {
            font-size: 3rem;
            font-weight: bold;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            color: #ffeb3b;
            line-height: 1;
            margin: 0;
        }

        /* 全螢幕按鈕 */
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            margin-left: 12px;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        /* Top Marquee */
        .unified-marquee-container {
            width: 100%;
            height: 60px;
            background: #e3f2fd;
            border: none;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #003366;
            flex-shrink: 0;
            margin-top: 0;
            /* 修正: 移除負邊距，讓它緊貼 Header */
            margin-left: -8px;
            margin-right: -8px;
            padding: 0 8px;
        }

        .unified-marquee-container .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: auto;
            line-height: 1.2;
            font-size: 2.5rem;
            font-weight: 900;
            top: 50%;
            margin-top: -1.25rem;
            will-change: transform;
            letter-spacing: 1px;
        }

        /* 🔥 移除: 不再自動添加箭頭，完全使用 D1 中的內容 */

        /* PIDS Section */
        .pids-section {
            display: flex;
            width: 100%;
            gap: 10px;
            flex: 0 0 auto;
            /* ✅ 不自動增長，由內容決定 */
            min-height: 0;
            overflow: hidden;
        }

        .pids-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            border: 3px solid var(--pids-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .screen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--pids-bg-primary);
            overflow: hidden;
        }

        .direction-header-1 {
            background: var(--header-inbound);
            color: var(--pids-text-primary);
            padding: 10px 15px;
            font-size: 1.5rem;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--pids-text-primary);
            flex-shrink: 0;
        }

        .direction-header-0 {
            background: var(--header-outbound);
            color: var(--pids-text-primary);
            padding: 10px 15px;
            font-size: 1.5rem;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--pids-text-primary);
            flex-shrink: 0;
        }

        .dest-list {
            font-size: 1.5rem;
        }

        /* 表格設定 (5欄 + 7班車) */
        .train-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 400;
            table-layout: fixed;
        }

        .train-table th {
            padding: 8px;
            color: #fff;
            border-bottom: 2px solid #fff;
            height: 40px;
            font-size: 1.8rem;
            font-weight: 400;
        }

        .train-table tbody tr {
            border-bottom: 1px solid #333;
        }

        /* 5班車 */
        .train-table td {
            padding: 0 5px;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 65px;
            /* ✅ 5班車專用：稍微加高，讓每班車更清晰 */
            font-size: 1.8rem;
            /* 加大字體 */
            font-weight: 400;
        }

        /* 車種類型欄統一藍色（無底色） */
        .train-table td:nth-child(3) {
            color: #29b6f6; /* 更飽和的亮藍色 */
            font-weight: 600 !important; /* 稍微加粗讓字體更扎實 */
        }

        .table-1 th {
            background: #000080;
        }

        .table-1 tr:nth-child(odd) {
            background: var(--row-odd-bg-inbound);
        }

        .table-1 tr:nth-child(even) {
            background: var(--row-even-bg-inbound);
        }

        .table-0 th {
            background: #bf360c;
        }

        .table-0 tr:nth-child(odd) {
            background: var(--row-odd-bg-outbound);
        }

        .table-0 tr:nth-child(even) {
            background: var(--row-even-bg-outbound);
        }

        .marquee-footer {
            background: #212121;
            color: #ffffff;
            height: 50px;
            position: relative;
            overflow: hidden;
            border-top: 3px solid #ff9800;
            flex-shrink: 0;
        }

        .marquee-footer .marquee-text {
            position: absolute;
            white-space: nowrap;
            height: 50px;
            line-height: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            will-change: transform;
        }

        .marquee-footer .marquee-text,
        .marquee-footer .marquee-text * {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif !important; /* 統一使用中文字型，讓數字/符號跟中文一樣大 */
            font-size: inherit !important; /* 強制鎖定字體大小不亂跳 */
            font-weight: 600 !important; /* 強制統一字體粗細，忽略 JS 內的粗體標籤 */
            vertical-align: baseline;
        }

        /* Media Section - ✅ V6.1 黃金比例：自動填滿剩餘空間 */
        .media-section {
            flex: 1;
            /* ✅ 關鍵：自動佔滿畫面垂直剩餘的所有空間 */
            display: flex;
            gap: 10px;
            min-height: 150px;
            /* 確保最小高度 */
            margin-top: 4px;
        }

        .media-box {
            flex: 1;
            height: 100%;
            /* ✅ 填滿父容器 */
            background: #000;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-label {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 10px;
            font-size: 1rem;
            z-index: 10;
            border-bottom-right-radius: 8px;
        }

        .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            opacity: 0;
            transition: opacity 1s;
        }

        .carousel-img.active {
            opacity: 1;
        }

        .video-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 車種顏色 */
        .train-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-size: 1.5rem;
            font-weight: 500;
            white-space: nowrap;
            min-width: 90px;
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .type-自強 {
            background-color: #FF5722;
        }

        .type-新自強 {
            background: linear-gradient(135deg, #222 0%, #444 100%);
            border: 1px solid #999;
        }

        .type-普悠瑪 {
            background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%);
        }

        .type-太魯閣 {
            background: linear-gradient(135deg, #9C27B0 0%, #7B1FA2 100%);
        }

        .type-莒光 {
            background-color: #FF9800;
        }

        .type-區間快 {
            background-color: #3F51B5;
        }

        .type-區間 {
            background-color: #2196F3;
        }

        .type-其他 {
            background-color: #607D8B;
        }

        /* 狀態與時間 */
        .status-ontime {
            color: #FFFFFF !important;
        }

        .status-delay {
            color: #ff1744 !important;
            animation: blink 1s infinite alternate;
        }

        .status-cancelled {
            color: #FF5252;
            font-weight: 900;
        }

        /* 延誤時間容器 -> 橫向並排顯示 */
        .time-delay-container {
            display: flex;
            flex-direction: row;
            /* 橫向排列 */
            justify-content: flex-end;
            /* 靠右對齊 */
            align-items: center;
            /* 垂直置中 */
            height: 100%;
            padding-right: 5px;
            gap: 8px;
            /* 兩個時間之間的間隔 */
        }

        .original-time {
            text-decoration: line-through;
            color: #777;
            font-size: 1.2rem;
            line-height: 1.8rem;
            /* 與預計時間對齐 */
        }

        .expected-time,
        .normal-time {
            font-size: 1.8rem;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            text-align: right;
            padding-right: 5px;
        }

        .expected-time {
            color: #ff5252;
        }

        .highlight-row {
            background-color: inherit !important;
            outline: none !important;
        }

        @keyframes smooth-marquee {
            0% {
                transform: translateX(var(--start-pos));
            }

            100% {
                transform: translateX(var(--end-pos));
            }
        }

        /* 🔥 中型平板優化 (1024px-1280px，如 1280×800 平板) */
        @media (max-width: 1280px) and (min-width: 901px) {
            .unified-header {
                height: 75px;
                padding: 0 12px;
            }

            .tra-logo-img {
                height: 2.8rem;
            }

            .station-name {
                font-size: 2.8rem;
            }

            .station-sub {
                font-size: 2.8rem;
            }

            .datetime-block {
                gap: 10px;
            }

            .date-text {
                font-size: 2.3rem;
            }

            .time-text {
                font-size: 2.3rem;
            }

            /* 中型平板全螢幕按鈕 */
            .fullscreen-btn {
                width: 44px;
                height: 44px;
                font-size: 1.3rem;
                margin-left: 10px;
            }

            .unified-marquee-container {
                height: 50px;
            }

            .unified-marquee-container .marquee-text {
                line-height: 1.2;
                font-size: 1.5rem;
            }

            .direction-header-0,
            .direction-header-1 {
                font-size: 1.2rem;
                padding: 8px 12px;
            }

            .dest-list {
                font-size: 1rem;
            }

            .train-table {
                font-size: 1.1rem;
            }

            .train-table th {
                font-size: 0.95rem;
                padding: 5px 2px;
                height: 30px;
            }

            .train-table td {
                height: 58px;
                padding: 0 3px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* 車次欄位特別縮小 */
            .train-table td:nth-child(1) {
                font-size: 0.9rem;
            }

            /* 狀態欄位特別縮小 */
            .train-table td:nth-child(5) {
                font-size: 0.9rem;
            }

            .train-type-badge {
                font-size: 0.8rem;
                min-width: 55px;
                max-width: 75px;
            }

            .normal-time,
            .expected-time {
                font-size: 1.2rem;
            }

            .original-time {
                font-size: 0.9rem;
            }
        }

        /* 🔥 小平板全螢幕優化 (800px-900px，如 800×600 或 1024×768 小平板) */
        @media (max-width: 900px) and (min-width: 700px) {
            .unified-header {
                height: 60px;
                padding: 0 10px;
            }

            .tra-logo-img {
                height: 2.2rem;
            }

            .station-branding {
                gap: 8px;
            }

            .station-name {
                font-size: 2.2rem;
            }

            .station-sub {
                font-size: 2.2rem;
            }

            .datetime-block {
                gap: 8px;
            }

            .date-text {
                font-size: 1.8rem;
            }

            .time-text {
                font-size: 1.8rem;
            }

            /* 小平板全螢幕按鈕 */
            .fullscreen-btn {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
                margin-left: 8px;
            }

            .unified-marquee-container {
                height: 42px;
            }

            .unified-marquee-container .marquee-text {
                line-height: 1.2;
                font-size: 1.2rem;
            }

            .direction-header-0,
            .direction-header-1 {
                font-size: 1rem;
                padding: 6px 8px;
            }

            .dest-list {
                font-size: 0.85rem;
            }

            .train-table {
                font-size: 0.75rem;
            }

            .train-table th {
                font-size: 0.7rem;
                padding: 3px 1px;
                height: 22px;
            }

            .train-table td {
                height: 48px;
                padding: 0 1px;
                font-size: 0.75rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* 車次欄位特別縮小 */
            .train-table td:nth-child(1) {
                font-size: 0.65rem;
            }

            /* 狀態欄位特別縮小 */
            .train-table td:nth-child(5) {
                font-size: 0.65rem;
            }

            .train-type-badge {
                font-size: 0.75rem;
                min-width: 48px;
                max-width: 68px;
                padding: 2px 3px;
            }

            .normal-time,
            .expected-time {
                font-size: 0.8rem;
            }

            .original-time {
                font-size: 0.6rem;
            }

            .marquee-footer {
                height: 36px;
            }

            .marquee-footer .marquee-text {
                font-size: 0.9rem;
                line-height: 36px;
            }
        }

        /* 🔥 RWD 修正區塊 (針對小螢幕，如手機/平板) */
        @media (max-width: 699px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
            .unified-header {
                height: 65px;
                padding: 0 8px;
                gap: 8px;
            }

            .tra-logo-img {
                height: 2.3rem;
            }

            .station-branding {
                gap: 8px;
            }

            .station-name-block {
                flex-direction: column;
                gap: 0;
                align-items: flex-start;
            }

            .station-name {
                font-size: 1.5rem;
            }

            .station-sub {
                font-size: 1.3rem;
            }

            .datetime-block {
                gap: 6px;
            }

            .date-text {
                font-size: 1.1rem;
            }

            .time-text {
                font-size: 1.4rem;
            }

            /* 平板版全螢幕按鈕 */
            .fullscreen-btn {
                width: 34px;
                height: 34px;
                font-size: 1rem;
                margin-left: 6px;
            }

            .unified-marquee-container {
                height: 38px;
                margin-left: -8px;
                margin-right: -8px;
            }

            .unified-marquee-container .marquee-text {
                line-height: 1.2;
                font-size: 1rem;
            }

            .pids-section {
                flex-direction: column;
                gap: 8px;
                overflow-y: auto;
            }

            .pids-column {
                min-height: 240px;
                flex-shrink: 0;
            }

            .direction-header-0,
            .direction-header-1 {
                font-size: 0.9rem;
                padding: 5px 8px;
            }

            .dest-list {
                font-size: 0.75rem;
            }

            .train-table {
                font-size: 0.85rem;
            }

            .train-table th {
                font-size: 0.75rem;
                padding: 0 4px;
                height: 24px;
            }

            .train-table td {
                height: 46px;
                padding: 0 4px;
                font-size: 0.85rem;
            }

            .train-table tbody tr {
                height: 46px;
            }

            /* 車次欄位特別縮小，避免截斷成省略號 */
            .train-table td:nth-child(1) {
                font-size: 0.7rem;
            }

            /* 狀態欄位特別縮小 */
            .train-table td:nth-child(5) {
                font-size: 0.7rem;
            }

            /* 手機版5班車佔滿空間 */

            .train-type-badge {
                font-size: 0.65rem;
                min-width: 42px;
                max-width: 60px;
                padding: 2px 3px;
            }

            .normal-time,
            .expected-time {
                font-size: 0.85rem;
            }

            .original-time {
                font-size: 0.65rem;
            }

            .marquee-footer {
                height: 32px;
            }

            .marquee-footer .marquee-text {
                font-size: 0.8rem;
                line-height: 32px;
            }

            /* 🔥 修正: 手機版媒體區塊改為垂直堆疊並可滑動 */
            .media-section {
                flex-direction: column;
                gap: 8px;
                overflow-y: auto;
            }

            .media-box {
                height: 120px;
                /* 每個盒子固定高度 */
                flex: 0 0 auto;
                /* 不自動伸縮 */
            }
        }

        @media (max-width: 480px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }
            .unified-header {

    <script src="assets/config.js"></script>

    <script>
        function formatMarqueeText(rawText) {
            const text = String(rawText || '');
            if (!text) return text;

            return text.replace(/([\u4e00-\u9fff]{1,6})\s*(?:-|－|–|—|~|～)\s*([\u4e00-\u9fff]{1,6})/g, '$1 ＜－－＞ $2');
        }

        // ============ PIDS 應用程式架構 ============
        const PIDS_APP = {
            // 配置常數（解決硬編碼問題）
            CONFIG: {
                API_BASE: "https://tra-schedule-worker.weacamm.org",
                INTERVALS: {
                    CLOCK: 1000,            // 時鐘更新間隔
                    PIDS_UPDATE: 60000,     // PIDS 數據更新間隔 (1分鐘)
                    LANG_SWITCH: 60000,     // 語言自動切換間隔 (1分鐘)
                    TOP_MARQUEE_CHECK: 60000,  // 頂部跑馬燈檢查間隔 (1分鐘)
                    CAROUSEL: 10000         // 輪播圖切換間隔
                },
                ROWS: {
                    DESKTOP: 5,  // ✅ 黃金比例：5 行列車，每行更大更清晰
                    MOBILE: 5
                },
                TRAIN_TYPES: {
                    "1100": "\u81ea\u5f37", "1101": "\u592a\u9b6f\u95a3", "1102": "\u81ea\u5f37", "1103": "\u81ea\u5f37", "1107": "\u666e\u60a0\u746a",
                    "1108": "\u81ea\u5f37", "110B": "\u65b0\u81ea\u5f37", "110G": "\u65b0\u81ea\u5f37", "110H": "\u65b0\u81ea\u5f37", "110K": "\u65b0\u81ea\u5f37", "110M": "\u65b0\u81ea\u5f37",
                    "1110": "\u8392\u5149", "1111": "\u8392\u5149", "1112": "\u8392\u5149", "1113": "\u8392\u5149", "1114": "\u8392\u5149", "1115": "\u8392\u5149", "1120": "\u5fa9\u8208",
                    "1131": "\u5340\u9593", "1132": "\u5340\u9593\u5feb", "1140": "\u666e\u5feb", "1150": "\u67f4\u5feb", "1270": "\u666e\u901a", "1280": "\u5340\u9593", "1281": "\u5340\u9593", "1282": "\u5340\u9593"
                }
            },

            // 應用狀態（使用 Proxy 實現響應式）
            STATE: new Proxy({
                currentLang: localStorage.getItem('pids_lang') || 'zh',
                manualLangOverride: false, // 記錄是否為手動切換
                rowLangs: [], // 🔥 儲存每一行目前的獨立語言
                stationID: '',
                stationName: '',
                lastTrainData: [],
                stopsCache: {},
                autoSwitchTimer: null,
                isVideoLoaded: false,
                _observers: new Set()
            }, {
                set(target, prop, value) {
                    if (prop.startsWith('_')) { target[prop] = value; return true; }
                    const oldValue = target[prop];
                    target[prop] = value;
                    target._observers.forEach(cb => { try { cb(prop, value, oldValue); } catch(e){} });

                    if (prop === 'stationID' && value) PIDS_APP.updatePids();
                    
                    // 🔥 防抖動 (Debounce) 渲染機制：當語言或資料改變時，延遲 10ms 再重繪，避免同一秒內重複渲染
                    if (prop === 'currentLang' || prop === 'rowLangs' || prop === 'lastTrainData') {
                        clearTimeout(target._renderTimer);
                        target._renderTimer = setTimeout(() => refreshDisplay(), 10);
                    }
                    return true;
                }
            }),

            // 訂閱狀態變化
            subscribe(callback) {
                this.STATE._observers.add(callback);
                return () => this.STATE._observers.delete(callback); // 返回取消訂閱函數
            },

            // 初始化
            init() {
                const params = new URLSearchParams(location.search);
                this.STATE.stationID = params.get('station');
                this.STATE.stationName = params.get('name') || '\u81fa\u9435';

                this.ui.updateStationName();
                this.ui.updateEnglishStationName();
                this.ui.updateUIStrings();
                this.startTimers();
                this.loadInitialData();
            },

            // UI 方法
            ui: {
                updateStationName() {
                    const el = document.getElementById('unifiedStationName');
                    if (el) {
                        const cleanName = PIDS_APP.STATE.stationName.replace(/車站$|站$/, '');
                        el.textContent = cleanName + '車站';
                    }
                },

                updateEnglishStationName() {
                    const enElement = document.getElementById('station-en');
                    const stationID = PIDS_APP.STATE.stationID;
                    if (enElement && typeof stationDataMap !== 'undefined' && stationDataMap[stationID]) {
                        const rawName = stationDataMap[stationID].ename;
                        const isCJCU = stationID === '4271' || /Chang\s*Jung\s*Christian\s*University/i.test(rawName);
                        const formattedName = isCJCU ? 'C.J.C.U.' : rawName.split('_')[0].toUpperCase();
                        enElement.textContent = `${formattedName} STATION`;
                    } else if (enElement) {
                        enElement.textContent = "TRA STATION";
                    }
                },

                updateUIStrings() {
                    const lang = i18n[PIDS_APP.STATE.currentLang];

                    const dir1Title = document.getElementById('dirTitle1');
                    const dir0Title = document.getElementById('dirTitle0');
                    if (dir1Title) dir1Title.textContent = lang.inbound;
                    if (dir0Title) dir0Title.textContent = lang.outbound;

                    const headHtml = `
                        <tr>
                            <th scope="col" style="width:15%">${lang.trainNo}</th>
                            <th scope="col" style="width:28%">${lang.dest}</th>
                            <th scope="col" style="width:20%">${lang.type}</th>
                            <th scope="col" style="width:20%">${lang.time}</th>
                            <th scope="col" style="width:17%">${lang.note || lang.status}</th>
                        </tr>`;

                    const table1Head = document.querySelector('.table-1 thead');
                    const table0Head = document.querySelector('.table-0 thead');
                    if (table1Head) table1Head.innerHTML = headHtml;
                    if (table0Head) table0Head.innerHTML = headHtml;
                }
            },

            startTimers() {
                // 每秒更新時鐘與語言檢查
                setInterval(() => this.updateClock(), this.CONFIG.INTERVALS.CLOCK);
                const delayToNextMinute = 60000 - (Date.now() % 60000);
                
                if (this.STATE.stationID) {
                    this.updatePids();
                    
                    // 行車資訊跑馬燈整分鐘 (00秒) 更新一次
                    setTimeout(() => {
                        this.updatePids();
                        setInterval(() => this.updatePids(), this.CONFIG.INTERVALS.PIDS_UPDATE);
                    }, delayToNextMinute);
                }
                
                this.checkTopMarquee();
                setTimeout(() => startMarquee('unifiedTopMarquee'), 1500);
                setTimeout(() => {
                    this.checkTopMarquee();
                    setInterval(() => this.checkTopMarquee(), this.CONFIG.INTERVALS.TOP_MARQUEE_CHECK);
                }, delayToNextMinute);
                
                // 🔥 移除這行：不再使用舊的 setInterval 切換語言
                // this.startAutoLangSwitch(); 
            },

            loadInitialData() {
                this.updateClock();
                updateMediaAssets();
                this.initKeyboardNavigation();
                console.log('✅ PIDS 系統初始化完成');
            },

            // 🔥 鍵盤導航支援（政府專案無障礙檢測要求）
            initKeyboardNavigation() {
                // 為所有互動元素添加鍵盤支援
                const interactiveElements = [
                    '#station-select',
                    '#languageSwitchBtn',
                    '#fullscreenBtn'
                ];

                interactiveElements.forEach(selector => {
                    const el = document.querySelector(selector);
                    if (el && !el.hasAttribute('tabindex')) {
                        el.setAttribute('tabindex', '0');
                        el.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                el.click();
                            }
                        });
                    }
                });

                // 為表格添加鍵盤導航
                this.subscribe((prop) => {
                    if (prop === 'lastTrainData') {
                        setTimeout(() => {
                            document.querySelectorAll('.train-table tbody').forEach((tbody, tableIndex) => {
                                tbody.setAttribute('tabindex', '0');
                                tbody.setAttribute('aria-label', `使用方向鍵瀏覽列車資訊 - ${tableIndex === 0 ? '北上' : '南下'}方向`);

                                // 移除舊監聽器避免重複
                                const newTbody = tbody.cloneNode(true);
                                tbody.parentNode.replaceChild(newTbody, tbody);

                                newTbody.addEventListener('keydown', (e) => {
                                    const rows = Array.from(newTbody.querySelectorAll('tr'));
                                    const currentRow = document.activeElement.closest('tr');
                                    const currentIndex = currentRow ? rows.indexOf(currentRow) : -1;

                                    switch (e.key) {
                                        case 'ArrowDown':
                                            e.preventDefault();
                                            if (currentIndex < rows.length - 1) {
                                                rows[currentIndex + 1].focus();
                                            }
                                            break;
                                        case 'ArrowUp':
                                            e.preventDefault();
                                            if (currentIndex > 0) {
                                                rows[currentIndex - 1].focus();
                                            }
                                            break;
                                        case 'Home':
                                            e.preventDefault();
                                            rows[0]?.focus();
                                            break;
                                        case 'End':
                                            e.preventDefault();
                                            rows[rows.length - 1]?.focus();
                                            break;
                                        case 'Tab':
                                            // 允許 Tab 離開表格
                                            break;
                                        default:
                                            return;
                                    }
                                });

                                // 為每一行添加 tabindex
                                newTbody.querySelectorAll('tr').forEach((row, index) => {
                                    row.setAttribute('tabindex', '0');
                                    row.setAttribute('aria-rowindex', String(index + 2)); // +2 因為 header 是 row 1
                                });
                            });
                        }, 200); // 增加延遲確保 DOM 更新完成
                    }
                });

                console.log('⌨️ 鍵盤導航已啟用：使用 Tab/方向鍵瀏覽');
            },

            // 🔥 不需要這個函數了
            // startAutoLangSwitch() { ... },

            updateClock() {
                const now = new Date();
                
                // 1. 更新畫面時間
                UI_Helper.setText('unifiedTime', now.toLocaleTimeString('en-GB'));
                UI_Helper.setText('unifiedDate', now.toISOString().split('T')[0].replace(/-/g, '/'));

                if (this.STATE.manualLangOverride) return;

                // 🔥 2. 絕對時間數學公式 (全部一起切換)
                const t = Math.floor(now.getTime() / 1000);
                
                // 設定切換週期：每 60 秒 (1分鐘) 切換一次語言
                const cycleSeconds = 60;
                const cycle = Math.floor(t / cycleSeconds) % 2;
                
                // 0: zh (中文), 1: en (英文)
                const currentBase = (cycle === 0) ? 'zh' : 'en';

                // 處理表頭與跑馬燈的語言
                if (this.STATE.currentLang !== currentBase) {
                    this.STATE.currentLang = currentBase;
                    PIDS_APP.ui.updateUIStrings();
                }

                // 計算每一行的專屬語言：全部統一 (同步切換)
                const newRowLangs = [];
                const maxRows = window.innerWidth <= 900 ? this.CONFIG.ROWS.MOBILE : this.CONFIG.ROWS.DESKTOP;
                for (let i = 0; i < maxRows; i++) {
                    newRowLangs.push(currentBase);
                }

                // 檢查如果列語言陣列有改變，才觸發更新
                const currentLangsStr = JSON.stringify(this.STATE.rowLangs || []);
                const newLangsStr = JSON.stringify(newRowLangs);
                if (currentLangsStr !== newLangsStr) {
                    this.STATE.rowLangs = newRowLangs; // 觸發 Proxy 自動呼叫 refreshDisplay()
                }
            },

            async updatePids() {
                if (this._currentFetchController) {
                    this._currentFetchController.abort();
                }

                this._currentFetchController = new AbortController();
                const signal = this._currentFetchController.signal;

                try {
                    const url = `${this.CONFIG.API_BASE}/api/liveboard/station?station=${this.STATE.stationID}`;
                    const response = await fetch(url, { signal, timeout: 15000 });

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const data = await response.json();
                    const now = new Date();
                    const nowTotalMinutes = now.getHours() * 60 + now.getMinutes();

                    // Worker v9.4.0: 同時相容 ScheduledDepartureTime 與 Dep/Arr
                    let filtered = (Array.isArray(data) ? data : []).map(t => {
                        const normalized = {
                            ...t,
                            TrainNo: t.TrainNo ?? t.No,
                            Direction: t.Direction ?? t.Dir,
                            TrainTypeName: t.TrainTypeName ?? t.Type,
                            EndingStationName: t.EndingStationName ?? t.Dest,
                            ScheduledDepartureTime: t.ScheduledDepartureTime ?? t.Dep ?? t.Arr,
                            ScheduledArrivalTime: t.ScheduledArrivalTime ?? t.Arr ?? t.Dep,
                            DelayTime: t.DelayTime ?? t.Delay ?? 0,
                            TrainStatus: t.TrainStatus ?? t.Status,
                            TripLine: t.TripLine ?? t.Line
                        };

                        const timeStr = normalized.ScheduledDepartureTime || "00:00";
                        const [h, m] = timeStr.split(':').map(Number);
                        const schedMins = h * 60 + m;
                        const delayMins = parseInt(normalized.DelayTime || 0);
                        const actualMins = schedMins + delayMins;
                        let adjustedActualMins = actualMins;
                        if (actualMins < nowTotalMinutes - 720) adjustedActualMins += 1440;

                        return {
                            ...normalized,
                            _sort: (adjustedActualMins - nowTotalMinutes + 1440) % 1440,
                            _actualMins: adjustedActualMins,
                            _isCancelled: String(normalized.TrainStatus) === '2'
                        };
                    }).filter(t => t._actualMins >= nowTotalMinutes || t._isCancelled);

                    filtered.sort((a, b) => a._sort - b._sort);

                    this.STATE.lastTrainData = filtered;
                    refreshDisplay();

                } catch (error) {
                    if (error.name === 'AbortError') return;
                    console.error("❌ PIDS 更新失敗:", error);
                    UI_Helper.showErrorOverlay('列車資訊傳輸暫時中斷');
                } finally {
                    this._currentFetchController = null;
                }
            },

            async checkTopMarquee() {
                try {
                    let url = `${this.CONFIG.API_BASE}/api/pids/marquee`;
                    if (this.STATE.stationID) url += `?station=${this.STATE.stationID}`;

                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Marquee fetch failed');

                    const data = await response.json();
                    const el = document.getElementById('unifiedTopMarquee');

                    if (data.text !== undefined && data.text !== null) {
                        let cleanText = data.text
                            .replace(/\\n/g, "     ")
                            .replace(/[\r\n]+/g, "     ")
                            .replace(/\s{2,}/g, "     ") // 合併多餘空白
                            .replace(/&nbsp;/g, " ")
                            .replace(/&amp;/g, "&")
                            .trim();

                        if (el && el.dataset.raw !== cleanText) {
                            el.dataset.raw = cleanText;
                            el.textContent = formatMarqueeText(cleanText);
                            startMarquee('unifiedTopMarquee');
                        }
                    }
                } catch (error) {
                    console.warn("⚠️ 跑馬燈載入失敗:", error);
                }
            }
        };

        // ============ UI 安全工具（防 XSS） ============
        const UI_Helper = {
            escape: (str) => {
                if (!str) return "";
                return String(str).replace(/[&<>"']/g, m => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                })[m]);
            },

            setText: (id, text) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text || '';
            },

            showErrorOverlay: (message) => {
                console.error('🚨 PIDS Data Error:', message);

                // 🎯 精準鎖定中央表格區域
                const pidsSection = document.querySelector('.pids-section');
                if (!pidsSection || document.getElementById('pids-data-error')) return;

                // 確保父容器有相對定位，以便蓋子精準對齊
                pidsSection.style.position = 'relative';

                const errorHTML = `
                    <div id="pids-data-error" style="
                        position: absolute; top: 0; left: 0; width: 100%; height: 100%;

        // 翻譯車站名稱的函式 (加入 rowLangCode 參數)
        function translateStation(zhName, langCode = PIDS_APP.STATE.currentLang) {
            if (langCode === 'zh') return zhName;

            let cleanName = zhName.replace(/\s*\(山\)/g, "").replace(/\s*\(海\)/g, "").replace(/車站$/g, "").trim();
            let suffix = "";
            if (zhName.includes("(山)")) suffix = " (MT)";
            if (zhName.includes("(海)")) suffix = " (CO)";

            if (typeof stationDataMap !== 'undefined') {
                for (let code in stationDataMap) {
                    if (stationDataMap[code].name === cleanName || stationDataMap[code].name === cleanName + "站") {
                        const mappedName = stationDataMap[code].ename.split('_')[0];
                        const isCJCU = cleanName === '長榮大學' || code === '4271' || /Chang\s*Jung\s*Christian\s*University/i.test(mappedName);
                        return (isCJCU ? 'C.J.C.U.' : mappedName) + suffix;
                    }
                }
            }


            // 再找手動字典
            return (stationEnMap[cleanName] || cleanName) + suffix;
        }

        function getViaTags(train, stops = []) {
            const tripLine = Number(train?.TripLine || 0);
            const names = (stops || []).map(s => s?.StationName?.Zh_tw || s?.StationName || s?.Name || "");
            const hasAny = (keys) => keys.some(k => names.some(n => String(n).includes(k)));

            const tags = [];
            if (tripLine === 1) tags.push('山');
            if (tripLine === 2) tags.push('海');
            if (hasAny(['宜蘭', '羅東', '礁溪', '頭城', '蘇澳'])) tags.push('宜蘭');
            if (hasAny(['臺東', '台東', '知本', '池上', '關山', '玉里'])) tags.push('臺東');
            if (hasAny(['枋寮', '大武', '太麻里', '金崙', '瀧溪', '內獅', '枋山'])) tags.push('南迴線');

            return [...new Set(tags)];
        }

        function getInfo(t, langCode = PIDS_APP.STATE.currentLang) {
            let rawName = t.TrainTypeName?.Zh_tw || t.TrainTypeName || '列車';
            const typeCode = String(t.TrainTypeCode || '');
            const note = String(t.Note || '');
            const merged = `${rawName} ${typeCode} ${note}`;
            let name = rawName.replace(/\(.*\)/g, '').trim();
            let cls = '其他';

            if (merged.includes('新自強') || merged.includes('3000') || ['110B', '110G', '110H', '110K', '110M'].includes(typeCode)) { name = '新自強'; cls = '新自強'; }
            else if (merged.includes('普悠瑪')) { name = '普悠瑪'; cls = '普悠瑪'; }
            else if (merged.includes('太魯閣')) { name = '太魯閣'; cls = '太魯閣'; }
            else if (merged.includes('莒光')) { name = '莒光'; cls = '莒光'; }
            else if (merged.includes('區間快')) { name = '區間快'; cls = '區間快'; }
            else if (merged.includes('區間')) { name = '區間'; cls = '區間'; }
            else if (merged.includes('自強')) { name = '自強'; cls = '自強'; }

            const lang = i18n[langCode];
            const displayName = lang.types[name] || name;
            return { name: displayName, cls };
        }

        async function fetchTrainStops(trainNo) {
            if (stopsCache[trainNo]) return stopsCache[trainNo];

            // 🔥 新增：15秒超時保護
            const abortController = new AbortController();
            const timeoutId = setTimeout(() => {
                abortController.abort();
                console.warn(`⚠️ [${trainNo}] 請求超時，已取消`);
            }, 15000);

            try {
                // 嘗試方案 1: 從 Worker 的 /api/schedule 取得
                let r = await fetch(`${TRA_WORKER_URL}/api/schedule?trainNo=${trainNo}`, {
                    signal: abortController.signal
                });
                clearTimeout(timeoutId);
                let d = await r.json();
                console.log(`[${trainNo}] Worker /api/schedule 結果:`, d);
                if (Array.isArray(d) && d.length && d[0].StopTimes) {
                    console.log(`✅ [${trainNo}] 取得 ${d[0].StopTimes.length} 筆停靠站 (Worker 陣列)`);
                    stopsCache[trainNo] = d[0].StopTimes;
                    return d[0].StopTimes;
                }
                if (d && d.StopTimes) {
                    console.log(`✅ [${trainNo}] 取得 ${d.StopTimes.length} 筆停靠站 (Worker 直接)`);
                    stopsCache[trainNo] = d.StopTimes;
                    return d.StopTimes;
                }
            } catch (e) {
                clearTimeout(timeoutId);
                if (e.name === 'AbortError') {
                    console.warn(`⚠️ [${trainNo}] Worker API 超時`);
                } else {
                    console.warn(`[${trainNo}] Worker API 失敗:`, e);
                }
            }

            try {
                // 嘗試方案 2: 直接從 TDX V3 取得
                const abortController2 = new AbortController();
                const timeoutId2 = setTimeout(() => abortController2.abort(), 15000);

                let r = await fetch(`https://tdx.transportdata.tw/api/basic/v3/Rail/TRA/DailyTrainTimetable/Today?$filter=TrainInfo/TrainNo eq '${trainNo}'&$format=JSON`, {
                    signal: abortController2.signal
                });
                clearTimeout(timeoutId2);
                let d = await r.json();
                console.log(`[${trainNo}] TDX V3 結果:`, d);
                if (d?.value?.[0]?.StopTimes) {
                    console.log(`✅ [${trainNo}] 取得 ${d.value[0].StopTimes.length} 筆停靠站 (TDX V3)`);
                    stopsCache[trainNo] = d.value[0].StopTimes;
                    return d.value[0].StopTimes;
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    console.warn(`⚠️ [${trainNo}] TDX V3 API 超時`);
                } else {
                    console.warn(`[${trainNo}] TDX V3 API 失敗:`, e);
                }
            }

            console.error(`❌ [${trainNo}] 無法從任何來源取得停靠站資料`);
            return [];
        }

        function getExpectedTime(timeStr, delayMins) {
            if (!timeStr || delayMins === 0) return timeStr;
            const [h, m] = timeStr.split(':').map(Number);
            const total = h * 60 + m + delayMins;
            const newH = Math.floor(total / 60) % 24;
            const newM = total % 60;
            return `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
        }

            } catch (e) {
                console.warn("Media Load Error", e);

        let carTimer;
        function setupCarousel(imgs) {
            const box = document.getElementById('carouselBox');
            box.querySelectorAll('img').forEach(i => i.remove());
            imgs.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src; img.className = i === 0 ? 'carousel-img active' : 'carousel-img';
                box.appendChild(img);
            });
            let idx = 0;
            if (carTimer) clearInterval(carTimer);
            carTimer = setInterval(() => {
                const list = box.querySelectorAll('img');
                if (list.length > 1) {
                    list[idx].classList.remove('active');
                    idx = (idx + 1) % list.length;
                    list[idx].classList.add('active');
                }
            }, 10000);
        }

        // 影片播放狀態全局變數
        let _videoIds = [];

        let _videoWatchdogTimer = null;

        function destroyYtPlayer() {
            if (window.ytPlayer && typeof window.ytPlayer.destroy === 'function') {
                try { window.ytPlayer.destroy(); } catch (_) {}
            }
            window.ytPlayer = null;
        }

        function refreshPlayableVideoList() {
            _playableVideoIds = _videoIds.filter(id => !_blockedVideoIds.has(id));
            if (_playableVideoIds.length === 0) {
                _currentVideoIndex = 0;
            } else if (_currentVideoIndex >= _playableVideoIds.length) {
                _currentVideoIndex = 0;
            }
        }

        function showVideoFallback(message) {
            const con = document.getElementById('videoContainer');
            if (!con) return;
            con.innerHTML = `<div style="padding:20px; color:#b0bec5; text-align:center; line-height:1.8;">${message}</div>`;
        }

        function stopVideoWatchdog() {
            if (_videoWatchdogTimer) {
                clearTimeout(_videoWatchdogTimer);
                _videoWatchdogTimer = null;
            }
        }

        function armVideoWatchdog() {
            stopVideoWatchdog();
            _videoWatchdogTimer = setTimeout(() => {
                destroyYtPlayer();
                showVideoFallback('📹 影音來源暫時無法播放，請稍後再試');
            }, 12000);
        }

        function playCurrentVideo() {
            if (!window.ytPlayer || _playableVideoIds.length === 0) return;
            const id = _playableVideoIds[_currentVideoIndex];
            if (!id) return;

            armVideoWatchdog();
            try {
                window.ytPlayer.loadVideoById(id);
                if (!document.hidden && typeof window.ytPlayer.playVideo === 'function') {
                    window.ytPlayer.playVideo();
                }
            } catch (_) {
                advanceToNextVideo('load-failed');
            }
        }

        function advanceToNextVideo(reason = 'next') {
            if (_playableVideoIds.length === 0) {

        function extractYoutubeId(input) {
            const raw = String(input || '').replace(/[\r\n\t\f\v]/g, '').trim();
            if (!raw) return null;

            // 純 11 碼 ID
            if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;

            // URL 格式
            try {
                const u = new URL(raw);
                const host = (u.hostname || '').toLowerCase();
                if (host.includes('youtu.be')) {
                    const id = u.pathname.replace(/^\//, '').split('/')[0];
                    return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
                }
                if (host.includes('youtube.com')) {
                    const v = u.searchParams.get('v');
                    if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) return v;

                    const parts = u.pathname.split('/').filter(Boolean);
                    const key = parts[0];
                    const id = parts[1];
                    if (['embed', 'shorts', 'v', 'vi', 'e'].includes(key) && /^[a-zA-Z0-9_-]{11}$/.test(id || '')) {
                        return id;
                    }
                }
            } catch (_) {}

            // 後備 regex
            const match = raw.match(/(?:v=|v\/|vi=|vi\/|youtu\.be\/|embed\/|e\/|shorts\/)([a-zA-Z0-9_-]{11})/i);
            return (match && match[1]) ? match[1] : null;
        }

        function _createDynamicPlayer() {
            // 防止重複初始化與確保網域正確
            if (!_isYTReady || window.ytPlayer || _playableVideoIds.length === 0) return;
            
            const cleanOrigin = window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '');
            console.log(`🎬 啟動播放器：首播 ${_playableVideoIds[_currentVideoIndex]} (Origin: ${cleanOrigin})`);

            window.ytPlayer = new YT.Player('ytPlayerDiv', {
                host: 'https://www.youtube.com',
                videoId: _playableVideoIds[_currentVideoIndex],
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    controls: 0,
                    rel: 0,
                    enablejsapi: 1,
                    origin: cleanOrigin,
                    widget_referrer: cleanOrigin,
                    playsinline: 1
                },
                events: {
                    'onReady': (event) => {
                        event.target.mute();
                        setTimeout(() => playCurrentVideo(), 300);
                    },
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.PLAYING) {
                            stopVideoWatchdog();
                            _videoErrorBurstCount = 0;
                            _lastVideoErrorTs = 0;
                            const currentId = event?.target?.getVideoData?.()?.video_id;
                            const idx = _playableVideoIds.indexOf(currentId);
                            if (idx >= 0) _currentVideoIndex = idx;
                            event.target.mute();
                        }
                        // 防止播放完畢後沒自動切換
                        if (event.data === YT.PlayerState.ENDED) {
                            advanceToNextVideo('ended');
                        }
                    },
                    'onError': (event) => {
                        stopVideoWatchdog();
                        const nowTs = Date.now();
                        _videoErrorBurstCount = (nowTs - _lastVideoErrorTs < 8000) ? (_videoErrorBurstCount + 1) : 1;
                        _lastVideoErrorTs = nowTs;

                        if (_videoErrorBurstCount >= 3) {
                            destroyYtPlayer();
                            showVideoFallback('📹 影音來源受限制，暫時無法播放');
                            return;
                        }

                        const badId = event?.target?.getVideoData?.()?.video_id;
                        if (badId) {
                            _blockedVideoIds.add(badId);
                        } else if (_playableVideoIds.length > 0) {
                            // 有些 Code 2 拿不到 video_id，至少淘汰目前候選第一支，避免無限循環
                            _blockedVideoIds.add(_playableVideoIds[0]);
                        }

                        refreshPlayableVideoList();
                        console.warn(`❌ 影片錯誤 (代碼: ${event.data})，已封鎖 ${badId || 'unknown'}，剩餘 ${_playableVideoIds.length} 部`);

                        if (_playableVideoIds.length === 0) {
                            destroyYtPlayer();
                            showVideoFallback('📹 影音來源暫時無法播放，請稍後再試');
                            return;
                        }
                        advanceToNextVideo('error');
                    }
                }
            });
        }

        function startMarquee(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const container = el.parentElement;

            // 清除舊動畫，強制瀏覽器重置狀態
            el.style.animation = 'none';
            el.style.transition = 'none';
            el.style.left = '0px';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const textWidth = el.scrollWidth;
                    const containerWidth = container.clientWidth;

                    // 動態速度計算：改用「每秒移動像素(px/s)」
                    const isMobileScreen = window.innerWidth <= 900;
                    const pixelsPerSecond = isMobileScreen ? 80 : 120;

                    const totalDistance = textWidth + containerWidth;
                    const duration = Math.max(8, totalDistance / pixelsPerSecond);

                    // 寫入 CSS 變數供 @keyframes 使用
                    el.style.setProperty('--start-pos', `${containerWidth}px`);
                    el.style.setProperty('--end-pos', `-${textWidth}px`);

                    // 啟動無限循環的 GPU 動畫
                    el.style.animation = `smooth-marquee ${duration}s linear infinite`;
                });
            });
        }

        async function updatePids(id) {
            try {
                let r = await fetch(`${TRA_WORKER_URL}/api/liveboard/station?station=${id}`);
                let d = await r.json();

                const now = new Date();
                const nowMins = now.getHours() * 60 + now.getMinutes();

                let filtered = d.filter(t => {
                    const [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                    const delayMins = parseInt(t.DelayTime || 0);
                    const actualMins = (h * 60 + m) + delayMins;
                    
                    const isCancelled = String(t.TrainStatus) === '2';
                    // 為了處理跨日，如果實際時間小於現在時間超過 12 小時，視為隔日班次
                    let adjustedActualMins = actualMins;
                    if (actualMins < nowMins - 720) adjustedActualMins += 1440;

                    return adjustedActualMins >= nowMins || isCancelled;
                });

                // 🔥 核心排序修正：計算相對於「現在時間」的分鐘差
                filtered.forEach(t => {
                    let [h, m] = (t.ScheduledDepartureTime || "00:00").split(':').map(Number);
                    let delayMins = parseInt(t.DelayTime || 0);
                    let actualMins = (h * 60 + m) + delayMins;

                    // 先做跨日修正（超過 12 小時視為隔日），再計算距離現在的分鐘數
                    let adjustedActualMins = actualMins;
                    if (actualMins < nowMins - 720) adjustedActualMins += 1440;

                    t._sort = (adjustedActualMins - nowMins + 1440) % 1440;
                });

                // 按距離現在的時長排序，越近的排越前面
                filtered.sort((a, b) => a._sort - b._sort);

                lastTrainData = filtered;
                refreshDisplay();

            } catch (e) {
                console.error("更新PIDS失敗:", e);
                renderTable('1', []);
                renderTable('0', []);
            }
        }

        // 🔥 大師級優化：使用 DocumentFragment 取代 innerHTML 拼接（從源頭杜絕 XSS）
        function renderTable(dir, list) {
            const tb = document.getElementById(`body${dir}`);
            // ✅ 關鍵修正：直接讀取 STATE，確保語言同步
            // const lang = i18n[PIDS_APP.STATE.currentLang]; (這行在下面會根據 row 取消)
            const template = document.getElementById('train-row-template');

            // 清空表格（使用 textContent 比 innerHTML = '' 更安全）
            while (tb.firstChild) {
                tb.removeChild(tb.firstChild);
            }

            const isMobile = window.innerWidth <= 900;
            const currentMaxRows = isMobile ? RWD_MAX_ROWS : MAX_ROWS;

            // 🔥 使用 DocumentFragment 提升性能
            const fragment = document.createDocumentFragment();

            list.slice(0, currentMaxRows).forEach((t, i) => {
                // 🌟 關鍵：取得這一行目前的專屬語言！
                const rowLangCode = (PIDS_APP.STATE.rowLangs && PIDS_APP.STATE.rowLangs[i]) || PIDS_APP.STATE.currentLang;
                const lang = i18n[rowLangCode];

                let info = getInfo(t, rowLangCode); // 傳入行語言
                let delay = parseInt(t.DelayTime || 0);
                let isCancel = String(t.TrainStatus) === '2';

                let status = "";
                let cls = "";
                if (isCancel) {
                    status = lang.cancelled; cls = 'status-cancelled';
                } else if (delay >= 120) {
                    status = rowLangCode === 'zh' ? "時間未定" : "Delayed"; cls = 'status-delay';
                } else if (delay > 0) {
                    status = lang.delay.replace('{min}', delay); cls = 'status-delay';
                } else {
                    status = lang.onTime; cls = 'status-ontime';
                }

                let timeStr = (t.ScheduledDepartureTime || "").slice(0, 5);
                let timeDisplay = timeStr;
                let isDelayed = false;
                
                if (delay > 0 && !isCancel) {
                    isDelayed = true;
                    if (delay >= 120) {
                        timeDisplay = "--:--"; // 嚴重誤點不顯示錯誤的推算時間
                    } else {
                        let [h, m] = timeStr.split(':').map(Number);
                        let min = h * 60 + m + delay;
                        timeDisplay = `${String(Math.floor(min / 60) % 24).padStart(2, '0')}:${String(min % 60).padStart(2, '0')}`;
                    }
                    // timeStr = `<span class="delay-time">${timeDisplay}</span><span class="original-time">${timeStr}</span>`;
                }

                 // 目的地處理 (傳入行語言)
                let dest = translateStation(t.EndingStationName, rowLangCode);

                // 🔥 使用 Template 克隆（完全避免 innerHTML）
                const clone = template.content.cloneNode(true);
                const tr = clone.querySelector('tr');

                // 設置屬性
                const noteText = (t.Note && String(t.Note).trim().length > 0)
                    ? translateNote(String(t.Note).trim())
                    : status;
                tr.setAttribute('aria-label', `車次 ${t.TrainNo}, 開往 ${dest}, 車種 ${info.name}, 時間 ${timeDisplay}, 備注 ${noteText}`);

                // 🔥 使用 textContent 安全設置內容（完全防止 XSS）
                const cells = tr.querySelectorAll('td');
                cells[0].textContent = String(t.TrainNo);
                cells[1].textContent = dest;
                cells[2].textContent = info.name;

                // 時間顯示
                const timeSpan = document.createElement('span');
                timeSpan.className = isDelayed ? 'expected-time' : 'normal-time';
                timeSpan.textContent = timeDisplay;
                cells[3].appendChild(timeSpan);

                cells[4].textContent = noteText;
                cells[4].className = (t.Note && String(t.Note).trim().length > 0) ? '' : cls;
                cells[4].setAttribute('role', 'gridcell');

                fragment.appendChild(clone);
            });

            // 填充空行
            for (let i = Math.min(list.length, currentMaxRows); i < currentMaxRows; i++) {
                const clone = template.content.cloneNode(true);
                fragment.appendChild(clone);
            }

            // 🔥 一次性插入（性能最佳）
            tb.appendChild(fragment);
        }

            if (isCancel || delay >= 60) {

                    console.log(`[${t.TrainNo}] 後續停靠站：${next || '無(終點)'}`);
                    if (next) {
                        const stopsLabel = currentLangCode === 'zh' ? '沿途停靠：' : 'Stops: ';
                        msg += `${sep}<span style="color:#fff">${stopsLabel}${next}</span>`;
                    }
                    else {
                        const terminalLabel = PIDS_APP.STATE.currentLang === 'zh' ? '▶ 終點站' : '▶ Terminal';
                        msg += `${sep}<span style="color:#fff">${terminalLabel}</span>`;
                    }
                } else {
                    // 找不到本站，顯示除了起點外的所有停靠站
                    let allStops = stops.slice(1).map(formatStation).join(PIDS_APP.STATE.currentLang === 'zh' ? '、' : ' → ');
                    console.log(`[${t.TrainNo}] 找不到本站，顯示所有停靠站：${allStops}`);
                    if (allStops) {
                        const stopsLabel = PIDS_APP.STATE.currentLang === 'zh' ? '沿途停靠：' : 'Stops: ';
                        msg += `${sep}<span style="color:#fff">${stopsLabel}${allStops}</span>`;
                    }
                }
            } else {
                console.warn(`[${t.TrainNo}] 停靠站資料為空或未載入`);
            }

            if (el.innerHTML !== msg) {
                el.innerHTML = msg;
                startMarquee(elId);
            }
        }

        async function checkTopMarquee() {
            try {
                // 🔥 修正: 帶入 station 參數，讓 Worker 能回傳沿途停靠站資訊
                let url = `${TRA_WORKER_URL}/api/pids/marquee`;
                if (GLOBAL_STATION_ID) url += `?station=${GLOBAL_STATION_ID}`;

                let r = await fetch(url);
                let d = await r.json();
                let el = document.getElementById('unifiedTopMarquee');

                if (d.text !== undefined && d.text !== null) {
                    let cleanText = d.text
                        .replace(/\\n/g, "     ")
                        .replace(/[\r\n]+/g, "     ")
                        .replace(/\s{2,}/g, "     ") // 合併多餘空白
                        .replace(/&nbsp;/g, " ")
                        .replace(/&amp;/g, "&")
                        .trim();

                    if (el.dataset.raw !== cleanText) {
                        el.dataset.raw = cleanText;
                        el.textContent = formatMarqueeText(cleanText);
                        startMarquee('unifiedTopMarquee');
                    }
                }
            } catch (e) { console.warn("Top Marquee Error:", e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // ============ 使用新架構初始化 PIDS 系統 ============
            console.log('🚀 PIDS 系統啟動中...');

            // 初始化 PIDS_APP（新架構）
            PIDS_APP.init();

            // 向後兼容：設置舊的全域變數
            const p = new URLSearchParams(location.search);
            GLOBAL_STATION_ID = p.get('station') || PIDS_APP.STATE.stationID;
            currentLang = PIDS_APP.STATE.currentLang;
            lastTrainData = PIDS_APP.STATE.lastTrainData;

            // 🔥 註冊 Service Worker（PWA 離線支援）
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker 註冊成功:', registration.scope);

                        // 檢查更新
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('🔄 新版本可用，請重新整理頁面');
                                    // 可選：顯示更新提示
                                    if (confirm('發現新版本，是否立即更新？')) {
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.warn('⚠️ Service Worker 註冊失敗:', error);
                    });

                // 監聽 Service Worker 控制變化
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('🔄 Service Worker 已更新');
                });
            }

            // 🔥 安裝到桌面提示（PWA）- 優化版
            let deferredPrompt;
            let installButton = null;

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;

                // 🎯 優化：創建自定義安裝按鈕（而非自動 confirm）
                console.log('📱 可安裝為 App');

                // 創建浮動安裝按鈕
                if (!localStorage.getItem('pwa_install_dismissed')) {
                    installButton = document.createElement('div');
                    installButton.id = 'pwa-install-banner';
                    installButton.innerHTML = `
                        <div style="position:fixed;top:20px;right:20px;background:#1976d2;color:#fff;padding:15px 25px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999;cursor:pointer;font-size:1rem;display:flex;align-items:center;gap:10px;animation:slideIn 0.5s ease-out">
                            <i class="fas fa-mobile-alt"></i>
                            <span>安裝 App</span>
                            <button style="background:#fff;color:#1976d2;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-weight:bold;margin-left:10px">安裝</button>
                            <button id="pwa-dismiss" style="background:transparent;color:#fff;border:none;padding:5px;cursor:pointer;font-size:1.2rem">×</button>
                        </div>
                        <style>
                            @keyframes slideIn {
                                from { transform: translateX(400px); opacity: 0; }
                                to { transform: translateX(0); opacity: 1; }
                            }
                        </style>
                    `;
                    document.body.appendChild(installButton);

                    // 安裝按鈕事件
                    installButton.querySelector('button:not(#pwa-dismiss)').addEventListener('click', async () => {
                        if (deferredPrompt) {
                            deferredPrompt.prompt();
                            const { outcome } = await deferredPrompt.userChoice;
                            console.log(outcome === 'accepted' ? '✅ 使用者接受安裝' : '❌ 使用者拒絕安裝');
                            deferredPrompt = null;
                            installButton.remove();
                        }
                    });

                    // 關閉按鈕
                    installButton.querySelector('#pwa-dismiss').addEventListener('click', () => {
                        localStorage.setItem('pwa_install_dismissed', 'true');
                        installButton.remove();
                    });
                }
            });

            // 安裝成功後移除按鈕
            window.addEventListener('appinstalled', () => {
                console.log('✅ PWA 安裝成功！');
                if (installButton) installButton.remove();
            });

            console.log('✅ PIDS 系統初始化完成');
            console.log(`📍 車站: ${PIDS_APP.STATE.stationName} (ID: ${PIDS_APP.STATE.stationID})`);
            console.log(`🌐 語言: ${PIDS_APP.STATE.currentLang.toUpperCase()}`);
            console.log('🚀 Master Class 功能已啟用：');
            console.log('  ✅ Proxy 狀態管理');
            console.log('  ✅ AbortController 防止 Race Condition');
            console.log('  ✅ DocumentFragment 渲染');
            console.log('  ✅ 鍵盤導航支援');
            console.log('  ✅ PWA 離線能力');
        });

        /**
         * 全螢幕功能 (Master Class 版)
         */
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = fullscreenBtn.querySelector('i');

        function toggleFullscreen() {
            const docEl = document.documentElement;
            if (!document.fullscreenElement) {
                // 直接呼叫，不要包在任何 Promise 或 Timeout 裡面
                const requestMethod = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
                if (requestMethod) {
                    requestMethod.call(docEl).catch(err => {
                        console.warn("⚠️ 全螢幕請求被攔截，請確保在點擊後立即執行");
                    });
                }
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // 按鈕點擊事件
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // 監聴全螢幕狀態變化（例如用戶按 ESC）
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenIcon.classList.remove('fa-compress');
                fullscreenIcon.classList.add('fa-expand');
                fullscreenBtn.title = '切換全螢幕';
            }
        });

        // 快捷鍵 F11 也可以切換（可選）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
        });

        /**
         * 格式化時間工具 (Master Class 版)
         * 用於向後兼容和未來擴充
         */
        function formatTime(t) {
            if (!t || typeof t !== 'string') return '--:--';
            return t.substring(0, 5);
        }
    </script>
</body>
