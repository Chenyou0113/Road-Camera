<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣即時快訊 Ｘ 臺灣天氣視界管理後台 - V9.2.5 整合版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === 保留您最愛的黑色系樣式 === */
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        .login-wrapper { display: flex; justify-content: center; align-items: center; flex: 1; padding: 20px; }
        .login-container { width: 100%; max-width: 400px; }
        .dashboard-wrapper { width: 100%; max-width: 98%; margin: 0 auto; padding: 20px; box-sizing: border-box; display: none; }
        .dashboard-wrapper.active { display: block; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); border: 1px solid #333; margin-bottom: 20px; }
        h2 { text-align: center; color: #4fc3f7; margin-bottom: 20px; }
        h3 { color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #2c2c2c; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 15px; outline: none; }
        button { width: 100%; padding: 12px; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { filter: grayscale(1); cursor: not-allowed; }
        .btn-login { background: linear-gradient(135deg, #2196F3, #1976D2); }
        .btn-save { background: linear-gradient(135deg, #43a047, #2e7d32); }
        .btn-pids { background: linear-gradient(135deg, #e91e63, #c2185b); }
        .btn-warn { background: linear-gradient(135deg, #ff9800, #f57c00); }
        .btn-sync { background: linear-gradient(135deg, #00bcd4, #0097a7); }
        .status { text-align: center; margin-top: 10px; font-size: 14px; min-height: 20px; color: #aaa; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        .user-badge { background: #333; padding: 5px 12px; border-radius: 20px; color: #4fc3f7; font-weight: bold; }
        .logout-btn { color: #ff5252; text-decoration: none; font-weight: bold; padding: 5px 10px; border: 1px solid #ff5252; border-radius: 5px; }
        .dashboard-grid { display: grid; grid-template-columns: 3fr 1fr; gap: 25px; }
        .code-display { background: #000; border: 2px dashed #673ab7; color: #b388ff; padding: 15px; text-align: center; font-size: 1.4rem; font-family: monospace; border-radius: 8px; cursor: pointer; }
        #pidsCurrentText { color: #ffeb3b; font-family: monospace; white-space: pre-wrap; word-wrap: break-word; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="login-wrapper" id="loginSection">
        <div class="login-container">
            <div class="card">
                <h2>🔐 後台管理登入</h2>
                <input type="text" id="loginUser" placeholder="管理員帳號">
                <input type="password" id="loginPass" placeholder="管理員密碼">
                <button class="btn-login" onclick="doLogin()">登入系統</button>
                <div class="status" id="loginStatus"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-wrapper" id="editSection">
        <div class="top-nav">
            <div class="nav-left"><strong>王偉預報 & 台鐵 PIDS 整合後台</strong></div>
            <div class="nav-right">
                <span id="currentUser" class="user-badge">User</span>
                <a href="#" onclick="logout()" class="logout-btn">登出</a>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- 左側主要區域 -->
            <div class="grid-col-main">
                <!-- 天氣跑馬燈 -->
                <div class="card">
                    <h3 style="color: #4caf50;"><i class="fas fa-bullhorn"></i> 天氣首頁跑馬燈</h3>
                    <textarea id="message" placeholder="載入中..."></textarea>
                    <button class="btn-save" onclick="saveWeatherMessage()">更新天氣跑馬燈</button>
                    <div class="status" id="weatherStatus"></div>
                </div>

                <!-- PIDS 宣導文字 -->
                <div class="card" style="border-top: 4px solid #e91e63;">
                    <h3 style="color: #e91e63;"><i class="fas fa-desktop"></i> PIDS 跑馬燈內容</h3>
                    <div style="background:#252525; padding:12px; border-radius:6px; margin-bottom:15px; max-height: 150px; overflow-y: auto;">
                        <span style="color:#aaa; font-size:0.8rem;">📍 目前儲存：</span>
                        <span id="pidsCurrentText">載入中...</span>
                    </div>
                    <textarea id="pidsMarqueeInput" style="height: 150px;" placeholder="輸入 PIDS 看板宣導文字..."></textarea>
                    <button class="btn-pids" onclick="savePidsMarquee()">同步至車站看板</button>
                    <div class="status" id="pidsStatus"></div>
                </div>

                <!-- PIDS 多媒體 -->
                <div class="card" style="border-top: 4px solid #2196f3;">
                    <h3 style="color: #2196f3;"><i class="fas fa-photo-video"></i> PIDS 多媒體素材</h3>
                    <label style="font-size:0.8rem; color:#888;">📸 輪播圖片 (一行一個網址)</label>
                    <textarea id="pidsImagesInput" style="height: 100px;"></textarea>
                    <label style="font-size:0.8rem; color:#888;">🎥 影片網址 (一行一個 YouTube 連結)</label>
                    <textarea id="pidsVideoInput" style="height: 100px;"></textarea>
                    <button onclick="savePidsAssets()" style="background: #2196f3;">儲存媒體設定</button>
                    <div class="status" id="pidsAssetsStatus"></div>
                </div>
            </div>

            <!-- 右側側邊欄 -->
            <div class="grid-col-side">
                <!-- 數據同步按鈕 (新增) -->
                <div class="card" style="border-top: 4px solid #00bcd4;">
                    <h3 style="color: #00bcd4;"><i class="fas fa-sync"></i> 數據手動同步</h3>
                    <button class="btn-sync" onclick="triggerPidsSync('live')" style="margin-bottom:10px;">同步即時動態</button>
                    <button class="btn-sync" onclick="triggerPidsSync('schedule')" style="background:#0097a7;">同步全台時刻表</button>
                    <button class="btn-sync" onclick="triggerPidsSync('alerts')" style="background:#00838f; margin-top:10px;">同步通阻公告</button>
                    <div class="status" id="syncStatus"></div>
                </div>

                <!-- 系統彈窗 -->
                <div class="card" style="border-top: 4px solid #ff9800;">
                    <h3><i class="fas fa-exclamation-triangle"></i> 系統彈窗公告</h3>
                    <input type="text" id="ann_title" placeholder="公告標題">
                    <textarea id="ann_content" style="height: 80px;" placeholder="公告內文..."></textarea>
                    <button class="btn-warn" onclick="saveWeatherAnnouncement()">發布公告</button>
                    <div class="status" id="annStatus"></div>
                </div>

                <!-- 邀請碼 -->
                <div class="card">
                    <h3><i class="fas fa-ticket-alt"></i> 邀請碼生成</h3>
                    <div id="newCodeBox" class="code-display" onclick="copyCode()" style="display:none;"></div>
                    <button onclick="generateInvite()" style="background:#673ab7; margin-top:10px;">生成代碼</button>
                    <div class="status" id="inviteStatus"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★ 配置：請確保網址正確
        const WEATHER_API = 'https://wang-weather.xiaoyouwu5-fd3.workers.dev';
        const PIDS_API = 'https://tra-schedule-worker.weacamm.org';

        // 登入邏輯
        function doLogin() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            if (u && p) {
                localStorage.setItem('wangwei_user', u);
                localStorage.setItem('wangwei_pass', p);
                checkAuth();
            }
        }

        function checkAuth() {
            const u = localStorage.getItem('wangwei_user');
            if (u) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('editSection').classList.add('active');
                document.getElementById('currentUser').innerText = u;
                loadAllData();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // 統一請求函式 (帶認證 Header)
        async function apiRequest(url, method = 'GET', body = null, withAuth = true) {
            const headers = {};

            if (withAuth) {
                headers['X-Username'] = localStorage.getItem('wangwei_user') || '';
                headers['X-Password'] = localStorage.getItem('wangwei_pass') || '';
            }
            if (body) {
                headers['Content-Type'] = 'application/json';
            }

            return fetch(url, {
                method,
                headers,
                body: body ? JSON.stringify(body) : null
            });
        }

        async function loadAllData() {
            try {
                // 載入天氣
                const resW = await apiRequest(`${WEATHER_API}/message`, 'GET', null, false);
                const dataW = await resW.json();
                document.getElementById('message').value = dataW.message;

                // 載入系統公告
                const resAnn = await apiRequest(`${WEATHER_API}/announcement`, 'GET', null, false);
                const dataAnn = await resAnn.json();
                document.getElementById('ann_title').value = dataAnn?.title || '';
                document.getElementById('ann_content').value = dataAnn?.content || '';

                // 載入 PIDS 文字
                const resP = await apiRequest(`${PIDS_API}/api/pids/marquee`, 'GET', null, false);
                const dataP = await resP.json();
                document.getElementById('pidsCurrentText').innerText = dataP.text;
                document.getElementById('pidsMarqueeInput').value = dataP.text;

                // 載入 PIDS 素材
                const resA = await apiRequest(`${PIDS_API}/api/pids/assets`, 'GET', null, false);
                const dataA = await resA.json();
                document.getElementById('pidsImagesInput').value = dataA.images.join('\n');
                document.getElementById('pidsVideoInput').value = dataA.video.join('\n');
            } catch (e) { console.error("資料載入失敗", e); }
        }

        // 儲存功能
        async function saveWeatherMessage() {
            const statusEl = document.getElementById('weatherStatus');
            const res = await apiRequest(`${WEATHER_API}/message`, 'POST', { message: document.getElementById('message').value });
            statusEl.innerText = res.ok ? "✅ 天氣跑馬燈已更新" : "❌ 儲存失敗";
        }

        async function savePidsMarquee() {
            const statusEl = document.getElementById('pidsStatus');
            const newText = document.getElementById('pidsMarqueeInput').value;
            const res = await apiRequest(`${PIDS_API}/api/admin/update-pids`, 'POST', { text: newText }, false);
            if (res.ok) {
                statusEl.innerText = "✅ PIDS 文字已更新";
                document.getElementById('pidsCurrentText').innerText = newText;
            } else statusEl.innerText = "❌ 儲存失敗";
        }

        async function savePidsAssets() {
            const statusEl = document.getElementById('pidsAssetsStatus');
            const payload = {
                images: document.getElementById('pidsImagesInput').value.split('\n').filter(s => s.trim()),
                video: document.getElementById('pidsVideoInput').value.split('\n').filter(s => s.trim())
            };
            const res = await apiRequest(`${PIDS_API}/api/admin/update-assets`, 'POST', payload, false);
            statusEl.innerText = res.ok ? "✅ 媒體資源已儲存" : "❌ 儲存失敗";
        }

        async function triggerPidsSync(type) {
            const statusEl = document.getElementById('syncStatus');
            statusEl.innerText = "⏳ 正在同步 ... (可能需要 30 秒)";
            try {
                const res = await apiRequest(`${PIDS_API}/api/sync?type=${encodeURIComponent(type)}`, 'GET', null, false);
                const txt = await res.text();
                statusEl.innerText = res.ok ? "✅ " + txt : "❌ 同步失敗";
            } catch (e) { statusEl.innerText = "❌ 連線超時，請檢查背景同步狀態"; }
        }

        async function saveWeatherAnnouncement() {
            const statusEl = document.getElementById('annStatus');
            const payload = {
                active: true,
                title: document.getElementById('ann_title').value.trim(),
                content: document.getElementById('ann_content').value.trim(),
                list: []
            };

            if (!payload.title || !payload.content) {
                statusEl.innerText = "⚠️ 請輸入公告標題與內容";
                return;
            }

            try {
                const res = await apiRequest(`${WEATHER_API}/announcement`, 'POST', payload, true);
                statusEl.innerText = res.ok ? "✅ 系統公告已發布" : "❌ 發布失敗";
            } catch (e) {
                statusEl.innerText = "❌ 發布失敗，請稍後再試";
            }
        }

        async function generateInvite() {
            const res = await apiRequest(`${WEATHER_API}/generate-invite`, 'POST', {});
            const data = await res.json();
            if (data.success) {
                const box = document.getElementById('newCodeBox');
                box.innerText = data.code;
                box.style.display = 'block';
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('newCodeBox').innerText);
            alert("已複製！");
        }

        checkAuth();
    </script>
</body>
</html>
