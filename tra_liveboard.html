<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵即時看板 - 專業控制台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D84315;
            --bg: #0a0a0a;
            --card: #181818;
            --border: #333;
            --accent: #ff9800;
            --blue: #03a9f4;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body { background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: #000; padding: 15px 20px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .back-btn { background: #333; color: #fff; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-size: 0.9rem; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 15px; }

        /* 通阻公告與跑馬燈 (保留原本功能) */
        .info-panel { background: #3e2723; border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .tra-marquee { background: #fff; color: #333; height: 50px; border-radius: 8px; overflow: hidden; display: flex; align-items: center; padding: 0 15px; margin-bottom: 15px; font-weight: bold; }
        .marquee-content { white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 控制面板與 Tabs */
        .control-panel { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .tab-nav { display: flex; gap: 8px; background: #222; padding: 5px; border-radius: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; background: transparent; color: #888; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr 120px; gap: 12px; align-items: flex-end; }
        .form-group { position: relative; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.8rem; color: #888; font-weight: bold; }
        input, select { background: #252525; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; outline: none; }

        /* Autocomplete 修復 */
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #2c2c2c; border: 1px solid #444; border-radius: 8px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: none; max-height: 300px; overflow-y: auto; }
        /* 自訂捲軸 */
        .suggestions::-webkit-scrollbar { width: 8px; }
        .suggestions::-webkit-scrollbar-track { background: #222; border-radius: 0 8px 8px 0; }
        .suggestions::-webkit-scrollbar-thumb { background: #555; border-radius: 8px; }
        .suggestions::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        .sugg-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #3d3d3d; display: flex; justify-content: space-between; }
        .sugg-item:hover { background: #3d3d3d; color: var(--accent); }

        .btn-query { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* 結果清單與方向切換 */
        .dir-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin: 25px 0 15px; }
        .dir-title { font-size: 1.2rem; font-weight: 900; color: var(--accent); }
        .btn-switch { background: var(--blue); color: #000; border: none; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .pids-btn { background: #222; color: #ffeb3b; border: 1px solid #ffeb3b; padding: 5px 12px; border-radius: 5px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }

        /* 列車卡片 */
        .train-card { background: #111; border-radius: 12px; border: 1px solid #222; margin-bottom: 12px; overflow: hidden; transition: 0.2s; }
        .train-card:hover { border-color: #555; }
        .train-summary { padding: 15px; display: grid; grid-template-columns: 100px 1fr 80px 100px; align-items: center; cursor: pointer; }
        
        /* 視覺車種色彩 */
        .t-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; color: #fff; margin-right: 8px; font-weight: bold; }
        .type-tc { background: #e74c3c; } /* 自強號 紅色 */
        .type-ck { background: #d35400; } /* 莒光號 橘色 */
        .type-lc { background: #2980b9; } /* 區間車 藍色 */
        .type-ot { background: #7f8c8d; } /* 其他 灰底 */

        .t-no { font-weight: 900; font-size: 1.1rem; }
        .t-dest { color: var(--blue); font-weight: bold; font-size: 1.1rem; }
        .t-time { font-family: monospace; font-size: 1.3rem; font-weight: bold; text-align: center; }
        .t-status { text-align: right; font-weight: bold; }
        .status-ok { color: var(--success); }
        .status-late { color: var(--danger); animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }

        /* 時刻表詳情 */
        .detail-pane { display: none; background: #050505; padding: 20px; border-top: 1px solid #222; }
        .timeline { border-left: 2px solid #333; margin-left: 10px; padding-left: 20px; }
        .step { position: relative; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 0.95rem; }
        .step::before { content: ''; position: absolute; left: -26px; top: 6px; width: 10px; height: 10px; background: #444; border-radius: 50%; }
        .step.passed { color: #555; }
        .step.passed::before { background: var(--success); }
        .step.current { color: var(--accent); font-weight: bold; }
        .step.current::before { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        
        .empty-hint { text-align: center; color: #555; padding: 40px; font-style: italic; }

        /* 免責聲明 */
        .disclaimer-box { background: #37474f; border-left: 5px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 20px; font-size: 0.95rem; color: #ddd; line-height: 1.8; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .disclaimer-title { color: var(--accent); font-weight: bold; margin-bottom: 10px; font-size: 1.05rem; display: flex; align-items: center; gap: 8px; }

        /* 淺色模式支援 (Light Mode) */
        body.light-mode { --bg: #f5f5f5; --card: #ffffff; --border: #dddddd; color: #333; }
        body.light-mode .header { background: #ffffff; border-bottom: 2px solid var(--primary); }
        body.light-mode .header h1 { color: #333; }
        body.light-mode .back-btn { background: #eee; color: #333; }
        body.light-mode .control-panel { box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        body.light-mode .tab-nav { background: #e0e0e0; }
        body.light-mode .tab-btn { color: #666; }
        body.light-mode .tab-btn.active { color: #000; }
        body.light-mode input, body.light-mode select { background: #fff; border: 1px solid #ccc; color: #333; }
        body.light-mode .suggestions { background: #fff; border: 1px solid #ccc; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        body.light-mode .sugg-item:hover { background: #f0f0f0; }
        body.light-mode .sugg-item { border-bottom: 1px solid #eee; }
        body.light-mode .sugg-item span:last-child { color: #999 !important; }
        body.light-mode .suggestions::-webkit-scrollbar-track { background: #f1f1f1; }
        body.light-mode .suggestions::-webkit-scrollbar-thumb { background: #ccc; }
        body.light-mode .train-card { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        body.light-mode .detail-pane { background: #fafafa; border-top: 1px solid #eee; }
        body.light-mode .empty-hint { color: #888; border-color: #ddd !important; background: #fff !important; }
        body.light-mode .disclaimer-box { background: #fff; color: #555; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; border-left: 5px solid var(--accent); }
        body.light-mode .step::before { background: #ccc; }
        body.light-mode .timeline { border-left-color: #ddd; }
        body.light-mode #updateTime { color: var(--primary) !important; }
        
        .theme-toggle-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: #ffeb3b; margin-left: 15px; }
        body.light-mode .theme-toggle-btn { color: #f39c12; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .train-summary { grid-template-columns: 1fr 1fr; gap: 10px; }
            .t-time, .t-status { text-align: left; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首頁</a>
    <h1 id="topTitle" style="font-size: 1.4rem; margin: 0;">台鐵即時看板</h1>
    <div style="display: flex; align-items: center;">
        <div id="updateTime" style="font-family: monospace; color: #ffeb3b;">--:--:--</div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn" title="切換深淺色模式">
            <i class="fas fa-sun"></i>
        </button>
    </div>
</header>

<div class="container">
    <!-- 公告面板 -->
    <div id="traAlertPanel" class="info-panel">
        <h3 style="margin:0 0 10px 0; color:var(--accent);">⚠️ 營運通阻</h3>
        <div id="traAlertContent"></div>
    </div>

    <!-- 跑馬燈 -->
    <div class="tra-marquee">
        <div class="marquee-content" id="marqueeText">正在同步台鐵公告資料...</div>
    </div>

    <section class="control-panel">
        <nav class="tab-nav">
            <button class="tab-btn active" onclick="switchMode('station')">車站看板</button>
            <button class="tab-btn" onclick="switchMode('route')">站到站查詢</button>
            <button class="tab-btn" onclick="switchMode('train')">車次追蹤</button>
        </nav>

        <div id="ui-station">
            <style>
                #stationFormRow { grid-template-columns: 1fr 1fr 1fr 90px 100px; gap: 10px; }
                @media (max-width: 768px) {
                    #stationFormRow { grid-template-columns: 1fr; }
                }
            </style>
            <div class="form-row" id="stationFormRow">
                <div class="form-group">
                    <label>路線分類</label>
                    <select id="routeSelect" onchange="renderStationSelect()">
                        <option value="ALL">全部路線</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>搜尋車站</label>
                    <input type="text" id="stationInput" placeholder="輸入站名..." oninput="handleSearch(this)" autocomplete="off">
                    <div id="suggestions" class="suggestions"></div>
                    <input type="hidden" id="selectedID">
                    <input type="hidden" id="selectedNameRaw">
                </div>
                <div class="form-group">
                    <label>選擇車站</label>
                    <select id="stationSelect" onchange="onStationSelectChange()">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>方向</label>
                    <select id="dirSelect">
                        <option value="">全部</option>
                        <option value="0">下行</option>
                        <option value="1">上行</option>
                    </select>
                </div>
                <button class="btn-query" onclick="executeStationQuery()">查詢看板</button>
            </div>
        </div>

        <div id="ui-route" style="display:none;">
            <div class="empty-hint" style="margin-top: 20px; background: #111; border-radius: 8px; border: 1px dashed #444;">
                <i class="fas fa-hammer" style="font-size: 2.5rem; color: #555; margin-bottom: 15px; display: block;"></i>
                時刻表規劃功能正在準備中，請先使用「車次追蹤」。
            </div>
        </div>

        <div id="ui-train" style="display:none;">
            <div class="form-row" style="grid-template-columns: 1fr auto;">
                <div class="form-group">
                    <label>車次號碼</label>
                    <input type="text" id="trainNoInput" placeholder="輸入車次 (如：408)" inputmode="numeric">
                </div>
                <button class="btn-query" onclick="executeTrainTrack()">追蹤車次跑線</button>
            </div>
        </div>
    </section>

        <!-- 資料延遲與免責聲明 -->
    <div class="disclaimer-box" style="margin-top:0; margin-bottom:20px;">
        <div class="disclaimer-title"><i class="fas fa-exclamation-triangle"></i> 資料準確性與延遲提醒：</div>
        <div>
            本看板資料來源為 TDX 平臺加值運算，與臺鐵官網一致但約有 <span style="color: #ff6b6b; padding: 2px 4px; background: rgba(255,107,107,0.1); border-radius: 4px;">1~3 分鐘延遲</span>。<br><br>
            此資料非直接介接車站現場系統，<span style="color: #ff6b6b; border-bottom: 1px dashed #ff6b6b; padding-bottom: 2px;">請勿直接與月台 PIDS 看板比對</span>，若您已進入車站，請務必以現場資訊為主，以免延誤行程。
        </div>
    </div>

    <div id="resultArea"></div>
</div>

<script src="assets/station-code-mapping.js"></script>
<script src="assets/train-line-classification.js"></script>
<script>
    const API = "https://tra-schedule-worker.weacamm.org";
    let allStations = [];
    let currentStationID = "";
    let currentStationName = "";
    let currentDirFilter = "";
    let lastFetchedData = [];

    document.addEventListener('DOMContentLoaded', () => {
        // Init theme from localStorage
        if (localStorage.getItem('tra_theme') === 'light' || (!localStorage.getItem('tra_theme') && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.body.classList.add('light-mode');
            document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>';
        }

        if (typeof stationDataMap !== 'undefined') {
            allStations = Object.entries(stationDataMap).map(([id, d]) => ({ id, name: d.name.replace('站','') }));
        }
        loadTraAlerts();
        startClock();
        if (typeof trainLineClassification !== 'undefined') {
            initRouteDropdowns();
        }
    });

    function initRouteDropdowns() {
        const routeSel = document.getElementById('routeSelect');
        let html = `<option value="ALL">全部路線</option>`;
        
        const grouped = {};
        for(const key in trainLineClassification) {
            const item = trainLineClassification[key];
            if(!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push({ id: key, name: item.name });
        }
        
        for(const cat in grouped) {
            html += `<optgroup label="${cat}">`;
            grouped[cat].forEach(r => {
                html += `<option value="${r.id}">${r.name}</option>`;
            });
            html += `</optgroup>`;
        }
        routeSel.innerHTML = html;

        // Init the station select
        renderStationSelect();
    }

    function renderStationSelect() {
        const routeId = document.getElementById('routeSelect').value;
        const stationSel = document.getElementById('stationSelect');
        let html = '';
        
        if (routeId === 'ALL') {
            html += `<option value="">請選擇路線或直接搜尋...</option>`;
            allStations.forEach(s => {
                html += `<option value="${s.id}">${s.id} - ${s.name}</option>`;
            });
        } else {
            html += `<option value="">請選擇車站...</option>`;
            const route = trainLineClassification[routeId];
            if(route && route.stations) {
                route.stations.forEach(s => {
                    html += `<option value="${s.code}">${s.code} - ${s.name}</option>`;
                });
            }
        }
        stationSel.innerHTML = html;
        
        // Reset hidden inputs when route changes
        document.getElementById('selectedID').value = "";
        document.getElementById('stationInput').value = "";
        document.getElementById('selectedNameRaw').value = "";
    }

    function onStationSelectChange() {
        const sel = document.getElementById('stationSelect');
        if (!sel.value) return;
        const txt = sel.options[sel.selectedIndex].text;
        const [id, name] = txt.split(' - ');
        
        if(id && name) {
            document.getElementById('selectedID').value = id.trim();
            document.getElementById('stationInput').value = name.trim();
            document.getElementById('selectedNameRaw').value = name.trim();
            currentStationID = id.trim();
            currentStationName = name.trim();
        }
    }

    function startClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleTimeString('en-GB');
            if (now.getSeconds() === 0 && currentStationID && document.getElementById('ui-station').style.display !== 'none') {
                executeStationQuery(true);
            }
        }, 1000);
    }
    function toggleTheme() {
        const isLight = document.body.classList.toggle('light-mode');
        document.getElementById('themeBtn').innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        localStorage.setItem('tra_theme', isLight ? 'light' : 'dark');
    }
    async function loadTraAlerts() {
        try {
            const res = await fetch(`${API}/api/alerts`);
            const data = await res.json();
            if (data.length > 0) {
                document.getElementById('traAlertPanel').style.display = 'block';
                document.getElementById('traAlertContent').innerHTML = data.map(a => `<div><strong>${a.Title}</strong>: ${a.Description}</div>`).join('');
                document.getElementById('marqueeText').innerHTML = data.map(a => `【${a.Title}】${a.Description}`).join('   ❖   ');
            } else {
                document.getElementById('marqueeText').innerText = "✅ 目前台鐵全線營運正常，無通阻事件。";
            }
        } catch (e) {
            document.getElementById('marqueeText').innerText = "台鐵公告資料載入失敗。";
        }
    }

    function switchMode(mode) {
        document.getElementById('resultArea').innerHTML = "";
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        ['station','route','train'].forEach(m => document.getElementById(`ui-${m}`).style.display = (m === mode ? 'block' : 'none'));
    }

    function handleSearch(el) {
        const val = el.value.trim().replace(/台/g, '臺');
        const box = document.getElementById('suggestions');
        
        let matches = val ? allStations.filter(s => s.name.includes(val) || s.id.includes(val)) : allStations;
        // 最多還是限制顯示一定數量，避免一次渲染太多導致卡頓 (這裡放寬到全部或前 200 個)
        if (!val) matches = matches.slice(0, 300);

        if (matches.length) {
            box.innerHTML = matches.map(s => `<div class="sugg-item" onclick="selectStation('${s.id}', '${s.name}')"><span>${s.name}站</span><span style="color:#666">${s.id}</span></div>`).join('');
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    // 點擊其他地方時關閉選單
    document.addEventListener('click', (e) => {
        const box = document.getElementById('suggestions');
        const input = document.getElementById('stationInput');
        if (e.target !== box && e.target !== input) {
            box.style.display = 'none';
        }
    });

    function selectStation(id, name) {
        document.getElementById('stationInput').value = name;
        document.getElementById('selectedID').value = id;
        document.getElementById('selectedNameRaw').value = name;
        document.getElementById('suggestions').style.display = 'none';
        currentStationID = id; currentStationName = name;
    }

    // 車種色彩判定
    function getTrainTypeClass(name) {
        if (name.includes('自強') || name.includes('普悠瑪') || name.includes('太魯閣') || name.includes('3000')) return 'type-tc';
        if (name.includes('莒光')) return 'type-ck';
        if (name.includes('區間')) return 'type-lc';
        return 'type-ot';
    }

    // 車種名稱轉換過濾
    function formatTrainType(name) {
        if (name.includes('3000') || name.includes('新自強')) return '新自強';
        if (name.includes('自強') && name.includes('柴')) return '柴自強';
        if (name.includes('太魯閣')) return '太魯閣';
        if (name.includes('普悠瑪')) return '普悠瑪';
        if (name.includes('自強')) return '自強';
        if (name.includes('區間快')) return '區間快';
        if (name.includes('區間')) return '區間';
        if (name.includes('莒光')) return '莒光';
        if (name.includes('復興')) return '復興';
        return name.split('(')[0].trim();
    }

    async function executeStationQuery(isAuto = false) {
        const id = document.getElementById('selectedID').value;
        const nameInfo = document.getElementById('selectedNameRaw').value || document.getElementById('stationInput').value;
        currentDirFilter = document.getElementById('dirSelect').value;
        
        if (!id) return alert("請先選擇車站");
        
        if (!isAuto) document.getElementById('resultArea').innerHTML = '<div style="text-align:center; padding:50px;">⏳ 正在抓取最新時刻資料...</div>';

        try {
            const res = await fetch(`${API}/api/liveboard/station?station=${id}`);
            lastFetchedData = await res.json();
            currentStationID = id;
            currentStationName = nameInfo;
            renderResult();
        } catch (e) { document.getElementById('resultArea').innerHTML = "<div class='empty-hint'>❌ 系統同步失敗</div>"; }
    }

    function renderResult() {
        const resArea = document.getElementById('resultArea');
        resArea.innerHTML = "";

        const pidsUrl = `tra-pids.html?station=${currentStationID}&name=${encodeURIComponent(currentStationName)}`;
        const pidsBtnHtml = `<a href="${pidsUrl}" target="_blank" class="pids-btn"><i class="fas fa-desktop"></i> 開啟車站 PIDS 控制台</a>`;

        const renderGroup = (dir, title) => {
            let filtered = lastFetchedData.filter(t => String(t.Direction) === dir).slice(0, 10);
            if (filtered.length === 0) return "";

            let html = `<div class="dir-header"><span class="dir-title">${title}</span>`;
            if (currentDirFilter !== "") {
                const otherDir = dir === '0' ? '1' : '0';
                const otherTitle = dir === '0' ? '切換至逆行' : '切換至順行';
                html += `<button class="btn-switch" onclick="setDirectionFilter('${otherDir}')"><i class="fas fa-exchange-alt"></i> ${otherTitle}</button>`;
            }
            html += pidsBtnHtml + `</div>`;

            filtered.forEach(t => {
                const delay = parseInt(t.DelayTime || 0);
                const statusStr = t.TrainStatus == 2 ? "停駛" : (delay === 0 ? "準點" : `晚 ${delay} 分`);
                const statusCls = t.TrainStatus == 2 ? "status-late" : (delay > 0 ? "status-late" : "status-ok");
                
                // 套用過濾器
                const typeName = formatTrainType(t.TrainTypeName.Zh_tw);
                const tbClass = getTrainTypeClass(typeName);

                html += `
                    <div class="train-card">
                        <div class="train-summary" onclick="showTrainDetail('${t.TrainNo}', this, '${t.TrainTypeName.Zh_tw}')">
                            <div><span class="t-badge ${tbClass}">${typeName}</span><span class="t-no">${t.TrainNo}</span></div>
                            <div class="t-dest">往 ${t.EndingStationName}</div>
                            <div class="t-time">${t.ScheduledDepartureTime.slice(0,5)}</div>
                            <div class="t-status ${statusCls}">${statusStr}</div>
                        </div>
                        <div class="detail-pane" id="detail-${t.TrainNo}"></div>
                    </div>`;
            });
            return html;
        };

        if (currentDirFilter === "") {
            resArea.innerHTML = renderGroup('1', "逆行 (北上/東行)") + renderGroup('0', "順行 (南下/西行)");
        } else {
            resArea.innerHTML = renderGroup(currentDirFilter, currentDirFilter === '0' ? "順行 (南下/西行)" : "逆行 (北上/東行)");
            if(resArea.innerHTML === "") {
                 resArea.innerHTML = `<div class="empty-hint">此方向目前時段無列車資訊</div>
                 <div style="text-align:center; margin-top:20px;">
                    <button class="btn-switch" onclick="setDirectionFilter('${currentDirFilter === '0' ? '1' : '0'}')">切換至另一方向查看</button>
                 </div>`;
            }
        }
    }

    function setDirectionFilter(newDir) {
        document.getElementById('dirSelect').value = newDir;
        currentDirFilter = newDir;
        renderResult();
    }

    // 將 showDetail 改為包含當前車次的詳細站點時刻邏輯
    async function showTrainDetail(trainNo, el, rawTypeName = '') {
        const pane = el.nextElementSibling;
        if (pane.style.display === 'block') { pane.style.display = 'none'; return; }
        
        // 關閉其他的展開
        document.querySelectorAll('.detail-pane').forEach(p => p.style.display = 'none');
        pane.style.display = 'block';
        pane.innerHTML = '<div style="text-align:center; color:#666;">⌛ 正在讀取該車次全線站序...</div>';

        try {
            // 同時抓取時刻表與該車次的動態 live 資料
            // 動態 Live API: /api/live?trainNo=編號
            // 時刻表 API: /api/schedule?trainNo=編號
            const [schRes, liveRes] = await Promise.all([
                fetch(`${API}/api/schedule?trainNo=${trainNo}`).then(r => r.json()),
                fetch(`${API}/api/live?trainNo=${trainNo}`).then(r => r.json()).catch(() => ({}))
            ]);

            const currentPos = liveRes.TrainLiveBoards?.[0]?.StationName?.Zh_tw || "";
            let html = `<div style="margin-bottom:10px; font-weight:bold; color:var(--accent)">
                            列車動態：${currentPos ? '目前通過/停靠 ' + currentPos : '尚未發車或已抵達終點'}
                        </div>
                        <div class="timeline">`;
            let hasPassed = true;

            if (schRes.StopTimes && schRes.StopTimes.length > 0) {
                schRes.StopTimes.forEach(s => {
                    let cls = hasPassed ? "passed" : "";
                    
                    // 用目前站點來切斷綠色小點的流向
                    if (currentPos && s.StationName.Zh_tw === currentPos) { 
                        cls = "current"; hasPassed = false; 
                    }
                    
                    // 如果一直沒遇到 currentPos，但現在渲染的這站是「你點擊展開的這站」，那就當作分界點
                    if (s.StationName.Zh_tw === currentStationName && !currentPos) {
                        hasPassed = false;
                        cls = "current";
                    }

                    html += `
                        <div class="step ${cls}">
                            <span>${s.StationName.Zh_tw}站</span>
                            <span>${s.DepartureTime.slice(0,5)}</span>
                        </div>`;
                });
            } else {
                html += '<div class="empty-hint">無法獲取此車次的站序資訊</div>';
            }
            pane.innerHTML = html + '</div>';
        } catch (e) { 
            pane.innerHTML = '<div class="empty-hint">無法載入此車次詳情</div>'; 
        }
    }

    async function executeTrainTrack() {
        const no = document.getElementById('trainNoInput').value.trim();
        if (!no) return alert('請輸入車次號碼');
        
        const resArea = document.getElementById('resultArea');
        resArea.innerHTML = `
            <div class="train-card" style="border-color:var(--accent);">
                <div class="train-summary" style="cursor:default">
                    <div><span class="t-badge type-ot">追蹤</span><span class="t-no">${no}</span></div>
                    <div class="t-dest">全線時刻表</div>
                </div>
                <div class="detail-pane" id="temp-detail" style="display:block"></div>
            </div>`;
        
        showTrainDetail(no, { nextElementSibling: document.getElementById('temp-detail') });
    }

    document.addEventListener('click', e => {
        if (!e.target.closest('.form-group')) {
            const sugg = document.getElementById('suggestions');
            if(sugg) sugg.style.display = 'none';
        }
    });
</script>
</body>
</html>
